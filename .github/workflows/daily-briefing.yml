name: Daily Briefing

on:
  schedule:
    - cron: '0 21 * * *'  # UTC 21:00 = JST 06:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build briefing
        run: |
          node src/auto-briefing.js
          echo "Auto-briefing completed..."
          # Persist weekly cache to docs/data for next run
          mkdir -p docs/data
          cp -f output/weekly_papers.json docs/data/ 2>/dev/null || true
          cp -f output/weekly_alerts.json docs/data/ 2>/dev/null || true
          cp -f output/weekly_tech.json docs/data/ 2>/dev/null || true
          echo "Building static site..."
          node src/build-static.js
          echo "Static site built successfully"
        timeout-minutes: 25
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit docs data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update briefing $(date -u -d '+9 hours' +%Y-%m-%d 2>/dev/null || date -u -v+9H +%Y-%m-%d)"
          git push || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
