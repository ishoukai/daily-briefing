<title>Search — 管理くんニュース</title>

<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--card:#FFFFFF;--border:#E8E6E0;--text:#1A1A18;--sub:#6B6960;--accent:#1A5F4A;--red:#9B2C2C;--amber:#92600A;--blue:#1A4B8C;--purple:#5B21B6;--tag-red:#FEF2F2;--tag-amber:#FFFBEB;--tag-blue:#EFF6FF;--tag-green:#F0FDF4;--tag-purple:#F5F3FF;--font-sans:'Noto Sans JP',sans-serif;--font-serif:'Noto Serif JP',serif}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.app-header h1{font-family:var(--font-serif);font-size:18px;font-weight:700;letter-spacing:0.02em;white-space:nowrap}
.app-header nav{display:flex;gap:12px;align-items:center;flex:1}
.app-header nav a{font-size:13px;color:var(--sub);text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;transition:all .15s}
.app-header nav a:hover,.app-header nav a.active{color:var(--accent);background:var(--tag-green)}
.container{max-width:820px;margin:0 auto;padding:24px 20px 80px}
.date-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.date-nav a{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;text-decoration:none;color:var(--sub);background:var(--card);transition:all .15s}
.date-nav a:hover,.date-nav a.current{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card.read{opacity:0.55}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.card h3{font-size:14.5px;font-weight:700;line-height:1.55}
.priority{font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.p-high{background:var(--tag-red);color:var(--red)}
.p-mid{background:var(--tag-amber);color:var(--amber)}
.p-info{background:var(--tag-green);color:var(--accent)}
.p-tech{background:var(--tag-purple);color:var(--purple)}
.card .source-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.card .source{font-size:11px;color:var(--sub)}
.card .link-btn{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid rgba(26,95,74,.25);border-radius:4px;transition:all .15s}
.card .link-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card .body{font-size:13px;color:#3D3D3A;line-height:1.8}
.card .impact{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12.5px;color:var(--accent);font-weight:500;line-height:1.7}
.card .impact::before{content:'-> '}
.card .memo{margin-top:8px;background:#F7F7F5;border-radius:6px;padding:10px 14px;font-size:12.5px;line-height:1.7}
.card .memo strong{color:var(--accent);font-weight:700}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sub);margin:28px 0 14px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.archive-list{list-style:none}
.archive-list li{margin-bottom:8px}
.archive-list li a{font-size:14px;color:var(--accent);text-decoration:none;padding:10px 16px;display:block;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.archive-list li a:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.archive-list li a .count{font-size:12px;color:var(--sub);margin-left:8px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
.collapsible-section{margin-top:8px}
.collapsible-section>summary{list-style:none}
.collapsible-section>summary::-webkit-details-marker{display:none}
.collapsible-section>summary::after{content:' \25B6';font-size:10px}
.collapsible-section[open]>summary::after{content:' \25BC'}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:13.5px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;text-decoration:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:5px;vertical-align:1px}
.panel{display:none}.panel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--sub);margin-top:2px}
.source-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.source-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--sub);background:var(--card)}
.source-pill b{color:var(--text);font-weight:700}
.footer-note{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--sub);line-height:1.7;text-align:center}
.search-box{margin-bottom:20px;display:flex;gap:8px}
.search-box input{flex:1;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-sans);background:var(--card)}
.search-box input:focus{outline:none;border-color:var(--accent)}
.search-results-info{font-size:13px;color:var(--sub);margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.search-results-info b{color:var(--text)}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.card-head{flex-direction:column;gap:4px}.priority{align-self:flex-start}.app-header{flex-direction:column;align-items:flex-start}}</style>
</head>

var DATA=[{"t":"診療報酬改定","s":"厚生労働省の診療報酬改定に関する公式情報。医療機関の経営に直接影響する制度変更の詳細が含まれている。","m":"診療報酬は当クリニックの収益基盤に直結。改定内容によって算定方式や施設基準への対応が必要。","i":"改定内容を精査し、当クリニックの各診療科への影響度を評価、必要な体制変更を検討する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-25"},{"t":"消費税と診療報酬について","s":"厚生労働省による消費税と診療報酬の関係についての公式見解。医療機関の消費税負担と補填措置に関する重要な情報。","m":"消費税は医療機関の経営を圧迫する要因。診療報酬での補填状況は収益性に直接関わる重要事項。","i":"消費税負担の実情と補填状況を確認し、必要に応じて関係機関へ意見提出を検討する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-25"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する公式情報。感染症対策や届出基準などの情報が含まれる。","m":"感染症対策の一環として把握。当院での感染症診療時の参考情報として保管。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-25"},{"t":"Mandrola’s Top 4 Trials from ACC 2026","s":"ACC 2026からの主要4つの臨床試験結果について循環器専門医による解説。循環器領域の最新エビデンスと診療への影響を評価。","m":"内科（循環器）での診療方針に直接影響する可能性。最新ガイドライン変更の前兆として重要。","i":"循環器診療における最新エビデンスを確認し、診療プロトコルの更新を検討。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/mandrolas-top-4-trials-acc-2026-details-matter-2026a10008ti?src=rss","d":"2026-03-25"},{"t":"Can Exercise Ease ‘Chemobrain’ During Chemotherapy?","s":"化学療法中の認知機能低下（ケモブレイン）に対する運動療法の効果について検討。がん治療における supportive careの新たなアプローチ。","m":"がん患者の紹介時に運動療法の重要性を伝達。地域のリハビリ施設との連携強化の参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/can-exercise-ease-chemobrain-during-chemotherapy-2026a10008pl?src=rss","d":"2026-03-25"},{"t":"FDA Seeks New Warning for Certain Parkinson&apos;s Drugs","s":"FDAが特定のパーキンソン病薬に対する新たな警告表示を検討中。薬剤安全性情報として医療従事者への注意喚起が必要。","m":"内科でのパーキンソン病薬処方時の安全性確認事項として把握。処方見直しの参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/fda-seeks-new-warning-seizure-risk-certain-parkinsons-drugs-2026a10008lk?src=rss","d":"2026-03-25"},{"t":"AI chatbot use for health information up 16% from 2024: Rock Health survey","s":"2 ed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41865332/","d":"2026-03-23"},{"t":"AISF practice guidance on pharmacological treatment of metabolic-dysfunction associated steatotic liver disease and steatohepatitis (MASLD/MASH): A 2026 Update.","s":"代謝機能異常関連脂肪性肝疾患（MASLD）の薬物治療に関するイタリア肝臓学会の2026年版診療ガイダンス。レスメチロムとセマグルチドが第3相試験で組織学的有効性を示している。","m":"当院の糖尿病患者で脂肪肝合併例が多い。新薬承認時の導入準備と適応患者の洗い出しを行う必要がある。","i":"糖尿病・肥満患者の脂肪肝管理において新薬導入時期と適応基準を検討する必要","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41864758/","d":"2026-03-23"},{"t":"PANoptosis in Alzheimer's disease: The expanding landscape of programmed cell death mechanisms and therapeutic interventions.","s":"アルツハイマー病におけるPANoptosis（複数の細胞死経路を統合したプログラム細胞死）の役割と治療介入の可能性について解説した総説。基礎研究レベルの内容。","m":"直接的な診療への影響は限定的だが、認知症患者の病態理解の参考となる。将来の治療法開発動向として把握。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41864364/","d":"2026-03-23"},{"t":"Malnutrition: an overlooked geriatric syndrome in older adults with type 2 diabetes.","s":"2型糖尿病高齢者における栄養失調が見過ごされがちな老年症候群として注目されている。糖尿病研究で栄養失調が軽視される傾向を指摘。","m":"当院の糖尿病外来で高齢患者の栄養評価が不十分な可能性。栄養士との連携強化と評価システム構築を検討すべき。","i":"糖尿病高齢患者の栄養状態評価を診療プロトコルに組み込む検討が必要","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41863684/","d":"2026-03-23"},{"t":"Effect of Glucagon-Like-Peptide-1 Receptor Agonists (GLP-1 RA) on Neuropsychiatric Outcomes: A Systematic Review and Meta-Analysis.","s":"GLP-1受容体作動薬の神経精神学的効果に関する系統的レビューとメタ解析。認知機能低下、気分障害、物質使用障害への効果を検討している。","m":"当院でのGLP-1薬使用患者で認知機能や精神状態の変化を観察する価値あり。多科連携の強化も検討課題。","i":"GLP-1薬処方時の多面的効果を患者説明に含め、精神科的既往の確認を強化する","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41862354/","d":"2026-03-23"},{"t":"Angiography-derived fractional flow reserve versus coronary angiography to guide coronary artery bypass grafting in patients undergoing surgical valve procedures with concomitant coronary artery disease in China (FAVOR IV-QVAS): a multicentre, triple-blind, randomised trial.","s":"心臓弁膜症手術と同時冠動脈バイパス術において、血管造影由来FFRによる生理学的評価が従来の解剖学的評価より良好な結果をもたらすかを検討した中国の多施設無作為化試験。","m":"循環器診療での参考情報だが、クリニックレベルでの直接的な影響は限定的。専門医療機関への紹介判断の参考程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41864747/","d":"2026-03-23"},{"t":"Effect of a clinical decision support system on stroke care quality and outcomes in patients with acute ischaemic stroke (GOLDEN BRIDGE II): cluster randomised clinical trial.","s":"急性虚血性脳卒中患者に対する臨床意思決定支援システム（CDSS）の効果を検討した中国の多施設クラスター無作為化試験。AI支援画像解析等を含む。","m":"脳卒中診療の質向上に関する参考情報。当院では脳卒中の急性期治療は行わないが、予防・管理での参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41862204/","d":"2026-03-23"},{"t":"Increased risk of stroke in patients with psoriasis: A systematic review and meta-analysis.","s":"乾癬患者における脳卒中リスク増加を示すメタ解析。70万人超の乾癬患者を含む18研究を解析し、脳卒中リスクの有意な増加を確認。","m":"耳鼻科外来でも皮膚症状を訴える患者がいる。乾癬疑い患者では心血管リスク評価と適切な専門医紹介が重要。","i":"皮膚症状で受診する患者の心血管リスク評価を強化し、必要に応じて循環器科紹介を検討","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861197/","d":"2026-03-23"},{"t":"On-target, off-tumor oral toxicities of talquetamab in heavily pretreated multiple myeloma.","s":"多発性骨髄腫治療薬タルケタマブの口腔毒性に関するレビュー。GPRC5D標的療法による舌・唾液腺・角化組織への副作用について解説。","m":"血液悪性疾患の専門的治療に関する内容で、クリニックでの直接的な関連性は低い。専門医療機関での治療情報として参考程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860737/","d":"2026-03-23"},{"t":"Management of Takayasu Arteritis - A 2026 Update.","s":"高安動脈炎の管理に関する2026年版アップデート。疾患活動性と血管損傷の評価法、PET血管活動性スコア等の新しい評価指標について解説。","m":"稀少疾患に関する専門的内容で、クリニックでの遭遇頻度は極めて低い。専門医療機関への紹介判断時の参考情報程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860699/","d":"2026-03-23"},{"t":"What Psychology Can Do For Everyday Life.","s":"心理学が日常生活において、コミュニケーション能力や人間関係の改善、ストレス管理に役立つことが証明されている。ポジティブな感情を対象とした練習により、人々はより幸福感を感じ、うつ症状が軽減されることが示されている。","m":"患者やスタッフのメンタルヘルス向上に応用可能。クリニックの職場環境改善や患者満足度向上の参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41863102/","d":"2026-03-23"},{"t":"Features of mobile apps for diabetic kidney disease self-management: A scoping review.","s":"糖尿病性腎症の自己管理を支援するモバイルアプリの機能に関するレビュー研究。糖尿病性腎症と慢性腎臓病の長期管理において、効果的な自己管理を支援するモバイルアプリが患者に利益をもたらす可能性がある。","m":"糖尿病内科として、患者の腎症管理にモバイルアプリを活用できる。治療成績向上と患者満足度向上につながる可能性。","i":"糖尿病患者の自己管理支援ツールの導入検討や、デジタルヘルス活用戦略の策定が必要。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860840/","d":"2026-03-23"},{"t":"IMPlementing IMProved Asthma self-management as RouTine (IMP2ART) in UK primary care: An internal pilot for a cluster randomised controlled trial.","s":"英国のプライマリケアにおいて、個別化された喘息アクションプランと定期的な専門家レビューを含む支援付き自己管理の実装に関する研究。この支援により予定外の受診が減少し、喘息の転帰と生活の質が改善される。","m":"小児科での小児喘息管理に応用可能。患者教育プログラムの充実により、急患対応の負担軽減が期待できる。","i":"呼吸器疾患患者の自己管理支援プログラムの導入を検討し、予定外受診の削減を図る。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860818/","d":"2026-03-23"},{"t":"Fecal microbiota transplantation in chronic liver disease: Current and future state of the art.","s":"慢性肝疾患における腸内細菌叢移植（FMT）の現状と将来展望に関するレビュー。肝硬変、肝性脳症、アルコール性肝疾患の治療にFMTが有効である可能性が示されている。","m":"消化器内科として、将来的な治療選択肢として注視が必要。現時点では研究段階だが、慢性肝疾患患者への新たなアプローチとなる可能性。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860558/","d":"2026-03-23"},{"t":"A person-centred ehealth intervention for fall prevention in nursing homes lacking geriatric expertise: cost-effectiveness analysis within a randomised controlled trial.","s":"老人医学の専門知識が不足している介護施設における転倒予防のための個人中心型eヘルス介入の費用対効果分析。遠隔医療プログラムが医療過疎地域の介護施設入居者の転倒予防に効果的である可能性が示された。","m":"高齢患者の多いクリニックとして、転倒予防への取り組みや遠隔医療の活用に関する参考情報。地域医療連携の観点でも有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860310/","d":"2026-03-23"},{"t":"Cost-effectiveness of treatment and care of patients with gastrointestinal inflammatory diseases: a systematic review.","s":"炎症性腸疾患患者の治療とケアの費用対効果に関する系統的レビュー。生物学的製剤と非生物学的製剤の比較、異なる生物学的療法間の比較、治療順序戦略について検討している。","m":"消化器内科として、IBD患者の治療選択や費用対効果を考慮した治療戦略の策定に参考となる情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861399/","d":"2026-03-23"},{"t":"Artificial intelligence for acute appendicitis diagnosis: A systematic review of current evidence, challenges, and future directions.","s":"急性虫垂炎診断における人工知能の活用に関する系統的レビュー。AIが診断精度の向上、臨床意思決定の支援、陰性虫垂切除術率の削減に有望なツールとして注目されている。","m":"消化器外科として、急性虫垂炎の診断精度向上は重要課題。AI活用により誤診リスク軽減と医療の質向上が期待できる。","i":"AI診断支援ツールの導入検討や、急性腹症患者の診断精度向上のための体制整備を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861187/","d":"2026-03-23"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"進行食道扁平上皮癌の一次治療におけるPD-1阻害剤と化学療法併用の有効な患者サブグループに関する系統的レビューとメタ解析。欧州医薬品庁が高PD-1発現ESCCの一次治療として承認している。","m":"消化器外科分野の最新治療情報として参考。食道癌患者の紹介タイミングや連携先選択の判断材料となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-23"},{"t":"Effectiveness of exercise interventions in patients with colorectal cancer during adjuvant chemotherapy: a systematic review and meta-analysis.","s":"大腸癌患者の術後補助化学療法中における運動介入の有効性に関する系統的レビューとメタ解析。運動能力、筋力、疲労、痛み、末梢神経障害、不安、うつ、生活の質への影響を検討している。","m":"大腸癌患者の術後ケアや生活指導において、運動療法の重要性を認識し、患者教育や連携先との情報共有に活用できる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860634/","d":"2026-03-23"},{"t":"The roles and heterogeneity of CD8+ T cells in inflammatory bowel disease: A narrative review of insights from single&#x2011;cell transcriptomics (Review).","s":"単一細胞トランスクリプトミクスを用いた炎症性腸疾患におけるCD8+ T細胞の役割と不均一性に関するレビュー。IBDにおいてCD8+ T細胞は顕著な表現型と機能的多様性を示し、特定のT細胞サブセットの標的調節により治療機会が期待される。","m":"IBD患者の病態理解と将来的な個別化治療の可能性を示す研究。消化器内科として患者への説明や治療選択の参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860039/","d":"2026-03-23"},{"t":"PD-1/PD-L1 inhibitors in recurrent or metastatic nasopharyngeal carcinoma: A systematic review and meta-analysis.","s":"上咽頭がんの再発・転移例に対するPD-1/PD-L1阻害薬の治療効果について9つの研究を対象とした系統的レビュー。883人の患者データを解析し、免疫チェックポイント阻害薬の有効性と安全性を評価している。","m":"耳鼻咽喉科での上咽頭がん診療への参考となる最新治療情報。一般クリニックでは直接的な影響は限定的だが、専門医との連携時の知識として有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861185/","d":"2026-03-23"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"進行食道扁平上皮がんの一次治療において、PD-1阻害薬と化学療法の併用療法の有効な患者群を特定するための系統的レビューとメタ解析。欧州医薬品庁がPD-1高発現例での併用療法を承認している。","m":"消化器がん診療の最新動向として把握。当院では内視鏡診断から専門病院への紹介判断に活用できる情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-23"},{"t":"Telehealth Approaches for Pediatric Otitis Media and Clinical Outcomes: Scoping Review.","s":"小児中耳炎に対するテレヘルス技術の応用と臨床成果に関するスコーピングレビュー。従来の対面診療に代わるデジタルツールの診断精度や実装成果を包括的に調査している。","m":"当院の小児科・耳鼻咽喉科での中耳炎診療効率化に直結。テレヘルス導入による診療アクセス向上と収益機会の拡大が期待される。","i":"小児科・耳鼻咽喉科でのテレヘルス導入可能性を検討し、遠隔診療体制の構築を準備する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41850731/","d":"2026-03-23"},{"t":"Advances in imaging modalities and tumor classification for vestibular schwannomas.","s":"前庭神経鞘腫に対する画像診断技術の進歩と腫瘍分類に関するレビュー。MRIが診断のゴールドスタンダードであり、高解像度MRIやDTIなどの先進技術が病変の特徴づけや手術計画の精緻化に貢献している。","m":"耳鼻咽喉科診療での画像診断精度向上の参考情報。めまい患者の精査時により適切な専門医紹介判断が可能となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41838294/","d":"2026-03-23"},{"t":"Maternal 12-HETE is associated with childhood asthma and the responses to prenatal omega-3 supplementation.","s":"母体血中12-HETEが小児喘息発症と関連し、妊娠中のオメガ3脂肪酸補給の効果に影響することを2つのコホート研究で実証。母体の12-HETE欠乏が小児の呼吸器疾患リスクと関連している。","m":"小児科での喘息予防相談時の参考情報。妊娠中の栄養指導や小児喘息の予防的アプローチに活用できる知見。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41850235/","d":"2026-03-23"},{"t":"An observational, cohort, multi-centre, open label phase IV extension study comparing IPV immune responses to preschool dTaP-IPV booster vaccines in children whose mothers received or did not receive an IPV-containing pertussis vaccine during pregnancy in England.","s":"英国での妊娠中百日咳ワクチン接種が小児のポリオワクチン免疫応答に与える影響を調査した第IV相拡大試験。妊娠中dTaP-IPVワクチン接種母の児では、就学前ブースター接種後の抗体価を評価している。","m":"小児科でのワクチン接種スケジュールと効果に関する参考情報。妊娠中ワクチン接種の影響を理解した適切な予防接種指導に活用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41690287/","d":"2026-03-23"},{"t":"Long-term protection of an inactivated enterovirus type 71 vaccine against hand, foot, and mouth diseases in children: a modelling study.","s":"エンテロウイルス71型ワクチンの手足口病に対する20年間の長期防御効果を数学モデルで予測した研究。第3相試験データを用い、抗体減衰動態をSegmented Power-law Modelで解析している。","m":"小児科での手足口病対策とワクチン相談時の参考情報。ワクチンの長期有効性を理解した適切な予防接種指導に役立つ。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41650673/","d":"2026-03-23"},{"t":"Ontology-Based Medication Named Entity Recognition Using Pretrained Transformer Models From a Thai Hospital: Model Fine-Tuning and Validation Study.","s":"タイの病院記録から薬剤情報を抽出するため、オントロジーベースのアノテーションと事前訓練済みTransformerモデルを活用した固有表現認識フレームワークの構築と検証を行った研究。","m":"医療DX推進における電子カルテデータ活用の参考事例。タイ・英語混合記録の処理技術は当院の多言語対応にも応用可能性あり。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861368/","d":"2026-03-23"},{"t":"Feasibility of a Large Language Model Chatbot to Support Parental Understanding in the PICU.","s":"PICU（小児集中治療室）での保護者支援を目的とした大規模言語モデルチャットボットの実現可能性を評価した前向き研究。GPT-4oベースのHIPAA準拠チャットボットで患者固有のEHRデータを活用している。","m":"小児科での保護者への説明支援ツールとして応用可能。AI技術による診療効率化と患者満足度向上の両立が期待される新しいアプローチ。","i":"AI診療支援ツールの導入可能性を検討し、患者・家族とのコミュニケーション向上策を準備する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860987/","d":"2026-03-23"},{"t":"SegMan-based dual-prior network with boundary-augmented hybrid attention for robust skin lesion segmentation.","s":"皮膚病変の自動分割技術を向上させるAI手法に関する研究。境界の曖昧さや形態学的多様性などの課題に対処する新しいネットワークアーキテクチャを提案している。","m":"皮膚科診療でのAI診断支援技術の発展。直接的な診療報酬への影響は現時点では限定的だが、将来的な診療効率化の可能性。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41849365/","d":"2026-03-23"},{"t":"Detection of rare medical events in electronic health records using machine learning: Current practices and suggestions - A scoping review.","s":"電子健康記録（EHR）での稀少医療事象をAIで検出する研究のスコーピングレビュー。医療データの不均衡やAI異常検知の現状と課題を整理している。","m":"当クリニックの電子カルテデータを活用した診断支援AI導入の参考となる。稀少疾患の見逃し防止に寄与する可能性。","i":"電子カルテシステムでのAI活用による稀少疾患の早期発見体制構築を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41838695/","d":"2026-03-23"},{"t":"Generating synthetic CEM from low-energy images using deep learning: A future without contrast media? A proof-of-concept study.","s":"深層学習を用いて低エネルギー画像から造影剤使用画像を合成生成する技術の概念実証研究。将来的に造影剤なしでの診断が可能になる可能性を示している。","m":"放射線画像診断での造影剤使用量削減の可能性。患者負担軽減と診療効率化の観点で将来的に注目すべき技術動向。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41838331/","d":"2026-03-23"},{"t":"Impact of Basal Ganglia Perivascular Spaces on Ischemic and Hemorrhagic Risks in Patients Taking Antithrombotic Therapies.","s":"抗血栓療法を受けている患者において、基底核周囲血管周囲腔の拡大が虚血性・出血性イベントリスクに与える影響を調査した多施設前向き観察研究。","m":"当院の循環器内科診療で抗凝固薬処方時の判断材料として活用可能。脳出血リスク評価の精度向上に寄与。","i":"循環器患者の抗血栓療法選択時にMRI所見も考慮したリスク評価を強化する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861278/","d":"2026-03-23"},{"t":"Relationship between cerebral perfusion and cognition in white matter hyperintensities of presumed vascular origin: A prospective 3D-pCASL study.","s":"血管性白質病変における脳血流と認知機能の関係を3D動脈スピンラベリング法で調査した前向き研究。脳小血管疾患の病態解明を目的としている。","m":"認知症予防や早期発見の観点で参考となる基礎研究。直接的な診療への応用は限定的だが、将来的な診断技術向上に寄与。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861232/","d":"2026-03-23"},{"t":"Experienced stigma in Japanese outpatients with diabetes: Age and polypharmacy matter.","s":"日本の糖尿病外来患者における体験的スティグマの調査研究。年齢や多剤服用が糖尿病関連スティグマに影響することを明らかにした単施設横断研究。","m":"当院の糖尿病診療において患者の心理的負担を理解し、より良い療養指導や診療環境整備の参考となる重要な知見。","i":"糖尿病患者の心理的負担軽減のための診療体制やコミュニケーション方法を見直す。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861231/","d":"2026-03-23"},{"t":"Factors involved in the improvement of prolonged symptoms in patients with COVID-19 treated with Japanese traditional (Kampo) medicine: A single-center, prospective, observational study.","s":"COVID-19後遺症患者に対する漢方薬を含む治療レジメンの効果を調査した単施設前向き観察研究。症状改善に関与する因子を分析している。","m":"COVID-19後遺症への対応として漢方薬併用の参考データ。当院でも後遺症患者への治療選択肢として検討可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861186/","d":"2026-03-23"},{"t":"The lived experience of adolescents with X-linked hypophosphataemia treated with burosumab at end of skeletal growth: a mixed-methods analysis.","s":"X連鎖性低リン血症の思春期患者におけるburosumab治療の経験を調査した多施設混合研究法による前向き研究。骨格成長終了前後での治療体験を記述している。","m":"稀少疾患の治療に関する研究で、小児科診療での参考情報。直接的な診療機会は限定的だが、専門的知識として有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860923/","d":"2026-03-23"},{"t":"診療報酬改定","s":"診療報酬改定","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-23"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬について","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-23"},{"t":"ジカウイルス感染症","s":"ジカウイルス感染症","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-23"},{"t":"Quantifying Cardiac Amyloid Burden","s":"心臓アミロイドーシスの定量的評価に関する研究。循環器診療における診断技術の進歩について。","m":"当クリニックの循環器内科での診断精度向上に参考となる情報。将来的な検査技術導入の参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/quantifying-cardiac-amyloid-burden-2026a10007jw?src=rss","d":"2026-03-23"},{"t":"Axitinib Ups Neuroendocrine Tumor Objective Response Rate","s":"アキシチニブが神経内分泌腫瘍の奏効率を向上させるという研究結果。がん治療薬の新たな適応について。","m":"消化器外科での腫瘍治療に関連する可能性。専門医との連携強化の参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/axitinib-boosts-neuroendocrine-tumor-objective-response-rate-2026a10008jd?src=rss","d":"2026-03-23"},{"t":"Waste Not, Want Not: Scientists Turn Plastic Into Levodopa","s":"プラスチック廃棄物からレボドパを生成する技術に関する研究。パーキンソン病治療薬の新製造法について。","m":"将来的な薬価や供給安定性に影響する可能性。環境配慮の製薬技術の動向として注目。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/waste-not-want-not-scientists-turn-plastic-levodopa-2026a10008jh?src=rss","d":"2026-03-23"},{"t":"Employee Dies Of Meningitis in North France, Company Says no Link to UK Outbreak","s":"フランス北部で髄膜炎による従業員死亡事例。英国のアウトブレイクとの関連性は否定されている感染症事例。","m":"小児科では髄膜炎の早期診断が重要。成人でも内科で対応する場合があり注意が必要。","i":"髄膜炎の診断・対応手順の再確認と院内感染対策の点検を実施。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/s/viewarticle/employee-dies-meningitis-north-france-company-says-no-link-2026a10008jq?src=rss","d":"2026-03-23"},{"t":"Lifelike 3D-Printed ‘Training Brains’ React Like Real Organs","s":"実際の臓器のように反応する3Dプリント製「訓練用脳」の開発。医療訓練技術の革新について。","m":"医療従事者の技術向上に寄与する可能性。将来的な研修制度への応用を検討材料として参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/lifelike-3d-printed-training-brains-react-real-organs-2026a10008if?src=rss","d":"2026-03-23"},{"t":"Suicidality May Predict Focal Epilepsy Treatment Resistance","s":"自殺傾向が焦点性てんかんの治療抵抗性を予測する可能性があるという研究結果。精神症状とてんかん治療の関連について。","m":"内科での薬物治療時の精神症状への注意喚起として参考。専門医への紹介タイミングの判断材料。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/suicidality-may-predict-treatment-resistance-newly-diagnosed-2026a10008i9?src=rss","d":"2026-03-23"},{"t":"Mixed Results for Psilocybin as Blinding Concerns Remain","s":"サイロシビンの治療効果について混合的な結果が報告されており、盲検化の課題が残っている。精神医学領域での新たな治療選択肢として注目されている。","m":"精神科専門医との連携や紹介の際の知識として有用。現時点では直接的な診療への影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mixed-results-psilocybin-blinding-concerns-remain-2026a10008id?src=rss","d":"2026-03-23"},{"t":"Recent Activity Matters for Dementia Risk in Older Adults","s":"高齢者において最近の身体活動が認知症リスクに影響することが示された。運動習慣の維持が認知機能保護に重要である。","m":"糖尿病や循環器疾患患者への生活指導で活用可能。予防医療の観点から患者指導に有用な情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/recent-activity-matters-dementia-risk-older-adults-2026a10008gy?src=rss","d":"2026-03-23"},{"t":"Rules for Thee, Not for Me: Neuroscience & Double Standards","s":"神経科学における二重基準について論じた記事。医療従事者の倫理的行動や判断における一貫性の重要性を扱っている。","m":"医療倫理や組織運営における判断基準の一貫性確保の参考となる。スタッフ教育にも活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/rules-thee-not-m 病指導に活用可能。新たな指導料算定の機会。","i":"呼吸指導や呼吸器系診療の強化、患者教育プログラムの検討。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD045XB0U6A300C2000000/","d":"2026-03-23"},{"t":"放射線の知識、国民に周知を 福島の中間貯蔵施設を訪ねて","s":"福島の中間貯蔵施設を通じて、放射線に関する正確な知識の普及啓発の重要性について論じられている。","m":"放射線検査時の患者説明に参考となるが、直接的な診療や経営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD045BG0U6A300C2000000/","d":"2026-03-23"},{"t":"テレワーク社会の落とし穴 体力が10歳分下がり、議論が偏りがちに","s":"テレワークの普及により体力低下や議論の偏りなどの健康・社会的問題が生じている。働き方の変化が健康に与える影響を指摘。","m":"糖尿病・循環器疾患患者の増加予測。特定保健指導や生活習慣病管理指導の需要拡大。","i":"生活習慣病患者の増加対応、運動指導強化、企業健診での啓発活動検討。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOSG174BJ0X10C26A2000000/","d":"2026-03-23"}];
var input=document.getElementById('search-input');
var info=document.getElementById('search-info');
var results=document.getElementById('search-results');
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pclass(p){return p==='要対応'?'p-high':p==='要注視'?'p-mid':p==='テック'?'p-tech':'p-info'}
function search(){
  var q=input.value.trim().toLowerCase();
  if(!q){info.style.display='none';results.innerHTML='';return}
  var matches=DATA.filter(function(a){
    return (a.t+' '+a.s+' '+a.m+' '+a.i+' '+a.src).toLowerCase().indexOf(q)>=0;
  });
  info.style.display='block';
  info.innerHTML='<b>'+matches.length+'</b> 件見つかりました';
  results.innerHTML=matches.slice(0,50).map(function(a){
    return '<div class="card"><div class="card-head"><h3>'+esc(a.t)+'</h3><span class="priority '+pclass(a.p)+'">'+esc(a.p)+'</span></div>'
      +'<div class="source-line"><span class="source">'+esc(a.src)+' — '+esc(a.d)+'</span>'
      +(a.u?'<a class="link-btn" href="'+esc(a.u)+'" target="_blank" rel="noopener">原文 ↗</a>':'')
      +'</div><div class="body">'+esc(a.s)+'</div></div>';
  }).join('');
}
input.addEventListener('input',search);
</script>
