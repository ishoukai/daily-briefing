ir for patients’ sake","s":"英国の国民保健サービスがパランティア社の技術を活用していることについての記事。医療データ管理システムの効果が報告されている。","m":"電子カルテやデータ分析システムの導入検討時の参考情報。医療DX推進の動向把握。","i":"医療DXやデータ管理システム導入の参考として情報収集が必要。","src":"FT","p":"要注視","u":"https://www.ft.com/content/4ceee73c-b816-490c-a2ca-fc3896f5f51b","d":"2026-04-17"},{"t":"診療報酬改定","s":"厚生労働省の診療報酬改定に関する公式情報。医療機関の収益に直接影響する重要な制度変更が含まれている可能性が高い。","m":"診療報酬改定はクリニック経営の根幹に関わる最重要事項。改定内容の詳細確認と対応準備が必須。","i":"診療報酬改定の詳細を確認し、算定方法や施設基準の変更に対応する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-16"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が説明している。消費税率変更時の診療報酬への影響や補填措置について記載されている可能性が高い。","m":"消費税は医療機関の収支に直接影響する重要事項。特に設備投資や医薬品購入時の消費税負担との関係で経営判断に影響する。","i":"消費税関連の診療報酬の取り扱いを確認し、請求業務への影響を把握する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-16"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症の情報提供ページ。蚊媒介感染症として注意が必要な疾患の基本情報が掲載されている。","m":"海外渡航患者からの相談や診療時の参考情報として活用可能。感染症対策の基礎知識として把握しておくべき内容。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-16"},{"t":"Direct Oral Anticoagulants Linked to Fewer Brain Bleeds","s":"直接作用型経口抗凝固薬（DOAC）が脳出血のリスクを従来の抗凝固薬より低減することが示された研究結果。循環器診療における薬剤選択に重要な知見。","m":"循環器内科を標榜する当院にとって、心房細動患者等への処方選択に直接関わる重要な情報。患者安全性向上につながる。","i":"循環器内科での抗凝固薬処方方針の見直しを検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/direct-oral-anticoagulants-linked-fewer-brain-bleeds-2026a1000bfx?src=rss","d":"2026-04-16"},{"t":"Pollution, Poverty, May Age the Brain as Much as AD","s":"環境汚染や貧困が脳の老化に与える影響がアルツハイマー病と同程度に深刻である可能性を示した研究。社会的決定要因が健康に与える影響の知見。","m":"患者の生活環境を考慮した診療アプローチの参考情報。予防医療の観点から患者指導に活用できる知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/pollution-poverty-may-age-brain-much-alzheimers-disease-2026a1000bs1?src=rss","d":"2026-04-16"},{"t":"Wake-Up Call: Sleep Loss, Fatigue Risk in Senior Surgeons","s":"高齢外科医における睡眠不足と疲労リスクに関する研究。外科医の疲労が医療安全に与える影響について警鐘を鳴らしている。","m":"当クリニックに外科はないが、医療安全管理の観点から医師の労働環境や疲労管理は参考になる知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/wake-call-sleep-loss-fatigue-risk-senior-surgeons-2026a1000bs3?src=rss","d":"2026-04-16"},{"t":"Positive Age Beliefs Linked to Functional Gains","s":"加齢に対する前向きな信念が身体機能の改善と関連しているという研究結果。高齢患者のQOL向上に心理的要因が重要であることを示唆。","m":"高齢患者への診療姿勢や指導方法の参考として有用。患者のメンタルヘルス向上が身体機能改善につながる可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/positive-age-beliefs-linked-functional-gains-2026a1000brx?src=rss","d":"2026-04-16"},{"t":"The Fascinating Phenomenon That Is Your Brain on Exercise","s":"運動が脳に与える興味深い現象について解説した記事。運動による脳機能への好影響のメカニズムに関する最新知見を紹介。","m":"患者への運動療法指導の根拠として活用可能。糖尿病や循環器疾患患者への生活指導に科学的背景を提供。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/fascinating-phenomenon-your-brain-exercise-2026a1000bqz?src=rss","d":"2026-04-16"},{"t":"Study Identifies Novel Stress-Inflammation Pathway in AD","s":"アトピー性皮膚炎における新たなストレス・炎症経路が特定された研究。ストレスが皮膚疾患に与える影響メカニズムを解明。","m":"皮膚科は当クリニックの専門外だが、ストレスと疾患の関連は内科診療でも参考となる病態理解の知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/how-stress-gets-under-skin-atopic-dermatitis-novel-2026a1000bqq?src=rss","d":"2026-04-16"},{"t":"Medicare’s WISeR Prior Authorization Model: Is It Wise?","s":"メディケアのWISeR事前承認モデルの有効性について検討。医療費適正化と診療効率化の観点から制度評価を行っている。","m":"米国の制度だが、日本でも診療報酬の事前承認制度拡大の参考となる。将来的な制度変更の方向性を示唆。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/medicares-wiser-model-really-wiser-way-manage-prior-2026a1000ara?src=rss","d":"2026-04-16"},{"t":"Are Medical Errors Driven by Systems Rather Than Clinicians?","s":"医療過誤が臨床医個人ではなくシステムに起因するかを検討した研究。医療安全の観点からシステム改善の重要性を指摘。","m":"医療安全管理者の配置が義務化される中、個人責任からシステム改善への転換は当クリニックの安全管理に直結。","i":"医療安全管理体制の見直しとシステム改善による過誤防止策の検討が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/are-medical-errors-driven-systems-rather-than-clinicians-2026a1000bp2?src=rss","d":"2026-04-16"},{"t":"Countertransference: A Practical Picture for All Physicians","s":"全ての医師に向けた逆転移に関する実践的な解説記事。患者との関係性における医師の感情反応について説明している。","m":"患者対応の質向上や医師のメンタルヘルス管理の観点で参考となるが、即座の対応は不要な一般的な医師教育内容。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/countertransference-practical-picture-all-physicians-2026a1000b0k?src=rss","d":"2026-04-16"},{"t":"Urologists Reckon With Ketamine’s Toll on the Bladder","s":"ケタミンが膀胱に与える悪影響について泌尿器科医が対処している状況。ケタミン使用増加に伴う副作用への対応が課題。","m":"泌尿器科は専門外だが、薬物依存やメンタルヘルス関連で内科診療でも遭遇する可能性がある副作用の知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/urologists-reckon-ketamines-toll-bladder-2026a1000blo?src=rss","d":"2026-04-16"},{"t":"Providers back bipartisan bill eliminating Medicare chronic care management cost sharing","s":"アメリカで慢性疾患管理に関するメディケアの患者負担を撤廃する超党派法案が提出され、医療提供者が支持している。慢性疾患管理サービスの患者負担軽減により利用率向上が期待される。","m":"当院の内科（糖尿病・循環器）では慢性疾患管理が主要業務。海外動向は日本の制度改定の参考となる可能性がある。","i":"日本でも慢性疾患管理加算の制度変更動向を注視し、糖尿病・循環器診療での収益影響を検討する必要がある。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/providers-back-new-bipartisan-bill-eliminating-medicare-chronic-care-management-cost","d":"2026-04-16"},{"t":"Behavioral health utilization is up with anxiety disorders leading demand, report finds","s":"行動療法・精神科医療の利用が増加しており、不安障害が需要を牽引している。テレヘルスの利用は安定化傾向にあることが報告されている。","m":"小児科では発達・行動面の相談が増加傾向。精神科医療の需要増は他科への影響も考慮すべき動向。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/trilliant-report-behavioral-health-utilization-telehealth-plateauing","d":"2026-04-16"},{"t":"Physician compensation up 3% in 2025, but not all specialties saw raises: Medscape","s":"2025年の医師報酬が3%上昇したが、すべての専門科で上昇したわけではないという米国の調査結果。専門科による報酬格差の実態を示している。","m":"海外の医師報酬動向として参考情報。日本の診療報酬改定議論の際の比較材料として有用な情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/physician-compensation-3-2025-not-all-specialties-saw-raises-medscape","d":"2026-04-16"},{"t":"Keebler Health secures $16M in series A funding for AI-powered risk adjustment platform","s":"Keebler HealthがAI活用したリスク調整プラットフォームで1600万ドルの資金調達を実施。医療AIスタートアップの動向を示している。","m":"医療AI分野の投資動向として参考情報。将来的な医療DX導入検討時の市場動向把握に有用。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/keebler-health-secures-16m-series-funding","d":"2026-04-16"},{"t":"Abridge expands clinical decision support solution with UpToDate partnership, new NEJM, JAMA content tie-ups","s":"AbridgeがUpToDateとの提携により臨床意思決定支援ソリューションを拡張し、NEJMやJAMAとのコンテンツ連携も開始した。AI診療支援ツールの機能強化が進んでいる。","m":"当院でもAI問診システム等の導入を検討中。臨床意思決定支援の高度化は診療の質向上に寄与する可能性。","i":"AI診療支援ツールの導入検討において、最新の機能拡張動向を踏まえた製品選定を行う。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/abridge-expands-clinical-decision-support-capabilities-uptodate-partnership","d":"2026-04-16"},{"t":"Hospitals with more disadvantaged patients fall short on price transparency, study finds","s":"社会的に不利な立場にある患者を多く抱える病院ほど、価格透明性の要求を満たしていないとする研究結果が発表された。医療格差と透明性の課題が浮き彫りになっている。","m":"価格透明性は今後日本でも重要課題となる可能性。当院でも料金体系の明確化は患者満足度向上につながる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/hospitals-more-disadvantaged-patients-fall-short-price-transparency-study","d":"2026-04-16"},{"t":"参天製薬、成長賭ける「自由診療」市場　近視薬など5000施設へ","s":"参天製薬が自由診療市場に注力し、近視進行抑制薬などを5000施設に展開する戦略を発表。眼科領域の自由診療市場拡大が示されている。","m":"当院では眼科は標榜していないが、近隣の眼科連携や自由診療分野への参入検討材料として重要な市場動向。","i":"眼科関連の自由診療導入可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF139AM0T10C26A3000000/","d":"2026-04-16"},{"t":"松本医師会会長「手袋など医療物資が不足」　医療提供体制確保に全力","s":"松本医師会会長が手袋などの医療物資不足について言及し、医療提供体制確保への取り組みを表明。医療物資の供給不安定化が示唆されている。","m":"医療物資不足は診療継続に直接影響する重要な問題。当院でも同様の供給リスクがあり、事前対策が必要。","i":"医療物資の在庫管理と調達先の多様化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA1534W0V10C26A4000000/","d":"2026-04-16"},{"t":"脳死臓器移植の実績多い病院、厚労省が重点支援　東大・九大など候補","s":"厚生労働省が脳死臓器移植の実績が多い病院への重点支援を検討している。東京大学病院や九州大学病院などが候補として挙がっている。移植医療の推進体制強化が目的とみられる。","m":"臓器移植は高度医療機関での対応であり、クリニックレベルでの直接的な影響は限定的。移植医療の動向として把握しておく価値はある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA151930V10C26A4000000/","d":"2026-04-16"},{"t":"犬猫生活、23日上場　佐藤淳社長「動物病院のグループ化で成長」","s":"犬猫生活が動物病院のグループ化戦略で成長を目指し上場。動物病院業界の統合・規模拡大の動向を示している。","m":"獣医師との連携や動物病院業界の動向把握に参考。人材確保競争への影響も考慮すべき。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC075EC0X00C26A4000000/","d":"2026-04-16"},{"t":"第一三共、市販薬売却でがん領域に集中投資　海外大手に対抗","s":"第一三共が市販薬事業を売却し、がん領域への集中投資を発表。製薬業界の戦略転換を示している。","m":"がん治療薬の開発動向や市販薬市場への影響を注視。将来的な薬価や供給への影響可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC154BL0V10C26A4000000/","d":"2026-04-16"},{"t":"アステラス会長｢ロボとAIで再生医療を産業に｣　科学大で実験施設稼働","s":"アステラス製薬会長が、ロボットとAIを活用した再生医療の産業化について言及。東京科学大学で実験施設が稼働開始した。再生医療分野での技術革新が進展している。","m":"再生医療は将来的な医療技術の方向性として重要。現在のクリニック診療への直接的影響は少ないが、長期的な医療動向として把握が必要。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC152OQ0V10C26A4000000/","d":"2026-04-16"},{"t":"「眠らぬ科学者」ロボ、がん研究効率は人の100倍　東京科学大で稼働","s":"東京科学大学で「眠らぬ科学者」ロボットが稼働開始し、がん研究の効率が人の100倍に向上した。AI・ロボット技術による研究効率化が実現している。","m":"研究効率化の技術革新として興味深いが、現在のクリニック診療への直接的影響は限定的。将来的な医療技術発展の方向性として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG028HO0S6A300C2000000/","d":"2026-04-16"},{"t":"日本ゲノム医療推進機構が発足　難病・がん患者の全ゲノム解析","s":"日本ゲノム医療推進機構が発足し、難病やがん患者の全ゲノム解析を推進する。個別化医療の基盤整備が本格化している。ゲノム医療の普及拡大が期待される。","m":"ゲノム医療は個別化医療の基盤技術。将来的にクリニックでもゲノム情報を活用した診療が普及する可能性があり、動向把握が重要。","i":"将来的なゲノム医療の診療報酬体系や連携体制の変化に備える必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOSG147OG0U6A410C2000000/","d":"2026-04-16"},{"t":"アステラス、膵がん治療薬候補の最終治験開始","s":"アステラス製薬が膵がん治療薬候補の最終段階の治験を開始した。新たな膵がん治療選択肢の登場が期待される。承認されれば治療法の選択肢が拡大する。","m":"消化器外科のクリニックとして、膵がん治療薬の動向は専門領域に関連する。ただし治験段階であり、現在の診療への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC157RZ0V10C26A4000000/","d":"2026-04-16"},{"t":"サントリーHD、第一三共の市販薬事業を買収 2465億円見込み","s":"サントリーホールディングスが第一三共の市販薬事業を2465億円で買収する見込み。医薬品業界の再編が進んでいる。","m":"医薬品業界の再編は薬価や供給に影響する可能性。処方薬への間接的影響を注視する必要がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC152O90V10C26A4000000/","d":"2026-04-16"},{"t":"持田製薬、不妊治療向けのバイオ後続品開発 中国企業と契約","s":"持田製薬が中国企業と契約し、不妊治療向けのバイオ後続品開発に参入する。不妊治療薬のコスト削減と治療アクセス改善が期待される。","m":"小児科として不妊治療の動向は周辺領域として関連するが、クリニックでの不妊治療実施は一般的でないため直接的影響は少ない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC157RW0V10C26A4000000/","d":"2026-04-16"},{"t":"腸内細菌新興バクテリコの菅沼CEO「個人に最適な補助薬を開発へ」","s":"腸内細菌新興企業バクテリコの菅沼CEOが個人に最適化された補助薬の開発を進めている。個別化医療の進展により、従来の画一的な治療から個人の体質に合わせた治療への転換が進んでいる。","m":"消化器内科での腸内環境改善治療や、糖尿病患者の個別化医療への対応が将来的に必要になる可能性がある。","i":"個別化医療の動向を注視し、糖尿病治療における新たな補助薬の可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQODL144Y00U6A410C2000000/","d":"2026-04-16"},{"t":"サノフィ日本法人､25年売上高は5%増2404億円 アトピー薬がけん引","s":"サノフィ日本法人の2025年売上高が5%増の2404億円となり、アトピー薬が成長をけん引している。アトピー性皮膚炎治療薬の需要増加と治療選択肢の拡大が続いている。","m":"小児科においてアトピー性皮膚炎の患者が多く、新薬の効果と費用対効果を検討して治療方針に反映させる必要がある。","i":"小児科でのアトピー性皮膚炎治療における新薬の処方動向と薬価を確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC1454Y0U6A410C2000000/","d":"2026-04-16"},{"t":"マニーの25年9月〜26年2月期、純利益33%増 歯科機器が好調","s":"医療機器メーカーのマニーが25年9月から26年2月期にかけて純利益33%増となり、歯科機器が好調な業績を支えている。歯科医療機器市場の成長が続いている。","m":"当院は歯科診療を行っていないが、医療機器業界全体の好調さは医療機器コスト上昇の可能性を示唆している。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC146WP0U6A410C2000000/","d":"2026-04-16"},{"t":"第一三共の肺がん治療薬候補、米国で申請受理 10月に審査完了へ","s":"第一三共の肺がん治療薬候補が米国で承認申請を受理され、10月に審査完了予定。新たな肺がん治療選択肢の登場が期待される。","m":"内科・呼吸器領域として肺がん治療薬の動向は関連するが、クリニックレベルでのがん治療は限定的なため直接的影響は少ない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1427Q0U6A410C2000000/","d":"2026-04-16"},{"t":"25年度の医療機関倒産、過去20年で最多の71件 商工リサーチ調べ","s":"2025年度の医療機関倒産件数が過去20年で最多の71件に達した。医療機関の経営環境悪化が深刻化している。","m":"医療機関の経営難が業界全体の課題。同業他院の状況把握と自院の競争力確保が急務。","i":"自院の財務状況を再点検し、経営基盤強化策の検討・実行が必要。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUC143N50U6A410C2000000/","d":"2026-04-16"},{"t":"歯科用手袋の安定供給を 上野厚労相、業界団体に要請","s":"上野厚労相が歯科用手袋の安定供給を業界団体に要請した。医療用消耗品の供給不安定化が懸念されている状況を示している。","m":"歯科用ではないが医療用手袋等の消耗品全般の供給状況に影響する可能性があり、在庫管理の参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA140YM0U6A410C2000000/","d":"2026-04-16"},{"t":"中国海南島にロシア人の波 欧米代替リゾート、医療ツアーでも誘引","s":"中国海南島でロシア人向け医療ツーリズムが拡大している。国際的な医療サービス需要の変化を示している。","m":"医療ツーリズムの動向参考程度。当院のような地域密着型クリニックには直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGM10AG50Q6A410C2000000/","d":"2026-04-16"},{"t":"膵臓がん治験薬で生存期間2倍 米レボリューション、株価一時40%高","s":"米レボリューション社の膵臓がん治験薬で生存期間が2倍に延長。がん治療に革新的な進歩の可能性を示している。","m":"消化器内科・外科を有する当院にとって重要な治療選択肢の進歩。患者・家族への情報提供準備が必要。","i":"消化器がん患者への情報提供準備と、将来的な治療選択肢拡大への対応検討。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOGN13B130T10C26A4000000/","d":"2026-04-16"},{"t":"デジタル機器の視聴、平日8時間以上が3割 ロート製薬が万博で調査","s":"デジタル機器を平日8時間以上視聴する人が3割に達することが調査で判明。デジタル機器使用による健康影響が懸念される。","m":"デジタル疲労や生活習慣病への影響が予想される。患者指導や予防医学的アプローチの強化が必要。","i":"眼科疾患や生活習慣病患者への生活指導強化と、デジタル機器関連症状への対応準備。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF133FY0T10C26A4000000/","d":"2026-04-16"},{"t":"調剤薬局の倒産件数、25年度は30件で過去最多 帝国データ","s":"2025年度の調剤薬局倒産件数が30件で過去最多を記録した。調剤薬局業界の経営環境悪化が深刻化している状況が明らかになった。","m":"処方箋発行先の調剤薬局との連携に影響する可能性があり、患者の利便性確保のため複数の薬局との関係構築が重要。","i":"院外処方箋の応需先薬局の経営状況を確認し、患者への影響を最小化する対策を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC137GS0T10C26A4000000/","d":"2026-04-16"},{"t":"テルモの腹部ステント、米FDAから画期的機器に指定 優先審査に","s":"テルモの腹部ステントが米FDAから画期的機器に指定され、優先審査の対象となった。日本の医療機器メーカーの技術力向上と海外展開が進んでいる。","m":"循環器内科では関連する医療機器だが、当院での直接的な利用は限定的。医療機器の技術革新動向として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1370M0T10C26A4000000/","d":"2026-04-16"},{"t":"久光製薬、26年2月期純利益12%減 上場最後の決算","s":"久光製薬が2026年2月期純利益12%減の見通しを発表。上場最後の決算となる。","m":"製薬業界の業績動向参考。外用薬メーカーの状況として、処方薬への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB130GF0T10C26A4000000/","d":"2026-04-16"},{"t":"大塚製薬、PTSD薬30年ごろ発売へ ピーク時売上1000億円も","s":"大塚製薬がPTSD治療薬を2030年頃に発売予定で、ピーク時売上1000億円を見込んでいる。精神科治療領域の拡大を示している。","m":"メンタルヘルス需要増加に対応。PTSD患者の早期発見・適切な紹介体制の構築が重要。","i":"PTSD患者への対応体制検討と、精神科との連携強化の準備が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC100TL0Q6A410C2000000/","d":"2026-04-16"},{"t":"「脳は老化する」とあきらめない 脳を活性化する秘策とは","s":"脳の老化に対する新たなアプローチや脳を活性化する方法について解説した記事。高齢化社会における認知機能維持への関心が高まっている。","m":"糖尿病や循環器疾患患者の認知機能低下予防に関連する知見として、患者指導や啓発活動の参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD316LJ0R30C26A3000000/","d":"2026-04-16"},{"t":"不祥事続いた東大病院 現場のがん専門医が思うことは","s":"東京大学病院で続発した不祥事について、現場のがん専門医の視点から論じられている。大学病院の医療安全や組織運営の課題が浮き彫りになっている。","m":"大学病院の組織運営の問題であり、クリニック経営への直接的影響は少ない。ただし医療安全管理の重要性を再認識する材料として参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD019V90R00C26A4000000/","d":"2026-04-16"},{"t":"「AIが論文投稿」の時代に 学術的に価値ある使い方、学会など検討へ","s":"AI論文投稿の時代に入り、学術的価値ある使い方について学会等で検討が始まっている。医学研究におけるAI活用の課題を示している。","m":"医学情報の質的変化や学術論文の信頼性評価への影響。継続的な医学知識アップデートが重要。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA0646X0W6A400C2000000/","d":"2026-04-16"},{"t":"入院前から退院後見据え支援 福祉とも連携、納得感高める","s":"入院前から退院後までを見据えた包括的な患者支援体制について、福祉分野との連携強化により患者の納得感を高める取り組みが紹介されている。","m":"外来から入院への紹介や退院後のフォローアップにおいて、地域の福祉サービスとの連携強化が患者満足度向上につながる。","i":"地域包括ケアシステムでの役割を見直し、福祉分野との連携体制を強化する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC0751Y0X00C26A1000000/","d":"2026-04-16"},{"t":"OpenAI releases new cyber security model to limited group of customers","s":"OpenAIが限定顧客にサイバーセキュリティ専用の新モデルを公開。AnthropicのMythosがソフトウェアのバグ発見能力への懸念を受けてのリリース。","m":"医療機関のサイバーセキュリティ強化に関連する可能性がある。電子カルテシステムの保護に参考となる技術動向。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/cf3d62e0-1b6c-4e69-b5f7-facaca586dbf","d":"2026-04-16"},{"t":"Mythos and the cyber security risk facing all states","s":"Mythosとサイバーセキュリティリスクが全ての国家に与える脅威について。AIは原子爆弾のような技術で、発明後は異なる世界に住むことになると分析。","m":"AIのサイバーセキュリティリスクは医療機関のデータ保護にも関連。患者情報管理システムのセキュリティ対策に参考。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/4334460f-b599-4578-8840-d1c7ecf01e08","d":"2026-04-16"},{"t":"Senior NHS officials warned staff over criticising rollout of Palantir platform","s":"英国NHSの上級職員が、パランティア社のプラットフォーム導入に対する批判を控えるよう職員に警告した。倫理的異議と不均等な導入により、この技術企業との契約はイングランドの医療サービス内で分裂を招く問題となっている。","m":"海外の医療DX事例として参考程度。データ活用プラットフォーム導入時の組織内反発は日本でも起こり得る課題。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/ff701533-aa19-4ab0-80ff-70c9420f37d9","d":"2026-04-16"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-15"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-15"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-15"},{"t":"Medicare’s WISeR Prior Authorization Model: Is It Wise?","s":"メディケアのWISeR事前承認モデルについて、その賢明性を問う記事。米国の医療保険制度における事前承認プロセスの新しいモデルに関する評価と議論。","m":"日本の保険診療でも事前承認が必要な治療がある。米国の制度変更は将来的に日本にも影響する可能性。","i":"米国の事前承認制度の動向を把握し、国内の保険制度への影響を注視する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/medicares-wiser-model-really-wiser-way-manage-prior-2026a1000ara?src=rss","d":"2026-04-15"},{"t":"Are Medical Errors Driven by Systems Rather Than Clinicians?","s":"医療過誤が臨床医個人ではなくシステムに起因するものかどうかを論じる記事。医療安全における個人責任とシステム要因の関係性について議論している内容。","m":"クリニックの医療安全管理は重要な経営課題。システム要因の視点は医療事故防止と賠償リスク軽減に関連。","i":"医療安全管理体制の見直しと、システム改善による医療過誤防止策を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/are-medical-errors-driven-systems-rather-than-clinicians-2026a1000bp2?src=rss","d":"2026-04-15"},{"t":"Countertransference: A Practical Picture for All Physicians","s":"全ての医師に向けた逆転移（カウンタートランスファレンス）の実践的な理解について解説する記事。医師と患者の関係性における心理的な相互作用に関する内容。","m":"患者対応の質向上に関連する内容。特に精神的なケアが必要な糖尿病患者などとの関係構築に参考になる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/countertransference-practical-picture-all-physicians-2026a1000b0k?src=rss","d":"2026-04-15"},{"t":"Urologists Reckon With Ketamine’s Toll on the Bladder","s":"ケタミンが膀胱に与える損傷について泌尿器科医が対処している状況を報告。ケタミン使用に伴う泌尿器系への副作用と臨床的な課題について論じている記事。","m":"ケタミンの副作用は内科診療でも留意すべき点。特に糖尿病患者の合併症管理時に薬物相互作用を考慮する必要がある。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/urologists-reckon-ketamines-toll-bladder-2026a1000blo?src=rss","d":"2026-04-15"},{"t":"MS Risk Upped Significantly With EBV Mononucleosis","s":"エプスタイン・バーウイルス（EBV）による伝染性単核症が多発性硬化症（MS）のリスクを有意に増加させるという研究結果。EBV感染とMS発症の関連性が科学的に裏付けられた。","m":"内科や小児科での診療において、EBV感染症の長期リスクを理解することは重要。患者への説明や診療方針に参考となる医学的知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/ms-risk-upped-significantly-ebv-mononucleosis-2026a1000bjd?src=rss","d":"2026-04-15"},{"t":"Teleneurology Bests On-Site Rounds for Postacute Stroke","s":"急性期後脳卒中ケアにおいて、遠隔神経学診療が対面での回診よりも優れた結果を示した。テレヘルスの有効性が脳卒中後ケアで実証された。","m":"循環器内科で脳卒中後フォローを行う際、遠隔診療の導入により患者ケアの質向上と効率化が期待できる。","i":"脳卒中後患者に対する遠隔診療導入の検討と、循環器内科での活用可能性を評価する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/teleneurology-bests-site-rounds-postacute-stroke-care-2026a1000biq?src=rss","d":"2026-04-15"},{"t":"Ready or Not, LLMs Are Coming for Medicine","s":"大規模言語モデル（LLM）が医療分野に急速に浸透している現状について。医療従事者が準備の有無に関わらず、AI技術の医療応用が進んでいる。","m":"AI問診システムや診療支援ツールの導入検討が必要。医療DXの波に乗り遅れないよう早期準備が重要。","i":"クリニック運営でのAI導入計画を策定し、スタッフ教育と患者対応準備を進める。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/ready-or-not-llms-are-coming-medicine-2026a1000b2m?src=rss","d":"2026-04-15"},{"t":"EMA Tightens Liver Safety Rules for Epilepsy Drug","s":"欧州医薬品庁（EMA）が抗てんかん薬の肝安全性規制を強化した。肝障害リスクの高い薬剤に対する監視体制が厳格化された。","m":"内科での薬剤処方において、肝機能への影響を慎重に評価する必要性が高まっている。安全管理体制の強化が求められる。","i":"抗てんかん薬処方時の肝機能検査頻度と安全性モニタリング体制を見直す。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/ema-tightens-liver-safety-rules-epilepsy-drug-2026a1000bcw?src=rss","d":"2026-04-15"},{"t":"NICU Procedures Cause Lasting Pain in Preterm Infants","s":"新生児集中治療室での医療処置が早産児に持続的な痛みを引き起こすという研究結果。小児医療における痛み管理の重要性が示された。","m":"当院小児科での処置や検査時の疼痛管理プロトコル見直しが必要。患者家族への説明方法も含めて対応検討。","i":"小児科診療時の痛み軽減対策と処置方法の見直しを検討する","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/nicu-procedures-cause-lasting-pain-preterm-infants-2026a1000bby?src=rss","d":"2026-04-15"},{"t":"Knee Osteoarthritis Pain Relief Seen With Neurotrophin-3 Inhibition","s":"膝関節症の疼痛に対してニューロトロフィン-3阻害による治療効果が確認された。新たな疼痛治療のメカニズムが明らかになった。","m":"整形外科領域の新たな治療アプローチ。当院では整形外科診療は行っていないが、疼痛管理の知見として参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/knee-osteoarthritis-pain-relief-seen-neurotrophin-3-2026a1000b2w?src=rss","d":"2026-04-15"},{"t":"WebMD Ignite rolls out program to help providers get Rural Health Transformation efforts off the ground","s":"WebMD Igniteが地方医療変革支援プログラムを開始。プロバイダーの地方医療改革推進を支援するサービスが登場した。","m":"地方でのクリニック経営における外部支援サービス活用の参考事例。医療DXや変革支援ツールの動向として注目。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/webmd-ignite-rolls-out-program-help-providers-get-rural-health-transformation-efforts","d":"2026-04-15"},{"t":"‘The next opioid epidemic’: Gambling legalization outpaces public health response to addiction","s":"ギャンブル依存症が「次のオピオイド危機」として警告されている。ギャンブル合法化の進展に対し、公衆衛生対応が追いついていない状況。","m":"メンタルヘルスケアの新たな課題として、ギャンブル依存症への対応が必要になる可能性。行動依存症の診療体制検討の参考。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/next-opioid-epidemic-gambling-addiction-grows-legalization-outpaces-public-health","d":"2026-04-15"},{"t":"Wavelet Medical, Aegis Ventures partner on first AI non-invasive fetal EEG monitoring platform","s":"ウェーブレット・メディカルとイージス・ベンチャーズが提携し、世界初のAI非侵襲胎児脳波モニタリングプラットフォームを開発。","m":"産科領域の新技術。当院では産科診療は行っていないが、AI医療技術の進歩動向として把握しておく価値あり。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/wavelet-aegis-partner-first-ai-non-invasive-fetal-eeg-monitoring-platform","d":"2026-04-15"},{"t":"New Mental Health Parity Index highlights where disparities persist","s":"新しいメンタルヘルス格差指標が発表され、精神医療における格差の実態が明らかになった。メンタルヘルス医療の不平等が続いている分野が特定された。","m":"メンタルヘルスケアにおける患者アクセスの改善や、精神科連携強化の必要性を示す指標として参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/new-mental-health-parity-index-highlights-where-disparities-persist","d":"2026-04-15"},{"t":"CMS taps 150 digital health companies, providers for ACCESS Model","s":"CMS（米国メディケア・メディケイド・サービス・センター）がACCESSモデルに150社のデジタルヘルス企業と医療提供者を選定した。このモデルは米国の医療制度改革の一環と考えられる。","m":"米国のデジタルヘルス政策動向。日本の医療DX推進の参考になる可能性があるが、直接的な影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/digital-health/cms-taps-150-digital-health-companies-providers-access-model","d":"2026-04-15"},{"t":"Healthcare spending varies widely between metropolitan areas: HCCI","s":"HCCI（医療費情報連携協議会）の調査によると、米国の都市圏間で医療費支出に大きな格差があることが判明した。地域による医療費の違いが明確になっている。","m":"米国の医療費格差に関する情報。日本でも地域医療格差は課題だが、直接的な経営判断への影響は少ない。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/finance/healthcare-spending-varies-widely-between-metropolitan-areas-hcci","d":"2026-04-15"},{"t":"「眠らぬ科学者」ロボ、がん研究効率は人の100倍　東京科学大で稼働","s":"東京科学大学でがん研究の効率を人の100倍向上させる研究ロボットが稼働開始。AI・ロボット技術による研究開発の自動化が進展している。","m":"研究開発分野の技術革新。クリニック運営への直接影響はないが、将来的な医療技術の進歩動向として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG028HO0S6A300C2000000/","d":"2026-04-15"},{"t":"後期高齢者の医療保険料、月7989円　過去最高の見通し","s":"後期高齢者の医療保険料が月7989円と過去最高になる見通し。高齢者の医療費負担増加が継続している。","m":"保険料上昇により患者の受診行動に変化が生じる可能性。特に糖尿病など継続治療が必要な患者への影響要注意。","i":"患者の受診控えや治療継続への影響を注視し、相談体制の充実を検討する","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA10C4L0Q6A410C2000000/","d":"2026-04-15"},{"t":"アスクル、医療用手袋やビニールテープに購入制限　中東情勢受け","s":"アスクルが中東情勢を受けて医療用手袋やビニールテープの購入制限を実施。地政学的リスクが医療消耗品の供給に影響を与えている状況。","m":"クリニック運営に必要な医療消耗品の調達リスクに直結。供給不安定化への対策が急務となる可能性。","i":"医療消耗品の代替調達先の検討と在庫管理の見直しが必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC147NU0U6A410C2000000/","d":"2026-04-15"},{"t":"日本ゲノム医療推進機構が発足　難病・がん患者の全ゲノム解析","s":"日本ゲノム医療推進機構が発足し、難病・がん患者の全ゲノム解析を推進する体制が整備された。国内のゲノム医療基盤の構築が進展している。","m":"当院の診療科目では直接的な影響は限定的。将来的に遺伝子診断や個別化医療への対応検討が必要になる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG147OG0U6A410C2000000/","d":"2026-04-15"},{"t":"膵臓がん治験薬で生存期間2倍 米レボリューション、株価一時40%高","s":"米レボリューション社の膵臓がん治験薬が生存期間を2倍に延長する結果を示し、同社株価が一時40%上昇。新たながん治療薬の可能性を示唆。","m":"消化器内科・外科での膵臓がん診療には関連するが、治験段階であり直接的な影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN13B130T10C26A4000000/","d":"2026-04-15"},{"t":"サノフィ日本法人､25年売上高は5%増2404億円 アトピー薬がけん引","s":"サノフィ日本法人の2025年売上高が前年比5%増の2404億円となった。アトピー性皮膚炎治療薬の好調な販売が売上増加を牽引している。","m":"アトピー治療薬の普及は内科での処方機会増加につながる。患者紹介ルートの構築が重要。","i":"アトピー治療薬の処方動向を把握し、皮膚科専門医との連携を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC1454Y0U6A410C2000000/","d":"2026-04-15"},{"t":"マニーの25年9月〜26年2月期、純利益33%増 歯科機器が好調","s":"医療機器メーカーのマニーが2025年9月〜2026年2月期において純利益33%増を記録した。歯科機器事業の好調が業績をけん引している。","m":"歯科機器業界の好調は医療業界全体の活況を示すが、当クリニックの診療科目には直接関係しない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC146WP0U6A410C2000000/","d":"2026-04-15"},{"t":"第一三共の肺がん治療薬候補、米国で申請受理 10月に審査完了へ","s":"第一三共の肺がん治療薬候補が米国で承認申請を受理され、10月に審査完了予定。新規がん治療薬の開発が進展している。","m":"がん治療薬の動向。当院の診療科目では直接的な影響は限定的だが、医療業界全体の新薬開発動向として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1427Q0U6A410C2000000/","d":"2026-04-15"},{"t":"25年度の医療機関倒産、過去20年で最多の71件 商工リサーチ調べ","s":"2025年度の医療機関倒産件数が過去20年で最多の71件に達したと商工リサーチが発表。医療業界の経営環境悪化が顕著。","m":"医療法人の経営に直接関わる重要な業界動向。同様のリスクを抱える可能性があり、経営戦略の見直しが求められる。","i":"自院の財務状況の再点検と経営改善策の早急な検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC143N50U6A410C2000000/","d":"2026-04-15"},{"t":"デジタル機器の視聴、平日8時間以上が3割 ロート製薬が万博で調査","s":"ロート製薬の万博調査で、デジタル機器の視聴時間が平日8時間以上の人が3割に達することが判明。デジタル疲労の実態が明らかに。","m":"眼科系疾患やデジタル疲労関連の診療需要増加につながる可能性。内科での生活習慣病相談でも関連する。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF133FY0T10C26A4000000/","d":"2026-04-15"},{"t":"調剤薬局の倒産件数、25年度は30件で過去最多 帝国データ","s":"帝国データバンクの調査によると、2025年度の調剤薬局倒産件数が30件となり過去最多を記録した。調剤薬局業界の経営環境悪化が深刻化している。","m":"調剤薬局の経営難は処方せん応需体制に影響する。院外処方の連携先確保が重要な経営課題。","i":"近隣調剤薬局との関係強化と、処方せん発行先の分散化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC137GS0T10C26A4000000/","d":"2026-04-15"},{"t":"テルモの腹部ステント、米FDAから画期的機器に指定 優先審査に","s":"テルモの腹部ステントが米FDA（食品医薬品局）から画期的医療機器に指定され、優先審査の対象となった。医療機器の技術革新と承認プロセスの迅速化を示している。","m":"循環器分野の医療機器技術進歩。将来的に循環器内科診療での治療選択肢拡大の可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1370M0T10C26A4000000/","d":"2026-04-15"},{"t":"大塚製薬、PTSD薬30年ごろ発売へ ピーク時売上1000億円も","s":"大塚製薬がPTSD治療薬を2030年頃に発売予定で、ピーク時売上1000億円を見込む。精神科領域での新薬開発が進展。","m":"内科での心身症やストレス関連疾患の診療で、精神科との連携機会が増加する可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC100TL0Q6A410C2000000/","d":"2026-04-15"},{"t":"キヤノン、被曝少ない新型CT 大学病院や研究施設に","s":"キヤノンが被曝量を抑制した新型CTを大学病院や研究施設向けに投入。医療画像診断技術の安全性向上が進んでいる。","m":"CT検査を実施する場合の機器選定において重要な技術動向。患者安全性向上と検査精度両立の観点で有用。","i":"将来的な画像診断機器の更新検討時に、被曝量低減技術を考慮する","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC085210Y6A400C2000000/","d":"2026-04-15"},{"t":"住友ファーマ、公募増資で最大1164億円調達 つなぎ融資1500億円も","s":"住友ファーマが公募増資で最大1164億円を調達し、つなぎ融資も1500億円実施する。製薬会社の資金調達動向に関するニュース。","m":"製薬会社の財務状況は薬価や供給に影響する可能性がある。住友ファーマの製品取り扱いがある場合は供給安定性を確認。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF087L00Y6A400C2000000/","d":"2026-04-15"},{"t":"塩野義製薬、米政府から最大763億円の助成金 抗菌薬の製造や開発で","s":"塩野義製薬が米政府から抗菌薬の製造・開発のため最大763億円の助成金を受けると発表。薬剤耐性菌対策として抗菌薬開発が注目されている。","m":"抗菌薬不足や新規抗菌薬の供給動向は院内感染対策に影響。将来の薬剤選択肢や価格に関連する可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF075UX0X00C26A4000000/","d":"2026-04-15"},{"t":"不祥事続いた東大病院 現場のがん専門医が思うことは","s":"東京大学病院で相次ぐ不祥事について、現場のがん専門医の視点から課題や対応策について言及している。大学病院の医療安全管理体制に関する議論。","m":"医療安全管理体制の見直しや内部監査機能の強化について参考となる事例。当院の安全管理体制の見直し検討材料。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD019V90R00C26A4000000/","d":"2026-04-15"},{"t":"「AIが論文投稿」の時代に 学術的に価値ある使い方、学会など検討へ","s":"AIによる論文投稿が増加する中、学術的価値のあるAI活用方法について学会等で検討が始まっている。医療分野でのAI論文の質や信頼性が課題となっている。","m":"医師の論文執筆や学術活動にAIツールが普及する可能性。診療ガイドラインや医学知識の質に間接的に影響する。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA0646X0W6A400C2000000/","d":"2026-04-15"},{"t":"入院前から退院後見据え支援 福祉とも連携、納得感高める","s":"入院前から退院後まで継続的に患者支援を行い、福祉分野とも連携することで患者の納得感を高める取り組みについて。","m":"地域包括ケアの流れでクリニックも退院支援や福祉連携が重要になる。紹介元病院との連携体制見直しの参考になる。","i":"地域連携や福祉との連携体制を見直し、退院調整機能の強化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC0751Y0X00C26A1000000/","d":"2026-04-15"},{"t":"父親が若年性認知症に 公的支援の窓口、縦割りで届かず","s":"若年性認知症の父親を持つ家族が公的支援制度の縦割り行政により適切な支援を受けられない課題について。","m":"若年性認知症患者の診療時は、家族に対する公的支援制度の情報提供が重要。地域包括支援センターとの連携も考慮。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD061WQ0W6A400C2000000/","d":"2026-04-15"},{"t":"突然死を防ぐ 痛み・圧迫感など違和感あればすぐ受診を","s":"突然死を防ぐため、胸の痛みや圧迫感などの違和感があればすぐに医療機関を受診することの重要性について。","m":"内科（循環器）を標榜するクリニックとして、突然死予防の啓発や初期症状での早期受診促進は重要な役割。","i":"循環器疾患の啓発活動を強化し、緊急時の受診勧奨体制を整備する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD310ZR0R30C26A3000000/","d":"2026-04-15"},{"t":"中性脂肪は「血管の老化」進める コレステロールと共犯で悪さに拍車","s":"中性脂肪が血管老化を促進し、コレステロールと相乗効果で血管にダメージを与えるメカニズムについて解説。","m":"糖尿病・循環器内科として、脂質管理における中性脂肪の重要性を再認識し、患者指導や治療方針に反映させる。","i":"脂質異常症患者の管理において中性脂肪とコレステロール両方の総合的な治療戦略を見直す。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD251MJ0V20C26A3000000/","d":"2026-04-15"},{"t":"Senior NHS officials warned staff over criticising rollout of Palantir platform","s":"英国NHSでPalantirプラットフォームの導入に対して職員が批判したことで、上級職員が警告を発した。倫理的反対と不均等な導入が問題となっている。","m":"海外の医療IT導入事例として参考になる。システム導入時の職員への配慮や倫理的課題への対応の重要性を示している。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/ff701533-aa19-4ab0-80ff-70c9420f37d9","d":"2026-04-15"},{"t":"AI chatbots misdiagnose in over 80% of early medical cases, study finds","s":"AI医療チャットボットが初期医療診断の80%以上で誤診するとの研究結果。OpenAIやDeepSeekなどの主要モデルが患者データ不完全時に性急な判断を下している。","m":"AI問診システムの導入を検討する際の重要な判断材料。誤診リスクや医師の最終確認体制の重要性を示唆している。","i":"AI問診導入時の診断精度やリスク評価を慎重に検討する必要がある。","src":"FT","p":"要注視","u":"https://www.ft.com/content/b10002fc-5fff-4e4d-bf64-0502b2d09bb1","d":"2026-04-15"},{"t":"How will AI change the org chart?","s":"AIが組織構造にどのような変化をもたらすかを論じる記事。ミクロレベルでは指揮系統の層を減らすことが効果的であるという証拠があるという内容。","m":"クリニックの組織運営にAIを活用する際の参考になる。スタッフの役割分担や意思決定プロセスの見直しに関連。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/f580228a-bc8a-4450-a159-b19727380d8a","d":"2026-04-15"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-14"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-14"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-14"},{"t":"EMA Tightens Liver Safety Rules for Epilepsy Drug","s":"欧州医薬品庁がてんかん薬の肝安全性規則を強化。肝機能への副作用リスクに対する監視体制の厳格化が行われている。","m":"てんかん薬処方時の肝機能検査の重要性が再認識される。小児科での抗てんかん薬使用時の参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/ema-tightens-liver-safety-rules-epilepsy-drug-2026a1000bcw?src=rss","d":"2026-04-14"},{"t":"NICU Procedures Cause Lasting Pain in Preterm Infants","s":"早産児に対するNICU処置が長期的な痛みを引き起こすという研究結果。新生児医療の課題に関する知見。","m":"小児科では新生児の痛み管理に関する知識として有用。NICU経験のある患児への配慮に活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/nicu-procedures-cause-lasting-pain-preterm-infants-2026a1000bby?src=rss","d":"2026-04-14"},{"t":"Knee Osteoarthritis Pain Relief Seen With Neurotrophin-3 Inhibition","s":"膝関節症の疼痛緩和にニューロトロフィン-3阻害が有効という研究結果。新たな疼痛治療のアプローチ。","m":"内科・循環器科での高齢患者の膝痛相談時の参考情報。新しい治療選択肢の可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/knee-osteoarthritis-pain-relief-seen-neurotrophin-3-2026a1000b2w?src=rss","d":"2026-04-14"},{"t":"Insomnia in Parkinson’s Disease: Symptom or Risk Factor?","s":"パーキンソン病における不眠が症状なのか危険因子なのかを検討した研究。神経疾患と睡眠障害の関連性について新たな知見を提供。","m":"高齢患者の睡眠障害診療において、神経疾患の早期発見の視点が重要。内科診療での参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/insomnia-parkinsons-disease-symptom-or-risk-factor-2026a1000b0f?src=rss","d":"2026-04-14"},{"t":"Hypnotic Therapy Tied to Reduced Spinal Cord Injury Pain","s":"脊髄損傷による疼痛に対する催眠療法の有効性が示された。非薬物療法による疼痛管理手法。","m":"慢性疼痛患者への非薬物療法として参考になる情報。補完医療の選択肢拡大。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/hypnotic-therapy-tied-reduced-spinal-cord-injury-pain-2026a1000azt?src=rss","d":"2026-04-14"},{"t":"Depression, Delirium May Signal Supranuclear Palsy Risk","s":"うつ病や精神錯乱が進行性核上性麻痺のリスク因子である可能性を示唆する研究。神経変性疾患の早期発見における精神症状の重要性を指摘。","m":"内科外来でのうつ症状や認知機能低下患者において、神経疾患の可能性を考慮する必要性がある。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/depression-delirium-may-signal-supranuclear-palsy-risk-2026a1000azm?src=rss","d":"2026-04-14"},{"t":"What 500 Brain Scans Reveal About How Psychedelics Work","s":"500例の脳スキャン解析により、サイケデリック薬物の脳への作用メカニズムが明らかになった。精神医療分野の研究成果。","m":"精神疾患治療の将来的な選択肢として関心のある分野。現在のクリニック診療には直接関係なし。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mystery-solved-how-psychedelics-affect-brain-2026a1000ax5?src=rss","d":"2026-04-14"},{"t":"Man With Spinal Compression From Hepatocellular Carcinoma","s":"肝細胞癌による脊髄圧迫を呈した男性症例。がんの脊髄転移による神経症状の診断と治療に関する症例報告。","m":"消化器内科・外科での肝癌患者において、神経症状出現時の迅速な対応の重要性を示す症例。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/man-spinal-compression-hepatocellular-carcinoma-2026a1000ask?src=rss","d":"2026-04-14"},{"t":"AI speeds up prior auth, coding while driving higher costs for health systems: PHTI report","s":"AIが事前承認やコーディングを高速化する一方で、医療システムのコストが増加しているという報告。医療DXの課題。","m":"電子カルテやAI問診導入時のコスト効果分析の参考。業務効率化と費用のトレードオフ。","i":"AI導入による業務効率化とコスト増加のバランスを評価し、投資対効果を慎重に検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/ai-speeding-prior-authorizations-while-driving-higher-costs-health-systems","d":"2026-04-14"},{"t":"CMS showcases first wave of digital health tools as questions about 'last mile' of adoption remain","s":"CMS（米国メディケア・メディケイド庁）がデジタルヘルスツールの第一弾を発表。普及の課題について議論継続中。","m":"米国のデジタルヘルス政策動向。日本の医療DX推進政策の参考となる海外事例。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/cms-showcases-first-wave-digital-health-tools-questions-about-last-mile-adoption-remain","d":"2026-04-14"},{"t":"How CVS Caremark is using innovative technology to simplify the prior authorization process","s":"CVSカーマークが事前承認プロセスを簡素化するための革新的な技術を活用している取り組みについての記事。薬局チェーンでの技術導入事例を紹介。","m":"処方箋応需時の事前承認プロセス効率化は調剤業務に関連。技術導入による業務効率化のヒントとなる可能性。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/sponsored/how-cvs-caremark-using-innovative-technology-simplify-prior-authorization-process","d":"2026-04-14"},{"t":"Reducing Barriers to Care: Mary’s Center Advances Technology Through Grant Funding","s":"メアリーズセンターが補助金資金を活用してケアへの障壁を削減し、テクノロジーを進歩させる取り組みについての記事。医療アクセス向上への技術活用事例。","m":"補助金活用による医療技術導入は、クリニックでの設備投資やDX推進の参考事例となる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/sponsored/reducing-barriers-care-marys-center-advances-technology-through-grant-funding","d":"2026-04-14"},{"t":"CMS proposes 2.4% hospital pay increase, nationwide mandatory model rollout","s":"CMSが病院向けに2.4%の診療報酬増額と全国義務化モデルの展開を提案。アメリカの病院向け診療報酬制度の動向について。","m":"海外の診療報酬制度動向は日本の将来的な制度変更の参考となる。病院向けだがクリニック経営にも示唆あり。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/cms-proposes-24-hospital-pay-increase-nationwide-mandatory-model-rollout","d":"2026-04-14"},{"t":"Proposed CMS rule would set prior auth deadlines for drugs","s":"CMS提案規則により薬剤の事前承認に期限が設定される予定。保険承認プロセスの効率化を目的とした制度変更について。","m":"薬剤処方時の事前承認プロセスは日常診療に関連。海外の効率化事例として参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/proposed-cms-rule-would-set-prior-auth-deadlines-drugs","d":"2026-04-14"},{"t":"中国海南島にロシア人大挙　欧米代替リゾート、医療ツアーでも誘引","s":"中国海南島がロシア人の医療ツーリズム先として注目されている。欧米への代替リゾート地として医療観光でも誘引を図っている。","m":"国際的な医療ツーリズムの動向として参考程度。日本の医療ツーリズム政策への示唆もある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGM10AG50Q6A410C2000000/","d":"2026-04-14"},{"t":"後期高齢者の医療保険料、月7989円　過去最高の見通し","s":"後期高齢者の医療保険料が月額7989円と過去最高になる見通し。高齢患者の医療費負担が増加する可能性。","m":"高齢患者が多い内科・循環器科では患者の負担増による受診行動の変化に注意が必要。","i":"高齢患者の受診抑制や支払い能力への影響を注視し、診療体制や料金設定を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA10C4L0Q6A410C2000000/","d":"2026-04-14"},{"t":"医師に「ゆるキャリ」志向　夜間や休日を敬遠、働きやすい診療所選ぶ","s":"医師の働き方志向が変化し、夜間や休日勤務を敬遠する「ゆるキャリ」志向が増加。働きやすい診療所を選ぶ傾向が強まっている。","m":"医師確保が困難な中での採用競争力に直結。勤務条件の見直しや働き方改革が必要な可能性。","i":"医師採用時に労働条件の見直しと働きやすい職場環境の整備を検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA2346H0T20C26A3000000/","d":"2026-04-14"},{"t":"医師会、医療物資の買い占め懸念訴え　厚労相と中東情勢で意見交換","s":"医師会が中東情勢の影響による医療物資の買い占めへの懸念を厚労相と議論。サプライチェーン問題が医療現場に与える影響を懸念している。","m":"地政学的リスクが医療機器・薬剤の安定供給に影響する可能性。クリニック運営の備蓄戦略に関わる。","i":"医療物資の調達計画見直しと在庫確保の検討が必要","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA1086R0Q6A410C2000000/","d":"2026-04-14"},{"t":"国民健康保険でシステム改修漏れ　一部の都道府県で資金不足の懸念","s":"国民健康保険システムの改修漏れにより、一部都道府県で資金不足が懸念される。保険者としての国保運営に影響が生じる可能性があり、レセプト請求や支払いに遅れが生じる恐れ。","m":"国保患者からの診療報酬請求に影響する可能性がある。システム障害時の対応フローを再確認が必要。","i":"国保レセプト請求の状況を確認し、支払遅延リスクに備えた資金繰り対策を検討する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA09C140Z00C26A4000000/","d":"2026-04-14"},{"t":"米レボリューション、膵がん治験薬で生存期間2倍　株価は急伸","s":"米レボリューション社の膵がん治験薬が患者の生存期間を2倍に延長する結果を示し、株価が急騰した。がん治療の新たな進歩として注目される。","m":"消化器内科・外科における将来的な治療選択肢として参考。膵がん治療の動向把握に有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN13B130T10C26A4000000/","d":"2026-04-14"},{"t":"デジタル機器の視聴、平日8時間以上が3割 ロート製薬が万博で調査","s":"ロート製薬の調査で平日8時間以上デジタル機器を視聴する人が3割に達することが判明。デジタル眼精疲労の増加が懸念される。","m":"患者のデジタル機器使用増加は眼科系疾患の潜在需要拡大につながる。小児科での相談も増える可能性。","i":"眼精疲労やドライアイ患者の増加を想定した診療体制の検討","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF133FY0T10C26A4000000/","d":"2026-04-14"},{"t":"調剤薬局の倒産件数、25年度は30件で過去最多 帝国データ","s":"2025年度の調剤薬局倒産件数が30件で過去最多を記録。調剤薬局業界の経営環境が厳しさを増している状況が明らかに。","m":"門前薬局や近隣薬局の経営不振は患者利便性や連携体制に影響。薬局との関係性見直しが必要な場合も。","i":"近隣薬局の経営状況を注視し、処方箋応需体制への影響を監視する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC137GS0T10C26A4000000/","d":"2026-04-14"},{"t":"テルモの腹部ステント、米FDAから画期的機器に指定 優先審査に","s":"テルモの腹部ステントが米FDAから画期的機器に指定され、優先審査の対象となった。医療機器の技術革新と承認プロセスについて。","m":"血管系治療機器の進歩は循環器内科診療に関連。将来的な治療選択肢拡大の可能性として参考となる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1370M0T10C26A4000000/","d":"2026-04-14"},{"t":"久光製薬、26年2月期純利益12%減 上場最後の決算","s":"久光製薬の2026年2月期純利益が12%減少の見込み。上場廃止前の最後の決算発表となる。","m":"貼付薬大手の業績動向として参考程度。クリニックでの処方薬への直接的な影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB130GF0T10C26A4000000/","d":"2026-04-14"},{"t":"大塚製薬、PTSD薬30年ごろ発売へ ピーク時売上1000億円も","s":"大塚製薬が2030年頃にPTSD治療薬の発売を予定し、ピーク時売上1000億円を見込んでいる。精神科医療分野での新たな治療選択肢となる。","m":"精神科領域の新薬動向として参考。クリニックでの精神科疾患への対応強化の参考となる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC100TL0Q6A410C2000000/","d":"2026-04-14"},{"t":"SOMPOケア、インド介護人材を他社に供給 紹介会社に2割出資","s":"SOMPOケアがインドの介護人材を他社に供給する事業を開始し、紹介会社に2割出資した。介護人材不足への対応策として注目される。","m":"介護業界の人材確保策として参考。医療・介護連携や将来的なスタッフ確保の参考となる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC03ALR0T00C26A4000000/","d":"2026-04-14"},{"t":"キヤノン、被曝少ない新型CT 大学病院や研究施設に","s":"キヤノンが被曝線量を低減した新型CTを開発し、大学病院や研究施設向けに展開。放射線検査の安全性向上。","m":"クリニックレベルでのCT導入には関係ないが、放射線検査の安全性向上は業界全体のトレンド。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC085210Y6A400C2000000/","d":"2026-04-14"},{"t":"テルモ、「医療機器のシリコンバレー」コスタリカでR&D 雇用3000人","s":"テルモがコスタリカに研究開発拠点を設立し、「医療機器のシリコンバレー」として3000人の雇用を創出する。国際的な医療機器開発の動向。","m":"医療機器メーカーの国際展開として参考。将来的な医療機器の技術革新動向の把握に有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN050JW0V00C26A3000000/","d":"2026-04-14"},{"t":"住友ファーマ、公募増資で最大1164億円調達 つなぎ融資1500億円も","s":"住友ファーマが公募増資で最大1164億円を調達し、つなぎ融資1500億円も実施。製薬会社の資金調達動向。","m":"大手製薬会社の財務動向として把握。新薬開発や薬価政策への影響を間接的に注視する必要がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF087L00Y6A400C2000000/","d":"2026-04-14"},{"t":"ALSOK、介護事業で大和ハウス系2社を買収","s":"ALSOKが介護事業強化のため大和ハウス系介護会社2社を買収した。警備会社の介護事業参入が加速している。","m":"異業種からの介護事業参入動向として参考。地域の介護サービス競争環境への影響を把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC0836D0Y6A400C2000000/","d":"2026-04-14"},{"t":"塩野義製薬、米政府から最大763億円の助成金 抗菌薬の製造や開発で","s":"塩野義製薬が米政府から最大763億円の抗菌薬製造・開発助成金を獲得。薬剤耐性菌対策として抗菌薬開発が国際的に重要視されている動向を示す。","m":"抗菌薬の安定供給や新薬開発動向として参考情報。直接的な診療への影響は限定的だが、感染症治療の選択肢拡大に期待。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF075UX0X00C26A4000000/","d":"2026-04-14"},{"t":"電子カルテ統一「2〜3年で費用削減効果」 都立病院理事長","s":"都立病院理事長が電子カルテ統一により2〜3年で費用削減効果が期待できると発言。大規模医療機関での電子カルテ統一による運用効率化の実例。","m":"複数クリニック経営において電子カルテ統一による効率化とコスト削減の参考事例。システム投資判断の材料として有用。","i":"電子カルテシステム更新時の統一化メリットを検討し、長期的なコスト削減効果を評価する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC251XC0V20C26A3000000/","d":"2026-04-14"},{"t":"Meiji Seikaファルマ永里社長、抗菌薬製造「国内回帰を」","s":"Meiji Seikaファルマの永里社長が抗菌薬製造の国内回帰を提唱。薬剤の安定供給体制強化に向けた業界動向。","m":"抗菌薬は感染症治療の基本薬剤で、各診療科で頻用される。供給体制の変化は診療に直接影響する。","i":"抗菌薬の供給状況や価格動向を注視し、在庫管理方針を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC03AV60T00C26A4000000/","d":"2026-04-14"},{"t":"消費税コストの軽減制度、病院にも適用案 自民・維新が物価高で検討","s":"自民・維新が物価高対策として消費税コストの軽減制度を病院にも適用する案を検討中。医療機関の経営負担軽減策として注目される政策動向。","m":"医療機関の消費税負担軽減は直接的な経営改善につながる重要な政策。制度詳細と適用条件の把握が必要。","i":"消費税軽減制度の適用可能性を継続的に情報収集し、制度化された際の申請準備を行う。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA013RG0R00C26A4000000/","d":"2026-04-14"},{"t":"がん免疫治療薬、米BMSとニコン系が国内製造 日本で承認申請","s":"米ブリストル・マイヤーズとニコン系企業ががん免疫治療薬の国内製造を開始し、日本で承認申請。がん治療薬の国産化推進。","m":"がん治療薬の選択肢拡大は将来的に外科での治療方針に影響する可能性。国産化は薬価にも影響。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC077F20X00C26A4000000/","d":"2026-04-14"},{"t":"心肺停止「コードブルー」を半減させた広尾病院 迅速対応の中身","s":"広尾病院が迅速対応システムにより心肺停止事例を半減させた取り組み。急変対応の質向上による患者安全管理の先進事例として注目される。","m":"クリニックレベルでの急変対応体制強化の参考情報。医療安全管理の質向上に向けた取り組みとして有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC232JV0T20C26A3000000/","d":"2026-04-14"},{"t":"希少疾患薬のJCRファーマ、「ライセンス収入」頼み脱却 欧州から新薬","s":"JCRファーマが希少疾患薬でライセンス収入依存からの脱却を目指し、欧州から新薬を導入する方針。","m":"希少疾患薬の開発動向として把握。専門性の高い領域のため、当クリニックへの直接影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF131PC0T10C26A3000000/","d":"2026-04-14"},{"t":"フィギュアスケートの回転技 視線保つ機能でめまいに歯止め","s":"フィギュアスケート選手の回転技において、視線を保つ機能がめまいの抑制に効果があることが判明。めまい治療の新知見。","m":"めまいは耳鼻咽喉科や内科で多く診る症状。新しい治療アプローチとして臨床応用の可能性を検討すべき。","i":"めまい患者の治療選択肢として視線保持訓練の導入を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD233VX0T20C26A3000000/","d":"2026-04-14"},{"t":"「AIが論文投稿」の時代に 学術的に価値ある使い方、学会など検討へ","s":"学術界でAIによる論文投稿が増加し、学会等が学術的価値のあるAI活用方法を検討している。医学研究分野でのAI利用ガイドライン策定の動向。","m":"医学研究や学会発表におけるAI活用の動向として参考。クリニックでの臨床研究活動にも将来的に影響する可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA0646X0W6A400C2000000/","d":"2026-04-14"},{"t":"入院前から退院後見据え支援 福祉とも連携、納得感高める","s":"入院前から退院後を見据えた患者支援の重要性を強調。福祉との連携により患者の納得感を高める取り組み。","m":"診療所での慢性疾患管理において、福祉連携は重要な要素。紹介・逆紹介の質向上につながる取り組み。","i":"地域包括ケアとの連携体制を強化し、患者の継続的支援体制を構築する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOCC0751Y0X00C26A1000000/","d":"2026-04-14"},{"t":"突然死を防ぐ 痛み・圧迫感など違和感あればすぐ受診を","s":"突然死の予防について、胸痛や圧迫感などの違和感があれば早期受診の重要性を啓発。循環器疾患の早期発見。","m":"内科（循環器）診療で重要な患者教育内容。急性心筋梗塞等の早期発見・対応は診療の質向上に直結。","i":"循環器症状の問診体制を強化し、早期受診を促す患者教育を実施する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD310ZR0R30C26A3000000/","d":"2026-04-14"},{"t":"AI chatbots misdiagnose in over 80% of early medical cases, study finds","s":"AIチャットボットが初期医療診断の80%以上で誤診するという研究結果。不完全な患者データで性急な判断を下す傾向が問題となっている。","m":"AI問診システムの限界と誤診リスクを示す重要な研究。AI診療支援ツール導入時の注意点として認識必要。","i":"AI問診システム導入時は診断精度の限界を理解し、医師による最終確認体制を確実に構築する。","src":"FT","p":"要注視","u":"https://www.ft.com/content/b10002fc-5fff-4e4d-bf64-0502b2d09bb1","d":"2026-04-14"},{"t":"How will AI change the org chart?","s":"AIが組織図をどのように変えるかについて、マイクロレベルでは指揮系統の階層を縮小することが有効であるという証拠が示されている。","m":"クリニックの組織運営にAIを活用する際の参考情報。将来的なスタッフ体制見直しの示唆。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/f580228a-bc8a-4450-a159-b19727380d8a","d":"2026-04-14"},{"t":"Anthropic closes in on OpenAI as US business use surges","s":"AnthropicがClaude Codeプロダクトへの強い関心により急成長し、米国企業利用でOpenAIに迫っている状況。","m":"医療現場でのAI活用が進む中、主要AIベンダーの競争状況は導入判断に影響する。Claude製品の医療応用可能性を検討する価値がある。","i":"医療AI活用を検討する際の選択肢として、Anthropic製品の動向を注視する。","src":"FT","p":"要注視","u":"https://www.ft.com/content/abb93a6f-9060-4095-8045-84b97d394a4c","d":"2026-04-14"},{"t":"診療報酬改定","s":"厚生労働省の診療報酬改定に関する情報です。診療報酬制度の変更は医療機関の収益に直接的な影響を与えます。改定内容によっては算定要件の変更や新規項目の追加等が含まれる可能性があります。","m":"診療報酬改定はクリニック収益の根幹に関わる最重要事項です。各科の診療内容と照らし合わせた影響度分析が必要です。","i":"改定内容を詳細に確認し、各診療科での算定項目への影響を分析して必要な対応策を検討する","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-13"},{"t":"消費税と診療報酬について","s":"厚生労働省による消費税と診療報酬の関係に関する情報です。消費税制度の変更は医療機関の経営に直接的な影響を与えるため、制度理解と適切な対応が必要です。","m":"医療機関の消費税取扱いは複雑で、誤解による損失リスクがあります。経理担当者との情報共有が重要です。","i":"消費税制度と診療報酬の関係を確認し、経理処理や請求業務への影響を検討する","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-13"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報です。感染症対策として、診療現場での感染予防策や患者対応について確認が必要な可能性があります。","m":"小児科や内科での感染症対応として、診断・治療指針の把握が必要です。海外渡航歴のある患者への対応も含まれます。","i":"感染症ガイドラインを確認し、必要に応じて院内感染対策を見直す","src":"厚生労働省","p":"要注視","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-13"},{"t":"Insomnia in Parkinson’s Disease: Symptom or Risk Factor?","s":"パーキンソン病における不眠症が症状なのか危険因子なのかを検討した研究。不眠症とパーキンソン病の相互関係について新たな知見が得られている。","m":"内科診療で高齢患者の睡眠障害を診る際の参考情報。パーキンソン病の早期発見につながる可能性がある。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/insomnia-parkinsons-disease-symptom-or-risk-factor-2026a1000b0f?src=rss","d":"2026-04-13"},{"t":"Hypnotic Therapy Tied to Reduced Spinal Cord Injury Pain","s":"脊髄損傷による疼痛に対する催眠療法の効果に関する研究です。代替療法としての催眠療法の有効性を示す研究結果が報告されています。","m":"直接的な診療への影響は限定的ですが、疼痛管理の選択肢として知識として把握しておく価値があります。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/hypnotic-therapy-tied-reduced-spinal-cord-injury-pain-2026a1000azt?src=rss","d":"2026-04-13"},{"t":"Depression, Delirium May Signal Supranuclear Palsy Risk","s":"うつ病やせん妄が進行性核上性麻痺のリスク指標となる可能性を示唆した研究。これらの症状が神経変性疾患の早期兆候である可能性が示されている。","m":"内科や小児科でうつ症状やせん妄を診る際の鑑別診断の参考。専門医への紹介タイミングの判断材料となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/depression-delirium-may-signal-supranuclear-palsy-risk-2026a1000azm?src=rss","d":"2026-04-13"},{"t":"Medscape Physician Compensation Report 2026: Positive Signs","s":"2026年の医師報酬レポートで前向きな兆候が示されている。医師の収入や職場環境に関する最新の調査結果が報告されている。","m":"医師の人材確保や給与設定の参考データ。クリニック経営における人件費計画に活用できる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/p11/return-normalization-medscape-physician-compensation-report-2026a10009um?src=rss","d":"2026-04-13"},{"t":"What 500 Brain Scans Reveal About How Psychedelics Work","s":"500件の脳画像解析により、精神作用物質が脳に与える影響のメカニズムを解明した研究です。精神医学分野での基礎研究として注目される内容です。","m":"クリニックの診療科目との関連性は低いですが、医学的知見として把握しておく価値のある研究です。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mystery-solved-how-psychedelics-affect-brain-2026a1000ax5?src=rss","d":"2026-04-13"},{"t":"Man With Spinal Compression From Hepatocellular Carcinoma","s":"肝細胞癌による脊椎圧迫の症例報告。癌の脊椎転移による神経症状の診断と治療について述べられている。","m":"消化器内科での肝癌フォローアップ時の合併症として参考。腰痛や神経症状を訴える患者の鑑別診断に有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/man-spinal-compression-hepatocellular-carcinoma-2026a1000ask?src=rss","d":"2026-04-13"},{"t":"AAN 2026","s":"2026年のアメリカ神経学会年次総会に関する情報。神経学分野の最新の研究発表や治療動向が紹介される見込み。","m":"神経学関連の最新情報源として活用。内科診療での神経症状の診断や治療の参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/c25/p14/american-academy-neurology-aan-2026-annual-meeting-2026a10009hr?src=rss","d":"2026-04-13"},{"t":"Does Ez-PAVE Support ‘Lower Is Better’ for LDL-C?","s":"Ez-PAVE試験の結果からLDLコレステロールの「低いほど良い」という概念を支持するかを検討。脂質管理の新たなエビデンスが示されている。","m":"糖尿病・循環器内科の診療ガイドライン更新に影響する可能性。患者への説明内容や治療目標値の調整が必要かもしれない。","i":"循環器内科での脂質管理方針の見直しを検討する必要がある。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/does-ez-pave-support-lower-better-ldl-c-2026a1000akx?src=rss","d":"2026-04-13"},{"t":"New Central Sleep Apnea Guidelines: Did They Go Too Far?","s":"中枢性睡眠時無呼吸症に関する新しいガイドラインが発表された。従来の治療方針から変更点があり、その妥当性について議論されている。","m":"内科や耳鼻咽喉科での睡眠時無呼吸症診療に直接影響。新ガイドラインに基づいた診療体制の整備が求められる。","i":"睡眠時無呼吸症の診断・治療方針の見直しと医師への情報共有が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/new-central-sleep-apnea-guidelines-did-they-go-too-far-2026a1000aab?src=rss","d":"2026-04-13"},{"t":"Functional Seizures Linked to Higher Risk for Mortality","s":"機能性けいれんが死亡率の高いリスクと関連することが示された研究。心因性けいれんと真のてんかんの鑑別診断の重要性が強調されている。","m":"小児科でのけいれん患者の鑑別診断に有用な情報。精神的要因も考慮した総合的な診療が必要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/functional-seizures-linked-higher-risk-mortality-2026a1000ade?src=rss","d":"2026-04-13"},{"t":"CMS proposes 2.4% hospital pay increase, nationwide mandatory model rollout","s":"CMSが病院に対して2.4%の支払い増加と全国的な強制モデル展開を提案。米国の病院経営に影響する政策変更が検討されている。","m":"米国の医療政策動向として参考情報。日本の診療報酬制度への間接的な影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/cms-proposes-24-hospital-pay-increase-nationwide-mandatory-model-rollout","d":"2026-04-13"},{"t":"Proposed CMS rule would set prior auth deadlines for drugs","s":"CMSが医薬品の事前承認に関する期限設定を提案する規則案を発表。保険承認プロセスの迅速化を図る取り組みが検討されている。","m":"米国の保険制度に関する情報で日本への直接影響は少ない。薬剤処方時の保険審査プロセス改善の参考程度。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/proposed-cms-rule-would-set-prior-auth-deadlines-drugs","d":"2026-04-13"},{"t":"HHS, after legal setback, updates ACIP charter to put more emphasis on vaccine safety","s":"米国HHSが法的敗訴を受けて、ワクチン推奨委員会（ACIP）の憲章を更新し、ワクチン安全性により重点を置く方針に変更した。ワクチン推奨プロセスに影響を与える可能性がある。","m":"小児科での予防接種業務への影響が考えられる。米国の安全性重視方針が日本にも波及する可能性を監視する必要がある。","i":"国際的なワクチン安全性基準の変化を注視し、日本の予防接種指針への影響を確認する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/pharma/hhs-after-legal-setback-updates-acip-charter-put-more-emphasis-vaccine-safety","d":"2026-04-13"},{"t":"Epic rolls out health alerts to flag rising rates of illness at the county level","s":"電子カルテ大手のEpicが、郡レベルでの疾患増加率を警告する健康アラート機能を展開した。地域の感染症動向をリアルタイムで把握できるシステムが導入される。","m":"内科・小児科での感染症対応に有用。日本でも類似システム導入により、早期の感染症対策が可能になる可能性がある。","i":"電子カルテシステムでの類似機能導入可能性を検討し、地域感染症対策の強化を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/epic-rolls-out-health-alerts-flag-rising-rates-illness-county-level","d":"2026-04-13"},{"t":"Benefits leaders report increased operational, financial costs amid 'digital health vendor sprawl': Solera survey","s":"デジタルヘルスベンダーの乱立により、医療福利厚生管理者が運営・財務コストの増加を報告している。複数システム管理の複雑化が課題となっている。","m":"クリニックでのデジタルツール選択時の参考情報。システム統合の重要性を示唆している。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/digital-health/benefits-leaders-report-increased-operational-f ay-february","d":"2026-04-12"},{"t":"Op-ed: Administrative fragility is costing healthcare more than we think","s":"医療における管理業務の脆弱性が、想定以上のコストを医療業界全体にもたらしているという論考。管理システムの非効率性が経営圧迫の要因となっている。","m":"クリニック運営の管理業務効率化は直接的な経営課題。電子カルテやレセプト業務の見直し検討材料として有用。","i":"自院の管理業務効率化の見直しと、システム投資の検討が必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/op-ed-administrative-fragility-costing-healthcare-more-we-think","d":"2026-04-12"},{"t":"Function Health acquires mobile healthcare platform Getlabs to provide members with at-home lab tests","s":"Function HealthがGetlabsを買収し、在宅検査サービスを強化。モバイルヘルスケアプラットフォームによる検査の在宅化が進展している。","m":"在宅検査は患者利便性向上と差別化要因。特に糖尿病患者の継続的モニタリングでの活用可能性あり。","i":"在宅医療・検査サービスの動向を注視し、自院での導入可能性を検討。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/function-health-acquires-mobile-healthcare-platform-getlabs-provide-members-home-lab","d":"2026-04-12"},{"t":"Fierce Healthcare Layoff Tracker—Mississippi hospital cuts nearly fifth of its workforce; UCI Health laying off 1% of workforce","s":"米国でミシシッピ州の病院が従業員の約20％を削減、UCI Healthが1％の人員削減を実施。米国医療機関での人件費圧縮が継続している。","m":"米国医療機関の人員削減動向として参考。日本の医療機関の人材確保課題とは状況が異なる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/finance/fierce-healthcare-layoff-tracker-2026-job-cuts-eliminations-health-systems-hospitals","d":"2026-04-12"},{"t":"Medicare navigation company Chapter banks $100M series E funding round","s":"メディケアナビゲーション会社Chapterが1億ドルのシリーズE資金調達を完了。高齢者向け医療保険案内サービスへの投資が活発化している。","m":"米国のメディケア関連サービスへの投資動向。日本の介護保険制度との違いはあるが、高齢者向けサービスのトレンドとして参考。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/medicare-navigation-company-chapter-banks-100m-series-e-funding-round","d":"2026-04-12"},{"t":"医師に「ゆるキャリ」志向　夜間や休日を敬遠、働きやすい診療所選ぶ","s":"医師の間で「ゆるキャリア」志向が広がり、夜間・休日勤務を敬遠し働きやすい診療所を選ぶ傾向が強まっている。医師の働き方に対する価値観が変化している。","m":"医師確保に直結する重要な人事課題。勤務医の採用・定着のため労働環境改善が経営上の優先事項。","i":"医師採用戦略の見直し、働きやすい環境整備と労働条件改善が急務。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA2346H0T20C26A3000000/","d":"2026-04-12"},{"t":"医師会、医療物資の買い占め懸念訴え　厚労相と中東情勢で意見交換","s":"日本医師会が中東情勢の影響による医療物資の買い占めへの懸念を厚労相に訴えた。医療材料の供給不安定化と価格高騰のリスクが高まっている。","m":"診療材料費の高騰や供給不安は直接的に経営に影響する。調達戦略の見直しが必要になる可能性がある。","i":"医療材料の在庫管理と調達先の多様化を検討し、必要物資の確保戦略を見直す。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA1086R0Q6A410C2000000/","d":"2026-04-12"},{"t":"国民健康保険でシステム改修漏れ　一部の都道府県で資金不足の懸念","s":"国民健康保険のシステム改修に漏れが発生し、一部都道府県で資金不足の懸念が生じている。制度運用に支障をきたす可能性がある。","m":"国保制度の不備はクリニックの保険請求業務に直接影響する可能性。システム障害による支払い遅延等のリスクを想定すべき。","i":"国保運営への影響を注視し、必要に応じて関係機関への確認と対応準備を行う。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA09C140Z00C26A4000000/","d":"2026-04-12"},{"t":"OTC類似薬の追加負担「がんや入院中の患者には求めず」　上野厚労相","s":"厚労相がOTC類似薬の追加負担について、がん患者や入院中の患者には求めないとの方針を表明した。外来診療での薬剤処方時の患者負担ルールに変更が生じる。","m":"外来診療での薬剤処方に直接影響する制度変更。患者説明と事務処理手順の見直しが必要。","i":"OTC類似薬処方時の患者説明方法を整備し、対象外患者の判定基準を明確化する必要がある。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA101F20Q6A410C2000000/","d":"2026-04-12"},{"t":"「医療版マクロスライド」実験へ　賃上げ範囲に給付抑制、現役負担軽く","s":"医療版マクロスライド制度の実験的導入により、医療費給付の抑制と現役世代の負担軽減を図る政策が検討されている。医療機関の収益構造に影響する可能性がある。","m":"診療報酬制度の根本的な見直しにつながる可能性があり、中長期的な経営戦略に影響する重要な政策動向。","i":"診療報酬制度の変更動向を注視し、収益への影響を分析する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA042O30U6A400C2000000/","d":"2026-04-12"},{"t":"医師の51%が遠隔診療に期待　地域偏在対策、普及へ報酬増求める声","s":"医師の51％が遠隔診療に期待を示し、地域偏在対策として普及促進のため診療報酬増額を求める声が高まっている。遠隔診療の制度改善への期待が大きい。","m":"遠隔診療は患者アクセス向上と効率化の手段。糖尿病等慢性疾患の継続管理での活用可能性が高い。","i":"遠隔診療システムの導入準備と、診療報酬改定動向の継続的な情報収集。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA198F60Z10C26A3000000/","d":"2026-04-12"},{"t":"がん細胞が転移する仕組み、生殖細胞の移動と共通　九州大学など解明","s":"九州大学などの研究チームが、がん細胞の転移メカニズムが生殖細胞の移動と共通していることを解明した。がん治療法開発の新たな糸口となる基礎研究成果。","m":"基礎研究の成果で、当院の日常診療への直接的影響はない。がん医療の将来的な進歩として参考程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG085D30Y6A400C2000000/","d":"2026-04-12"},{"t":"大塚製薬、PTSD薬30年ごろ発売へ ピーク時売上1000億円も","s":"大塚製薬がPTSD治療薬を2030年頃に発売予定で、ピーク時売上高1000億円を見込む。精神疾患治療分野での新たな治療選択肢として期待される。","m":"当院は精神科ではないため直接的影響は限定的。PTSD患者の紹介先での治療選択肢拡大として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC100TL0Q6A410C2000000/","d":"2026-04-12"},{"t":"SOMPOケア、インド介護人材を他社に供給 紹介会社に2割出資","s":"SOMPOケアがインド介護人材を他社に供給する事業を開始し、紹介会社に2割出資。介護人材不足に対する新たな解決策として注目される。","m":"クリニックでも介護事業に参入している場合、外国人人材活用の参考になる。人材確保の選択肢として検討価値がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC03ALR0T00C26A4000000/","d":"2026-04-12"},{"t":"キヤノン、被曝少ない新型CT 大学病院や研究施設に","s":"キヤノンが被曝量を従来より大幅に削減した新型CTを開発し、大学病院や研究施設への導入を進める。医療現場での放射線被曝リスク軽減に貢献する技術。","m":"当院ではCT設備はないが、紹介先病院での検査品質向上として患者メリットがある。医療機器の技術進歩として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC085210Y6A400C2000000/","d":"2026-04-12"},{"t":"テルモ、「医療機器のシリコンバレー」コスタリカでR&D 雇用3000人","s":"テルモがコスタリカに医療機器の研究開発拠点を設立し、3000人雇用を予定。グローバル展開による新技術開発が期待される。","m":"新しい医療機器の開発動向として把握しておく価値がある。将来的にクリニック向け新製品に繋がる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN050JW0V00C26A3000000/","d":"2026-04-12"},{"t":"住友ファーマ、公募増資で最大1164億円調達 つなぎ融資1500億円も","s":"住友ファーマが公募増資で最大1164億円を調達し、つなぎ融資1500億円も実施。製薬大手の資金調達動向。","m":"製薬業界の資金調達は新薬開発や供給体制に影響する可能性。間接的にクリニックでの薬剤供給に関連。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF087L00Y6A400C2000000/","d":"2026-04-12"},{"t":"ALSOK、介護事業で大和ハウス系2社を買収","s":"ALSOKが大和ハウス系の介護事業会社2社を買収。警備業界から介護分野への業界参入が加速している。","m":"介護事業の市場拡大と業界再編の動向として把握。クリニックが介護連携を考える際の参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC0836D0Y6A400C2000000/","d":"2026-04-12"},{"t":"塩野義製薬、米政府から最大763億円の助成金 抗菌薬の製造や開発で","s":"塩野義製薬が米政府から最大763億円の助成金を獲得し、抗菌薬の製造・開発を強化。薬剤耐性菌対策として注目される。","m":"内科診療で使用する抗菌薬の新薬開発動向として重要。薬剤耐性菌対策の最新動向を把握すべき。","i":"新しい抗菌薬の開発動向を注視し、将来的な処方選択肢の拡大に備える。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF075UX0X00C26A4000000/","d":"2026-04-12"},{"t":"電子カルテ統一「2〜3年で費用削減効果」 都立病院理事長","s":"都立病院理事長が電子カルテ統一により2〜3年で費用削減効果が出ると発言。統一化による効率化が実証されつつある。","m":"複数クリニックを経営する医療法人として、電子カルテ統一による運営効率化のメリットを検討すべき。","i":"自院の電子カルテシステムの効率化と費用削減の可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC251XC0V20C26A3000000/","d":"2026-04-12"},{"t":"Meiji Seikaファルマ永里社長、抗菌薬製造「国内回帰を」","s":"明治製薬ファルマの永里社長が抗菌薬製造の国内回帰を提言。感染症治療薬の供給安定化に向けた動き。","m":"抗菌薬はクリニックでの感染症治療に必須。国内生産回帰は供給安定性と薬価に影響する可能性。","i":"抗菌薬の供給状況と価格動向を注視し、在庫管理の見直しを検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC03AV60T00C26A4000000/","d":"2026-04-12"},{"t":"消費税コストの軽減制度、病院にも適用案 自民・維新が物価高で検討","s":"自民・維新が病院への消費税コスト軽減制度適用を検討。物価高対策として医療機関の負担軽減を目指す。","m":"医療法人の経営に直接影響する重要な制度変更。消費税負担軽減により収益改善の可能性がある。","i":"制度の詳細が決定次第、適用条件と手続きを確認し、申請準備を行う。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA013RG0R00C26A4000000/","d":"2026-04-12"},{"t":"がん免疫治療薬、米BMSとニコン系が国内製造 日本で承認申請","s":"米ブリストル・マイヤーズスクイブとニコン系企業が、がん免疫治療薬の国内製造体制を構築し、日本での承認申請を行う。国内供給体制の強化を図る。","m":"当院の診療科目では直接的な影響は限定的。がん患者の紹介先での治療選択肢拡大として把握すべき情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC077F20X00C26A4000000/","d":"2026-04-12"},{"t":"心肺停止「コードブルー」を半減させた広尾病院 迅速対応の中身","s":"広尾病院が心肺停止事案を半減させた迅速対応システムの取り組みが紹介。医療安全管理の成功事例として注目。","m":"クリニックレベルでも応用可能な医療安全管理の手法として参考になる。緊急時対応体制の見直しに活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC232JV0T20C26A3000000/","d":"2026-04-12"},{"t":"希少疾患薬のJCRファーマ、「ライセンス収入」頼み脱却 欧州から新薬","s":"希少疾患薬のJCRファーマがライセンス収入依存からの脱却を図り、欧州から新薬を導入。事業戦略の転換。","m":"希少疾患薬は専門性が高く、一般的なクリニックでの取り扱いは限定的。業界動向として把握程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF131PC0T10C26A3000000/","d":"2026-04-12"},{"t":"種子島に初の看護師養成学校 鹿児島市の専門学校がサテライト教室","s":"種子島に初の看護師養成学校が設立され、鹿児島市の専門学校がサテライト教室を開設。地方での看護師確保対策。","m":"看護師不足は全国的な課題で、地方での看護師養成は人材確保に影響。クリニックの看護師採用にも関連。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC316260R30C26A3000000/","d":"2026-04-12"},{"t":"ノバルティス、希少疾患の遺伝子治療薬 全年齢向けで承認取得","s":"ノバルティスが希少疾患向けの遺伝子治療薬について、全年齢を対象とした承認を取得した。遺伝子治療分野の進展を示している。","m":"希少疾患の遺伝子治療は一般的なクリニック診療との関連は限定的。ただし将来的な治療オプション拡大の傾向として把握価値あり。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC0678D0W6A400C2000000/","d":"2026-04-12"},{"t":"患者の細胞使い肝硬変の再生医療 長崎大学、4月から臨床研究開始","s":"長崎大学が患者自身の細胞を用いた肝硬変に対する再生医療の臨床研究を4月から開始する。この治療法は将来的に肝疾患治療の新たな選択肢となる可能性がある。","m":"消化器内科・外科での将来的な治療選択肢として注目すべき技術。現時点では臨床研究段階で直接的な影響はない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG061760W6A400C2000000/","d":"2026-04-12"},{"t":"川崎重工、東京女子医大の付属病院に搬送ロボット 薬剤運ぶ","s":"川崎重工が東京女子医大付属病院に薬剤搬送ロボットを導入。医療現場の自動化・省人化が進展している。","m":"クリニックでも将来的に搬送業務の自動化が可能になれば、人件費削減と効率化が期待できる。","i":"ロボット導入による業務効率化の可能性を中長期的に検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC061XA0W6A400C2000000/","d":"2026-04-12"},{"t":"中外製薬、ベア1万円 大卒初任給は1万円増の31万円","s":"中外製薬がベースアップ1万円、大卒初任給を31万円に引き上げ。製薬業界での人材確保競争が激化している。","m":"医療業界全体の賃金上昇トレンドとして把握。クリニック職員の給与水準見直しの参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC063KI0W6A400C2000000/","d":"2026-04-12"},{"t":"「AIが論文投稿」の時代に 学術的に価値ある使い方、学会など検討へ","s":"AIによる論文投稿が増加し、学会等で学術的価値ある使い方の検討が始まっている。研究倫理の新たな課題が浮上。","m":"クリニックが学会発表や研究活動を行う際のAI活用ガイドラインとして今後注目すべき動向。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA0646X0W6A400C2000000/","d":"2026-04-12"},{"t":"入院前から退院後見据え支援 福祉とも連携、納得感高める","s":"入院前から退院後を見据えた支援体制の構築について。福祉との連携により患者の納得感を高める取り組み。","m":"地域包括ケアの推進は診療報酬上も重視される分野。クリニックでも入院時の連携体制構築が重要。","i":"地域包括ケアシステムでの連携強化を検討し、退院支援体制の見直しを行う。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC0751Y0X00C26A1000000/","d":"2026-04-12"},{"t":"Anthropic closes in on OpenAI as US business use surges","s":"AnthropicがOpenAIに迫る成長を見せており、米国企業でのAI利用が急増している。同社のClaude Codeプロダクトへの強い関心が急成長の要因となっている。","m":"AI技術の発展は将来的に医療現場でのAI活用に影響する可能性がある。ただし現時点では直接的な医療・ヘルスケア応用への言及はない。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/abb93a6f-9060-4095-8045-84b97d394a4c","d":"2026-04-12"},{"t":"Cyber security stocks fall on worries over Anthropic’s advanced AI tool","s":"AnthropicのMythosモデルが従来システムで見逃されていた重要なソフトウェア脆弱性を検出できることが判明し、サイバーセキュリティ関連株が下落した。高度なAI技術の脅威検出能力が示された。","m":"医療機関の電子カルテやネットワークシステムのセキュリティに影響する可能性。サイバー攻撃対策の見直しが必要になるかもしれない。","i":"医療情報システムのセキュリティ対策強化の検討が必要","src":"FT","p":"要注視","u":"https://www.ft.com/content/f1205b22-ad87-43bb-bc63-da5b69a942ef","d":"2026-04-12"},{"t":"Bessent called in US bank CEOs to discuss Anthropic model’s cyber risks","s":"ベッセント米財務長官がAnthropicのAIモデルのサイバーリスクについて、米国の銀行CEOらと会議を開催した。最新AIシステムが数十年前の脆弱性を検出する能力を示している。","m":"政府レベルでAIのサイバーリスクが議論されており、医療機関のシステムセキュリティにも影響する可能性。AI導入時のセキュリティ検討が重要。","i":"医療機関のサイバーセキュリティ対策とAI利用のリスク評価が必要","src":"FT","p":"要注視","u":"https://www.ft.com/content/397bf755-54cf-4018-a01d-8f714d8667c5","d":"2026-04-12"},{"t":"Asian start-ups evolve to reshape industries with AI","s":"アジアの新興企業がAI技術を活用して物流、製造業、ヘルスケアなどの既存産業の変革に取り組んでいる。起業家たちは確立された業界の改善に焦点を当てている。","m":"ヘルスケア分野でのAI活用トレンドは将来的に医療機関の診療や運営に影響する可能性。アジアのAI技術発展動向として情報収集価値あり。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/2c8f4699-55e5-4cf6-a805-2e074ef7495e","d":"2026-04-12"},{"t":"For Oura and Whoop, health has a reasonable chance of being wealth","s":"ヘルステック企業のOuraとWhoopが、それぞれ110億ドルと100億ドルの評価額で資金調達を実施した。ウェアラブルデバイスによる健康管理市場の急成長を示している。","m":"患者の日常的な健康管理データを診療に活用する可能性。特に糖尿病・循環器分野での連携メリットが期待できる。","i":"ウェアラブルデバイスとの連携可能性や患者の健康データ活用について検討する。","src":"FT","p":"要注視","u":"https://www.ft.com/content/1362f461-8a07-4521-b5f1-88350405fdde","d":"2026-04-12"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-11"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-11"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-11"},{"t":"Insomnia in Parkinson’s Disease: Symptom or Risk Factor?","s":"パーキンソン病における不眠症が症状なのか危険因子なのかという医学的議論。パーキンソン病と睡眠障害の関係性についての最新見解。","m":"内科診療で睡眠障害やパーキンソン病患者を診る際の参考情報。病態理解の向上に有用だが、直接的な経営判断は不要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/insomnia-parkinsons-disease-symptom-or-risk-factor-2026a1000b0f?src=rss","d":"2026-04-11"},{"t":"Hypnotic Therapy Tied to Reduced Spinal Cord Injury Pain","s":"催眠療法が脊髄損傷による疼痛軽減に効果があるとする研究結果。非薬物療法としての新たな治療選択肢として注目される。","m":"疼痛管理は内科でも関連するが、専門的な催眠療法の導入は現実的でない。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/hypnotic-therapy-tied-reduced-spinal-cord-injury-pain-2026a1000azt?src=rss","d":"2026-04-11"},{"t":"Depression, Delirium May Signal Supranuclear Palsy Risk","s":"うつ病や譫妄が進行性核上性麻痺のリスク信号となる可能性があるという研究報告。神経学的疾患の早期発見に関する知見として、内科診療での鑑別診断に参考となる情報。","m":"内科診療でうつ病や譫妄症状を呈する患者の神経学的疾患鑑別に有用。高齢患者の診療機会が多いクリニックでの診断精度向上に寄与する可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/depression-delirium-may-signal-supranuclear-palsy-risk-2026a1000azm?src=rss","d":"2026-04-11"},{"t":"Medscape Physician Compensation Report 2026: Positive Signs","s":"2026年の医師報酬調査で前向きな兆候が報告されている。医師の収入動向や医療業界の経済状況に関する情報として、人材確保や給与水準設定の参考となる。","m":"医師の給与水準や採用競争力の参考データ。クリニックでの医師採用や報酬設定において市場相場を把握するための業界動向情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/p11/return-normalization-medscape-physician-compensation-report-2026a10009um?src=rss","d":"2026-04-11"},{"t":"What 500 Brain Scans Reveal About How Psychedelics Work","s":"500件の脳スキャンを分析し、幻覚剤が脳に与える影響メカニズムを解明した研究結果。神経科学・精神医学領域での基礎研究成果。","m":"基礎研究であり、クリニック診療への直接的応用は困難。学術的関心の範囲。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mystery-solved-how-psychedelics-affect-brain-2026a1000ax5?src=rss","d":"2026-04-11"},{"t":"Man With Spinal Compression From Hepatocellular Carcinoma","s":"肝細胞癌による脊椎圧迫の症例報告。消化器疾患から整形外科的合併症に至る病態に関する臨床情報として、内科診療での患者管理に参考となる。","m":"消化器内科診療で肝癌患者の合併症として脊椎病変を念頭に置く必要性。当院の消化器内科・外科での患者フォローアップに活用できる臨床知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/man-spinal-compression-hepatocellular-carcinoma-2026a1000ask?src=rss","d":"2026-04-11"},{"t":"AAN 2026","s":"アメリカ神経学会2026年次総会に関する情報。神経学分野の最新動向や治療法に関する学術情報として、内科診療での神経疾患対応に参考となる。","m":"神経学分野の最新治療動向。内科診療で神経症状を呈する患者の診療レベル向上や、専門医への適切な紹介判断に役立つ学術情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/c25/p14/american-academy-neurology-aan-2026-annual-meeting-2026a10009hr?src=rss","d":"2026-04-11"},{"t":"Does Ez-PAVE Support ‘Lower Is Better’ for LDL-C?","s":"Ez-PAVE試験がLDLコレステロールの「より低い方が良い」という方針を支持するかについての検討。循環器疾患の脂質管理ガイドラインに影響する可能性がある重要な臨床研究。","m":"当院の循環器・糖尿病診療で高脂血症患者の治療目標設定に直接影響。現在の治療プロトコルの見直しが必要になる可能性。","i":"循環器内科での脂質管理方針の見直しと、患者への説明方法の検討が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/does-ez-pave-support-lower-better-ldl-c-2026a1000akx?src=rss","d":"2026-04-11"},{"t":"New Central Sleep Apnea Guidelines: Did They Go Too Far?","s":"中枢性睡眠時無呼吸症候群の新しいガイドラインが過度に厳格である可能性についての議論。睡眠障害の診断・治療基準の変更により、診療方針に影響する可能性がある。","m":"内科・耳鼻咽喉科で睡眠時無呼吸症候群患者を診療する際の新基準への対応。診断基準変更により紹介タイミングや治療方針の調整が必要。","i":"睡眠時無呼吸症候群の診断・治療方針の見直しと、専門医との連携体制の確認が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/new-central-sleep-apnea-guidelines-did-they-go-too-far-2026a1000aab?src=rss","d":"2026-04-11"},{"t":"Functional Seizures Linked to Higher Risk for Mortality","s":"機能性発作が死亡リスクの増加と関連するという研究報告。神経学的症状の鑑別診断や患者管理における重要な臨床知見として参考となる。","m":"内科診療で発作様症状を呈する患者の鑑別診断に有用。機能性疾患であっても長期的な予後管理の重要性を示す臨床情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/functional-seizures-linked-higher-risk-mortality-2026a1000ade?src=rss","d":"2026-04-11"},{"t":"Proposed CMS rule would set prior auth deadlines for drugs","s":"CMS（米国メディケア・メディケイド・サービス・センター）が薬剤の事前承認に期限を設ける新規制を提案。医療機関での薬剤処方承認プロセスに直接的な影響を与える制度変更。","m":"日本の診療とは直接関係ないが、国際的な医療制度動向として把握。日本でも同様の制度変更が検討される可能性を念頭に置く必要。","i":"薬剤処方の事前承認プロセスの見直しと、新期限への対応体制の構築が急務。","src":"Fierce Healthcare","p":"要対応","u":"https://www.fiercehealthcare.com/regulatory/proposed-cms-rule-would-set-prior-auth-deadlines-drugs","d":"2026-04-11"},{"t":"HHS, after legal setback, updates ACIP charter to put more emphasis on vaccine safety","s":"米国保健社会福祉省が法的挫折を受けて、ワクチン安全性により重点を置くACIP憲章を更新。ワクチン政策や安全性評価体制の変更により、予防接種実施に影響する可能性。","m":"小児科でのワクチン接種業務に関連。米国での政策変更が日本の予防接種制度や患者の意識に与える影響を注視する必要。","i":"ワクチン接種方針の確認と、患者・保護者への説明体制の見直しが必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/pharma/hhs-after-legal-setback-updates-acip-charter-put-more-emphasis-vaccine-safety","d":"2026-04-11"},{"t":"Epic rolls out health alerts to flag rising rates of illness at the county level","s":"Epic社が県レベルでの疾患発生率上昇を警告するヘルスアラート機能を展開。電子カルテシステムでの感染症監視機能強化により、診療所での感染症対策に影響する可能性。","m":"当院でもEpic系システム導入時に同様機能が利用可能になる可能性。地域の感染症動向を迅速に把握し、診療方針に反映できるメリット。","i":"電子カルテでの感染症アラート機能の活用検討と、地域感染症情報の診療への反映体制を構築。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/epic-rolls-out-health-alerts-flag-rising-rates-illness-county-level","d":"2026-04-11"},{"t":"Hospital M&A roars back to life in Q1 2026; Operating performances fray in February","s":"2026年第1四半期に病院M&Aが活発化する一方、2月の運営実績が悪化している。米国の病院業界では統合の動きが加速している。","m":"米国の動向だが、日本でも医療機関の統合・連携は今後の課題。経営環境の厳しさは共通認識として参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/hospital-ma-roars-back-life-q1-2026-operating-performances-fray-february","d":"2026-04-11"},{"t":"Fierce Healthcare Layoff Tracker—Mississippi hospital cuts nearly fifth of its workforce; UCI Health laying off 1% of workforce","s":"米国でミシシッピ州の病院が従業員の約20%を削減、UCI Healthも1%の従業員削減を実施。医療機関の人員削減が続いている。","m":"米国の事例だが、医療機関の経営効率化は世界共通の課題。人件費圧縮の参考事例として把握しておく価値あり。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/finance/fierce-healthcare-layoff-tracker-2026-job-cuts-eliminations-health-systems-hospitals","d":"2026-04-11"},{"t":"Medicare navigation company Chapter banks $100M series E funding round","s":"メディケア案内サービス会社Chapterが1億ドルのシリーズE資金調達を完了。高齢者向け医療保険案内サービスへの投資が活発化。","m":"米国のメディケア制度だが、日本でも高齢者医療の複雑化は同様。患者案内サービスのニーズは今後国内でも高まる可能性。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/medicare-navigation-company-chapter-banks-100m-series-e-funding-round","d":"2026-04-11"},{"t":"Regulatory burdens continue to mount for physician practices","s":"医師の診療所に対する規制負担が継続的に増加している。行政手続きや報告義務の増加が診療現場を圧迫している状況。","m":"日本でも同様に診療報酬請求や各種報告書の負担増加は深刻。業務効率化とコンプライアンス体制の強化が急務。","i":"規制対応体制の見直しと効率化、必要に応じて外部委託の検討が必要。","src":"Fierce Healthcare","p":"要対応","u":"https://www.fiercehealthcare.com/providers/regulatory-burdens-continue-mount-physician-practices","d":"2026-04-11"},{"t":"Eli Lilly launches oral GLP-1 drug across US through Lilly Direct, telehealth providers","s":"イーライリリーが経口GLP-1薬をリリーダイレクトおよび遠隔医療プロバイダーを通じて米国全土で発売開始。糖尿病治療における新たな選択肢として注目される。","m":"内科（糖尿病）での処方検討対象。遠隔医療との組み合わせは競合環境の変化要因。","i":"糖尿病患者への新治療選択肢として情報収集し、導入検討を行う。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/telehealth/eli-lillys-launches-oral-glp-1-drug-across-us-through-lilly-direct-telehealth-providers","d":"2026-04-11"},{"t":"AbbVie challenges 'outdated' 340B drug discount program guidance in new lawsuit","s":"アッヴィが340B薬価割引プログラムのガイダンスを時代遅れとして新たな訴訟を起こした。製薬会社と病院の薬価制度を巡る対立が継続。","m":"米国の薬価制度の話だが、日本でも薬価改定や後発品使用促進など、薬剤費圧縮の動きは継続している。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/pharma/abbvie-challenges-outdated-340b-drug-discount-program-guidance-new-suit","d":"2026-04-11"},{"t":"Humana, Noom and Welldoc team up with b.well to expand health data access as part of CMS push","s":"ヒューマナ、Noom、ウェルドックがb.wellと提携し、CMS推進の一環として健康データアクセスを拡大。医療データ連携が加速している。","m":"日本でも医療DXが推進される中、患者の健康データ活用とプラットフォーム連携は重要な検討課題となる。","i":"電子カルテや健康管理アプリとの連携体制の検討が必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/humana-noom-a
