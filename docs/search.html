<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — Daily Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--card:#FFFFFF;--border:#E8E6E0;--text:#1A1A18;--sub:#6B6960;--accent:#1A5F4A;--red:#9B2C2C;--amber:#92600A;--blue:#1A4B8C;--purple:#5B21B6;--tag-red:#FEF2F2;--tag-amber:#FFFBEB;--tag-blue:#EFF6FF;--tag-green:#F0FDF4;--tag-purple:#F5F3FF;--font-sans:'Noto Sans JP',sans-serif;--font-serif:'Noto Serif JP',serif}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.app-header h1{font-family:var(--font-serif);font-size:18px;font-weight:700;letter-spacing:0.02em;white-space:nowrap}
.app-header nav{display:flex;gap:12px;align-items:center;flex:1}
.app-header nav a{font-size:13px;color:var(--sub);text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;transition:all .15s}
.app-header nav a:hover,.app-header nav a.active{color:var(--accent);background:var(--tag-green)}
.container{max-width:820px;margin:0 auto;padding:24px 20px 80px}
.date-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.date-nav a{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;text-decoration:none;color:var(--sub);background:var(--card);transition:all .15s}
.date-nav a:hover,.date-nav a.current{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card.read{opacity:0.55}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.card h3{font-size:14.5px;font-weight:700;line-height:1.55}
.priority{font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.p-high{background:var(--tag-red);color:var(--red)}
.p-mid{background:var(--tag-amber);color:var(--amber)}
.p-info{background:var(--tag-green);color:var(--accent)}
.p-tech{background:var(--tag-purple);color:var(--purple)}
.card .source-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.card .source{font-size:11px;color:var(--sub)}
.card .link-btn{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid rgba(26,95,74,.25);border-radius:4px;transition:all .15s}
.card .link-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card .body{font-size:13px;color:#3D3D3A;line-height:1.8}
.card .impact{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12.5px;color:var(--accent);font-weight:500;line-height:1.7}
.card .impact::before{content:'-> '}
.card .memo{margin-top:8px;background:#F7F7F5;border-radius:6px;padding:10px 14px;font-size:12.5px;line-height:1.7}
.card .memo strong{color:var(--accent);font-weight:700}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.checkbox-row label{font-size:12px;color:var(--sub);cursor:pointer;display:flex;align-items:center;gap:6px}
.checkbox-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sub);margin:28px 0 14px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.archive-list{list-style:none}
.archive-list li{margin-bottom:8px}
.archive-list li a{font-size:14px;color:var(--accent);text-decoration:none;padding:10px 16px;display:block;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.archive-list li a:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.archive-list li a .count{font-size:12px;color:var(--sub);margin-left:8px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
.collapsible-section{margin-top:8px}
.collapsible-section>summary{list-style:none}
.collapsible-section>summary::-webkit-details-marker{display:none}
.collapsible-section>summary::after{content:' \25B6';font-size:10px}
.collapsible-section[open]>summary::after{content:' \25BC'}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:13.5px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;text-decoration:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:5px;vertical-align:1px}
.panel{display:none}.panel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--sub);margin-top:2px}
.source-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.source-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--sub);background:var(--card)}
.source-pill b{color:var(--text);font-weight:700}
.footer-note{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--sub);line-height:1.7;text-align:center}
.search-box{margin-bottom:20px;display:flex;gap:8px}
.search-box input{flex:1;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-sans);background:var(--card)}
.search-box input:focus{outline:none;border-color:var(--accent)}
.search-results-info{font-size:13px;color:var(--sub);margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.search-results-info b{color:var(--text)}
.auth-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px;max-width:360px;width:100%;text-align:center}
.auth-box h2{font-family:var(--font-serif);font-size:20px;margin-bottom:8px}
.auth-box p{font-size:13px;color:var(--sub);margin-bottom:20px}
.auth-box input{width:100%;padding:10px 14px;font-size:14px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-family:var(--font-sans)}
.auth-box input:focus{outline:none;border-color:var(--accent)}
.auth-box button{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.auth-box .error{color:var(--red);font-size:12px;margin-top:8px;display:none}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.card-head{flex-direction:column;gap:4px}.priority{align-self:flex-start}.app-header{flex-direction:column;align-items:flex-start}}</style>
</head>
<body>
<div id="auth-overlay" class="auth-overlay" style="display:none">
<div class="auth-box">
<h2>Daily Briefing</h2>
<p>パスワードを入力してください</p>
<form id="auth-form"><input id="auth-pw" type="password" placeholder="Password" autofocus><button type="submit">Enter</button><div id="auth-error" class="error">パスワードが正しくありません</div></form>
</div></div>
<div class="app-header">
  <h1>Daily Intelligence Briefing</h1>
  <nav>
    <a href="./index.html">Latest</a>
    <a href="./archive/index.html">Archive</a>
    <a href="./search.html" class="active">Search</a>
  </nav>
</div>
<div class="container">
  <h2 style="font-size:18px;margin-bottom:20px;">Search</h2>
  <div class="search-box"><input id="search-input" type="text" placeholder="キーワードを入力..." autofocus></div>
  <div id="search-info" class="search-results-info" style="display:none"></div>
  <div id="search-results"></div>
</div>

<script>
(function(){
  var HASH='76c85623ee58495b2449fe7dbc47b289c14459b3adb9eebc0c960514147e4233';
  var KEY='briefing_auth';
  function check(){return localStorage.getItem(KEY)===HASH}
  if(check()){document.getElementById('auth-overlay').remove();return}
  document.getElementById('auth-overlay').style.display='flex';
  document.getElementById('auth-form').onsubmit=async function(e){
    e.preventDefault();
    var pw=document.getElementById('auth-pw').value;
    var buf=new TextEncoder().encode(pw);
    var hash=await crypto.subtle.digest('SHA-256',buf);
    var hex=Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
    if(hex===HASH){localStorage.setItem(KEY,HASH);document.getElementById('auth-overlay').remove()}
    else{document.getElementById('auth-error').style.display='block'}
  };
})();
</script>
<script>
var DATA=[{"t":"AISF practice guidance on pharmacological treatment of metabolic-dysfunction associated steatotic liver disease and steatohepatitis (MASLD/MASH): A 2026 Update.","s":"代謝機能異常関連脂肪性肝疾患（MASLD）の薬物治療に関するイタリア肝臓学会の診療指針2026年版。2型糖尿病、肥満、メタボリック症候群患者での有病率増加が報告され、ResmetiromとSemaglutideが第3相試験で組織学的効果を示した。","m":"内科（糖尿病・循環器）での糖尿病患者に対する脂肪肝スクリーニングの重要性が高まる。新薬承認により治療選択肢が拡大する可能性。","i":"糖尿病患者への肝疾患スクリーニング強化と、新薬承認時の治療選択肢拡大への準備が必要。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41864758/","d":"2026-03-23"},{"t":"PANoptosis in Alzheimer's disease: The expanding landscape of programmed cell death mechanisms and therapeutic interventions.","s":"アルツハイマー病におけるPANoptosis（細胞死機構）の役割に関する基礎研究。アミロイドβとタウ蛋白の蓄積がPANoptosomeを活性化し、神経変性を促進するメカニズムを解明。治療介入の新たな標的となる可能性。","m":"認知症患者の家族からの相談対応時の参考情報。将来的に新規治療法開発につながる可能性がある基礎研究。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41864364/","d":"2026-03-23"},{"t":"Malnutrition: an overlooked geriatric syndrome in older adults with type 2 diabetes.","s":"2型糖尿病高齢者における栄養不良という見落とされがちな老年症候群について。機能能力と生活の質に大きく影響する重要な臨床状態だが、糖尿病研究では軽視されがちな問題として指摘。","m":"内科での高齢糖尿病患者診療において、血糖管理だけでなく栄養評価の重要性が増している。多職種連携での対応が必要。","i":"高齢糖尿病患者の栄養状態評価を診療プロセスに組み込み、多職種連携強化を検討。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41863684/","d":"2026-03-23"},{"t":"Effect of Glucagon-Like-Peptide-1 Receptor Agonists (GLP-1 RA) on Neuropsychiatric Outcomes: A Systematic Review and Meta-Analysis.","s":"GLP-1受容体作動薬の神経精神学的アウトカムに対する効果のシステマティックレビューとメタ分析。2型糖尿病患者の認知機能低下、気分障害、物質使用障害への影響を検証し、神経保護・精神作用効果の可能性を示唆。","m":"糖尿病治療でのGLP-1薬使用時に、血糖・体重管理以外の神経精神学的メリットも期待できる可能性。患者説明での差別化要因。","i":"GLP-1薬処方時の効果説明範囲拡大と、精神的症状改善の可能性について情報提供強化。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41862354/","d":"2026-03-23"},{"t":"Features of mobile apps for diabetic kidney disease self-management: A scoping review.","s":"糖尿病性腎症患者のセルフマネジメント支援モバイルアプリの機能に関するスコーピングレビュー。糖尿病性腎症と慢性腎疾患患者の長期管理において、モバイルアプリによる効果的なセルフマネジメント支援の重要性を検証。","m":"糖尿病患者への療養指導でモバイルアプリ活用の可能性。患者の自己管理支援ツールとしての検討価値あり。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860840/","d":"2026-03-23"},{"t":"Angiography-derived fractional flow reserve versus coronary angiography to guide coronary artery bypass grafting in patients undergoing surgical valve procedures with concomitant coronary artery disease in China (FAVOR IV-QVAS): a multicentre, triple-blind, randomised trial.","s":"心臓弁膜症手術時の併存冠動脈疾患に対する血管造影由来FFRガイド下冠動脈バイパス術の多施設無作為化試験。中国の12の3次病院で実施され、生理学的ガイド戦略の臨床アウトカム改善効果を検証。","m":"循環器疾患患者の高次医療機関紹介時の参考情報。最新の冠動脈疾患治療戦略として認識。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41864747/","d":"2026-03-23"},{"t":"Effect of a clinical decision support system on stroke care quality and outcomes in patients with acute ischaemic stroke (GOLDEN BRIDGE II): cluster randomised clinical trial.","s":"急性虚血性脳卒中患者における臨床決定支援システム（CDSS）の脳卒中ケア質と臨床アウトカムへの効果を検証したクラスター無作為化臨床試験。AI画像解析と治療推奨を含むCDSSの有効性を77病院で評価。","m":"脳卒中疑い患者の高次医療機関紹介時の参考情報。AI支援診断システムの普及動向として認識。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41862204/","d":"2026-03-23"},{"t":"Increased risk of stroke in patients with psoriasis: A systematic review and meta-analysis.","s":"乾癬患者における脳卒中リスク増加のシステマティックレビューとメタ分析。18研究、70万人超の乾癬患者を含む解析で、乾癬患者の脳卒中リスク増加が確認された。慢性炎症性皮膚疾患と心血管イベントの関連性を示す。","m":"皮膚疾患患者でも循環器リスク評価が重要。他科連携での包括的管理の必要性を示すエビデンス。","i":"乾癬患者に対する心血管リスク評価の強化と、循環器内科への適切な紹介体制構築。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861197/","d":"2026-03-23"},{"t":"On-target, off-tumor oral toxicities of talquetamab in heavily pretreated multiple myeloma.","s":"多発性骨髄腫治療薬talquetamabの口腔毒性に関するレビュー。GPRC5DとCD3を標的とした初のバイスペシフィック抗体で高い効果を示すが、舌・唾液腺・硬化組織のGPRC5D発現により口腔有害事象が頻発。","m":"血液疾患患者の口腔有害事象に関する情報。耳鼻咽喉科での対症療法需要の可能性として認識。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860737/","d":"2026-03-23"},{"t":"Management of Takayasu Arteritis - A 2026 Update.","s":"高安動脈炎の管理に関する2026年版アップデート。若年女性に多発する慢性大血管血管炎で、疾患活動性と血管損傷の鑑別が困難。PETVASやVAMPスコアなどの新しい評価法とTAIDAI複合スコアの開発が進展。","m":"稀な血管炎疾患の最新管理情報。専門医療機関への紹介判断時の参考として保持。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860699/","d":"2026-03-23"},{"t":"Features of mobile apps for diabetic kidney disease self-management: A scoping review.","s":"糖尿病性腎疾患（DKD）の自己管理支援モバイルアプリの機能に関するスコーピングレビュー。DKDや慢性腎疾患患者が効果的な自己管理を行うためのモバイルアプリの特徴を特定することを目的としている。","m":"糖尿病専門クリニックとして、患者の自己管理支援ツールの導入検討材料。モバイルアプリの有効性データは患者指導の質向上に寄与する可能性。","i":"糖尿病患者向けデジタルヘルス導入の参考として活用を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860840/","d":"2026-03-23"},{"t":"IMPlementing IMProved Asthma self-management as RouTine (IMP2ART) in UK primary care: An internal pilot for a cluster randomised controlled trial.","s":"英国のプライマリケアにおいて、個別化された喘息行動計画と定期的な専門家によるレビューを含む喘息自己管理支援の実装戦略IMP2ARTの評価研究。支援された自己管理は予定外受診を減らし、喘息転帰と生活の質を改善する。","m":"小児科での喘息患者が多い当院にとって、患者・家族への自己管理支援強化は重要。定期的なフォローアップ体制の見直しが必要。","i":"小児科の喘息患者管理において自己管理支援プログラムの導入を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860818/","d":"2026-03-23"},{"t":"Fecal microbiota transplantation in chronic liver disease: Current and future state of the art.","s":"慢性肝疾患における腸内細菌叢移植（FMT）の現在と将来の状況に関するレビュー。肝硬変、肝性脳症、アルコール関連肝疾患の治療において腸内細菌叢移植が有効である可能性を示唆している。","m":"消化器内科・外科として将来的な治療選択肢として注視。現時点では実装段階ではないが、肝疾患診療の将来動向として把握しておく価値がある。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860558/","d":"2026-03-23"},{"t":"A person-centred ehealth intervention for fall prevention in nursing homes lacking geriatric expertise: cost-effectiveness analysis within a randomised controlled trial.","s":"老人医学的専門知識が不足している介護施設での転倒予防のためのeヘルス介入の費用対効果分析。医療過疎地の介護施設居住者を対象とした遠隔医療プログラムの転倒予防効果を調査している。","m":"直接的な影響は限定的だが、高齢者医療における遠隔医療の活用事例として参考になる。将来的な在宅医療展開時の参考情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860310/","d":"2026-03-23"},{"t":"Cost-effectiveness of treatment and care of patients with gastrointestinal inflammatory diseases: a systematic review.","s":"炎症性腸疾患患者の治療とケアの費用対効果に関する系統的レビュー。生物学的製剤と非生物学的製剤の比較、異なる生物学的製剤間の比較、治療順序戦略について検討している。","m":"消化器内科として炎症性腸疾患の治療費用対効果は関心事項。生物学的製剤の使用判断や治療戦略立案の参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861399/","d":"2026-03-23"},{"t":"Artificial intelligence for acute appendicitis diagnosis: A systematic review of current evidence, challenges, and future directions.","s":"急性虫垂炎診断におけるAIの系統的レビュー。診断精度向上、臨床意思決定支援、陰性虫垂切除率の削減において人工知能が有望なツールとして浮上している。","m":"消化器外科として急性虫垂炎の診断精度向上は重要課題。AI支援による誤診リスク削減と適切な手術適応判断に活用可能。","i":"消化器外科の急性腹症診断において、AI診断支援システムの導入を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861187/","d":"2026-03-23"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"進行食道扁平上皮癌の一次治療におけるPD-1阻害薬と化学療法併用の有益な患者サブグループに関する系統的レビューとメタ解析。欧州医薬品庁がPD-1高発現ESCCに対する一次治療として承認している。","m":"消化器内科・外科として食道癌治療の最新動向として把握。当院での対象患者は限定的だが、紹介や連携における判断材料として有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-23"},{"t":"Effectiveness of exercise interventions in patients with colorectal cancer during adjuvant chemotherapy: a systematic review and meta-analysis.","s":"大腸癌患者の補助化学療法中における運動介入の効果に関する系統的レビューとメタ解析。運動能力、筋力、疲労、痛み、化学療法誘発性末梢神経障害、不安、うつ、生活の質への影響を評価している。","m":"消化器外科として大腸癌術後患者の補助療法中のケアに関連。運動療法の導入や患者指導の根拠として活用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860634/","d":"2026-03-23"},{"t":"The roles and heterogeneity of CD8+ T cells in inflammatory bowel disease: A narrative review of insights from single&#x2011;cell transcriptomics (Review).","s":"炎症性腸疾患におけるCD8+ T細胞の役割と不均一性に関する単細胞トランスクリプトーム解析のナラティブレビュー。IBDにおけるCD8+ T細胞の表現型・機能的多様性と治療機会を特定している。","m":"消化器内科として炎症性腸疾患の病態理解と将来的な個別化治療戦略の参考。基礎研究レベルだが治療標的の理解に有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860039/","d":"2026-03-23"},{"t":"PD-1/PD-L1 inhibitors in recurrent or metastatic nasopharyngeal carcinoma: A systematic review and meta-analysis.","s":"上咽頭癌の再発・転移例に対するPD-1/PD-L1阻害薬の治療効果に関するメタ解析研究。9研究883例を対象に生存期間、客観的奏効率、副作用等を評価した。","m":"耳鼻咽喉科診療で上咽頭癌を扱う際の治療選択肢として把握。免疫チェックポイント阻害薬の動向は参考情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861185/","d":"2026-03-23"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"進行食道扁平上皮癌の一次治療におけるPD-1阻害薬と化学療法併用の有効性を評価したメタ解析。欧州で高PD-L1発現ESCCの一次治療として承認されている。","m":"消化器内科・外科で食道癌患者を紹介する際の治療選択肢として把握。免疫チェックポイント阻害薬の適応拡大動向。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-23"},{"t":"Telehealth Approaches for Pediatric Otitis Media and Clinical Outcomes: Scoping Review.","s":"小児中耳炎に対する遠隔医療アプローチの範囲的レビュー。従来の対面診療による鼓膜鏡検査に代わる遠隔診断技術の開発が進んでいる。","m":"小児科と耳鼻咽喉科の中耳炎診療で遠隔医療活用の可能性。診療効率化と患者アクセス改善に寄与。","i":"小児科・耳鼻咽喉科で遠隔医療導入の検討時期を見極める。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41850731/","d":"2026-03-23"},{"t":"Advances in imaging modalities and tumor classification for vestibular schwannomas.","s":"前庭神経鞘腫の画像診断技術と腫瘍分類の進歩に関するレビュー。高解像度MRI、拡散テンソル画像などの先進的画像技術が病変評価と手術計画を改善。","m":"耳鼻咽喉科で前庭神経鞘腫を疑う症例の画像診断依頼時の参考。先進的画像技術の理解が診断精度向上に寄与。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41838294/","d":"2026-03-23"},{"t":"Maternal 12-HETE is associated with childhood asthma and the responses to prenatal omega-3 supplementation.","s":"妊娠中の母体12-HETEと小児喘息との関連、及び妊娠中オメガ3サプリメント摂取への反応に関する研究。母体12-HETE欠乏が小児喘息リスク増加と関連。","m":"小児科で喘息児の診療時、妊娠中の母体要因としての12-HETEとオメガ3摂取歴の把握が有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41850235/","d":"2026-03-23"},{"t":"An observational, cohort, multi-centre, open label phase IV extension study comparing IPV immune responses to preschool dTaP-IPV booster vaccines in children whose mothers received or did not receive an IPV-containing pertussis vaccine during pregnancy in England.","s":"妊娠中にIPV含有百日咳ワクチンを接種した母親の子どもと非接種群の子どもを対象とした、就学前dTaP-IPVブースターワクチンに対する免疫反応比較研究。","m":"小児科でワクチン接種スケジュール管理時の参考。妊娠中ワクチン接種が子どもの免疫反応に与える影響を把握。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41690287/","d":"2026-03-23"},{"t":"Long-term protection of an inactivated enterovirus type 71 vaccine against hand, foot, and mouth diseases in children: a modelling study.","s":"不活化エンテロウイルス71型ワクチンの手足口病に対する長期防御効果をモデリング研究で予測。20年間の長期防御効果を数学的モデルで評価。","m":"小児科で手足口病の予防策検討時の参考。EV71ワクチンの長期効果データは保護者への説明に有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41650673/","d":"2026-03-23"},{"t":"Case report and literature review of neurodevelopmental syndrome linked to DOT1L variants.","s":"DOT1L遺伝子変異に関連した神経発達症候群の症例報告と文献レビュー。発達遅延と先天異常を呈する常染色体優性遺伝症候群の26例目の報告。","m":"小児科で発達遅延を呈する患児の遺伝的背景評価時の参考。DOT1L変異による症候群の認識が診断に寄与。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41475673/","d":"2026-03-23"},{"t":"Ontology-Based Medication Named Entity Recognition Using Pretrained Transformer Models From a Thai Hospital: Model Fine-Tuning and Validation Study.","s":"タイの病院記録からの薬剤情報抽出を目的とした、オントロジーベースの薬剤固有表現認識システムの開発と検証。5つの事前訓練済み変換器モデルを評価。","m":"電子カルテ導入時の薬剤情報管理システム参考事例。タイ語・英語混在の医療記録処理技術は日本でも応用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861368/","d":"2026-03-23"},{"t":"Feasibility of a Large Language Model Chatbot to Support Parental Understanding in the PICU.","s":"PICU（小児集中治療室）で保護者の質問に答えるGPT-4ベースのチャットボットの実用性を評価した研究。14名の保護者が参加し、87.5%の登録率を達成した。","m":"小児科を有する当法人では、保護者対応の効率化とサービス向上のため、同様のAI技術活用を検討する価値がある。実装前に医療安全面での検証が必要。","i":"小児科外来でのAI問診システム導入検討時の参考データとして活用する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860987/","d":"2026-03-23"},{"t":"SegMan-based dual-prior network with boundary-augmented hybrid attention for robust skin lesion segmentation.","s":"皮膚病変のセグメンテーション（領域分割）を行うAI技術の改良に関する研究。境界の曖昧さや形態の多様性といった課題に対処する新しいネットワーク手法を提案した。","m":"皮膚科は当法人の診療科目にないが、AI画像診断技術の進歩として把握。将来的な医療DXの参考情報として記録。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41849365/","d":"2026-03-23"},{"t":"Detection of rare medical events in electronic health records using machine learning: Current practices and suggestions - A scoping review.","s":"電子健康記録（EHR）において機械学習を用いて稀な医療イベントを検出する現状と課題に関するスコーピングレビュー。異常検出アプローチについて整理された文献。","m":"当法人が扱う糖尿病合併症や循環器疾患の早期発見に応用可能。電子カルテのAI機能拡張時の重要な参考資料となる。","i":"電子カルテシステムでのAI活用計画策定時に、稀な疾患の早期発見機能実装を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41838695/","d":"2026-03-23"},{"t":"Generating synthetic CEM from low-energy images using deep learning: A future without contrast media? A proof-of-concept study.","s":"低エネルギー画像から合成造影マンモグラフィ画像を生成する深層学習技術の概念実証研究。造影剤を使わない画像診断の可能性を示した。","m":"マンモグラフィは当法人の診療範囲外だが、造影剤レス検査への技術動向として把握。将来的な医療費抑制に寄与する可能性。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41838331/","d":"2026-03-23"},{"t":"Impact of Basal Ganglia Perivascular Spaces on Ischemic and Hemorrhagic Risks in Patients Taking Antithrombotic Therapies.","s":"抗血栓薬服用患者において、脳基底核周囲血管間隙の拡大が脳卒中リスクに与える影響を調査した日本の多施設前向き観察研究。52病院が参加した大規模研究。","m":"当法人の循環器内科患者の多くが抗血栓薬を服用しており、脳卒中リスク評価の精度向上に直結する重要な知見。画像診断との連携強化が必要。","i":"循環器内科で抗血栓薬処方患者のMRI画像評価基準を見直し、リスク層別化を強化する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861278/","d":"2026-03-23"},{"t":"Relationship between cerebral perfusion and cognition in white matter hyperintensities of presumed vascular origin: A prospective 3D-pCASL study.","s":"血管性白質病変における脳血流と認知機能の関係を3D-pCASLを用いて調査した前向き研究。128名の参加者で認知機能評価と画像検査を実施した。","m":"認知症早期診断への応用可能性があるが、当法人では専門的な脳血流画像検査は実施していない。将来的な連携先検討時の参考情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861232/","d":"2026-03-23"},{"t":"Experienced stigma in Japanese outpatients with diabetes: Age and polypharmacy matter.","s":"日本の糖尿病外来患者114名を対象とした糖尿病関連スティグマ（偏見・差別）の実態調査。年齢とポリファーマシーが体験されるスティグマに関連することが判明。","m":"当法人の糖尿病内科で最も重要な知見。患者の内面的な負担を理解し、多剤併用時の配慮や心理的支援の強化が必要。QOL向上に直結する。","i":"糖尿病患者の心理的負担軽減のため、服薬指導とカウンセリング体制を見直す。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861231/","d":"2026-03-23"},{"t":"Factors involved in the improvement of prolonged symptoms in patients with COVID-19 treated with Japanese traditional (Kampo) medicine: A single-center, prospective, observational study.","s":"COVID-19長期症状患者に対する漢方薬治療の効果を調査した日本の単施設前向き観察研究。特に倦怠感などの症状改善に焦点を当てた治療レジメンを開発。","m":"当法人でもLong COVID患者の相談が増加しており、標準治療がない中で漢方薬による症状緩和は有効な選択肢。内科での導入検討が必要。","i":"Long COVID患者への漢方薬処方を検討し、症状改善プログラムを整備する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861186/","d":"2026-03-23"},{"t":"The lived experience of adolescents with X-linked hypophosphataemia treated with burosumab at end of skeletal growth: a mixed-methods analysis.","s":"X連鎖性低リン血症の青年患者におけるburosumab治療の体験を調査した多施設混合研究法による研究。骨格成長終了前後での治療経験を記述した。","m":"稀少疾患の専門治療に関する研究で、当法人の一般的な小児科診療との関連性は低い。稀少疾患患者の紹介先情報として記録。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860923/","d":"2026-03-23"},{"t":"診療報酬改定","s":"診療報酬改定","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-23"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬について","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-23"},{"t":"ジカウイルス感染症","s":"ジカウイルス感染症","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-23"},{"t":"Quantifying Cardiac Amyloid Burden","s":"心臓アミロイドーシスの定量的評価に関する医学論文。循環器疾患の診断技術に関する専門的な内容で、循環器内科の診療知識として参考になる。","m":"循環器内科での心アミロイドーシス診断に関する最新知見。専門的な診断技術だが、当クリニックでの実施可能性は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/quantifying-cardiac-amyloid-burden-2026a10007jw?src=rss","d":"2026-03-23"},{"t":"Axitinib Ups Neuroendocrine Tumor Objective Response Rate","s":"神経内分泌腫瘍に対するアキシチニブの客観的奏効率向上に関する臨床試験結果。消化器外科での治療選択肢に関連する新薬情報。","m":"神経内分泌腫瘍の治療薬として注目。当クリニックの消化器外科での治療適応は限定的だが、患者紹介時の知識として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/axitinib-boosts-neuroendocrine-tumor-objective-response-rate-2026a10008jd?src=rss","d":"2026-03-23"},{"t":"Waste Not, Want Not: Scientists Turn Plastic Into Levodopa","s":"プラスチック廃棄物からパーキンソン病治療薬レボドパを製造する技術開発に関する基礎研究。環境と医療の接点を示す興味深い研究成果。","m":"基礎研究レベルの技術で、当クリニック経営への直接的影響はない。将来的な薬剤供給や環境問題への関心として参考程度。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/waste-not-want-not-scientists-turn-plastic-levodopa-2026a10008jh?src=rss","d":"2026-03-23"},{"t":"Employee Dies Of Meningitis in North France, Company Says no Link to UK Outbreak","s":"フランス北部で髄膜炎による死亡事例が発生、英国での集団発生との関連性は否定。感染症の海外動向として参考情報。","m":"髄膜炎の海外発生状況として把握。当クリニックへの直接的影響はないが、感染症動向の参考として。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/employee-dies-meningitis-north-france-company-says-no-link-2026a10008jq?src=rss","d":"2026-03-23"},{"t":"Lifelike 3D-Printed ‘Training Brains’ React Like Real Organs","s":"実際の脳のように反応する3Dプリント製の訓練用脳モデルの開発。医療教育や手術訓練技術の進歩に関する研究。","m":"医療教育技術の進歩として興味深いが、当クリニックでの活用機会は限定的。将来的な医療技術動向として参考程度。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/lifelike-3d-printed-training-brains-react-real-organs-2026a10008if?src=rss","d":"2026-03-23"},{"t":"Suicidality May Predict Focal Epilepsy Treatment Resistance","s":"自殺傾向が焦点性てんかんの治療抵抗性を予測する可能性について。精神的要因と神経疾患治療効果の関連性に関する研究。","m":"てんかん治療での精神的要因の重要性を示す研究。当クリニックでのてんかん診療は限定的だが、精神的ケアの重要性として参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/suicidality-may-predict-treatment-resistance-newly-diagnosed-2026a10008i9?src=rss","d":"2026-03-23"},{"t":"Mixed Results for Psilocybin as Blinding Concerns Remain","s":"サイロシビン（マジックマッシュルームの活性成分）の臨床試験で混在する結果が報告されており、治療効果の評価において盲検化の問題が残存している。精神医学領域での新しい治療選択肢として注目されている。","m":"精神科診療は行っていないが、将来的な治療選択肢として情報収集価値あり。当面は直接的な影響なし。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mixed-results-psilocybin-blinding-concerns-remain-2026a10008id?src=rss","d":"2026-03-23"},{"t":"Recent Activity Matters for Dementia Risk in Older Adults","s":"高齢者において最近の身体活動が認知症リスクに影響することが研究で示された。運動習慣の継続が認知機能維持に重要であることが確認されている。","m":"糖尿病・循環器患者への運動指導に活用可能。予防医学的アプローチの強化に繋がる情報。","i":"生活習慣病指導や健康相談で運動の重要性をより強調した指導を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/recent-activity-matters-dementia-risk-older-adults-2026a10008gy?src=rss","d":"2026-03-23"},{"t":"Rules for Thee, Not for Me: Neuroscience & Double Standards","s":"神経科学の観点から人間の二重基準について分析した記事。「自分には甘く、他人には厳しい」という心理的傾向を神経科学的に解説している。","m":"診療現場での患者コミュニケーションや職員マネジメントに応用可能な心理学的知見として参考になる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/rules-thee-not-me-neuroscience-double-standard-2026a100086q?src=rss","d":"2026-03-23"},{"t":"<a href=\"/regulatory/cms-proposed-rule-aims-ax-fax-machine-phase-out-paper-mailing\" hreflang=\"en\">CMS final rule aims to ax the fax machine, phase out paper mailing</a>","s":"<a href=\"/regulatory/cms-proposed-rule-aims-ax-fax-machine-phase-out-paper-mailing\" hreflang=\"en\">CMS final rule aims to ax the fax machine, phase out paper mailing</a>","m":"","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/cms-proposed-rule-aims-ax-fax-machine-phase-out-paper-mailing","d":"2026-03-23"},{"t":"<a href=\"/regulatory/labor-department-proposes-rule-force-greater-pbm-transparency\" hreflang=\"en\">PCMA urges Labor Department to rescind PBM transparency rule as Congress passed reforms</a>","s":"<a href=\"/regulatory/labor-department-proposes-rule-force-greater-pbm-transparency\" hreflang=\"en\">PCMA urges Labor Department to rescind PBM transparency rule as Congress passed reforms</a>","m":"","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/labor-department-proposes-rule-force-greater-pbm-transparency","d":"2026-03-23"},{"t":"<a href=\"/regulatory/hhs-moves-cut-federal-funding-hospitals-over-gender-affirming-care-minors\" hreflang=\"en\">HHS 'declaration' to restrict gender-affirming care for minors struck down by 時間の調整が有効であることを解説した記事。睡眠障害の改善アプローチに関する健康情報。","m":"患者への生活指導や睡眠相談時の参考情報として活用可能。特に内科診療での生活習慣改善指導に有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG116UR0R10C26A3000000/","d":"2026-03-23"},{"t":"肥満症は「要治療」 増える専門外来、健康障害防ぐ","s":"肥満症を治療が必要な疾患として捉え、専門外来が増加している。健康障害の予防を目的とした治療アプローチが注目されている。","m":"糖尿病・循環器内科として肥満症治療への取り組み強化が重要。GLP-1薬の活用や専門外来設置の検討材料となる。","i":"肥満症治療の専門性向上と専門外来開設の検討が必要。糖尿病診療との連携強化。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD038GK0T00C26A3000000/","d":"2026-03-23"},{"t":"目の前の命と向き合い続ける ジャパンハート創設者・吉岡秀人さん","s":"NPO法人ジャパンハート創設者の吉岡秀人氏に関するインタビュー記事。国際医療支援活動を通じた医師の使命と社会貢献について語られている内容と推測される。","m":"医師の社会的使命や国際貢献活動の視点は参考になる。直接的な経営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD16AU20W6A310C2000000/","d":"2026-03-23"},{"t":"不調の原因は「普段の呼吸」の可能性 死亡リスクにも影響を及ぼす","s":"普段の呼吸法が健康に与える影響について解説した記事。呼吸の質が不調や死亡リスクに関連するという内容で、予防医学的な観点から注目される。","m":"内科診療での生活指導や予防医学的アプローチの参考になる。患者教育の新たな視点として活用可能。","i":"呼吸指導や予防医学的アプローチを診療に取り入れることを検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD045XB0U6A300C2000000/","d":"2026-03-23"},{"t":"放射線の知識、国民に周知を 福島の中間貯蔵施設を訪ねて","s":"福島の中間貯蔵施設を訪問した記事で、放射線に関する国民の知識向上の必要性について述べている。医療従事者の放射線理解にも関連する内容。","m":"放射線に関する正しい知識は医療従事者として重要。直接的な経営判断への影響は少ない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD045BG0U6A300C2000000/","d":"2026-03-23"},{"t":"テレワーク社会の落とし穴 体力が10歳分下がり、議論が偏りがちに","s":"テレワークが身体機能や思考に与える負の影響について分析した記事。体力低下や議論の偏りなど、働き方の変化による健康への影響を扱っている。","m":"コロナ後の働き方変化による健康への影響は診療で遭遇する可能性がある。生活習慣病対策の参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG174BJ0X10C26A2000000/","d":"2026-03-23"},{"t":"「不要な入院や退院延長、悪循環招く」 苦悩する現場の医師・看護師","s":"病院での不要な入院や退院延長が医療現場に与える問題について、現場の医師・看護師の苦悩を取り上げた記事。医療制度の課題を扱っている。","m":"クリニックから病院への紹介タイミングや連携のあり方に関わる重要な視点。医療制度の課題として把握が必要。","i":"適切な医療提供と効率的な病院連携について検討し、紹介・逆紹介の運用を見直す。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA104OP0Q6A310C2000000/","d":"2026-03-23"}];
var input=document.getElementById('search-input');
var info=document.getElementById('search-info');
var results=document.getElementById('search-results');
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pclass(p){return p==='要対応'?'p-high':p==='要注視'?'p-mid':p==='テック'?'p-tech':'p-info'}
function search(){
  var q=input.value.trim().toLowerCase();
  if(!q){info.style.display='none';results.innerHTML='';return}
  var matches=DATA.filter(function(a){
    return (a.t+' '+a.s+' '+a.m+' '+a.i+' '+a.src).toLowerCase().indexOf(q)>=0;
  });
  info.style.display='block';
  info.innerHTML='<b>'+matches.length+'</b> 件見つかりました';
  results.innerHTML=matches.slice(0,50).map(function(a){
    return '<div class="card"><div class="card-head"><h3>'+esc(a.t)+'</h3><span class="priority '+pclass(a.p)+'">'+esc(a.p)+'</span></div>'
      +'<div class="source-line"><span class="source">'+esc(a.src)+' — '+esc(a.d)+'</span>'
      +(a.u?'<a class="link-btn" href="'+esc(a.u)+'" target="_blank" rel="noopener">原文 ↗</a>':'')
      +'</div><div class="body">'+esc(a.s)+'</div></div>';
  }).join('');
}
input.addEventListener('input',search);
</script>
