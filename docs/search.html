<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理くんニュース</title>
<link rel="icon" href="/daily-briefing/kanri-kun.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--card:#FFFFFF;--border:#E8E6E0;--text:#1A1A18;--sub:#6B6960;--accent:#1A5F4A;--red:#9B2C2C;--amber:#92600A;--blue:#1A4B8C;--purple:#5B21B6;--tag-red:#FEF2F2;--tag-amber:#FFFBEB;--tag-blue:#EFF6FF;--tag-green:#F0FDF4;--tag-purple:#F5F3FF;--font-sans:'Noto Sans JP',sans-serif;--font-serif:'Noto Serif JP',serif}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.app-header h1{font-family:var(--font-serif);font-size:18px;font-weight:700;letter-spacing:0.02em;white-space:nowrap}
.app-header nav{display:flex;gap:12px;align-items:center;flex:1}
.app-header nav a{font-size:13px;color:var(--sub);text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;transition:all .15s}
.app-header nav a:hover,.app-header nav a.active{color:var(--accent);background:var(--tag-green)}
.container{max-width:820px;margin:0 auto;padding:24px 20px 80px}
.date-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.date-nav a{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;text-decoration:none;color:var(--sub);background:var(--card);transition:all .15s}
.date-nav a:hover,.date-nav a.current{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card.read{opacity:0.55}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.card h3{font-size:14.5px;font-weight:700;line-height:1.55}
.priority{font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.p-high{background:var(--tag-red);color:var(--red)}
.p-mid{background:var(--tag-amber);color:var(--amber)}
.p-info{background:var(--tag-green);color:var(--accent)}
.p-tech{background:var(--tag-purple);color:var(--purple)}
.card .source-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.card .source{font-size:11px;color:var(--sub)}
.card .link-btn{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid rgba(26,95,74,.25);border-radius:4px;transition:all .15s}
.card .link-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card .body{font-size:13px;color:#3D3D3A;line-height:1.8}
.card .impact{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12.5px;color:var(--accent);font-weight:500;line-height:1.7}
.card .impact::before{content:'-> '}
.card .memo{margin-top:8px;background:#F7F7F5;border-radius:6px;padding:10px 14px;font-size:12.5px;line-height:1.7}
.card .memo strong{color:var(--accent);font-weight:700}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sub);margin:28px 0 14px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.archive-list{list-style:none}
.archive-list li{margin-bottom:8px}
.archive-list li a{font-size:14px;color:var(--accent);text-decoration:none;padding:10px 16px;display:block;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.archive-list li a:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.archive-list li a .count{font-size:12px;color:var(--sub);margin-left:8px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
.collapsible-section{margin-top:8px}
.collapsible-section>summary{list-style:none}
.collapsible-section>summary::-webkit-details-marker{display:none}
.collapsible-section>summary::after{content:' \25B6';font-size:10px}
.collapsible-section[open]>summary::after{content:' \25BC'}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:13.5px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;text-decoration:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:5px;vertical-align:1px}
.panel{display:none}.panel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--sub);margin-top:2px}
.source-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.source-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--sub);background:var(--card)}
.source-pill b{color:var(--text);font-weight:700}
.footer-note{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--sub);line-height:1.7;text-align:center}
.search-box{margin-bottom:20px;display:flex;gap:8px}
.search-box input{flex:1;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-sans);background:var(--card)}
.search-box input:focus{outline:none;border-color:var(--accent)}
.search-results-info{font-size:13px;color:var(--sub);margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.search-results-info b{color:var(--text)}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.card-head{flex-direction:column;gap:4px}.priority{align-self:flex-start}.app-header{flex-direction:column;align-items:flex-start}}</style>
</head>

</div><script>
var DATA=[{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-29"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-29"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-29"},{"t":"AISLE Discovers 38 CVEs in OpenEMR Healthcare Software","s":"セキュリティ企業が医療ソフトウェアOpenEMRで38件の重大な脆弱性を発見。10万以上の医療プロバイダーが使用する電子医療記録システムに影響。","m":"電子カルテのサイバーセキュリティは患者情報保護の観点で重要。使用システムの脆弱性対応とセキュリティ体制見直しが必要。","i":"電子カルテシステムのセキュリティ対策強化と脆弱性情報の定期確認が必要。","src":"Hacker News","p":"要注視","u":"https://aisle.com/blog/aisle-discovers-38-critical-security-vulnerabilities-in-healthcare-software-used-by-100000-providers","d":"2026-04-29"},{"t":"AF Pulsed Field Ablation Disappoints in Setup for Success","s":"心房細動に対するパルスドフィールドアブレーション治療が期待されたほどの成果を示さなかった臨床試験結果について報告。","m":"循環器内科を標榜する当院では、心房細動患者の紹介判断や治療選択肢の説明に関連。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/pulsed-field-ablation-af-disappoints-setup-success-avant-2026a1000ddt?src=rss","d":"2026-04-29"},{"t":"Are First-Time Seizures a Red Flag for Cancer?","s":"初回発作のてんかんが癌の危険信号となり得るかについて検討した医学記事。癌診断における神経症状の重要性を論じている。","m":"内科診療で神経症状を呈する患者の鑑別診断に有用。早期癌発見の視点として参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/are-first-time-seizures-red-flag-cancer-2026a1000dja?src=rss","d":"2026-04-29"},{"t":"Long Covid Linked to Brain Changes","s":"長期コロナ後遺症が脳の変化と関連していることが研究で明らかになった。認知機能低下との関係が示唆され、後遺症治療への新たな知見。","m":"コロナ後遺症患者の診療において脳機能への影響を考慮した対応が必要。内科診療での長期フォローアップに参考となる情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/long-covid-linked-brain-changes-cognitive-decline-2026a1000dhe?src=rss","d":"2026-04-29"},{"t":"Novel PD Drug May Delay Levodopa Initiation","s":"パーキンソン病の新しい治療薬がレボドパの開始時期を遅らせる可能性があることを報告した研究結果について。","m":"高齢患者が多い当院では、パーキンソン病疑いの患者の専門医紹介タイミングに関連。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/novel-parkinsons-drug-may-delay-need-levodopa-2026a1000dhk?src=rss","d":"2026-04-29"},{"t":"Burn Pit Exposure Linked to Higher Neurologic Risk in Vets","s":"退役軍人における燃焼ピット曝露が神経疾患リスクの増加と関連していることを示した研究結果についての報告。","m":"環境曝露と神経疾患の関連性として興味深いが、日本のクリニック診療には直接関係薄い。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/burn-pit-exposure-linked-higher-neurologic-risk-veterans-2026a1000dgm?src=rss","d":"2026-04-29"},{"t":"Young Man on Finasteride Suffers Ischemic Stroke","s":"フィナステリド服用中の若い男性が虚血性脳梗塞を発症した症例報告。薬剤と血栓症リスクの関連性について検討。","m":"男性型脱毛症治療でフィナステリドを処方する機会があり、重要な副作用情報として把握必要。","i":"フィナステリド処方時の血栓リスク評価と患者説明の見直しを検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/young-man-finasteride-suffers-ischemic-stroke-2026a1000dgt?src=rss","d":"2026-04-29"},{"t":"A Preliminary Look at Subtyping People With Type 2 Diabetes","s":"2型糖尿病患者のサブタイピング（病型分類）に関する予備的研究について。個別化医療に向けた糖尿病分類の新しいアプローチ。","m":"糖尿病専門外来を行う当院にとって、患者の病型分類と治療最適化に直結する重要な情報。","i":"糖尿病診療のサブタイピング動向を注視し、個別化治療への対応を準備する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/preliminary-look-subtyping-people-type-2-diabetes-2026a10008ln?src=rss","d":"2026-04-29"},{"t":"EMA Pushes Earlier Intervention in Rare Pediatric Diseases","s":"欧州医薬品庁（EMA）が小児希少疾患における早期介入の重要性を推進している。診断技術の向上により、症状発現前の早期治療開始が可能になっている。小児期の早期介入により長期的な健康アウトカムの改善が期待される。","m":"小児科を運営する当院にとって、希少疾患の早期発見・介入は診療の質向上に直結する。新しいガイドラインや治療法の動向把握が重要。","i":"小児科診療での早期スクリーニングや新しい治療選択肢について情報収集を行う。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/ema-pushes-earlier-intervention-rare-pediatric-diseases-2026a1000dae?src=rss","d":"2026-04-29"},{"t":"Migraine Preventive Drug Gets EU Nod for Acute Episodes","s":"偏頭痛予防薬がEUで急性発作治療としても承認されました。これまで予防目的のみだった薬剤が、急性期治療にも使用可能となり、偏頭痛治療の選択肢が拡大します。","m":"内科での頭痛診療において治療選択肢の拡大となる可能性があります。国内承認状況を確認し、患者への治療メリットを検討する価値があります。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/migraine-preventive-drug-gets-eu-nod-acute-episodes-2026a1000da3?src=rss","d":"2026-04-29"},{"t":"Self-Administered Med Shows Promise in Myasthenia Gravis","s":"重症筋無力症に対する自己投与可能な新薬が有望な結果を示している。患者の利便性向上と医療費削減が期待される。外来通院頻度の減少により患者負担軽減が可能。","m":"神経内科系疾患の治療選択肢拡大。当院では直接的な対象患者は少ないが、在宅医療や通院負担軽減の観点で参考になる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/self-administered-med-shows-promise-myasthenia-gravis-2026a1000d8n?src=rss","d":"2026-04-29"},{"t":"CCS deploys enterprise-wide agentic AI across chronic care operations","s":"CCSが慢性疾患管理業務全体でエージェント型AIを導入しました。AIが自律的に意思決定を行い、慢性疾患患者のケア効率化を図る取り組みです。","m":"当院の糖尿病・循環器患者管理にAI導入することで、診療効率向上と患者満足度改善が期待できます。技術動向の継続的な情報収集が必要です。","i":"糖尿病患者管理でのAI活用可能性を検討し、業務効率化の導入時期を計画する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/ccs-deploys-enterprise-wide-agentic-ai-across-chronic-care-operations","d":"2026-04-29"},{"t":"UChicago Medicine, Artisight partner on system-wide rollout of smart hospital platform","s":"シカゴ大学医療センターとArtisightが病院全体でのスマートホスピタルプラットフォーム展開で提携。AI技術を活用した医療効率化と患者安全向上を目指す。リアルタイムでの医療データ分析と予測機能を提供。","m":"医療DX推進は当院にとって重要課題。AI活用による診療効率化や患者安全向上の事例として参考になる。","i":"スマートホスピタル技術の動向を把握し、将来的なDX投資計画に反映する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/hospitals/uchicago-medicine-artisight-partner-smart-hospital-platform-deployment","d":"2026-04-29"},{"t":"Medical professional liability premiums rise for 7th straight year","s":"医療過誤保険料が7年連続で上昇しています。医療従事者の賠償責任保険費用が継続的に増加しており、医療機関の経営負担が拡大しています。","m":"クリニック運営コストの上昇要因として保険料負担増は経営に直接影響します。リスク管理体制の見直しも併せて検討が必要です。","i":"保険料見直しと適切な補償範囲確保のため、保険代理店との協議を早急に実施する。","src":"Fierce Healthcare","p":"要対応","u":"https://www.fiercehealthcare.com/providers/medical-professional-liability-premiums-rise-seventh-straight-year","d":"2026-04-29"},{"t":"Utah Medical Licensing Board urges state to shut down Doctronic AI prescribing pilot","s":"ユタ州医師免許委員会がAI処方システム「Doctronic」の試験運用中止を州に要請しました。AI による処方箋発行の安全性や規制遵守に関する懸念が表面化しています。","m":"AI問診や診療支援システム導入を検討する際、医師法や医療安全の観点から規制動向を注視する必要があります。","i":"AI診療支援システム導入時の規制リスクを評価し、慎重な導入計画を策定する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/utah-medical-licensing-board-urges-state-shut-down-doctronic-ai-prescribing","d":"2026-04-29"},{"t":"Humana's CenterWell, Mark Cuban Cost Plus Drugs partner to tackle employers' drug costs","s":"HumanaのCenterWellとMark Cuban Cost Plus Drugsが企業向け薬剤費削減で提携。透明性の高い薬価設定により企業の医療費負担軽減を目指す。ジェネリック薬品の普及促進も図る。","m":"薬剤費削減の取り組み事例。当院でも後発品使用促進や薬剤費適正化の参考になる可能性がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/humanas-centerwell-mark-cubans-cost-plus-drugs-handle-employers-prescriptions","d":"2026-04-29"},{"t":"家族手当「短時間労働者にも」　厚労省、同一労働同一賃金の指針改正","s":"厚生労働省が同一労働同一賃金の指針を改正し、家族手当も短時間労働者に支給するよう求める。パート・非正規職員の処遇改善が必要。","m":"クリニックの看護師や事務職員にパート勤務が多いため、人件費増加への対応が必要。労務管理制度の見直しが求められる。","i":"パート職員の家族手当支給体制見直しと人件費予算への影響を検討する必要がある。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA238TO0T20C26A4000000/","d":"2026-04-29"},{"t":"高齢者の医療費「原則3割負担へ工程表を」　財制審","s":"財政制度等審議会が高齢者の医療費負担を原則3割とする工程表策定を提言しました。現在の1-2割負担から大幅な制度変更となる可能性があります。","m":"当院の高齢患者割合が高い診療科では、負担増による受診控えが収益に大きく影響する可能性があります。制度改正の動向を継続監視する必要があります。","i":"患者負担増による受診控えリスクを評価し、高齢患者への対応策を検討する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA2812Z0Y6A420C2000000/","d":"2026-04-29"},{"t":"診療巡る「性的トラブル」、医療機関の15%で　こども家庭庁調査","s":"こども家庭庁調査で医療機関の15%で診療に関連する性的トラブルが発生していることが判明しました。医療現場での患者安全とハラスメント防止が重要な課題として浮上しています。","m":"小児科を含む複数診療科を運営する当院では、患者・職員双方の安全確保が経営リスク管理の重要項目です。即座の対策実施が必要です。","i":"院内のハラスメント防止規程見直しと職員研修実施、相談窓口設置を急ぐ。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA260RR0W6A420C2000000/","d":"2026-04-29"},{"t":"健康保険料率高止まり、組合3割「解散水準」　高齢者医療の負担重く","s":"健康保険組合の保険料率が高止まりし、3割が解散検討水準に達している。高齢者医療費の負担増が主因で医療費抑制圧力が高まる。","m":"保険組合の財政悪化は診療報酬削減圧力や患者の受診抑制につながる可能性。経営環境の悪化要因として注意が必要。","i":"医療費適正化の圧力強化により診療報酬や患者負担の動向を注視する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA270OW0X20C26A4000000/","d":"2026-04-29"},{"t":"高齢者医療への拠出金、現役負担10年で25%増　大企業健保から4兆円","s":"高齢者医療への拠出金が10年で25%増加し、大企業健保から4兆円の負担となっています。医療保険制度全体の財政圧迫が深刻化しています。","m":"医療保険制度の財政状況は診療報酬改定や制度変更に影響するため、中長期的な経営環境変化の参考情報として把握しておく必要があります。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA249KN0U6A420C2000000/","d":"2026-04-29"},{"t":"次世代のがん「主薬」国産化へ　投資マネーも加速、狙う2兆円市場","s":"次世代がん治療薬の国産化に向けた投資が加速し、2兆円市場を狙う動きが活発化しています。がん治療分野での国産新薬開発競争が激化しています。","m":"消化器外科でのがん患者への治療選択肢拡大の可能性がありますが、当院の診療領域への直接的影響は限定的です。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC206WW0Q6A420C2000000/","d":"2026-04-29"},{"t":"ぼうこうがんの再発リスク、腫瘍切除後の治療有無で変わらず　富山大","s":"富山大学の研究で、膀胱がんの腫瘍切除後の補助治療の有無が再発リスクに影響しないことが判明。従来の治療方針見直しにつながる可能性。","m":"泌尿器がん治療に関する研究成果だが、消化器がん患者への間接的な参考情報となる。がん治療の標準化動向として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG283V30Y6A420C2000000/","d":"2026-04-29"},{"t":"がんステージ4「新薬で一変」　免疫や抗体…開発は中国が主戦場に","s":"ステージ4がんの治療が免疫療法や抗体薬により大きく変化し、中国が新薬開発の主戦場となっています。がん治療の革新が患者予後を大幅に改善させています。","m":"消化器がんの進行例に対する治療選択肢の変化として参考になりますが、当院での直接的な対応は連携病院への紹介が中心となります。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG1793D0X10C26A4000000/","d":"2026-04-29"},{"t":"東京科学大学とFRONTEO、AI創薬の拠点　がん治療薬など探索","s":"東京科学大学とFRONTEOがAI創薬の拠点を設立し、がん治療薬などの探索を行う。AI技術を活用した創薬研究の産学連携事例。","m":"がん治療薬の開発動向は消化器がん患者の治療選択肢拡大に関連。AI創薬技術の進歩は将来的な治療法に影響する可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG273RM0X20C26A4000000/","d":"2026-04-29"},{"t":"大塚HDの純利益16%増 1〜3月期、抗精神病薬など伸びる","s":"大塚ホールディングスの2024年1-3月期決算で純利益が16%増加し、抗精神病薬などが好調だったとの報告です。","m":"精神科薬の市場動向として参考になりますが、当クリニックでは精神科診療を行っていないため影響は限定的です。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB280F00Y6A420C2000000/","d":"2026-04-29"},{"t":"シスメックスが純利益60億円下方修正 26年3月期、子会社3社で減損","s":"シスメックスが2026年3月期の純利益予想を60億円下方修正し、子会社3社で減損処理を行うと発表しました。","m":"検査機器大手の業績悪化は検査機器価格や保守費用に影響する可能性がありますが、直接的な影響は限定的です。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF286ZI0Y6A420C2000000/","d":"2026-04-29"},{"t":"明治HD系、インド製薬大手と提携 日本脳炎ワクチンの技術提供","s":"明治ホールディングス系がインド製薬大手と提携し、日本脳炎ワクチンの技術提供を行う。新興国市場でのワクチン事業拡大を目指す。","m":"小児科での予防接種業務に関連するワクチン業界動向。日本脳炎ワクチンは定期接種対象のため供給体制変化を把握しておく必要。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC288RI0Y6A420C2000000/","d":"2026-04-29"},{"t":"NISSHA、米大学内に医療機器の研究拠点 現場ニーズ捉えやすく","s":"NISSHAがアメリカの大学内に医療機器の研究拠点を設立。現場のニーズを直接捉えて医療機器開発に活かす産学連携モデル。","m":"医療機器開発の現場重視トレンドは参考になるが、クリニック経営への直接的影響は限定的。技術革新の方向性として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF237XI0T20C26A4000000/","d":"2026-04-29"},{"t":"「休日診療難民」6割が経験 一般社団法人調べ","s":"一般社団法人の調査により、6割の人が休日に医療機関を受診できない「休日診療難民」を経験していることが判明しました。","m":"地域の休日診療ニーズが高いことが判明。休日診療実施による収益機会と人件費増加を天秤にかける必要があります。","i":"休日診療体制の見直しや休日診療の実施可能性を検討する必要があります。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC286F80Y6A420C2000000/","d":"2026-04-29"},{"t":"健康保険組合とは 大企業の会社員ら2800万人が加入","s":"健康保険組合について解説した記事。大企業の会社員など約2800万人が加入している制度についての基本的な情報。","m":"患者の保険制度理解に有用。健保組合加入者は外来患者層の重要な構成要素。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA272L80X20C26A4000000/","d":"2026-04-29"},{"t":"テルモ、10秒で測定可能な体温計 防水機能も","s":"テルモが10秒で測定可能で防水機能も備えた新しい体温計を発売するとの発表です。","m":"診療効率化につながる可能性がある医療機器ですが、現在の体温計で十分対応できているため緊急性は低いです。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC278K30X20C26A4000000/","d":"2026-04-29"},{"t":"アステラス最高益も迫る特許の崖 26年3月期、次の主力薬は育成途上","s":"アステラス製薬が2026年3月期最高益を達成する見込みだが、主力薬の特許切れによる「特許の崖」が迫っている状況です。","m":"大手製薬会社の業績動向として参考情報。特許切れによる後発品登場は薬剤費削減につながる可能性があります。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC229MT0S6A420C2000000/","d":"2026-04-29"},{"t":"英シルチェスター、メディパルHDに株主提案 特別配104円など","s":"英国の投資会社シルチェスターがメディパルホールディングスに対して特別配当104円などを含む株主提案を行いました。","m":"医薬品卸大手の株主提案の話題。薬品調達コストや流通に間接的に影響する可能性がありますが、直接的影響は限定的です。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB272KA0X20C26A4000000/","d":"2026-04-29"},{"t":"ヤマハ、音楽で高齢者向け予防医療 日タイ病院大手と提携","s":"ヤマハが音楽を活用した高齢者向け予防医療事業で日タイの病院大手と提携。音楽療法による認知症予防や健康維持への応用を目指す。","m":"高齢者の予防医療ニーズ拡大は内科診療での健康管理指導に関連。音楽療法は補完的な治療選択肢として参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGS272990X20C26A4000000/","d":"2026-04-29"},{"t":"ニプロファーマ、注射剤の新棟が8月稼働 有事はワクチン生産も","s":"ニプロファーマが8月に注射剤の新工場を稼働予定。有事の際にはワクチン製造も可能な体制を構築する。","m":"注射剤やワクチンの安定供給は医療機関にとって重要。供給体制の強化は長期的に医療提供に影響する可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF250CZ0V20C26A4000000/","d":"2026-04-29"},{"t":"病院・介護食のナリコマフード、岡山に新工場 投資額146億円","s":"病院・介護食大手のナリコマフードが岡山県に146億円を投資して新工場を建設。医療・介護施設向け食事サービスの生産体制を強化。","m":"病院・介護食の供給体制強化は直接的影響は限定的。ただし高齢患者の栄養管理や嚥下食ニーズの拡大トレンドを示している。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC271ZO0X20C26A4000000/","d":"2026-04-29"},{"t":"更年期支援アプリのYStory、企業向けサービス開始 適切なケア提案","s":"更年期支援アプリYStoryが企業向けサービスを開始し、従業員に適切な更年期ケアを提案するサービスを提供開始しました。","m":"当クリニックでも更年期症状の患者が多く、デジタルヘルスとの連携や情報提供方法の参考になる可能性があります。","i":"更年期症状への対応強化や産業医業務への活用可能性を検討する必要があります。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC271OV0X20C26A4000000/","d":"2026-04-29"},{"t":"腸内環境、検査結果を最短2日で バイオ新興・大阪大学が定点観測化","s":"大阪大学発のバイオ新興企業が腸内環境検査の結果を最短2日で提供するサービスを開発し、定点観測化を実現した。従来より大幅に短縮された検査期間で腸内環境の継続的なモニタリングが可能になる。","m":"消化器内科・外科での新たな検査メニューとして導入可能性がある。予防医療やヘルスケアサービスの差別化要素となり得る。","i":"消化器内科での腸内環境検査導入や患者へのヘルスケアサービス拡充の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC22AGQ0S6A420C2000000/","d":"2026-04-29"},{"t":"自然楽しむストレス解消法、「森林セラピーロード」で爽快に","s":"森林セラピーロードを活用したストレス解消法に関する記事。自然環境を活用した健康増進やストレス管理の手法について紹介されている。","m":"患者の生活指導やストレス管理の参考情報として活用できる。特に糖尿病や循環器疾患患者への生活習慣改善提案に関連。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD31AY70R30C26A3000000/","d":"2026-04-29"},{"t":"午後イチの眠気招く血糖値の乱高下、昼食と食べ方で抑制","s":"昼食後の眠気の原因となる血糖値の急激な変動について、食事内容や食べ方による抑制方法を解説した記事。血糖値管理における食事療法の重要性が示されている。","m":"内科（糖尿病）での患者指導に直接活用できる実践的な情報。糖尿病外来での栄養指導や生活習慣改善指導の質向上に貢献する。","i":"糖尿病患者への食事指導内容の見直しや栄養指導の強化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD10A7H0Q6A410C2000000/","d":"2026-04-29"},{"t":"人材紹介料に苦しむ医療機関 経験した医師｢ドクターバンクの充実を｣","s":"医療機関が医師の人材紹介料負担に苦しんでいる状況。医師からはドクターバンクの充実を求める声が上がっている。","m":"医師の人材紹介料は経営を圧迫する要因。公的な医師紹介制度の動向は採用戦略に直結する重要な情報。","i":"医師採用コスト削減のため、ドクターバンクの活用を検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA2155T0R20C26A4000000/","d":"2026-04-29"},{"t":"支援情報をまとめて提供 ケアする人を支える会社を設立","s":"介護や医療従事者など「ケアする人」を支援する情報提供サービスを行う会社が設立された。支援情報を一元化して提供することで、ケアラーの負担軽減を目指している。","m":"スタッフのメンタルヘルス管理や働き方改善の参考となる。患者家族への介護支援情報提供サービスとしても活用可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD096VJ0Z00C26A4000000/","d":"2026-04-29"},{"t":"The tensions behind Palantir’s efforts to transform English healthcare","s":"米国パランティア社がイギリス国民保健サービスの医療システム変革に取り組んでいるが、現場スタッフ間でソフトウェアの実用性について意見が分かれている。「terrible でもrevolutionary でもない」との評価がされている。","m":"医療DXや電子カルテシステム導入時の課題として参考になる。海外の医療IT導入事例として、システム選定や導入計画の検討材料となる。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/36a5ae05-bfa2-4e74-af35-8ba9e3d76ca3","d":"2026-04-29"},{"t":"Large UK companies in the dark about how their data is used overseas by AI","s":"英国の大企業の技術・データ担当幹部への調査で、海外でのAIによるデータ処理について理解不足が判明。データがどう扱われているか把握できていない状況。","m":"医療機関のAI導入時にもデータ処理の透明性は重要課題。患者データの取り扱いに関連する可能性。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/dc326668-b565-418f-92d3-e1266ed59f49","d":"2026-04-29"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-28"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-28"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-28"},{"t":"FDA approves first gene therapy for treatment of genetic hearing loss","s":"米国FDAが遺伝性難聴に対する初の遺伝子治療薬を承認しました。これは遺伝性聴覚障害の治療において画期的な進歩となります。今後、日本での承認や臨床応用が期待されます。","m":"当法人の耳鼻咽喉科で扱う難聴患者への新たな治療選択肢となる可能性があります。遺伝子治療の動向は専門性の高い医療技術として注目すべき分野です。","i":"耳鼻咽喉科での将来的な治療選択肢として情報収集と専門医との連携強化を検討する。","src":"Hacker News","p":"要注視","u":"https://www.fda.gov/news-events/press-announcements/fda-approves-first-ever-gene-therapy-treatment-genetic-hearing-loss-under-national-priority-voucher","d":"2026-04-28"},{"t":"A Preliminary Look at Subtyping People With Type 2 Diabetes","s":"2型糖尿病患者の病型分類（サブタイピング）に関する予備的研究について報告した記事。糖尿病の個別化治療アプローチの進展を示している。","m":"内科（糖尿病）診療の核心的内容。今後の診療ガイドライン変更や治療方針の見直しに影響する可能性あり。","i":"糖尿病診療における新たな分類方法の導入可能性を検討し、個別化治療への対応を準備する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/preliminary-look-subtyping-people-type-2-diabetes-2026a10008ln?src=rss","d":"2026-04-28"},{"t":"EMA Pushes Earlier Intervention in Rare Pediatric Diseases","s":"EMA（欧州医薬品庁）が希少小児疾患に対する早期介入の推進方針を打ち出したことを報じた記事。小児医療における治療戦略の変化を示している。","m":"小児科診療に直接関連する規制動向。希少疾患の早期発見・治療方針に影響し、診療体制の見直しが必要になる可能性。","i":"小児科診療での早期発見・介入体制の強化を検討し、関連するガイドラインの更新に備える。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/ema-pushes-earlier-intervention-rare-pediatric-diseases-2026a1000dae?src=rss","d":"2026-04-28"},{"t":"Migraine Preventive Drug Gets EU Nod for Acute Episodes","s":"欧州でミグレイン予防薬が急性エピソードに対する適応でも承認された。予防薬としてだけでなく、急性期治療での使用も可能となった。","m":"片頭痛治療選択肢の拡大は内科診療に関連する。海外での承認動向は日本での今後の治療選択肢拡大の予兆として注視する価値がある。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/migraine-preventive-drug-gets-eu-nod-acute-episodes-2026a1000da3?src=rss","d":"2026-04-28"},{"t":"Self-Administered Med Shows Promise in Myasthenia Gravis","s":"重症筋無力症に対する自己投与可能な新薬が有望な結果を示したという研究報告。神経筋疾患治療の新たな選択肢について述べている。","m":"専門性の高い神経内科領域の治療薬。当院の診療科目との関連性は低いが、医療全体のトレンドとして把握。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/self-administered-med-shows-promise-myasthenia-gravis-2026a1000d8n?src=rss","d":"2026-04-28"},{"t":"EMA Greenlights Drugs for MS and Spinal Muscular Atrophy","s":"EMAが多発性硬化症と脊髄性筋萎縮症の治療薬を承認したことを報じた記事。神経疾患治療の新薬承認に関する情報。","m":"専門性の高い神経内科領域の薬剤承認。当院での取り扱いは想定されないが、医療業界動向として参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/ema-greenlights-drugs-ms-and-spinal-muscular-atrophy-2026a1000d3y?src=rss","d":"2026-04-28"},{"t":"Drug Therapy in Nonobstructive Hypertrophic Cardiomyopathy","s":"非閉塞性肥大型心筋症に対する薬物療法について解説した記事。循環器疾患の専門的治療法に関する最新情報を提供している。","m":"内科（循環器）診療に直結する内容。肥大型心筋症の薬物療法は当院で扱う可能性があり、治療指針の更新が必要。","i":"循環器内科診療での肥大型心筋症治療プロトコルの見直しを検討し、最新治療法への対応を準備する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/s/viewarticle/drug-therapy-nonobstructive-hypertrophic-cardiomyopathy-2026a1000bfc?src=rss","d":"2026-04-28"},{"t":"First Positive Phase 3 Drug Trial for MOGAD","s":"MOGAD（抗MOG抗体関連疾患）に対する初の第3相臨床試験で陽性結果が得られたことを報告した記事。希少な神経免疫疾患の治療選択肢拡大を示している。","m":"極めて専門性の高い神経免疫疾患領域。当院での診療対象外だが、医療技術進歩の参考情報として把握。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/first-positive-phase-3-drug-trial-mogad-2026a1000d2s?src=rss","d":"2026-04-28"},{"t":"Plant-Based Diet Quality May Affect Dementia Risk","s":"植物性食品を基調とした食事の質が認知症リスクに影響する可能性を示した研究について報告した記事。食事療法と認知症予防の関連性を論じている。","m":"生活習慣病管理での栄養指導に活用可能。糖尿病や循環器疾患の食事療法指導時の参考情報として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/plant-based-diet-quality-may-affect-dementia-risk-2026a1000d1s?src=rss","d":"2026-04-28"},{"t":"Carotid Revascularization May Lower Seizure Risk in Stenosis","s":"頸動脈狭窄症患者における頸動脈血行再建術が、けいれんリスクを低下させる可能性があるという研究結果。頸動脈血管の血流改善によって脳血流が改善され、けいれん発作の予防効果が期待される。","m":"循環器内科診療での頸動脈狭窄症患者への治療選択肢の参考情報。専門医への紹介判断材料として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/carotid-revascularization-may-lower-seizure-risk-stenosis-2026a1000d17?src=rss","d":"2026-04-28"},{"t":"Syphilis Linked to Risk for Major Cardiovascular Events","s":"梅毒が主要な心血管疾患のリスク要因となることが明らかになった研究。梅毒感染が心血管系に与える長期的影響について新たな知見が得られた。","m":"内科・循環器診療で梅毒の心血管リスクを考慮した診療が必要。感染症と循環器疾患の関連に注意。","i":"梅毒検査の重要性を再認識し、循環器リスクのある患者への検査を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/syphilis-linked-risk-major-cardiovascular-events-2026a1000d1c?src=rss","d":"2026-04-28"},{"t":"AMA urges lawmakers to implement stronger safeguards for AI chatbots in mental health","s":"米国医師会がメンタルヘルス分野でのAIチャットボットに対する強化されたセーフガード実装を議員に要請している。AIの安全な医療利用に向けた規制強化を求めている。","m":"AI医療利用の安全性確保は世界共通の課題。当院でAI問診等の導入を検討する際の安全性基準設定の参考となる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/ama-urges-lawmakers-implement-stronger-safeguards-ai-chatbots-mental-health","d":"2026-04-28"},{"t":"UnityAI builds out agentic AI for staffing operations to match outpatient clinicians with patient demand","s":"UnityAIが外来クリニックの人員配置最適化のためのエージェント型AIを開発している。患者需要に応じて医療スタッフの配置を最適化するシステムを構築している。","m":"クリニックの人員配置効率化は直接的な経営課題。このような技術の発展は将来的に当院の運営効率向上に活用できる可能性がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/unityai-builds-out-agentic-ai-staffing-operations-keep-pace-patient-demand","d":"2026-04-28"},{"t":"Health Tech Weekly Rundown: Google invests in AI training for rural health workers; State of genAI adoption in healthcare","s":"Googleが地方の医療従事者向けAI研修に投資し、医療分野での生成AI採用状況に関する週次レポートが発表された。医療現場でのAI技術活用が進展している。","m":"医療AI技術の普及動向は当院のデジタル化戦略に参考となる。地方医療でのAI活用事例は、当院での技術導入検討に有用な情報となる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/health-tech-weekly-rundown-googleorg-johnson-johnson-foundation-partner-ai-training","d":"2026-04-28"},{"t":"「接客AI」が介護の最適用品選び、ウェルモがECチャット用開発へ","s":"ウェルモが介護用品選択支援のための接客AIをECチャット向けに開発している。利用者のニーズに応じて最適な介護用品を提案するシステムの構築を進めている。","m":"介護分野でのAI活用事例として参考になる。当院の高齢患者やその家族への情報提供方法改善のヒントとなる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC225OD0S6A420C2000000/","d":"2026-04-28"},{"t":"高齢者医療への拠出金、現役負担10年で25%増　大企業健保から4兆円","s":"高齢者医療への拠出金が現役世代の負担として10年間で25%増加し、大企業健保から4兆円が拠出されている。医療費増大による社会保険制度への影響が深刻化している。","m":"医療費抑制圧力の高まりは診療報酬削減や患者負担増につながる可能性がある。当院の収益構造や患者層への影響を早期に分析し対策を講じる必要がある。","i":"社会保険制度の持続可能性懸念により、診療報酬制度や患者負担のあり方が変更される可能性を注視し、収益構造の見直しを検討する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA249KN0U6A420C2000000/","d":"2026-04-28"},{"t":"薬価安すぎ日本、製薬企業が敬遠？　米の政策で海外新薬使えぬリスク","s":"日本の薬価が安すぎることで製薬企業が新薬の日本投入を敬遠する傾向が強まっている。米国の政策変更により、海外で承認された新薬が日本で使用できなくなるリスクが高まっている。","m":"特に糖尿病や循環器領域での新薬導入遅延は、当院の専門性に直接影響する。治療選択肢の制限は患者獲得競争で不利になる可能性がある。","i":"新薬アクセス制限により、最新治療選択肢の減少と患者満足度への影響を監視する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA231WJ0T20C26A4000000/","d":"2026-04-28"},{"t":"医師の病院離れ深刻に　診療所に転出、地域に偏り","s":"医師の病院離れが深刻化し、診療所への転出が増加している。地域による偏在も問題となっている。医師の働き方や医療機関の人材確保に影響を与える可能性がある。","m":"診療所での医師採用機会が増える可能性がある。一方で競争激化により採用コストが上昇する懸念もある。","i":"医師採用戦略の見直しと、病院からの転出医師へのアプローチ検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD133ML0T10C26A4000000/","d":"2026-04-28"},{"t":"がんステージ4「新薬で一変」　免疫や抗体…開発は中国が主戦場に","s":"がんステージ4の治療において、免疫薬や抗体薬などの新薬により治療成績が大幅に改善している。新薬開発では中国が主戦場となっている状況。","m":"内科診療での生活習慣病管理においてがんスクリーニングとの連携強化が重要。最新治療の動向把握が患者への適切な紹介判断に影響する。","i":"がん治療における最新の薬物療法情報の収集と、患者への情報提供体制の整備。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOSG1793D0X10C26A4000000/","d":"2026-04-28"},{"t":"東京科学大学とFRONTEO、AI創薬の拠点　がん治療薬など探索","s":"東京科学大学とFRONTEOがAI創薬の拠点を設立し、がん治療薬などの探索を行う。人工知能技術を活用した新薬開発の加速化を目指している。","m":"AI創薬の進展は将来的に新薬開発期間短縮につながる可能性がある。クリニック経営への直接的影響は限定的だが、医療業界全体の技術革新動向として把握しておく価値がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG273RM0X20C26A4000000/","d":"2026-04-28"},{"t":"ヤマハ、音楽で高齢者向け予防医療　日タイ病院大手と提携","s":"ヤマハが音楽を活用した高齢者向け予防医療事業を展開し、日本とタイの病院大手と提携する。音楽療法による健康増進効果を活用したサービスを提供する。","m":"予防医療分野での新たなアプローチとして注目される。当院でも高齢患者向けの予防医療サービス拡充を検討する際の参考となる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGS272990X20C26A4000000/","d":"2026-04-28"},{"t":"動物医薬のマブジェネシス、ネコの抗体に関する権利を日本曹達に売却","s":"動物医薬品会社マブジェネシスが、ネコの抗体に関する知的財産権を日本曹達に売却しました。","m":"動物医薬品の動向ですが、当法人のクリニック診療には直接影響しません。業界動向として把握のみ。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2725A0X20C26A4000000/","d":"2026-04-28"},{"t":"健康保険組合とは 大企業の会社員ら2800万人が加入","s":"健康保険組合の概要を説明した記事。大企業の会社員ら2800万人が加入する健康保険制度の基本情報について解説している。","m":"患者の保険制度理解に役立つが、新しい情報ではない。保険請求業務の基礎知識として参考程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA272L80X20C26A4000000/","d":"2026-04-28"},{"t":"英シルチェスター、メディパルHDに株主提案 特別配104円など","s":"英投資ファンドのシルチェスターが、医薬品卸大手メディパルホールディングスに対して特別配当104円などの株主提案を行いました。","m":"薬品卸業界の株主動向は、間接的に薬価や供給に影響する可能性があります。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB272KA0X20C26A4000000/","d":"2026-04-28"},{"t":"塩野義製薬の年間配当5円積み増し71円に 26年3月期、HIV薬堅調","s":"塩野義製薬が2026年3月期の年間配当を5円増額し71円とすると発表。HIV薬の堅調な売上が背景にある。製薬企業の業績好調を示している。","m":"製薬企業の好業績は薬価や医薬品供給の安定性に間接的に影響。HIV薬の需要増は感染症診療の動向を示している。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2768X0X20C26A4000000/","d":"2026-04-28"},{"t":"ニプロファーマ、注射剤の新棟が8月稼働 有事はワクチン生産も","s":"ニプロファーマが注射剤製造の新棟を8月に稼働開始。有事の際にはワクチン生産も可能な設備として整備される。医薬品製造体制の強化が進んでいる。","m":"注射剤の安定供給体制強化により、クリニックでの注射薬確保の安定性向上が期待される。ワクチン供給体制の充実も診療に好影響。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF250CZ0V20C26A4000000/","d":"2026-04-28"},{"t":"病院・介護食のナリコマフード、岡山に新工場 投資額146億円","s":"病院・介護食専門のナリコマフードが岡山県に146億円を投資して新工場を建設する。医療機関向け食品供給体制の拡充を図っている。","m":"医療機関向けサービス市場の成長を示す事例。当院では直接関係しないが、医療業界全体の市場拡大動向として把握しておく価値がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC271ZO0X20C26A4000000/","d":"2026-04-28"},{"t":"更年期支援アプリのYStory、企業向けサービス開始 適切なケア提案","s":"更年期支援アプリのYStoryが企業向けサービスを開始し、従業員に適切なケアを提案するサービスを展開します。","m":"内科診療での更年期障害対応において、デジタルツールの活用可能性を検討できます。","i":"デジタルヘルスケアの動向として、当法人でも更年期診療のデジタル化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC271OV0X20C26A4000000/","d":"2026-04-28"},{"t":"腸内環境、検査結果を最短2日で バイオ新興・大阪大学が定点観測化","s":"バイオ新興企業と大阪大学が連携し、腸内環境検査の結果を最短2日で提供する定点観測サービスを開発しました。","m":"当法人の消化器内科・外科診療において、腸内環境検査の迅速化は患者満足度向上に寄与します。","i":"消化器内科診療での腸内環境検査導入について、新技術の活用を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC22AGQ0S6A420C2000000/","d":"2026-04-28"},{"t":"更年期診療新興マイフィット、心療内科に参入 不調相談しやすく","s":"更年期診療を手がける新興企業マイフィットが心療内科分野に参入し、患者が不調を相談しやすい環境を整備します。","m":"内科診療での更年期対応において、心理的サポートの重要性が高まっています。","i":"更年期診療と心療内科の連携について、当法人での診療体制を見直す。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC247S80U6A420C2000000/","d":"2026-04-28"},{"t":"人材紹介料に苦しむ医療機関 経験した医師｢ドクターバンクの充実を｣","s":"医療機関が人材紹介料の高額化に苦しんでいる状況。医師からはドクターバンクの充実を求める声が上がっており、人材確保コストが経営を圧迫している。","m":"人材紹介料は直接的な経営コスト。ドクターバンクの活用や直接採用の強化により、採用コストの削減が可能になる。","i":"人材紹介会社への依存度見直しと、ドクターバンクなど公的紹介制度の活用検討が急務。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA2155T0R20C26A4000000/","d":"2026-04-28"},{"t":"医療用手袋、欠品で中小医院に届かず 政府は5000万枚備蓄5月放出","s":"医療用手袋の欠品により中小医院への供給不足が深刻化。政府が5月に備蓄5000万枚を放出する予定だが、中小医療機関への影響が懸念されている。","m":"感染管理に必須の医療用手袋不足は診療継続に直結する重大問題。早急な在庫確保と調達ルート多様化が経営継続の要。","i":"医療用手袋の在庫確保と複数の調達先確保、代替品の検討が必要。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUC208V70Q6A420C2000000/","d":"2026-04-28"},{"t":"中外製薬の純利益19%増 1〜3月、血友病薬の販売増","s":"中外製薬の1-3月期純利益が19%増となった。血友病薬の販売増が主な要因。製薬業界の好調な業績を示している。","m":"血友病薬の需要増は希少疾患治療の進歩を示す。製薬企業の好業績は医薬品供給の安定化にプラス要因。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB22A8A0S6A420C2000000/","d":"2026-04-28"},{"t":"明治HD系など3社、新会社設立へ 杏林製薬の後発薬事業を承継","s":"明治ホールディングス系など3社が新会社を設立し、杏林製薬の後発薬事業を承継する。ジェネリック医薬品事業の再編が進んでいる。","m":"ジェネリック医薬品事業の再編は薬価や供給安定 4000000/","d":"2026-04-28"},{"t":"1日1万歩より効果的 「インターバル速歩」で老化を防ぐ","s":"1日1万歩よりも効果的とされる「インターバル速歩」による老化防止効果について紹介している。","m":"糖尿病・循環器疾患患者への運動療法指導の参考情報。生活習慣改善指導に活用できる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD087470Y6A400C2000000/","d":"2026-04-28"},{"t":"「がんを知る本」で備え、向き合う 大人も子どももがん教育","s":"がん教育の重要性を説く記事で、大人も子どもも対象とした「がんを知る本」による教育啓発活動について紹介している。がん予防意識の向上を目指している。","m":"がん教育の普及により患者のがん検診受診意識が向上する可能性。内科診療での生活習慣病指導時にがん予防の啓発機会が増える。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD105270Q6A410C2000000/","d":"2026-04-28"},{"t":"バテる子供たち 便利で快適な現代に足りないものは","s":"現代の子供たちの体力低下や疲れやすさについて、便利で快適な生活環境との関連性を論じた記事。","m":"小児科での頻繁な相談内容。現代の子育て環境を踏まえた指導方針の参考となる。","i":"小児科診療で体力低下を訴える患者への生活指導内容を見直し強化する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD3160I0R30C26A3000000/","d":"2026-04-28"},{"t":"The tensions behind Palantir’s efforts to transform English healthcare","s":"米国パランティア社がイギリス医療制度（NHS）に導入したソフトウェアについて、現場スタッフの評価が分かれているとの報告。","m":"医療DXの海外動向として参考になる。システム導入時の現場での実用性評価の重要性を示唆。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/36a5ae05-bfa2-4e74-af35-8ba9e3d76ca3","d":"2026-04-28"},{"t":"診療報酬改定","s":"厚生労働省による診療報酬改定に関する情報。医療機関の経営に直接影響する重要な制度変更。","m":"診療報酬は当院の収益に直結する最重要情報。改定内容の把握と対応策検討は経営上必須。スタッフへの周知徹底も必要。","i":"最新の改定内容を詳細確認し、各診療科での算定要件変更や新設項目への対応準備を行う。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-27"},{"t":"消費税と診療報酬について","s":"厚生労働省による消費税と診療報酬に関する情報。医療機関の税務・経営に関わる重要な制度説明。","m":"消費税は医療機関の経営に大きく影響する。非課税売上である医療費と課税仕入れのバランスを理解し、適切な税務処理を行う必要がある。","i":"消費税の取扱いと診療報酬での補填状況を確認し、税務処理や収支への影響を精査する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-27"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。蚊媒介感染症の一つとして感染対策や診断に関する指針。","m":"海外渡航者の増加に伴い、稀だが内科や小児科で相談される可能性がある感染症。基本的な知識として把握しておく価値がある。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-27"},{"t":"EMA Greenlights Drugs for MS and Spinal Muscular Atrophy","s":"欧州医薬品庁（EMA）が多発性硬化症と脊髄性筋萎縮症の治療薬を承認した。新たな治療選択肢が患者に提供される。","m":"神経疾患は内科でも遭遇する可能性あり。新薬承認は診療の選択肢拡大につながる重要情報。","i":"神経内科領域の新薬情報を把握し、専門医との連携や紹介体制を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/ema-greenlights-drugs-ms-and-spinal-muscular-atrophy-2026a1000d3y?src=rss","d":"2026-04-27"},{"t":"Drug Therapy in Nonobstructive Hypertrophic Cardiomyopathy","s":"非閉塞性肥大型心筋症の薬物療法について解説。循環器疾患の治療選択肢に関する最新情報が提供されている。","m":"循環器内科を標榜するクリニックにとって心筋症治療は重要な診療領域。最新治療法の習得が必要。","i":"循環器内科として最新の肥大型心筋症治療法を学習し、診療方針に反映する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/s/viewarticle/drug-therapy-nonobstructive-hypertrophic-cardiomyopathy-2026a1000bfc?src=rss","d":"2026-04-27"},{"t":"First Positive Phase 3 Drug Trial for MOGAD","s":"MOGAD（抗MOG抗体関連疾患）に対する初の第3相薬物試験で陽性結果が得られた。希少な神経疾患の治療に新たな進展がある。","m":"希少疾患の治療薬開発は専門性が高く、一般クリニックでの直接的な診療機会は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/first-positive-phase-3-drug-trial-mogad-2026a1000d2s?src=rss","d":"2026-04-27"},{"t":"Plant-Based Diet Quality May Affect Dementia Risk","s":"植物性食品中心の食事の質が認知症リスクに影響する可能性があることが示された。食事指導における重要な知見となる。","m":"内科診療での生活習慣指導や糖尿病管理において、認知症予防の観点からの食事指導に活用可能。","i":"糖尿病や生活習慣病患者への栄養指導で植物性食品の質について助言を強化する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/plant-based-diet-quality-may-affect-dementia-risk-2026a1000d1s?src=rss","d":"2026-04-27"},{"t":"Carotid Revascularization May Lower Seizure Risk in Stenosis","s":"頸動脈狭窄症において頸動脈血行再建術が発作リスクを低下させる可能性があることが示された。脳血管疾患予防の新たな知見である。","m":"頸動脈狭窄は循環器内科で遭遇する可能性があるが、血行再建術は専門施設での治療が必要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/carotid-revascularization-may-lower-seizure-risk-stenosis-2026a1000d17?src=rss","d":"2026-04-27"},{"t":"Syphilis Linked to Risk for Major Cardiovascular Events","s":"梅毒が主要な心血管イベントのリスク増加と関連することが判明した研究結果。梅毒感染が心疾患リスクを高める可能性が示された。循環器診療において梅毒の既往歴確認の重要性が示唆される。","m":"当院の循環器内科診療で心血管リスク評価時の参考情報として活用可能。糖尿病患者の心血管リスク管理にも関連する知見。","i":"循環器診療時に梅毒の既往歴確認を強化し、必要に応じて検査を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/syphilis-linked-risk-major-cardiovascular-events-2026a1000d1c?src=rss","d":"2026-04-27"},{"t":"Poststroke Epilepsy Carries Higher Risk for Dementia","s":"脳卒中後てんかんが認知症発症リスクを高めることが研究で示された。脳卒中患者のフォローアップにおいて、てんかんの発症と認知機能の継続的な監視が重要であることが示唆される。","m":"当院では脳卒中専門診療は実施していないが、循環器疾患患者の認知機能評価における参考情報として有用。高齢患者の総合的な健康管理の観点で参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/poststroke-epilepsy-carries-higher-risk-dementia-2026a1000d16?src=rss","d":"2026-04-27"},{"t":"Anemia Linked to Alzheimer’s Biomarkers, Dementia Risk","s":"貧血がアルツハイマー病のバイオマーカー上昇と認知症リスク増加に関連することが研究で判明。貧血の早期発見・治療が認知症予防において重要な役割を果たす可能性が示された。","m":"当院の内科診療で頻繁に遭遇する貧血患者への対応指針として重要。糖尿病患者の合併症管理にも関連する知見として活用可能。","i":"内科診療で貧血患者の認知機能評価を強化し、必要に応じて認知症スクリーニングを実施する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/anemia-linked-elevated-alzheimers-blood-biomarkers-greater-2026a1000d0t?src=rss","d":"2026-04-27"},{"t":"Medscape Physician Wealth & Debt Report 2026","s":"2026年度版の米国医師の資産・負債調査報告。医師の純資産増加傾向や負債状況についての最新データが示されている。医療従事者の経済状況に関する業界動向調査。","m":"日本の医療経営とは制度が異なるが、医師の経済状況トレンドとして参考情報。当院の人事戦略や給与体系検討時の参考データとして活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/p11/medscape-physician-wealth-debt-report-2026-rising-net-worth-2026a10009up?src=rss","d":"2026-04-27"},{"t":"FDA Declines Stroke Drug Over Manufacturing and Packaging Issues","s":"FDA が製造・包装上の問題により脳卒中治療薬の承認を拒否した。医薬品の製造品質管理の重要性と規制当局の厳格な審査姿勢が示された事例。","m":"当院では脳卒中専門治療は行わないが、医薬品の品質管理に対する規制動向として参考。循環器用薬の品質管理への注意喚起として活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/fda-declines-stroke-drug-over-manufacturing-and-packaging-2026a1000cyq?src=rss","d":"2026-04-27"},{"t":"HCA Healthcare executives shrug off Q1 volumes disruptions, reaffirm FY2026 guidance","s":"HCAヘルスケアの経営陣が第1四半期の患者数減少の影響を軽視し、2026年度の業績予想を維持すると発表。大手病院チェーンの経営戦略と業績見通しについての報告。","m":"米国大手病院チェーンの経営動向として参考情報。日本のクリニック経営とは規模・制度が異なるが、患者数変動への対応事例として参考。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/hca-healthcare-executives-shrug-q1-volumes-disruptions-reaffirm-fy2026-guidance","d":"2026-04-27"},{"t":"Lawmakers introduce bipartisan legislation to improve access, quality of care in Medicare Advantage plans","s":"米国議会でメディケアアドバンテージプランのアクセス改善と医療の質向上を目指す超党派法案が提出された。米国の公的医療保険制度改革に向けた政治的動きについての報告。","m":"米国の医療保険制度に関する内容で、日本の診療報酬制度とは異なるが、医療アクセス改善への政策動向として参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/lawmakers-introduce-bipartisan-legislation-improve-access-quality-care-medicare","d":"2026-04-27"},{"t":"UnitedHealthcare, Aetna, Cigna tout progress to standardize prior authorization as part of industry-wide commitment","s":"ユナイテッドヘルスケア、エトナ、シグナが事前承認の標準化における進展を報告。業界全体での医療承認プロセス標準化への取り組みが進行中。日本での保険診療承認プロセスへの影響可能性。","m":"米国の事前承認標準化は、日本の診療報酬制度や審査体制の効率化にも影響を与える可能性。当院の保険診療業務の効率化検討に参考となる動向。","i":"事前承認標準化の動向を注視し、日本の保険診療における類似の効率化施策への準備を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/unitedhealthcare-aetna-tout-progress-standardize-prior-authorization-part-industry-wide","d":"2026-04-27"},{"t":"Industry Voices—Hospitals are very online, but what happens when they're plunged into 'digital darkness'?","s":"病院のデジタル依存度が高まる中、システム障害時の「デジタルの闇」状態への対策の重要性について論じた記事。医療機関におけるデジタル障害時のリスク管理と事業継続計画の必要性。","m":"当院も電子カルテシステムに依存しており、システム障害時の診療継続は重要な経営リスク。BCP策定における重要な視点として活用。","i":"電子カルテやデジタルシステム障害時の業務継続計画を見直し、アナログでの診療継続体制を整備する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/industry-voices-hospitals-are-very-online-what-happens-when-theyre-plunged-digital","d":"2026-04-27"},{"t":"Northwell Health unveils toolkit for gun violence prevention in healthcare settings","s":"ノースウェル・ヘルスが医療機関における銃暴力防止のためのツールキットを発表。医療現場での暴力防止対策と安全管理への取り組み事例が紹介されている。","m":"日本では銃暴力は稀だが、医療現場での暴力・安全管理対策として参考。当院の患者・職員の安全確保策検討時の参考事例として活用可能。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/hospitals/northwell-health-unveils-first-its-kind-toolkit-gun-violence-prevention-healthcare","d":"2026-04-27"},{"t":"海外新薬が日本で使えない「ドラッグロス」　米薬価政策が拍車の恐れ","s":"海外で承認された新薬が日本で使用できない「ドラッグロス」問題が深刻化。米国の薬価政策変更がさらに状況を悪化させる可能性がある。","m":"内科（糖尿病・循環器）や消化器領域で新薬が使えない場合、患者の治療機会に影響する。先進的治療への患者要望に対する説明が必要になる可能性。","i":"新薬アクセスの遅れによる治療選択肢への影響を把握し、患者・家族への説明準備を行う。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA231WJ0T20C26A4000000/","d":"2026-04-27"},{"t":"医師の病院離れ深刻に　診療所に転出、地域に偏り","s":"医師の病院離れが深刻化し、診療所への転出が増加している。地域による偏りも見られ、医療提供体制に影響を与えている。","m":"病院からの医師転出増加は、当院にとって医師確保の好機となる可能性がある。一方で地域医療連携への影響も考慮が必要。","i":"医師確保の機会として捉え、求人戦略の見直しや勤務条件の改善を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD133ML0T10C26A4000000/","d":"2026-04-27"},{"t":"はしか感染、4月で25年の通年上回る　厚労相がワクチン接種呼びかけ","s":"はしか感染者数が4月時点で2025年の通年実績を上回る異例の拡大を見せている。厚生労働相がワクチン接種を強く呼びかけており、感染拡大防止が急務となっている。","m":"小児科を有するクリニックでは、ワクチン接種推進と感染疑い患者への院内感染対策が重要。地域の感染状況把握も必要。","i":"小児科において麻疹ワクチン接種の啓発強化と在庫確保、感染疑い患者の適切な対応準備が必要","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA240RU0U6A420C2000000/","d":"2026-04-27"},{"t":"人材紹介料に苦しむ医療機関　経験した医師｢ドクターバンクの充実を｣","s":"医療機関が人材紹介会社への高額な紹介料負担に苦しんでいる。医師からはドクターバンクなど公的人材紹介制度の充実を求める声が上がっている。","m":"医師の人材確保コストが経営を圧迫している問題。複数診療科を持つクリニックでは特に人材確保戦略の見直しが必要。","i":"医師採用コスト削減のため、公的ドクターバンクの活用検討と人材紹介会社との契約見直しを実施","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA2155T0R20C26A4000000/","d":"2026-04-27"},{"t":"医療用手袋、欠品で中小医院に届かず　政府は5000万枚備蓄5月放出","s":"医療用手袋の欠品により中小医療機関への供給が不足している。政府は5月に備蓄から5000万枚を放出する対応を発表した。","m":"中小クリニックは物資調達力が大病院より劣る。医療用手袋は全診療科で必須のため、安定調達体制の構築が重要。","i":"医療用手袋の在庫確保と複数業者からの調達ルート確保、備蓄戦略の見直しが必要","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC208V70Q6A420C2000000/","d":"2026-04-27"},{"t":"腸内環境、検査結果を最短2日で バイオ新興・大阪大学が定点観測化","s":"バイオベンチャーと大阪大学が腸内環境検査の結果を最短2日で提供するサービスを開発し、定点観測を可能にする技術を実用化。","m":"消化器内科を有するクリニックにとって、新たな検査サービスとして患者に提供できる可能性がある。検査の迅速化は患者満足度向上につながる。","i":"消化器内科での検査メニュー拡充や患者への付加価値提供の可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC22AGQ0S6A420C2000000/","d":"2026-04-27"},{"t":"更年期診療新興マイフィット、心療内科に参入 不調相談しやすく","s":"更年期診療を手掛ける新興企業マイフィットが心療内科分野に参入し、女性が相談しやすい診療環境の整備を進める。","m":"内科で糖尿病・循環器を診療する中で、更年期や心身症状の患者への対応力向上や、必要に応じた専門医連携の参考になる。","i":"女性患者の更年期や心身の不調への対応強化、診療科連携の参考にする。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC247S80U6A420C2000000/","d":"2026-04-27"},{"t":"中外製薬の純利益19%増 1〜3月、血友病薬の販売増","s":"中外製薬の2026年1-3月期の純利益が前年同期比19％増加した。血友病治療薬の販売拡大が主な要因となっている。","m":"製薬会社の業績情報。血友病薬の販売増は専門性の高い領域のため、一般クリニック経営への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB22A8A0S6A420C2000000/","d":"2026-04-27"},{"t":"明治HD系など3社、新会社設立へ 杏林製薬の後発薬事業を承継","s":"明治ホールディングス系企業など3社が新会社を設立し、杏林製薬の後発医薬品事業を承継することが発表された。","m":"ジェネリック医薬品業界の再編情報。薬価や供給安定性への影響を中長期的に注視する必要がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC247IM0U6A420C2000000/","d":"2026-04-27"},{"t":"第一三共、26年3月期決算の発表を5月11日に延期 供給計画見直し","s":"製薬大手の第一三共が2026年3月期決算発表を5月11日に延期すると発表。供給計画の見直しが理由とされている。","m":"大手製薬企業の供給計画見直しは、将来的な薬剤供給や薬価に影響する可能性があるが、現時点では情報収集レベル。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB240ON0U6A420C2000000/","d":"2026-04-27"},{"t":"メドトロニック系、手術学習の支援システム AIで個人情報保護","s":"メドトロニック系企業が手術学習支援システムを開発し、AIを活用した個人情報保護機能を搭載している。医療技術の教育分野での革新が進んでいる。","m":"手術支援システムの技術革新。クリニックレベルでは直接的な影響は少ないが、医療技術教育の変化として参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC236DY0T20C26A4000000/","d":"2026-04-27"},{"t":"東和薬品、スズケン系に後発薬の生産委託 28年度までに7億錠","s":"ジェネリック医薬品メーカーの東和薬品がスズケン系企業に後発薬の生産委託を行い、2028年度までに7億錠の生産体制を構築する。","m":"ジェネリック医薬品の生産体制強化は、クリニックでの薬剤調達コストや供給安定性に直結する重要な業界動向。","i":"ジェネリック医薬品の安定供給確保状況を注視し、薬剤調達戦略を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF237K50T20C26A4000000/","d":"2026-04-27"},{"t":"川崎重工、日医大千葉北総病院に搬送ロボット 医療従事者の負担軽減","s":"川崎重工が日本医科大学千葉北総病院に搬送ロボットを導入し、医療従事者の負担軽減を図る。病院内での物品搬送業務の自動化により、スタッフがより患者ケアに集中できる環境を構築。","m":"クリニック規模では導入コストが課題だが、将来的な人手不足対策として自動化技術の動向は把握しておく価値がある。医療DX推進の一環として参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC243IN0U6A420C2000000/","d":"2026-04-27"},{"t":"ダイト松森社長「後発薬498品目で生産統合協議」 半年で9倍に","s":"ダイトの松森社長が後発薬498品目で生産統合協議を進めていると発表。半年前の9倍の規模に拡大している。","m":"後発薬の生産統合は薬価や供給安定性に影響する可能性がある。クリニックの薬剤費や患者への影響を検討する必要がある。","i":"処方薬の供給状況変化を注視し、調剤や薬剤調達への影響を確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC233SJ0T20C26A4000000/","d":"2026-04-27"},{"t":"透析用チューブや手袋、99%超が海外頼み 医療物資に供給リスク","s":"透析用チューブや医療用手袋の99％以上が海外依存となっており、医療物資の供給リスクが浮き彫りになっている。国内調達体制の脆弱性が問題となっている。","m":"医療物資の海外依存リスクは全医療機関共通の課題。コストと安定供給のバランス取りが重要な経営判断となる。","i":"医療物資の調達先多様化と在庫管理の見直し、サプライチェーンリスク対応計画の策定が必要","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA15BHN0V10C26A4000000/","d":"2026-04-27"},{"t":"膵臓がん治療前進 米新薬治験5割で腫瘍縮小、mRNAワクチンも効果","s":"膵臓がん治療において、米国での新薬治験で5割の患者で腫瘍縮小が認められた。mRNAワクチンも効果を示しており、膵臓がん治療の新たな選択肢として期待される。","m":"当院では膵臓がんの一次診断は行わないが、消化器内科・外科での早期発見への意識向上に参考になる。将来的に新治療法が国内承認された際の紹介先との連携に備える必要がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN22D6J0S6A420C2000000/","d":"2026-04-27"},{"t":"医薬品をドローンで離島へ 伊予銀行などが瀬戸内で試験フライト","s":"伊予銀行などが瀬戸内海の離島への医薬品配送にドローンを活用する試験フライトを実施。医療物流の新技術実証。","m":"医療物流の効率化技術として興味深いが、都市部クリニックへの直接的影響は限定的。将来的な配送コスト削減の可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC197N30Z10C26A3000000/","d":"2026-04-27"},{"t":"更年期の女性の精神的な不調、こころと体からの警告","s":"更年期女性の精神的不調について、心身からの警告サインとして注意喚起する記事。更年期症状の理解と対応の重要性を解説。","m":"内科診療で更年期症状を訴える女性患者は多い。適切な診断と治療連携により患者満足度向上と診療収入増加の機会となる。","i":"更年期外来や女性の心の健康相談への対応体制強化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOSG156290V10C26A4000000/","d":"2026-04-27"},{"t":"東北大学、ゲノム情報基盤6.9万人分に拡充 国内最大規模に","s":"東北大学がゲノム情報基盤を6.9万人分に拡充し、国内最大規模のデータベースを構築した。精密医療の基盤整備が進展。","m":"ゲノム医療の基盤整備は将来的な個別化医療の発展につながるが、現在のクリニック診療への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC2422Z0U6A420C2000000/","d":"2026-04-27"},{"t":"低温サウナ、60度前後で水風呂入らず 無理なく\"ととのう\"","s":"60度前後の低温サウナが水風呂なしで無理なく「ととのう」効果を得られるという新しいサウナスタイルの紹介。健康促進の新手法。","m":"健康増進やストレス解消の新しい手法として患者との会話に活用できるが、直接的な診療への影響は少ない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD091YA0Z00C26A4000000/","d":"2026-04-27"},{"t":"アルツハイマー病の記憶障害、ドーパミン不足が一因 東北大学が発見","s":"東北大学がアルツハイマー病の記憶障害にドーパミン不足が関与していることを発見した。認知症治療の新たな治療標的の可能性。","m":"認知症診療の基礎研究として興味深いが、実際の治療法開発まで時間がかかる。現在の内科診療での認知症スクリーニングは継続。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG150SX0V10C26A4000000/","d":"2026-04-27"},{"t":"1日1万歩より効果的 「インターバル速歩」で老化を防ぐ","s":"1日1万歩よりも効果的な「インターバル速歩」で老化予防ができるという運動療法の紹介。効率的な健康増進法として注目。","m":"糖尿病や循環器疾患患者への運動療法指導に活用できる。効果的な運動指導により患者アウトカム向上と継続受診促進が期待できる。","i":"患者への運動指導内容を更新し、インターバル速歩の指導を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD087470Y6A400C2000000/","d":"2026-04-27"},{"t":"「がんを知る本」で備え、向き合う 大人も子どももがん教育","s":"がん教育の普及に向けて、大人と子ども向けの「がんを知る本」による啓発活動が展開されている。がん知識の向上とがんとの向き合い方を学ぶ取り組みが進んでいる。","m":"がん教育・啓発活動の情報。内科診療でがん患者と接する機会があるため、患者教育の参考として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD105270Q6A410C2000000/","d":"2026-04-27"},{"t":"バテる子供たち 便利で快適な現代に足りないものは","s":"現代の子供たちが疲れやすくなっている現象について、便利で快適な生活環境が影響している可能性を指摘した記事。子供の体力低下や健康状態の変化に関する内容と推測される。","m":"小児科を有する当法人では、子供の体力低下や疲労に関する相談が増加する可能性がある。現代的な生活習慣が子供の健康に与える影響を理解し、保護者への指導内容を見直すことが重要。","i":"小児科での診療において、子供の体力低下や疲労感に関する相談への対応準備を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD3160I0R30C26A3000000/","d":"2026-04-27"},{"t":"ブータンの胃がん減らせ、ピロリ菌の検査キット開発 大分大学など","s":"大分大学などがブータンの胃がん対策として、ピロリ菌検査キットの開発を進めている。国際協力による医療技術支援の取り組みが注目されている。","m":"ピロリ菌検査技術の開発情報。消化器内科を有するクリニックでは検査技術の進歩として参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC2033N0Q6A420C2000000/","d":"2026-04-27"},{"t":"佐々木貴史さん（1）夢のシャツで人々健康に","s":"佐々木貴史氏が健康をテーマとした「夢のシャツ」で人々の健康促進を目指している。ヘルスケア分野での新しい取り組みについて紹介している。","m":"ウェアラブル健康機器は予防医療や患者指導に活用できる可能性。今後のヘルスケア機器動向として注目。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD221HJ0S6A320C2000000/","d":"2026-04-27"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-26"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-26"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-26"},{"t":"EMA Greenlights Drugs for MS and Spinal Muscular Atrophy","s":"欧州医薬品庁（EMA）が多発性硬化症（MS）と脊髄性筋萎縮症の新薬を承認した。","m":"内科での神経系症状患者の紹介判断に影響。新治療選択肢の情報として重要。","i":"神経系疾患の新治療選択肢として、専門医への紹介判断に活用する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/ema-greenlights-drugs-ms-and-spinal-muscular-atrophy-2026a1000d3y?src=rss","d":"2026-04-26"},{"t":"Drug Therapy in Nonobstructive Hypertrophic Cardiomyopathy","s":"非閉塞性肥大型心筋症に対する薬物療法について。循環器疾患の治療選択肢に関する最新情報。","m":"内科（循環器）診療に直結する情報。肥大型心筋症患者の治療方針決定に有用。","i":"循環器診療での治療選択肢として情報を把握し、必要時専門医紹介を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/s/viewarticle/drug-therapy-nonobstructive-hypertrophic-cardiomyopathy-2026a1000bfc?src=rss","d":"2026-04-26"},{"t":"First Positive Phase 3 Drug Trial for MOGAD","s":"MOGAD（抗MOG抗体関連疾患）に対する初の第3相臨床試験で陽性結果が得られた。","m":"稀な神経免疫疾患の治療選択肢。直接的な診療機会は少ないが、知識として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/first-positive-phase-3-drug-trial-mogad-2026a1000d2s?src=rss","d":"2026-04-26"},{"t":"Plant-Based Diet Quality May Affect Dementia Risk","s":"植物性食品を中心とした食事の質が認知症リスクに影響する可能性があることが示された。","m":"生活習慣病患者への栄養指導に活用可能。糖尿病・循環器疾患の包括的管理に有益。","i":"糖尿病患者への栄養指導時に認知症予防の観点も含めて指導内容を強化する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/plant-based-diet-quality-may-affect-dementia-risk-2026a1000d1s?src=rss","d":"2026-04-26"},{"t":"Carotid Revascularization May Lower Seizure Risk in Stenosis","s":"頸動脈狭窄症に対する血行再建術が発作リスクを低減する可能性があることが示された。","m":"循環器診療での専門医紹介判断の参考情報。脳血管系リスク評価に有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/carotid-revascularization-may-lower-seizure-risk-stenosis-2026a1000d17?src=rss","d":"2026-04-26"},{"t":"Syphilis Linked to Risk for Major Cardiovascular Events","s":"梅毒感染が主要心血管イベントのリスク増加と関連することが示された。","m":"感染症と循環器疾患の関連性。内科診療での総合的なリスク評価に重要な情報。","i":"梅毒検査陽性患者に対し心血管リスク評価を強化し、循環器フォローアップを検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/syphilis-linked-risk-major-cardiovascular-events-2026a1000d1c?src=rss","d":"2026-04-26"},{"t":"Poststroke Epilepsy Carries Higher Risk for Dementia","s":"脳卒中後てんかんが認知症発症リスクを高めることが研究で示された。脳卒中後の合併症管理における新たな知見として注目される。","m":"内科・循環器診療での脳卒中後患者フォローに参考となる情報。認知症リスク評価の視点が追加される。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/poststroke-epilepsy-carries-higher-risk-dementia-2026a1000d16?src=rss","d":"2026-04-26"},{"t":"Anemia Linked to Alzheimer’s Biomarkers, Dementia Risk","s":"貧血がアルツハイマー病のバイオマーカー上昇と認知症リスク増加に関連することが判明。早期発見・治療の重要性が示唆される。","m":"内科診療での貧血患者に対する認知症リスク評価の観点。定期的な血液検査での早期発見が重要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/anemia-linked-elevated-alzheimers-blood-biomarkers-greater-2026a1000d0t?src=rss","d":"2026-04-26"},{"t":"Medscape Physician Wealth & Debt Report 2026","s":"2026年医師の資産・負債レポートが発表された。医師の経済状況や負債の傾向に関する最新データが示される。","m":"医療法人理事長として同業他社の経営状況把握に参考。人材確保時の給与設定の参考材料。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/p11/medscape-physician-wealth-debt-report-2026-rising-net-worth-2026a10009up?src=rss","d":"2026-04-26"},{"t":"FDA Declines Stroke Drug Over Manufacturing and Packaging Issues","s":"FDAが製造・包装上の問題により脳卒中治療薬の承認を見送った。薬事承認プロセスの厳格化を示す事例。","m":"循環器内科での新薬導入時期に影響する可能性。既存治療選択肢の継続が必要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/fda-declines-stroke-drug-over-manufacturing-and-packaging-2026a1000cyq?src=rss","d":"2026-04-26"},{"t":"HCA Healthcare executives shrug off Q1 volumes disruptions, reaffirm FY2026 guidance","s":"HCAヘルスケアが第1四半期の患者数減少の影響を軽視し、2026年度予想を据え置いた。大手病院チェーンの業績見通し。","m":"米国大手医療機関の動向として参考。日本の医療機関経営への直接的影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/hca-healthcare-executives-shrug-q1-volumes-disruptions-reaffirm-fy2026-guidance","d":"2026-04-26"},{"t":"Lawmakers introduce bipartisan legislation to improve access, quality of care in Medicare Advantage plans","s":"メディケアアドバンテージプランのアクセス改善・医療の質向上を目的とした超党派法案が提出された。米国医療保険制度改革の動き。","m":"米国の医療保険制度改革動向として参考。日本の医療保険制度への影響は間接的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/lawmakers-introduce-bipartisan-legislation-improve-access-quality-care-medicare","d":"2026-04-26"},{"t":"UnitedHealthcare, Aetna, Cigna tout progress to standardize prior authorization as part of industry-wide commitment","s":"ユナイテッドヘルスケア、エトナ、シグナが事前承認手続きの標準化を進めると発表。医療保険業界全体での取り組み。","m":"保険請求業務の効率化に関連。日本の保険制度でも類似の標準化が進む可能性。","i":"日本でも保険審査の効率化動向を注視し、事務負担軽減への対応準備を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/unitedhealthcare-aetna-tout-progress-standardize-prior-authorization-part-industry-wide","d":"2026-04-26"},{"t":"Industry Voices—Hospitals are very online, but what happens when they're plunged into 'digital darkness'?","s":"病院のデジタル依存が高まる中、システム障害時の対応策（デジタル闇対策）の重要性が指摘された。医療ITリスク管理の課題。","m":"クリニックのIT化推進と並行してシステム障害対策が必要。診療継続のためのリスク管理。","i":"電子カルテやシステム障害時のBCP策定・見直しを実施し、アナログ対応手順を整備する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/industry-voices-hospitals-are-very-online-what-happens-when-theyre-plunged-digital","d":"2026-04-26"},{"t":"Northwell Health unveils toolkit for gun violence prevention in healthcare settings","s":"ノースウェルヘルスが医療現場での銃暴力防止ツールキットを発表。医療機関における安全対策の新しいアプローチ。","m":"米国特有の課題だが、医療機関での安全管理体制構築の参考として有用。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/hospitals/northwell-health-unveils-first-its-kind-toolkit-gun-violence-prevention-healthcare","d":"2026-04-26"},{"t":"AI-powered prior authorizations for Medicare have greatly delayed care, Washington state hospitals say","s":"米国ワシントン州の病院が、メディケアのAI搭載事前承認システムが医療提供を大幅に遅延させていると報告している。AI技術の医療制度への導入に課題が浮き彫りになっている。","m":"日本でも将来的にAI活用の事前承認システムが導入される可能性を想定し、海外事例として参考情報。診療の遅延リスクへの注意が必要。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/ai-powered-prior-authorizations-medicare-have-greatly-delayed-care-wash-hospitals-say","d":"2026-04-26"},{"t":"Chutes & Ladders—Cityblock names former UHC exec as chief health officer; Blue Shield taps chief pharmacy officer","s":"シティブロックが元UHC幹部を最高健康責任者に任命、ブルーシールドが薬事責任者を採用。医療業界の人事動向。","m":"米国医療業界の人材動向として参考。経営幹部レベルでの人材流動性の高さを示す。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/chutes-ladders-2026-hires-departures-firings-retirements-ceo-executives-healthcare","d":"2026-04-26"},{"t":"FTC files suit over telemarketing scheme selling fake PPO insurance","s":"米国連邦取引委員会が偽のPPO保険を販売するテレマーケティング詐欺に対して訴訟を提起しました。医療保険詐欺の事例として、患者への影響が懸念される問題です。","m":"偽保険による未収金リスクや患者トラブルの可能性。米国事例だが類似詐欺への注意喚起として参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/ftc-files-suit-over-telemarketing-scheme-selling-fake-ppo-insurance","d":"2026-04-26"},{"t":"人材紹介料に苦しむ医療機関　経験した医師｢ドクターバンクの充実を｣","s":"医療機関が高額な人材紹介料に苦しんでおり、経験医師がドクターバンクの充実を求めている。医師の人材確保コストが医療機関経営を圧迫している状況。","m":"医師確保は全診療科に共通する課題。人材紹介料削減と効率的な医師確保手段の検討が経営上重要。","i":"人材紹介費用の見直しとドクターバンク等の公的制度活用を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA2155T0R20C26A4000000/","d":"2026-04-26"},{"t":"医師の病院離れ深刻に　診療所に転出、地域に偏り","s":"医師の病院離れが深刻化し、診療所への転出が増加している。地域による偏りも見られ、医師の働き方や勤務先選択に変化が起きている。","m":"病院から診療所への医師流入は採用機会の拡大を意味する。一方で競合診療所との医師確保競争激化の可能性も。","i":"病院勤務医師の診療所転職ニーズを踏まえた採用戦略を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD133ML0T10C26A4000000/","d":"2026-04-26"},{"t":"はしか感染、4月で25年の通年上回る　厚労相がワクチン接種呼びかけ","s":"はしか感染者が4月時点で2025年通年を上回る状況となり、厚生労働大臣がワクチン接種を呼びかけている。感染拡大防止対策の強化が求められている。","m":"小児科では特に重要な対応事項。内科でも成人患者への啓発が必要。院内感染防止策の徹底が急務。","i":"院内感染対策の見直しとスタッフ・患者へのワクチン接種推奨を実施する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA240RU0U6A420C2000000/","d":"2026-04-26"},{"t":"医療用手袋、欠品で中小医院に届かず　政府は5000万枚備蓄5月放出","s":"医療用手袋の欠品により中小医院への供給が滞っている。政府が5月に備蓄5000万枚を放出予定だが、供給不足の解決には時間を要する見込み。","m":"全診療科で必須の医療資材。特に手技の多い消化器外科や小児科への影響が大きい。早急な対応が必要。","i":"医療用手袋の在庫確保と代替品調達ルートの確立を急ぐ。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUC208V70Q6A420C2000000/","d":"2026-04-26"},{"t":"中外製薬の純利益19%増 1〜3月、血友病薬の販売増","s":"中外製薬の1-3月期純利益が19%増加し、血友病薬の販売増が寄与した。製薬業界の業績回復傾向が見られている。","m":"製薬会社の業績情報として参考。血友病薬の普及は専門性の高い治療分野であり、クリニック診療への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB22A8A0S6A420C2000000/","d":"2026-04-26"},{"t":"明治HD系など3社、新会社設立へ 杏林製薬の後発薬事業を承継","s":"明治ホールディングス系企業など3社が、杏林製薬の後発医薬品事業を承継する新会社を設立する計画。後発薬市場の再編が進んでいる。","m":"後発薬の供給体制変化により薬剤調達に影響の可能性。新会社の供給安定性を注視すべき。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC247IM0U6A420C2000000/","d":"2026-04-26"},{"t":"学研HDが葬儀ホール新設 高齢者住宅の居住者以外にも対応","s":"学研ホールディングスが高齢者住宅に加えて一般向けにも対応する葬儀ホールを新設します。高齢者向けサービスの拡充として注目される動きです。","m":"高齢患者の終末期ケア連携先として把握しておく価値あり。地域包括ケアの一環として関連する可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC16A0S0W6A410C2000000/","d":"2026-04-26"},{"t":"第一三共、26年3月期決算の発表を5月11日に延期 供給計画見直し","s":"第一三共が2026年3月期決算発表を5月11日に延期すると発表しました。供給計画の見直しが理由とされており、医薬品供給への影響が懸念されます。","m":"大手製薬会社の供給計画見直しは処方薬確保に直接影響。糖尿病・循環器薬の供給状況要注意。","i":"第一三共製薬の供給状況を確認し、処方薬の代替品確保を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUB240ON0U6A420C2000000/","d":"2026-04-26"},{"t":"メドトロニック系、手術学習の支援システム AIで個人情報保護","s":"メドトロニック系企業が、人工知能を活用した手術学習支援システムを開発。個人情報保護機能を搭載している。医療従事者の技術向上支援が目的。","m":"医師の技術向上と効率化に寄与する可能性。導入コストと効果を将来的に評価が必要。","i":"AI活用の医療技術向上ツールの導入可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC236DY0T20C26A4000000/","d":"2026-04-26"},{"t":"東和薬品、スズケン系に後発薬の生産委託 28年度までに7億錠","s":"東和薬品がスズケン系企業に後発薬の生産委託を行い、2028年度までに7億錠の生産体制を構築します。後発薬の安定供給体制強化の動きです。","m":"後発薬の安定供給は薬剤費削減と処方選択に直結。東和薬品・スズケン系薬品の供給状況を注視。","i":"後発薬の供給安定化により処方選択肢が広がる可能性を把握しておく。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF237K50T20C26A4000000/","d":"2026-04-26"},{"t":"川崎重工、日医大千葉北総病院に搬送ロボット 医療従事者の負担軽減","s":"川崎重工が日本医科大学千葉北総病院に搬送ロボットを導入し、医療従事者の負担軽減を図る取り組みが開始された。病院業務の自動化・効率化への注目が集まっている。","m":"クリニック規模では大型搬送ロボットは不要だが、業務効率化の考え方は参考になる。小規模な自動化技術導入の検討材料として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC243IN0U6A420C2000000/","d":"2026-04-26"},{"t":"ダイト松森社長「後発薬498品目で生産統合協議」 半年で9倍に","s":"ダイト松森社長が後発医薬品498品目で生産統合協議を進めており、この数は半年で9倍に増加している。後発薬の安定供給に向けた業界再編の動きと考えられる。","m":"後発薬の供給不安が続く中、生産統合により安定供給が改善される可能性がある。クリニックでの薬剤調達戦略の見直しが必要かもしれない。","i":"後発薬の供給体制変化により、薬剤調達への影響を確認する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC233SJ0T20C26A4000000/","d":"2026-04-26"},{"t":"透析用チューブや手袋、99%超が海外頼み 医療物資に供給リスク","s":"透析用チューブや医療用手袋の99%以上が海外依存となっており、医療物資の供給リスクが懸念されている。国内調達の必要性が指摘。","m":"感染症流行時の供給不安定化リスク。複数ルートでの調達体制構築が重要。","i":"医療資材の調達先多様化と在庫管理体制の見直しを検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA15BHN0V10C26A4000000/","d":"2026-04-26"},{"t":"膵臓がん治療前進 米新薬治験5割で腫瘍縮小、mRNAワクチンも効果","s":"膵臓がん治療で米国の新薬治験において5割の患者で腫瘍縮小が確認された。mRNAワクチンも効果を示しており、難治性がんの治療選択肢拡大への期待が高まっている。","m":"消化器外科での膵臓がん患者への治療選択肢拡大の可能性。将来的に新薬が承認された際の治療体制検討が必要になる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN22D6J0S6A420C2000000/","d":"2026-04-26"},{"t":"医薬品をドローンで離島へ 伊予銀行などが瀬戸内で試験フライト","s":"伊予銀行などが瀬戸内海の離島への医薬品配送にドローンを活用する試験フライトを実施。離島や過疎地域での医薬品配送の効率化を目指す取り組み。","m":"都市部のクリニックには直接的な影響は少ないが、将来的に医薬品配送の効率化や緊急時の薬剤調達手段として参考になる技術動向。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC197N30Z10C26A3000000/","d":"2026-04-26"},{"t":"メディ、中外製薬の「エレビジス」使用を支援 主治医と専門家つなぐ","s":"メディ社が中外製薬の「エレビジス」使用を支援するサービスを開始。主治医と専門医をつなぐプラットフォームを提供している。","m":"専門医連携システムの活用により診療の質向上が期待。類似サービスの動向要注意。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC201NZ0Q6A420C2000000/","d":"2026-04-26"},{"t":"田辺ファーマ、マラリア新薬開発でファンドから7億円助成 1回投与型","s":"田辺ファーマがマラリア新薬開発のためファンドから7億円の助成を受ける。1回投与型の新薬開発を進める予定。","m":"マラリアは日本では稀な疾患のため、直接的なクリニック業務への影響は限定的。ただし海外渡航者への対応で参考となる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF223R60S6A420C2000000/","d":"2026-04-26"},{"t":"エーザイの腎細胞がん向け3剤併用療法の治験 評価項目達成せず","s":"エーザイが開発中の腎細胞がん向け3剤併用療法の臨床試験で、主要評価項目を達成できなかった。新薬開発の困難さを示している。","m":"がん治療薬の開発動向として参考。直接的な経営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC21B6U0R20C26A4000000/","d":"2026-04-26"},{"t":"更年期の女性の精神的な不調、こころと体からの警告","s":"更年期女性の精神的な不調について、心と体からの警告として捉える必要性を解説。更年期症状の理解と対応に関する情報。","m":"内科では更年期症状で受診する女性患者が多い。適切な診断と治療、必要に応じた専門医への紹介体制の整備が重要。","i":"内科での更年期症状への対応体制や連携先の確認を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOSG156290V10C26A4000000/","d":"2026-04-26"},{"t":"東北大学、ゲノム情報基盤6.9万人分に拡充 国内最大規模に","s":"東北大学がゲノム情報基盤を6.9万人分に拡充し、国内最大規模となった。ゲノム医療の研究基盤拡充に関する動向。","m":"将来的にゲノム医療が一般化した際の参考情報。現在のクリニック診療への直接的な影響は少ないが、個別化医療の動向として注目。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC2422Z0U6A420C2000000/","d":"2026-04-26"},{"t":"低温サウナ、60度前後で水風呂入らず 無理なく\"ととのう\"","s":"60度前後の低温サウナで水風呂に入らずに効果を得る方法について紹介。無理なく「ととのう」体験ができる健康法。","m":"患者の健康維持に関する話題として参考程度。生活指導の際の雑談ネタとしては使えるが、医療業務への直接的な影響はない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD091YA0Z00C26A4000000/","d":"2026-04-26"},{"t":"1日1万歩より効果的 「インターバル速歩」で老化を防ぐ","s":"1日1万歩よりも効果的とされる「インターバル速歩」による老化防止効果について解説。運動療法の新しいアプローチ。","m":"糖尿病患者や循環器疾患患者への運動指導の参考となる情報。従来の歩行指導に加えて、より効率的な運動方法として活用できる。","i":"","src":"日経","p":"参考","u":
