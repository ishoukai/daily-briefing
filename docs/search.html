":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC3192U0R30C26A3000000/","d":"2026-04-02"},{"t":"帝人が過去最大950億円の赤字 26年3月期最終、医薬子会社で減損","s":"帝人が医薬子会社での減損により2026年3月期に過去最大の950億円の最終赤字を計上する見通し。製薬業界の厳しい経営環境を示している。","m":"製薬業界全体の動向として注視。医薬品供給や価格への間接的影響の可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB316NO0R30C26A3000000/","d":"2026-04-02"},{"t":"DNP、横浜市立大とAI使ったX線画像分析 肺がん検診支援","s":"大日本印刷が横浜市立大学と共同でAIを活用したX線画像分析による肺がん検診支援システムを開発。AI診断支援技術の実用化が進展。","m":"内科診療での画像診断支援AIは診断精度向上と業務効率化に寄与。将来的な導入検討の参考情報。","i":"AI診断支援システムの導入可能性と費用対効果を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC302LS0Q6A330C2000000/","d":"2026-04-02"},{"t":"杏林製薬、仏製薬企業とライセンス契約 神経障害性の疼痛治療薬","s":"杏林製薬がフランス製薬企業と神経障害性疼痛治療薬のライセンス契約を締結。新たな疼痛治療選択肢の拡大。","m":"糖尿病患者の神経障害性疼痛は内科診療で頻繁に遭遇する症状。新薬情報は治療選択肢拡大につながる。","i":"新しい疼痛治療薬の特徴と適応を把握し、糖尿病性神経障害等への応用可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC316X30R30C26A3000000/","d":"2026-04-02"},{"t":"田辺ファーマ、ワクチン製造の合弁解消 BIKEN財団に株式譲渡","s":"田辺ファーマがワクチン製造の合弁事業を解消し、BIKEN財団に株式を譲渡する。国内ワクチン供給体制の再編が進んでいる。","m":"ワクチン供給体制の変化は今後の調達に影響する可能性がある。小児科でのワクチン接種業務への間接的な影響を注視する必要。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF312330R30C26A3000000/","d":"2026-04-02"},{"t":"JMDC、企業向け健康管理システムを刷新 派遣やパートも網羅","s":"JMDCが企業向け健康管理システムを刷新し、派遣やパート従業員も対象に含める改良を実施。企業の健康管理体制の包括的な対応が可能になる。","m":"産業医連携や企業健診での協力機会に関連。健康管理システムの動向は予防医療分野での連携検討材料となる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC3073B0Q6A330C2000000/","d":"2026-04-02"},{"t":"日本薬科大など3大学、「薬屋のひとりごと」と連携 漢方の魅力発信","s":"日本薬科大学など3大学が人気アニメ「薬屋のひとりごと」と連携し、漢方薬の魅力を発信する取り組みを開始。薬学教育と漢方普及の新しいアプローチ。","m":"漢方薬への関心向上により、内科での漢方処方に対する患者の理解度向上に期待。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC257DL0V20C26A3000000/","d":"2026-04-02"},{"t":"DNP、インド工科大学に研究拠点 モビリティー・医療分野で連携","s":"大日本印刷がインド工科大学に研究拠点を設置し、モビリティーと医療分野で連携。国際的な研究開発体制を強化。","m":"長期的な医療技術開発の動向として興味深いが、現在の診療業務への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2758M0X20C26A3000000/","d":"2026-04-02"},{"t":"明治HD系、米バイオ新興に出資 インフルワクチン開発後押し","s":"明治ホールディングス系が米国のバイオベンチャーに出資し、新しいインフルエンザワクチンの開発を支援する。","m":"新型インフルワクチンの開発動向は小児科・内科での予防接種業務に将来的に影響。技術革新による効果向上に期待。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC302UN0Q6A330C2000000/","d":"2026-04-02"},{"t":"脳のパフォーマンスが変わる 自分だけの「快眠リズム」の見つけ方","s":"脳のパフォーマンス向上のために個人に最適化された快眠リズムを見つける方法について。睡眠の質と脳機能の関係性を解説。","m":"睡眠障害の患者への生活指導に活用可能。内科での生活習慣病管理にも有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD181650Y6A310C2000000/","d":"2026-04-02"},{"t":"知識と行動が運命変える がんのリテラシー向上を","s":"がんに関する知識と行動の重要性を説き、がんリテラシーの向上を呼びかける内容。早期発見・早期治療の啓発記事。","m":"消化器内科・外科での癌検診や健康指導において、患者教育の重要性を再確認。リテラシー向上は診療の質向上につながる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD187QJ0Y6A310C2000000/","d":"2026-04-02"},{"t":"口の中が燃えるようにピリピリ 原因不明の「舌痛症」かも","s":"口の中が燃えるようにピリピリする症状を呈する「舌痛症」について。原因不明で診断が困難な疾患の特徴を紹介。","m":"耳鼻咽喉科で遭遇する可能性のある症状。専門医への紹介判断基準の確認要。","i":"耳鼻咽喉科での鑑別診断能力向上と適切な紹介先の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD029AV0S6A200C2000000/","d":"2026-04-02"},{"t":"長崎市内3病院、緊急性ない救急車利用は7700円徴収 7月から","s":"長崎市内の3病院が7月から緊急性のない救急車利用に対して7700円の徴収を開始する。不適切な救急車利用への対策が本格化。","m":"救急車の適正利用は地域医療全体の課題。クリニックでも緊急時対応の説明や患者教育の重要性が高まる。","i":"救急対応の方針見直しや患者への説明体制の整備を検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOJC2795L0X20C26A3000000/","d":"2026-04-02"},{"t":"国立大学44病院、赤字脱却の見込み 26年度診療報酬改定で試算","s":"国立大学病院44病院が2026年度診療報酬改定により赤字脱却の見込み。診療報酬改定の具体的な影響度合いが示される試算結果。","m":"診療報酬改定は医療法人の収益に直結する最重要事項。大学病院の試算結果は改定の方向性を示す重要指標。","i":"2026年度診療報酬改定の詳細内容を確認し、自院への影響を試算・分析する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA252JC0V20C26A3000000/","d":"2026-04-02"},{"t":"「覚悟と工夫、時に諦めと希望も」 安藤忠雄さん、がんでも信念貫く","s":"建築家の安藤忠雄氏ががんと向き合いながらも信念を貫く姿勢について紹介する記事。がん患者の生き方に焦点を当てた内容。","m":"がん患者への精神的支援や生活指導の参考になる。消化器外科での患者ケアにおいて心理的サポートの重要性を再認識。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD255TK0V20C26A2000000/","d":"2026-04-02"},{"t":"医療事故、報告件数の低迷続く 制度10年で警察頼みが増加","s":"医療事故報告制度開始から10年経つが報告件数は低迷し、警察への通報に頼る傾向が増加している。医療安全体制の課題が浮き彫りに。","m":"医療安全は全診療科に関わる重要課題。事故防止体制の充実と適切な報告システムの構築が経営リスク管理に直結。","i":"院内の医療安全管理体制と事故報告システムの見直し・強化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-04-02"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を最大化するために「痛気持ちいい」程度より強めに伸ばすことが推奨される。運動療法の効果的な方法について。","m":"糖尿病や循環器疾患患者への運動指導時の参考情報として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-04-02"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクの増加と関連するという研究結果。食事パターンと骨の健康との関係性が明らかに。","m":"内科での生活習慣病管理や小児科での成長期栄養指導に直接活用できる知見。","i":"糖尿病や高齢患者への栄養指導内容の見直しと骨折予防の強化が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-04-02"},{"t":"Whoop hits $10bn valuation as health tracking takes off","s":"ウェアラブル健康トラッキングデバイスメーカーのWhoopが企業価値100億ドルを達成。ソブリンウェルスファンドやトップアスリートから5億7500万ドルを調達し、IPOを検討中。","m":"ウェアラブルデバイスによる健康管理は、クリニックでの予防医療や生活習慣病管理に活用可能。患者との接点拡大の機会。","i":"患者の健康データ管理や予防医療サービスの検討機会として注視する。","src":"FT","p":"要注視","u":"https://www.ft.com/content/0a1e069c-adfd-4ea7-9472-0ff64bb63e25","d":"2026-04-02"},{"t":"Eli Lilly signs $2bn deal for AI drug development with Hong Kong biotech","s":"イーライリリーが香港のバイオテック企業とAIを活用した薬剤開発で20億ドルの契約を締結。グローバル製薬会社が中国で新薬探索を積極化している。","m":"イーライリリーは糖尿病治療薬の大手メーカー。AI創薬による新薬開発は当院の糖尿病患者治療に将来影響する可能性。","i":"新薬開発動向を注視し、糖尿病等の治療薬の将来的な選択肢拡大を把握する。","src":"FT","p":"要注視","u":"https://www.ft.com/content/4efaf8cd-d415-46bb-8fb9-367e4eb3a781","d":"2026-04-02"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-01"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-01"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-01"},{"t":"How Symptoms Affect Social Lives, Loneliness Near Life&apos;s End","s":"終末期における症状が社会生活や孤独感に与える影響について分析した研究。症状管理と患者の社会的つながりの関係性を検討。","m":"高齢患者の終末期ケアや在宅医療を検討する際の参考情報。患者の生活の質向上への示唆。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/how-symptoms-affect-social-lives-and-loneliness-final-year-2026a10009uk?src=rss","d":"2026-04-01"},{"t":"Protecting the Hearts of Patients with Hypertension","s":"高血圧患者の心臓保護に関する医療情報。高血圧治療における心血管イベント予防のアプローチについて解説。","m":"当院の循環器内科・糖尿病内科で多数診療する高血圧患者への治療方針に直接関連。診療の質向上につながる重要情報。","i":"循環器内科での高血圧治療プロトコルの見直し検討が必要","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/protecting-hearts-patients-hypertension-2026a10009o3?src=rss","d":"2026-04-01"},{"t":"Myotonia Drug Gets Green Light for Pediatric Patients in EU","s":"筋強直症治療薬がEUで小児患者への適応承認を取得。小児の筋疾患治療における新たな選択肢として注目。","m":"当院小児科での筋疾患診療は限定的だが、小児専門治療薬の承認動向として参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/myotonia-drug-gets-green-light-pediatric-patients-eu-2026a10009si?src=rss","d":"2026-04-01"},{"t":"No Link Between Common ADHD Treatment and Psychosis Risk","s":"ADHD治療薬と精神病発症リスクとの間に関連性がないことを示した研究結果。一般的なADHD治療の安全性を支持する知見。","m":"小児科でのADHD診療における薬物療法の安全性に関する参考情報。保護者への説明時の根拠として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/no-link-between-common-adhd-treatment-and-psychosis-risk-2026a10009sc?src=rss","d":"2026-04-01"},{"t":"Fibromyalgia Reframed and Linked to Altered Pain Processing","s":"線維筋痛症が痛み処理の変化と関連付けて再定義された。慢性疼痛疾患の理解が深まり、診断・治療アプローチが進歩している。","m":"内科外来でも慢性疼痛の相談があり、線維筋痛症の新たな理解は診療に参考となる知識。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/fibromyalgia-reframed-and-linked-altered-pain-processing-2026a10009r9?src=rss","d":"2026-04-01"},{"t":"Posttraumatic Headaches May Masquerade as Migraines","s":"外傷後頭痛が片頭痛として誤診される可能性があることが報告された。頭痛の鑑別診断における注意点が示されている。","m":"内科外来での頭痛診療において、外傷歴の聴取と適切な鑑別診断の重要性を再認識する情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/posttraumatic-headaches-may-masquerade-migraines-2026a10009s2?src=rss","d":"2026-04-01"},{"t":"Lithium Beyond Bipolar: A New Role in Brain Health","s":"リチウムが双極性障害治療以外の脳の健康維持において新たな役割を持つ可能性について報告された。神経保護作用や認知機能改善への応用が研究されている。","m":"内科での気分障害併存患者への対応や、認知症予防への応用可能性として関心がある。現時点では研究段階のため直接的な診療変更は不要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/lithium-beyond-bipolar-new-role-brain-health-2026a10009nk?src=rss","d":"2026-04-01"},{"t":"Anesthetic Risk Linked to Venezuelan Maternal Lineage","s":"ベネズエラ系母系血統と麻酔リスクとの関連性が報告された研究。特定の遺伝的背景における麻酔管理上の注意点について。","m":"外科手術時の麻酔リスク評価の参考情報。消化器外科での術前評価において遺伝的背景考慮の重要性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/anesthetic-risk-linked-venezuelan-maternal-lineage-2026a10009ni?src=rss","d":"2026-04-01"},{"t":"The Death of the Medical Fax Is Foretold — Again","s":"医療現場でのファックス使用廃止が再び議論されている。デジタル化推進により、従来の紙ベース情報伝達からの転換が求められている。","m":"他医療機関や薬局との連携でファックスに依存している業務が多い。段階的なデジタル移行計画が必要になる。","i":"電子カルテや医療DXへの対応準備とファックス依存体制の見直し検討が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/death-medical-fax-foretold-again-2026a10009mx?src=rss","d":"2026-04-01"},{"t":"Even Low HIV Load Can Double Heart Disease Risk","s":"HIV感染者では低ウイルス量でも心疾患リスクが約2倍になることが判明。HIV感染と心血管疾患の関連性を示した研究結果。","m":"HIV患者の心血管リスク管理に関する知見。当院での該当患者は少ないが、循環器診療の参考情報として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/even-low-hiv-load-can-double-heart-disease-risk-2026a100098o?src=rss","d":"2026-04-01"},{"t":"HHS urges hospitals to align patient menus with updated dietary guidance","s":"米国保健福祉省が病院に対し、患者向けメニューを最新の食事ガイダンスに合わせるよう促している。入院患者の栄養管理の質向上を目指す取り組み。","m":"日本では診療報酬で栄養管理実施加算がある。海外動向として参考になるが直接的な経営影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/hhs-urges-hospitals-align-patient-menus-updated-dietary-guidance","d":"2026-04-01"},{"t":"Hartford HealthCare, K Health launch PatientGPT, new AI tool to help patients find health information","s":"ハートフォードヘルスケアとK Healthが患者向けAI健康情報ツール「PatientGPT」を開発・導入した。患者の医療情報アクセスを改善する取り組み。","m":"患者が事前に症状や疑問をAIで整理してから受診することで、診療効率が向上する可能性がある。導入コストと効果を評価したい。","i":"患者向けAIツール導入による診療効率化と患者満足度向上の検討が必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/hartford-healthcare-k-health-launch-patientgpt-new-ai-tool-help-patients","d":"2026-04-01"},{"t":"Ensemble partners with Cohere to build first RCM-native large language model","s":"EnsembleがCohereと提携し、診療報酬管理（RCM）専用の大規模言語モデルを構築。医療事務の自動化・効率化を目指す技術開発。","m":"レセプト作成や医療事務の自動化は人件費削減に直結。AI技術の医療事務分野への応用として注目すべき動向。","i":"AIによる医療事務効率化技術の動向を追跡し、導入可能性を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/ensemble-partners-cohere-build-first-rcm-native-large-language-model","d":"2026-04-01"},{"t":"Mental health provider platform Headway acquires team behind AI company Tezi","s":"メンタルヘルス事業者プラットフォームHeadwayがAI企業Teziのチームを買収した。メンタルヘルス分野でのAI活用が進展している。","m":"小児科での発達障害や心身症患者への対応でメンタルヘルス分野との連携機会がある。AI活用トレンドとして把握しておく。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/mental-health-provider-platform-headway-acquires-team-behind-ai-company-tezi","d":"2026-04-01"},{"t":"Employer telehealth company eMed raises $200M at $2B valuation","s":"企業向けテレヘルス企業eMedが20億ドル評価で2億ドルの資金調達を実施した。企業向け医療サービス市場の成長を示している。","m":"企業健診や産業医業務への展開可能性として参考になる。テレヘルス市場の成長トレンドを把握できる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/employer-telehealth-company-emed-raises-200m-2b-valuation","d":"2026-04-01"},{"t":"States pay Deloitte, others millions to comply with Trump law to cut Medicaid rolls","s":"各州がメディケイド登録者削減のためのトランプ政権法令への対応で、デロイトなどに数百万ドルの費用を支払っている。","m":"米国の医療保険制度変更だが、日本の医療制度には直接影響しない。海外動向として参考程度に留める。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/states-pay-deloitte-others-millions-comply-trump-law-cut-medicaid-rolls","d":"2026-04-01"},{"t":"CMS: This year's open enrollment brought fewer signups, higher premiums","s":"米国CMSの報告で、今年のオープン enrollment期間中の加入者数が減少し、保険料は上昇した。医療保険市場の動向に関する情報。","m":"米国の医療保険市場の動向であり、日本の医療制度とは異なる。参考情報として把握する程度。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/cms-years-open-enrollment-brought-fewer-signups-higher-premiums-fewer-silver-sign-ups","d":"2026-04-01"},{"t":"Nonprofit Electronic Frontier Foundation sues CMS over AI prior authorization demonstration","s":"非営利団体電子フロンティア財団がCMSのAI事前承認実証に対して訴訟を起こした。AIによる医療承認プロセスへの法的懸念が表面化。","m":"日本でもAI診断支援ツール導入時に同様の問題が生じる可能性がある。患者説明と同意プロセスの整備が重要。","i":"AI導入時のコンプライアンスと患者権利保護への配慮を強化する必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/regulatory/nonprofit-electronic-frontier-foundation-sues-cms-over-ai-prior-authorization","d":"2026-04-01"},{"t":"Nearly half of US hospital markets entirely controlled by 1 or 2 health systems: KFF","s":"KFFの調査によると、米国の病院市場のほぼ半数が1-2つの医療システムに完全に支配されている。医療市場の寡占化に関する報告。","m":"米国の病院市場集約化の動向。日本でも地域医療構想により病床統合が進む中、参考となる海外事例。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/nearly-half-us-hospital-markets-entirely-controlled-1-or-2-health-systems-kff","d":"2026-04-01"},{"t":"持田製薬、子宮内膜症の治療薬を海外に 韓化学大手と販売契約","s":"持田製薬が子宮内膜症治療薬を韓国化学大手と販売契約を締結し海外展開を図る。婦人科領域の治療薬の国際展開が進展。","m":"子宮内膜症は内科でも相談されることがある疾患。治療薬の動向として参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC3192U0R30C26A3000000/","d":"2026-04-01"},{"t":"帝人が過去最大950億円の赤字 26年3月期最終、医薬子会社で減損","s":"帝人が2026年3月期に過去最大の950億円の赤字を計上。医薬子会社での減損処理が主因。製薬業界の企業動向。","m":"大手製薬企業の業績悪化は薬価への影響や新薬開発への影響が考えられる。業界動向として把握しておく。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB316NO0R30C26A3000000/","d":"2026-04-01"},{"t":"DNP、横浜市立大とAI使ったX線画像分析 肺がん検診支援","s":"大日本印刷が横浜市立大学と連携してAIを活用したX線画像分析による肺がん検診支援システムを開発。医療AI技術の実用化が進展している。","m":"内科での胸部X線検査にAI支援技術が導入される可能性がある。診断精度向上と効率化が期待される。","i":"AI画像診断技術の動向を注視し、将来的な導入可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC302LS0Q6A330C2000000/","d":"2026-04-01"},{"t":"杏林製薬、仏製薬企業とライセンス契約 神経障害性の疼痛治療薬","s":"杏林製薬がフランスの製薬企業と神経障害性疼痛治療薬のライセンス契約を締結。新たな疼痛治療選択肢の開発が進展。","m":"糖尿病性神経障害による疼痛治療など、内科でも関連する領域の新薬開発動向として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC316X30R30C26A3000000/","d":"2026-04-01"},{"t":"田辺ファーマ、ワクチン製造の合弁解消 BIKEN財団に株式譲渡","s":"田辺ファーマがワクチン製造合弁事業を解消し、BIKEN財団に株式を譲渡する。製薬企業の事業再編による影響。","m":"ワクチン供給体制に変更があるかもしれないが、クリニックレベルでの直接的影響は限定的。小児科での予防接種業務への間接的影響を注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF312330R30C26A3000000/","d":"2026-04-01"},{"t":"JMDC、企業向け健康管理システムを刷新 派遣やパートも網羅","s":"JMDCが企業向け健康管理システムを刷新し、派遣社員やパート社員も対象範囲に含めるシステムを開発。企業の健康管理業務の効率化を図る。","m":"企業健診市場の動向として注目。産業医との連携や企業健診受託の参考情報となる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC3073B0Q6A330C2000000/","d":"2026-04-01"},{"t":"日本薬科大など3大学、「薬屋のひとりごと」と連携 漢方の魅力発信","s":"日本薬科大学など3大学が人気アニメ「薬屋のひとりごと」と連携し、漢方の魅力を発信する取り組みを開始。薬学教育の新しいアプローチ。","m":"漢方需要の拡大につながる可能性。消化器内科で漢方を扱う場合、患者の関心向上が期待できる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC257DL0V20C26A3000000/","d":"2026-04-01"},{"t":"DNP、インド工科大学に研究拠点 モビリティー・医療分野で連携","s":"大日本印刷がインド工科大学にモビリティー・医療分野の研究拠点を設立。国際的な医療技術開発連携が拡大している。","m":"医療分野の国際研究開発動向として参考程度。直接的なクリニック運営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2758M0X20C26A3000000/","d":"2026-04-01"},{"t":"明治HD系、米バイオ新興に出資 インフルワクチン開発後押し","s":"明治ホールディングス系企業が米バイオ新興企業に出資し、インフルエンザワクチン開発を支援する。新型ワクチン開発への投資。","m":"小児科と内科でインフルエンザワクチン接種を実施している。新しいワクチンの効果や接種スケジュール変更に備える必要がある。","i":"新しいインフルエンザワクチンの臨床応用時期と特徴を把握し導入準備が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC302UN0Q6A330C2000000/","d":"2026-04-01"},{"t":"「医療モール」3000施設突破、SCに並ぶ 美・食で待ち時間も商機に","s":"医療モールが3000施設を突破し、ショッピングセンター並みの規模に成長している。美容・飲食サービスとの融合で患者の待ち時間を商機に変える動き。","m":"複数専門科を持つ当法人にとって、医療モール展開は患者利便性向上と収益拡大の機会。立地戦略の見直しも必要かもしれない。","i":"医療モール参画や患者サービス向上による差別化戦略の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC185MS0Y6A310C2000000/","d":"2026-04-01"},{"t":"AI創薬の実力引き出せ データ生かし、有力候補を素早く","s":"AI創薬技術の活用により、データを効率的に活用して有力な新薬候補を迅速に発見する取り組みについて報じている。AI技術を活用した創薬プロセスの効率化が進んでいる。","m":"AI創薬の進歩は将来的に新薬開発期間の短縮と治療選択肢の拡大をもたらす。クリニックでの診療における新薬選択肢に間接的に影響する可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD208YD0Q6A220C2000000/","d":"2026-04-01"},{"t":"国立大学44病院、赤字脱却の見込み 26年度診療報酬改定で試算","s":"2026年度診療報酬改定により国立大学44病院が赤字脱却の見込みとなる試算が発表された。診療報酬改定の具体的な内容と影響度が注目される。","m":"診療報酬改定は直接的に収益に影響する。改定内容によっては算定体制の見直しが必要になる可能性がある。","i":"2026年度診療報酬改定の詳細内容を確認し、自院への影響を試算する必要がある。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA252JC0V20C26A3000000/","d":"2026-04-01"},{"t":"高度な小児医療、県またぎ集約方針 少子化受け心臓手術やがん治療","s":"少子化を受けて高度な小児医療（心臓手術やがん治療）を県をまたいで集約する方針が示された。小児専門医療の地域再編が進む。","m":"小児科を持つクリニックとして、高度医療との連携体制や紹介先の変化を把握しておく必要がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA278PD0X20C26A2000000/","d":"2026-04-01"},{"t":"大塚製薬、米バイオ企業を1100億円で買収 PTSDの新薬候補取得","s":"大塚製薬が米国のバイオテクノロジー企業を1100億円で買収し、PTSD治療薬の新薬候補を取得した。精神科領域での治療選択肢拡大に向けた企業戦略。","m":"PTSD治療薬の開発は精神科・心療内科での治療選択肢拡大に関連する。当クリニックでは直接的な診療科目ではないが、患者紹介時の参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC279AT0X20C26A3000000/","d":"2026-04-01"},{"t":"エーザイと米メルク 腎臓がん向けに抗がん剤を併用、日本で申請","s":"エーザイと米メルクが腎臓がん治療に向けて抗がん剤を併用する治療法について日本で承認申請を行った。がん治療における新たな併用療法の選択肢拡大。","m":"がん治療の進歩は患者の長期予後改善に寄与する。当クリニックでがん患者の併存疾患管理や専門医への紹介判断に参考となる情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273SQ0X20C26A3000000/","d":"2026-04-01"},{"t":"知識と行動が運命変える がんのリテラシー向上を","s":"がんに関する正しい知識の普及と行動変容の重要性について論じている。がんリテラシーの向上により患者の治療成果や予後改善が期待される。","m":"がんリテラシー向上は早期発見・適切な治療選択に繋がる。当クリニックでの健診や患者教育の際に、がん予防に関する情報提供の重要性を再認識。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD187QJ0Y6A310C2000000/","d":"2026-04-01"},{"t":"口の中が燃えるようにピリピリ 原因不明の「舌痛症」かも","s":"口の中が燃えるようにピリピリする原因不明の「舌痛症」について解説した記事。患者への説明や診断に役立つ情報。","m":"舌痛症は耳鼻咽喉科での診療対象。患者への説明や診断精度向上に活用できる情報。","i":"耳鼻咽喉科や内科での患者対応時の参考として活用を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD029AV0S6A200C2000000/","d":"2026-04-01"},{"t":"長崎市内3病院、緊急性ない救急車利用は7700円徴収 7月から","s":"長崎市内の3病院が7月から緊急性のない救急車利用に対して7700円を徴収する制度を開始する。不適切な救急車利用を抑制し、真に必要な患者への対応を優先する取り組み。","m":"救急医療の適正利用は全国的な課題。当クリニックでも夜間・休日対応時の患者教育や、適切な医療機関選択の指導が重要になる。","i":"救急医療適正利用の動向を注視し、患者への啓発強化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOJC2795L0X20C26A3000000/","d":"2026-04-01"},{"t":"「覚悟と工夫、時に諦めと希望も」 安藤忠雄さん、がんでも信念貫く","s":"建築家の安藤忠雄氏ががんを患いながらも信念を貫いて活動を続けている体験談。がんとの向き合い方や治療継続の重要性についての啓発的内容。","m":"著名人のがん体験談は患者の治療意欲向上に参考となる。当クリニックでがん患者への精神的サポートや治療継続の動機づけに活用できる事例。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD255TK0V20C26A2000000/","d":"2026-04-01"},{"t":"医療事故、報告件数の低迷続く 制度10年で警察頼みが増加","s":"医療事故調査制度が開始から10年経過したが、報告件数の低迷が続いている。医療安全の向上に向けた制度運用の課題が浮き彫りになっている。","m":"医療事故調査制度の動向は医療安全管理に直結する。当クリニックでもインシデント報告体制の強化と安全管理の継続的改善が必要。","i":"医療安全管理体制の見直しと事故報告の適切な運用を確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-04-01"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を高めるためには「痛気持ちいい」レベルより強めに伸ばすことが重要という運動療法に関する情報。","m":"患者への運動指導やリハビリテーション指導時の参考情報として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-04-01"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクと関連があるという食事習慣と健康に関する研究情報。","m":"糖尿病外来や生活習慣病指導での患者教育に活用できる予防医学的な情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-04-01"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法整備と精密検査受診率向上が急務とされている。企業健診におけるがん検診体制の充実が求められている。","m":"内科で実施可能ながん検診項目があり、職域健診の法整備により受託機会が増える可能性がある。","i":"職域がん検診の動向を注視し、企業健診受託の機会拡大を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-04-01"},{"t":"不調の多くは過剰から 頑張り過ぎず、体の声に耳傾けて","s":"体調不良の多くは過剰な活動から生じるため、頑張り過ぎず体の声に耳を傾けることの重要性を説いた健康管理に関する記事。","m":"患者への生活指導や健康管理アドバイス時の参考として活用できる情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD258CZ0V20C26A2000000/","d":"2026-04-01"},{"t":"患者の血管ソックリ再現 東北大発新興、カテーテル治療の精度向上へ","s":"東北大発のベンチャー企業が、患者の血管を精密に再現する技術を開発。カテーテル治療の精度向上と安全性向上に貢献する技術。","m":"循環器診療の技術向上に関する情報。当院の循環器内科診療の将来的な治療選択肢として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC1684H0W6A310C2000000/","d":"2026-04-01"},{"t":"Is this social media's tobacco moment?","s":"ソーシャルメディアが健康に与える影響について、タバコ産業との類似性の観点から論じている。メタやグーグルに対する法的判断に関する内容。","m":"ソーシャルメディアの健康影響は精神的健康に関連する。特に小児科診療において、デジタルデバイス使用と健康の関係性への注意が必要。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/5a7324b8-d553-46b2-8c6d-26c2a73a43dd","d":"2026-04-01"},{"t":"Whoop hits $10bn valuation as health tracking takes off","s":"ウェアラブルデバイスメーカーのフープが100億ドルの企業価値で5.75億ドルを調達。健康トラッキング技術の普及により株式公開を検討中。","m":"ウェアラブル健康管理デバイスの普及は、患者の健康意識向上や予防医療への関心増加につながる可能性がある。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/0a1e069c-adfd-4ea7-9472-0ff64bb63e25","d":"2026-04-01"},{"t":"Eli Lilly signs $2bn deal for AI drug development with Hong Kong biotech","s":"イーライリリーが香港のバイオテック企業とAI創薬開発で20億ドルの契約を締結。世界の製薬会社が中国での新薬開発を積極的に進めている。","m":"イーライリリーはGLP-1薬メーカーであり、当院の糖尿病診療に直接関連。AI創薬による新治療薬開発は注目すべき。","i":"新薬開発動向を注視し、糖尿病治療薬など関連分野での治療選択肢拡大の可能性を把握する。","src":"FT","p":"要注視","u":"https://www.ft.com/content/4efaf8cd-d415-46bb-8fb9-367e4eb3a781","d":"2026-04-01"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-31"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-31"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-31"},{"t":"Lithium Beyond Bipolar: A New Role in Brain Health","s":"双極性障害治療薬として知られるリチウムが、双極性障害以外の脳の健康維持において新たな役割を果たす可能性についての研究報告。","m":"直接的な診療科への影響は限定的。内科での精神科薬剤の知識として参考程度。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/lithium-beyond-bipolar-new-role-brain-health-2026a10009nk?src=rss","d":"2026-03-31"},{"t":"Anesthetic Risk Linked to Venezuelan Maternal Lineage","s":"ベネズエラ系母系血統において麻酔リスクが高まる可能性が示された。特定の遺伝的背景と麻酔合併症との関連性に関する研究報告。","m":"外科処置時の麻酔管理において、患者の遺伝的背景を考慮する必要性を示唆。消化器外科での参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/anesthetic-risk-linked-venezuelan-maternal-lineage-2026a10009ni?src=rss","d":"2026-03-31"},{"t":"The Death of the Medical Fax Is Foretold — Again","s":"医療分野でのファックス使用終了について再度議論されている。医療機関間の情報伝達手段のデジタル化が進展する見込み。","m":"他医療機関や薬局との連携方法の変更が必要。電子カルテシステムとの連携強化が求められる。","i":"ファックスに依存した業務プロセスの見直しとデジタル化対応を準備する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/death-medical-fax-foretold-again-2026a10009mx?src=rss","d":"2026-03-31"},{"t":"Even Low HIV Load Can Double Heart Disease Risk","s":"HIV感染者では低ウイルス量でも心疾患リスクが2倍に上昇することが判明。従来考えられていたよりも軽度の感染状態でも循環器合併症に注意が必要。","m":"循環器内科での診療において、HIV感染歴のある患者の心血管リスク評価がより重要になる。定期的な心機能チェックが必要。","i":"HIV患者の循環器スクリーニング強化と、内科での継続的な心血管リスク評価体制を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/even-low-hiv-load-can-double-heart-disease-risk-2026a100098o?src=rss","d":"2026-03-31"},{"t":"Exercise, CVD Risk Control: Heart Benefit, No Brain Gain?","s":"運動と心血管疾患リスクコントロールに関する研究で、心臓への利益は確認されたが脳への利益は見られなかったという結果が報告された。","m":"循環器内科での運動療法指導の根拠として参考。糖尿病患者への運動指導でも活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/exercise-cvd-risk-control-good-heart-no-brain-gain-2026a10009l6?src=rss","d":"2026-03-31"},{"t":"The Thyroid Cancer Dilemma: Doing More Isn’t Always Better","s":"甲状腺がん診療において過剰な治療介入が必ずしも良い結果をもたらさないという考え方が示された。適切な治療選択の重要性を強調。","m":"内科での甲状腺疾患管理において、過剰な精密検査や治療を避け、適切なタイミングでの専門医紹介が重要。","i":"甲状腺疾患患者の紹介基準を見直し、過剰診療回避のための診療連携体制を構築する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/thyroid-cancer-dilemma-doing-more-isnt-always-doing-better-2026a10008zs?src=rss","d":"2026-03-31"},{"t":"Shared Decision-Making in Sleep Apnea and Obesity","s":"睡眠時無呼吸症候群と肥満の管理において、患者との共同意思決定の重要性が強調された。個別化された治療選択肢の提案が鍵。","m":"内科での生活習慣病管理において、患者の価値観や希望を取り入れた治療選択が重要。GLP-1薬使用時の意思決定にも応用可能。","i":"睡眠時無呼吸と肥満患者に対する診療方針で、患者参加型の治療選択プロセスを導入する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/obstructive-sleep-apnea-obesity-glp1s-shared-decision-making-2026a100055n?src=rss","d":"2026-03-31"},{"t":"Meningococcal Disease Has Been Increasing Since 2021","s":"2021年以降、髄膜炎菌感染症の発生率が増加傾向にある。成人を含む幅広い年齢層での警戒が必要な状況。","m":"内科・小児科での発熱患者診療において、髄膜炎菌感染症の鑑別診断と迅速な専門医療機関への紹介体制が重要。","i":"発熱患者の診療で髄膜炎菌感染症の可能性を考慮し、早期診断・迅速対応体制を確認する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/meningococcal-disease-has-been-increasing-2021-adults-and-2026a10008zq?src=rss","d":"2026-03-31"},{"t":"Contemporary Diagnosis and Treatment of AR","s":"大動脈弁閉鎖不全症の現代的な診断と治療法についての最新情報。診断技術の進歩と治療選択肢の拡大が紹介されている。","m":"循環器内科での心弁膜疾患診療において、最新の診断・治療指針を把握しておく必要がある。専門医紹介タイミングの判断に有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/contemporary-diagnosis-and-treatment-aortic-regurgitation-2026a10007jy?src=rss","d":"2026-03-31"},{"t":"Dementia Risk May Triple With Type 1 Diabetes","s":"1型糖尿病患者では認知症リスクが3倍に上昇する可能性が示された。長期的な血糖管理と脳機能保護の重要性が浮き彫りになった。","m":"糖尿病内科での1型糖尿病管理において、血糖コントロールだけでなく認知機能の長期的なモニタリングが重要になる。","i":"1型糖尿病患者の長期フォローにおいて、認知機能評価を定期的に実施する体制を整備する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dementia-risk-may-triple-type-1-diabetes-2026a10009ek?src=rss","d":"2026-03-31"},{"t":"CMS: This year's open enrollment brought fewer signups, higher premiums","s":"米国の今年度のオープン登録では、登録者数減少と保険料上昇が見られた。医療保険市場の動向に関する米国の状況報告。","m":"米国の医療保険制度の動向であり、日本のクリニック経営への直接的影響は限定的。医療制度の国際比較の参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/cms-years-open-enrollment-brought-fewer-signups-higher-premiums-fewer-silver-sign-ups","d":"2026-03-31"},{"t":"Nearly half of US hospital markets entirely controlled by 1 or 2 health systems: KFF","s":"米国の病院市場の約半分が1〜2の医療システムによって完全に支配されているとの調査結果。医療機関の寡占化が進んでいる状況。","m":"米国の医療機関統合の動向であり、日本の医療法人経営への直接的影響は少ない。業界構造変化の参考情報として有用。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/nearly-half-us-hospital-markets-entirely-controlled-1-or-2-health-systems-kff","d":"2026-03-31"},{"t":"Oral GLP-1s, COVID preventatives: 3 more drugs in the pipeline, Optum says payers should watch","s":"オプタム社が保険会社が注視すべき薬剤として、経口型GLP-1薬、新型コロナ予防薬など3つの新薬を挙げた。これらの薬剤が市場に与える影響が大きいと予測される。","m":"糖尿病内科として経口GLP-1薬の登場は治療選択肢拡大に直結。患者ニーズと薬価動向を監視。","i":"GLP-1薬市場の動向を注視し、糖尿病診療への影響を評価する必要がある。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/oral-glp-1s-covid-preventatives-3-more-drugs-pipeline-optum-says-payers-should-watch","d":"2026-03-31"},{"t":"Advocate Health to launch ‘nation’s largest’ hospital drone delivery program in Zipline partnership","s":"米国のAdvocate Healthが全米最大規模の病院ドローン配送プログラムをZiplineと提携して開始する。医療物流の効率化を図る取り組み。","m":"将来的に日本でも医療物流のドローン活用が普及する可能性がある。現時点では海外事例として参考程度。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/advocate-health-launch-nations-largest-hospital-drone-delivery-program-zipline","d":"2026-03-31"},{"t":"Op-ed: Empathy meets efficiency—how the responsible use of AI can transform Medicare","s":"メディケアにおけるAIの責任ある活用が、共感と効率性を両立させることで医療制度を変革する可能性についての論説。","m":"将来的な医療DX推進の参考情報。AI活用による診療効率化の検討材料として有用。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/op-ed-empathy-meets-efficiency-how-responsible-use-ai-can-transform","d":"2026-03-31"},{"t":"SCAN taps biopharma, CMS vet Aman Bhandari as its first chief AI officer","s":"米国の医療保険会社SCANが、製薬業界とCMS出身の専門家Aman Bhandari氏を初代AI責任者として採用したと発表。","m":"医療分野でのAI専門人材の重要性を示す事例。将来的なAI導入時の人材確保の参考。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/scan-taps-aman-bhandari-its-first-chief-ai-officer","d":"2026-03-31"},{"t":"調剤業務の外部委託、対象範囲で論戦　厚労省「県またぎ」提示","s":"調剤業務の外部委託について、厚労省が県をまたいだ委託を提示し、対象範囲について議論が続いている。調剤業務の効率化に向けた制度変更が検討中。","m":"院内処方を行う場合の調剤業務効率化に関連。制度変更による影響は限定的だが動向は把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA306WH0Q6A330C2000000/","d":"2026-03-31"},{"t":"高度な小児医療、県またぎ集約方針　少子化受け心臓手術やがん治療","s":"少子化を受けて、高度な小児医療（心臓手術やがん治療）を県をまたいで集約化する方針が示された。専門性の高い医療の集約が進む。","m":"小児科を運営するクリニックとして、専門医療の集約化による患者紹介体制への影響を注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA278PD0X20C26A2000000/","d":"2026-03-31"},{"t":"日本薬科大など3大学、「薬屋のひとりごと」と連携 漢方の魅力発信","s":"日本薬科大学など3大学が人気アニメ「薬屋のひとりごと」と連携し、漢方薬の魅力を発信する取り組みを開始。薬学教育と一般啓発の新しいアプローチ。","m":"漢方薬への関心が高まれば、内科診療での漢方処方需要が増加する可能性がある。患者の漢方への理解促進につながるかもしれない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC257DL0V20C26A3000000/","d":"2026-03-31"},{"t":"DNP、インド工科大学に研究拠点 モビリティー・医療分野で連携","s":"大日本印刷がインド工科大学と研究拠点を設立し、モビリティーと医療分野で連携する。海外との医療技術開発協力が拡大している。","m":"医療技術の国際的な開発動向として参考。クリニック経営への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2758M0X20C26A3000000/","d":"2026-03-31"},{"t":"明治HD系、米バイオ新興に出資 インフルワクチン開発後押し","s":"明治ホールディングス系列が米国のバイオテック企業に出資し、インフルエンザワクチン開発を支援すると発表。新たなワクチン技術の開発が期待される。","m":"将来的な新型インフルエンザワクチンの供給や技術動向として参考。小児科での予防接種業務に関連。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC302UN0Q6A330C2000000/","d":"2026-03-31"},{"t":"「医療モール」3000施設突破、SCに並ぶ 美・食で待ち時間も商機に","s":"医療モールが全国で3000施設を突破し、ショッピングセンター並みの規模に成長。美容や飲食サービスとの複合化により待ち時間も商機として活用されている。","m":"クリニック経営の新しいモデルとして注目。複数診療科を持つ強みを活かした医療モール展開の可能性を検討。","i":"競合環境の変化を分析し、患者サービス向上と複合化戦略を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC185MS0Y6A310C2000000/","d":"2026-03-31"},{"t":"AI創薬の実力引き出せ データ生かし、有力候補を素早く","s":"人工知能を活用した創薬技術の発展により、データを活用して有望な薬剤候補を迅速に特定する取り組みが進んでいる。AI創薬の実用化が加速している。","m":"AI創薬の進展により新薬の市場投入が早まれば、当院での治療選択肢拡大に繋がる可能性がある。特に糖尿病・循環器分野での新薬動向を追跡すべき。","i":"将来的に新薬開発の迅速化により治療選択肢が増加する可能性を注視する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD208YD0Q6A220C2000000/","d":"2026-03-31"},{"t":"国立大学44病院、赤字脱却の見込み 26年度診療報酬改定で試算","s":"2026年度診療報酬改定により、国立大学44病院が赤字から脱却する見込みとなった。診療報酬改定が病院経営に大きな改善効果をもたらすことが示された。","m":"診療報酬改定は民間クリニックにも直接的に影響。改定内容の詳細把握が経営判断に重要。","i":"診療報酬改定の影響を詳細に分析し、クリニック経営への影響度を評価する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA252JC0V20C26A3000000/","d":"2026-03-31"},{"t":"大塚製薬、米バイオ企業を1100億円で買収 PTSDの新薬候補取得","s":"大塚製薬が米国のバイオテクノロジー企業を1100億円で買収し、PTSD治療薬の候補物質を取得した。精神疾患治療薬分野への投資が活発化している。","m":"PTSD治療薬は当院の診療科目とは直接関係しないが、製薬業界の投資動向として参考情報。大塚製薬の事業拡大戦略の一環と考えられる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC279AT0X20C26A3000000/","d":"2026-03-31"},{"t":"エーザイと米メルク 腎臓がん向けに抗がん剤を併用、日本で申請","s":"エーザイと米メルクが腎臓がん治療に向けて抗がん剤の併用療法を日本で承認申請した。がん治療における併用療法の開発が進んでいる。","m":"腎臓がん治療は当院の診療範囲外だが、併用療法の承認動向は製薬業界の治療戦略として参考になる。消化器外科での連携病院への紹介時の知識として有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273SQ0X20C26A3000000/","d":"2026-03-31"},{"t":"塩野義製薬、3000億円借り入れ エイズ治療薬の英社への追加出資で","s":"塩野義製薬がエイズ治療薬の英企業への追加出資のため3000億円を借り入れ。製薬業界の大型投資が続いている。","m":"製薬業界の投資動向として参考。エイズ治療はクリニック診療範囲外のため直接的影響なし。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2762M0X20C26A3000000/","d":"2026-03-31"},{"t":"GSKやアストラゼネカ、ぜんそくにバイオ薬 効果長持ち・価格10倍超","s":"GSKとアストラゼネカが効果が長持ちするぜんそく用バイオ薬を開発。従来薬の10倍以上の価格だが効果持続期間が長いのが特徴。","m":"内科診療でぜんそく患者を診察する際の治療選択肢が広がる。高価格だが効果的な新薬は患者の治療満足度向上につながる可能性がある。","i":"新しいぜんそく治療薬の承認状況と保険適用を注視し、処方選択肢の拡大を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC09A3G0Z00C25A6000000/","d":"2026-03-31"},{"t":"調剤報酬改定で「医療モール薬局」苦難 収益力低下、M&A加速へ","s":"調剤報酬改定により医療モール内薬局の収益が低下し、経営難からM&A加速が予想される。薬局業界の再編が進む可能性がある。","m":"調剤報酬改定は当院と連携する薬局の経営に直接影響する。薬局の経営状況変化は患者の利便性や当院の診療にも波及する可能性がある。","i":"隣接薬局との連携体制への影響を評価し、必要に応じて薬局との関係強化を検討する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOFC051Z00V00C26A3000000/","d":"2026-03-31"},{"t":"プラ単一素材に対応可能な医薬品の錠剤包装技術 CKD､リサイクル容易","s":"CKDが医薬品の錠剤包装において、リサイクルしやすいプラスチック単一素材に対応可能な技術を開発。環境負荷軽減と持続可能な包装材料への取り組み。","m":"医薬品包装の環境対応技術。現在のクリニック運営への直接影響は限定的だが、将来的な医薬品コスト・調達に関わる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD2743G0X20C26A3000000/","d":"2026-03-31"},{"t":"エーザイ、肺がん治療薬を欧州で承認申請","s":"エーザイが肺がん治療薬の欧州での承認申請を行った。がん治療薬の開発・承認が進んでいる。","m":"がん治療薬の進歩は消化器がん患者の治療選択肢拡大に関連。専門医療機関との連携強化要検討。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273FW0X20C26A3000000/","d":"2026-03-31"},{"t":"小野薬品、希少がん治療薬の承認申請 既存薬使用後の患者対象","s":"小野薬品が希少がん治療薬の承認申請を行った。既存薬使用後の患者を対象とした新たな治療選択肢が開発されている。","m":"希少がん治療の進歩。消化器がん診療での早期発見・適切な紹介体制の重要性が増す。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2646K0W6A320C2000000/","d":"2026-03-31"},{"t":"がん治療向け放射性元素「アスタチン」 住友重機械、27年製造開始へ","s":"住友重機械工業ががん治療向け放射性元素「アスタチン」の製造を2027年に開始予定。新しいがん治療技術の実用化が進む。","m":"放射線治療技術の進歩。がん診療の高度化により、早期発見・適切紹介の重要性がより高まる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG16B430W6A110C2000000/","d":"2026-03-31"},{"t":"メルク、がん治療薬新興を1兆円で買収 主力薬特許切れで連続M&A","s":"メルクが主力薬の特許切れに備え、がん治療薬新興企業を1兆円で買収。製薬業界の大型M&Aが続いている。","m":"製薬業界の統合による新薬開発力強化。将来的な治療薬の選択肢拡大につながる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN25C390V20C26A3000000/","d":"2026-03-31"},{"t":"武田薬品、27年3月期に構造再編費1500億円 特許切れや新薬に備え","s":"武田薬品が2027年3月期に1500億円の構造再編費を計上予定。主力薬の特許切れと新薬開発に向けた組織改革を実施する方針。","m":"大手製薬会社の構造改革は薬価や医薬品供給に影響。当クリニックで使用する武田薬品の医薬品への影響を確認する必要。","i":"武田薬品の薬価変動や供給体制変化を注視し、処方薬の切り替え準備を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC258FO0V20C26A3000000/","d":"2026-03-31"},{"t":"口の中が燃えるようにピリピリ 原因不明の「舌痛症」かも","s":"口の中がピリピリと燃えるような痛みを感じる原因不明の「舌痛症」について解説。診断や治療方法に関する情報提供記事。","m":"耳鼻咽喉科で診察する可能性のある症状。患者からの相談に備えて基礎知識を共有し、必要に応じて専門医連携を準備。","i":"舌痛症の症状を訴える患者への適切な対応方法と専門医への紹介体制を整備する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD029AV0S6A200C2000000/","d":"2026-03-31"},{"t":"長崎市内3病院、緊急性ない救急車利用は7700円徴収 7月から","s":"長崎市内の3病院が緊急性のない救急車利用に対して7700円の徴収を7月から開始する。救急医療の適正利用を促進する取り組みが広がっている。","m":"救急車の適正利用は全国的な課題。当院も時間外受診の増加に悩んでおり、患者教育や緊急度トリアージの参考になる取り組みである。","i":"当院での救急対応体制と患者への啓発活動について検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOJC2795L0X20C26A3000000/","d":"2026-03-31"},{"t":"医療事故、報告件数の低迷続く 制度10年で警察頼みが増加","s":"医療事故調査制度開始から10年経過したが、報告件数は低迷が続いている。警察への届出に依存する傾向が増加しており、制度の課題が浮き彫りになっている。","m":"医療事故調査制度は全医療機関に関わる重要な制度。当院でも医療安全管理者の配置や事故時の対応手順を改めて確認する必要がある。","i":"院内の医療安全管理体制の見直しと事故報告制度への対応方針を確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-03-31"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を高めるため「痛気持ちいい」程度よりも強めに伸ばすことが有効とする健康情報。運動指導の参考となる内容。","m":"生活習慣病指導や患者への運動指導時の参考情報。糖尿病・循環器疾患患者への生活指導に活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-03-31"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクの増加と関連するという研究結果。食事タイミングが骨の健康に与える影響について報告。","m":"生活習慣病指導に活用できる知見。特に糖尿病患者や高齢患者への食事指導で、食事時間の重要性も併せて指導可能。","i":"糖尿病や高齢患者への栄養指導に食事タイミングの重要性を組み込む。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-03-31"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法制度整備について検討されており、精密検査の受診率向上が急務とされている。法整備により職域検診の義務化や基準変更の可能性がある。","m":"内科での生活習慣病管理と連携したがん検診体制の構築機会。法制化により企業からの検診依頼が増加する可能性。","i":"職域検診対応の準備と、がん検診体制の見直しを検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-03-31"},{"t":"Eli Lilly signs $2bn deal for AI drug development with Hong Kong biotech","s":"米イーライリリーが香港のバイオテクノロジー企業と20億ドルのAI創薬開発契約を締結した。世界の製薬大手が中国での新薬開発を積極的に進めている。","m":"海外製薬企業のAI創薬投資動向として参考情報。将来的に新薬開発の加速により治療選択肢が増える可能性がある。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/4efaf8cd-d415-46bb-8fb9-367e4eb3a781","d":"2026-03-31"},{"t":"Ministers explore triggering break clause in Palantir’s NHS contract","s":"英国政府がパランティア社とのNHSデータシステム契約の解約条項発動を検討。論議を呼ぶ米国企業のNHS参入に対する圧力が高まっている状況。","m":"海外の医療データシステムに関する動向。日本の医療DXや電子カルテシステム選定の参考として、データ管理会社選定の重要性を示唆。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/2d2b1af1-edea-4fd0-a081-3811e34bc52e","d":"2026-03-31"},{"t":"Why recruiters are making interviews ‘AI-free zones’","s":"採用担当者が面接を「AI禁止区域」にする動きが広がっている。AIを使った求職応募が増加する中、雇用主は対面式や実技評価に回帰している。","m":"採用プロセスでのAI利用への対応策で、クリニックスタッフ採用時の参考となる。面接手法の見直しが必要かもしれない。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/bcc3becc-859e-4628-b6a7-b4788e6f20a6","d":"2026-03-31"},{"t":"診療報酬改定","s":"厚生労働省の診療報酬改定に関する公式情報。クリニック経営に直接的な影響を与える制度変更の最新情報が含まれている可能性が高い。","m":"診療報酬改定はクリニック経営の根幹に関わる。算定要件の変更や新設項目への対応が直接収益に影響する。","i":"診療報酬改定の詳細を確認し、算定要件や点数変更への対応準備を開始する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-30"},{"t":"消費税と診療報酬について","s":"厚生労働省による消費税と診療報酬の関係に関する公式情報。消費税率変更時の診療報酬への影響や補填措置について記載されている可能性がある。","m":"消費税の取り扱いはクリニック経営における重要な会計事項。診療報酬での補填状況を正確に把握する必要がある。","i":"消費税と診療報酬の関係を確認し、税務処理や収益計算への影響を評価する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-30"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。蚊媒介感染症として注意喚起されている疾患の概要。","m":"海外渡航歴のある患者での鑑別診断として認識。小児科では特に妊婦への影響について留意が必要。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-30"},{"t":"The Thyroid Cancer Dilemma: Doing More Isn’t Always Better","s":"甲状腺癌の治療において、過度な治療が必ずしも良い結果をもたらすわけではないという治療方針のジレンマについて議論。","m":"専門外の分野だが、過度な医療介入に対する慎重なアプローチは、当院の内科診療でも参考になる考え方。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/thyroid-cancer-dilemma-doing-more-isnt-always-doing-better-2026a10008zs?src=rss","d":"2026-03-30"},{"t":"Meningococcal Disease Has Been Increasing Since 2021","s":"2021年以降、髄膜炎菌感染症の発症が増加傾向にある。成人・小児ともに感染者数の増加が報告されている。","m":"小児科を有する当院にとって、髄膜炎菌感染症の増加は重要な感染症動向。早期診断と適切な対応が求められる。","i":"小児科診療で髄膜炎菌感染症の診断・対応体制を再確認し、必要に応じて研修を実施する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/meningococcal-disease-has-been-increasing-2021-adults-and-2026a10008zq?src=rss","d":"2026-03-30"},{"t":"Contemporary Diagnosis and Treatment of AR","s":"大動脈弁閉鎖不全症の現代的な診断と治療方法について解説。最新の診断技術と治療選択肢が紹介されている。","m":"循環器内科の専門領域。当院での循環器診療の参考情報として、最新の診断・治療指針を把握しておく価値がある。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/contemporary-diagnosis-and-treatment-aortic-regurgitation-2026a10007jy?src=rss","d":"2026-03-30"},{"t":"Dementia Risk May Triple With Type 1 Diabetes","s":"1型糖尿病患者において認知症リスクが3倍に増加する可能性が示された。糖尿病管理と認知症予防の関連性が注目される。","m":"糖尿病専門の内科を有する当院にとって極めて重要な情報。1型糖尿病患者の長期管理方針の見直しが必要。","i":"糖尿病診療で認知機能評価を強化し、患者・家族への認知症リスク説明を充実させる。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dementia-risk-may-triple-type-1-diabetes-2026a10009ek?src=rss","d":"2026-03-30"},{"t":"Biocomputer From Human Neurons Plays Doom, Raises Ethics","s":"人間のニューロンを使用したバイオコンピューターがゲームをプレイすることに成功し、倫理的な課題が提起されている。医療技術の新たな可能性を示している。","m":"基礎研究段階の技術で直接的な臨床応用は遠い。将来的な医療AI発展の基盤技術として注目。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/biocomputer-human-neurons-plays-doom-raises-ethics-2026a10009e0?src=rss","d":"2026-03-30"},{"t":"Physicians Must Lead AI Integration in Medicine","s":"医師が医療分野でのAI統合をリードする必要性が強調されている。医療現場でのAI導入において医師の主導的役割が重要とされている。","m":"診療業務の効率化と質向上のためのAI活用が必須となる時代。電子カルテやAI問診導入の判断材料。","i":"AI導入計画の策定と医師の研修体制構築を検討する必要がある。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/physician-ai-adoption-surging-we-must-lead-its-integration-2026a100095u?src=rss","d":"2026-03-30"},{"t":"S1 Episode 2: Can Early Genetic Testing Change ATTR-CM Outcomes?","s":"ATTR心筋症における早期遺伝子検査が治療成績に与える影響について議論するポッドキャスト番組。","m":"専門性の高い循環器領域の話題。当院の循環器診療での知識向上には有用だが、直接的な診療への影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep2-2026a10006ha?src=rss","d":"2026-03-30"},{"t":"S1 Episode 1: Rethinking Rhythm Control in ATTR-CM","s":"ATTR心筋症における不整脈治療の新しいアプローチについて議論するポッドキャスト番組。","m":"高度専門領域の循環器疾患に関する内容。当院の循環器診療レベルでは直接的な適用は困難だが、知識として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep1-2026a10006h9?src=rss","d":"2026-03-30"},{"t":"Preventing Deficiencies After Bariatric Surgery","s":"肥満手術後の栄養欠乏症予防について解説した記事。手術後の患者に適切な栄養管理と継続的なモニタリングが重要であることを説明している。","m":"消化器外科での肥満手術後患者の栄養管理に参考となる情報。継続的な栄養指導体制の検討材料。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/preventing-deficiencies-after-bariatric-surgery-2026a100098g?src=rss","d":"2026-03-30"},{"t":"Higher Meat Intake, Lower Dementia Risk — But Only in APOE4","s":"APOE4遺伝子保有者において、肉類の摂取量増加が認知症リスク低下と関連するという研究結果。遺伝的背景により栄養指導のアプローチが異なる可能性を示唆している。","m":"内科診療での認知症予防指導や栄養相談において、個別化医療の視点を取り入れる際の参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/higher-meat-intake-lower-dementia-risk-only-apoe4-carriers-2026a100098j?src=rss","d":"2026-03-30"},{"t":"Oral GLP-1s, COVID preventatives: 3 more drugs in the pipeline, Optum says payers should watch","s":"経口GLP-1薬、COVID予防薬など新薬パイプラインについてOptumが保険者に注意喚起。糖尿病診療を行うクリニックにとって治療選択肢の拡大を意味する。","m":"内科で糖尿病診療を行うクリニックとして、新しいGLP-1製剤の登場は治療選択肢の拡大につながる。患者ニーズや処方動向の変化に対応が必要。","i":"GLP-1経口薬の承認動向を注視し、糖尿病患者への治療選択肢拡大に備える。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/oral-glp-1s-covid-preventatives-3-more-drugs-pipeline-optum-says-payers-should-watch","d":"2026-03-30"},{"t":"Op-ed: Empathy meets efficiency—how the responsible use of AI can transform Medicare","s":"メディケアにおけるAIの責任ある活用により、共感と効率性を両立させることができるとの論考。医療制度でのAI活用の可能性を論じている。","m":"米国の事例だが医療AIの活用方向性として参考になる。日本の医療制度への応用可能性を検討する価値。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/op-ed-empathy-meets-efficiency-how-responsible-use-ai-can-transform","d":"2026-03-30"},{"t":"SCAN taps biopharma, CMS vet Aman Bhandari as its first chief AI officer","s":"SCAN社がバイオファーマ・CMS出身のアマン・バンダリ氏を初のチーフAI責任者に任命した。医療保険会社でのAI責任者設置の動き。","m":"米国での医療AI責任者設置トレンド。日本でも医療機関でのAI統括責任者の必要性が高まる可能性。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/scan-taps-aman-bhandari-its-first-chief-ai-officer","d":"2026-03-30"},{"t":"Infosys to acquire Optimum Healthcare IT in $465M deal","s":"インフォシス社が医療ITコンサルティング会社のOptimum Healthcare ITを4億6500万ドルで買収すると発表。医療IT分野の統合が進んでいる。","m":"医療IT分野の企業統合動向。電子カルテやシステム導入時のベンダー選定に影響する可能性。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/infosys-acquire-optimum-healthcare-it-465m-deal","d":"2026-03-30"},{"t":"New therapy animal program aims to support 100K patients, providers","s":"10万人の患者と医療従事者を支援することを目的とした新しいセラピー動物プログラムが開始された。医療現場での動物療法の拡大。","m":"小児科や高齢者医療での導入可能性。患者満足度向上や治療効果向上の手段として検討余地あり。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/new-therapy-animal-program-aims-support-100k-patients-providers","d":"2026-03-30"},{"t":"Gen Z nurses prioritize schedule flexibility, need more manager interactions to avoid turnover","s":"Z世代の看護師は勤務スケジュールの柔軟性を重視し、離職防止には管理者とのコミュニケーション増加が必要という調査結果。世代別の労働価値観の変化を示している。","m":"クリニックでの若手スタッフ採用・定着戦略において、世代別のニーズを理解する参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/gen-z-nurses-prioritize-schedule-flexibility-need-more-manager-interactions-avoid","d":"2026-03-30"},{"t":"ダイハツ、介護の送迎支援サービス強化　昼の「遊休車両」を活用","s":"ダイハツが昼間の遊休車両を活用して介護の送迎支援サービスを強化している。高齢者の移動支援における民間企業の取り組み。","m":"高齢患者の通院支援サービスとして連携可能性あり。アクセス改善により患者数増加の機会となる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF127BM0S6A310C2000000/","d":"2026-03-30"},{"t":"「医療モール」3000施設突破、SCに並ぶ　美・食で待ち時間も商機に","s":"医療モールが3000施設を突破し、ショッピングセンター並みの規模となった。美容や飲食施設と組み合わせて待ち時間を商機とする動き。","m":"競合他院との差別化や患者満足度向上の手段として重要。立地戦略や施設運営方針の見直し材料。","i":"医療モール出店や既存施設でのサービス拡充について検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC185MS0Y6A310C2000000/","d":"2026-03-30"},{"t":"高度な小児医療、県またぎ集約方針　少子化受け心臓手術やがん治療","s":"少子化を受けて高度な小児医療（心臓手術やがん治療）を県をまたいで集約する方針が示された。小児科を運営するクリニックの診療体制に影響する可能性がある。","m":"小児科を運営するクリニックとして、高度医療機関への紹介体制や役割分担の変化に対応が必要。患者の流れに影響する可能性がある。","i":"小児科の専門診療体制と他院との連携体制を見直し、患者紹介ルートを確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA278PD0X20C26A2000000/","d":"2026-03-30"},{"t":"医療事故、報告件数の低迷続く　制度10年で警察頼みが増加","s":"医療事故の報告制度開始から10年が経過したが、報告件数の低迷が続いている。医療機関による内部報告よりも警察への通報に依存する傾向が強まっているとみられる。","m":"医療事故報告制度への適切な対応は法的リスク管理の観点で重要。報告体制の整備と職員教育が必要。","i":"医療安全管理体制の見直しと事故報告制度への対応強化が必要","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-03-30"},{"t":"調剤報酬改定で「医療モール薬局」苦難　収益力低下、M&A加速へ","s":"調剤報酬改定により医療モール内薬局の収益性が悪化している。この影響で薬局業界のM&A活動が加速する見込み。","m":"医療モール内薬局の経営悪化は患者利便性に影響する可能性。薬局との連携体制や紹介関係の見直しが必要。","i":"医療モール運営や薬局との連携戦略の見直しを検討する","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOFC051Z00V00C26A3000000/","d":"2026-03-30"},{"t":"AI創薬の実力引き出せ データ生かし、有力候補を素早く","s":"AI技術を活用した創薬開発において、データの効果的な活用により有望な薬剤候補をより迅速に特定する取り組みが進んでいる。","m":"AI創薬の進展は将来的に新薬の開発スピードと治療選択肢の拡大につながる可能性。業界トレンドとして注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD208YD0Q6A220C2000000/","d":"2026-03-30"},{"t":"国立大学44病院、赤字脱却の見込み 26年度診療報酬改定で試算","s":"2026年度診療報酬改定により国立大学44病院が赤字脱却する見込みとの試算が発表された。診療報酬改定が病院経営に与える影響の具体例として注目される。","m":"診療報酬改定がクリニック経営に与える影響を予測する参考材料となる。改定内容によっては収益構造の見直しが必要になる可能性がある。","i":"自院の診療報酬改定による収益影響を詳細に試算し、経営戦略を見直す必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA252JC0V20C26A3000000/","d":"2026-03-30"},{"t":"大塚製薬、米バイオ企業を1100億円で買収 PTSDの新薬候補取得","s":"大塚製薬が米バイオテクノロジー企業を1100億円で買収し、PTSD治療薬の新薬候補を取得した。精神科領域での治療選択肢拡大を狙う。","m":"PTSD治療薬の開発は精神科領域の治療選択肢拡大につながるが、現在の診療科目との直接的な関連は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC279AT0X20C26A3000000/","d":"2026-03-30"},{"t":"エーザイと米メルク 腎臓がん向けに抗がん剤を併用、日本で申請","s":"エーザイと米メルクが腎臓がん治療を目的とした抗がん剤の併用療法について、日本での承認申請を行った。","m":"がん治療の進歩は重要だが、当クリニックの診療科目（内科・耳鼻咽喉科・小児科・消化器）との直接的関連は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273SQ0X20C26A3000000/","d":"2026-03-30"},{"t":"塩野義製薬、3000億円借り入れ エイズ治療薬の英社への追加出資で","s":"塩野義製薬がエイズ治療薬開発企業への追加出資のため3000億円を借り入れ。製薬企業の投資戦略として注目されるが、クリニック診療への直接的影響は限定的。","m":"製薬企業の投資動向として参考程度。エイズ治療はクリニックレベルでの診療機会は少なく、直接的な影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2762M0X20C26A3000000/","d":"2026-03-30"},{"t":"GSKやアストラゼネカ、ぜんそくにバイオ薬 効果長持ち・価格10倍超","s":"GSKやアストラゼネカがぜんそく治療向けバイオ薬を展開。効果が長持ちする一方で価格は従来薬の10倍超となる。新たな治療選択肢として注目される。","m":"内科でのぜんそく治療に直結する情報。高価格帯の新薬による患者負担と治療効果のバランスを考慮した診療方針の検討が必要。","i":"ぜんそく患者への新治療選択肢として情報収集し、適応患者の選定基準を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC09A3G0Z00C25A6000000/","d":"2026-03-30"},{"t":"プラ単一素材に対応可能な医薬品の錠剤包装技術 CKD､リサイクル容易","s":"CKDが医薬品の錠剤包装でプラスチック単一素材に対応可能な技術を開発。リサイクルが容易になる環境配慮型の包装技術。","m":"医薬品供給の環境対応動向として参考情報。直接的なクリニック経営への影響は限定的だが、業界の持続可能性への取り組みとして注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD2743G0X20C26A3000000/","d":"2026-03-30"},{"t":"エーザイ、肺がん治療薬を欧州で承認申請","s":"エーザイが肺がん治療薬を欧州で承認申請。がん治療薬の開発動向として注目されるが、クリニックレベルでの直接的な処方機会は限定的。","m":"がん治療薬の開発動向として参考。クリニックでの処方機会は少ないが、がん患者の紹介や連携に間接的に関わる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273FW0X20C26A3000000/","d":"2026-03-30"},{"t":"小野薬品、希少がん治療薬の承認申請 既存薬使用後の患者対象","s":"小野薬品が希少がん治療薬の承認申請を行った。希少疾患治療薬の開発として注目されるが、クリニック診療での処方機会は極めて限定的。","m":"希少がん治療薬はクリニックでの処方機会は極めて少ない。製薬業界の動向として参考程度の情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2646K0W6A320C2000000/","d":"2026-03-30"},{"t":"がん治療向け放射性元素「アスタチン」 住友重機械、27年製造開始へ","s":"住友重機械ががん治療向け放射性元素「アスタチン」の製造を2027年に開始予定。新しいがん治療技術の動向として注目されるが、クリニック診療への直接的影響は限定的。","m":"放射性元素を用いたがん治療は高度専門医療であり、クリニックでの取り扱いはない。業界動向として参考程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG16B430W6A110C2000000/","d":"2026-03-30"},{"t":"メルク、がん治療薬新興を1兆円で買収 主力薬特許切れで連続M&A","s":"メルクががん治療薬新興企業を1兆円で買収。主力薬の特許切れに対応した連続M&A戦略。製薬業界の動向として注目されるが、クリニック経営への直接的影響は限定的。","m":"製薬企業のM&A動向として参考。将来的な薬剤供給や価格に間接的に影響する可能性があるが、直接的な経営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN25C390V20C26A3000000/","d":"2026-03-30"},{"t":"武田薬品、27年3月期に構造再編費1500億円 特許切れや新薬に備え","s":"武田薬品が2027年3月期に1500億円の構造再編費を計上予定。特許切れや新薬開発に備えた大規模な事業再構築を実施。","m":"大手製薬企業の事業戦略変更として参考情報。クリニックの薬剤調達や新薬の供給体制に間接的な影響の可能性あり。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC258FO0V20C26A3000000/","d":"2026-03-30"},{"t":"介護のソラストがMBO、上場廃止へ 経営自由度高める","s":"介護サービス大手のソラストがMBO（経営陣による買収）を実施し、上場廃止となる。経営の自由度向上を目的としている。","m":"介護業界の動向は高齢患者への対応や地域連携の観点で参考になるが、直接的な経営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC24B530U6A320C2000000/","d":"2026-03-30"},{"t":"杏林製薬、ヤンセンファーマと販売の契約締結 抗結核薬で","s":"杏林製薬がヤンセンファーマと抗結核薬の販売に関する契約を締結した。結核治療薬の流通体制が整備される。","m":"結核は内科診療で遭遇する可能性があるが、専門的治療は結核専門医療機関が担当するため直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2587B0V20C26A3000000/","d":"2026-03-30"},{"t":"川崎重工、介護職員の行動を自動で記録できるシステム 業務改善に","s":"川崎重工が介護職員の行動を自動記録できるシステムを開発した。介護現場での業務効率化と記録の自動化を目的としている。","m":"医療現場での業務記録システムの技術動向として興味深いが、現在のクリニック運営との直接的関連は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC254ZM0V20C26A3000000/","d":"2026-03-30"},{"t":"スズケン､セイノーHDなどと資本業務提携 メーカー物流を強化","s":"スズケンがセイノーHDなどと資本業務提携を締結。メーカー向け物流機能の強化により、医薬品流通体制の効率化を図る。","m":"医薬品卸大手の物流強化により、クリニックへの医薬品供給の安定性や効率性に間接的な影響あり。供給体制の変化として注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD255FE0V20C26A3000000/","d":"2026-03-30"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を高める方法について解説。従
