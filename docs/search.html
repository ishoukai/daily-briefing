tsuite/bunya/0000106602.html","d":"2026-04-25"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-25"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-25"},{"t":"EMA Greenlights Drugs for MS and Spinal Muscular Atrophy","s":"欧州医薬品庁（EMA）が多発性硬化症（MS）と脊髄性筋萎縮症の治療薬を承認。新たな治療選択肢が欧州で利用可能となる。","m":"神経系疾患の新薬承認情報。内科診療での専門医紹介や患者相談時の知識として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/ema-greenlights-drugs-ms-and-spinal-muscular-atrophy-2026a1000d3y?src=rss","d":"2026-04-25"},{"t":"Drug Therapy in Nonobstructive Hypertrophic Cardiomyopathy","s":"非閉塞性肥大型心筋症に対する薬物療法について。循環器疾患の治療戦略に関する医学的情報。","m":"循環器内科を標榜するクリニックとして、心筋症の薬物治療に関する最新知識の習得に有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/drug-therapy-nonobstructive-hypertrophic-cardiomyopathy-2026a1000bfc?src=rss","d":"2026-04-25"},{"t":"First Positive Phase 3 Drug Trial for MOGAD","s":"MOGAD（MOG抗体関連疾患）に対する初の陽性第3相薬事試験結果が報告された。希少な神経炎症性疾患の新たな治療選択肢。","m":"希少疾患の治療進歩に関する情報。内科診療での鑑別診断や専門医紹介の判断に参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/first-positive-phase-3-drug-trial-mogad-2026a1000d2s?src=rss","d":"2026-04-25"},{"t":"Plant-Based Diet Quality May Affect Dementia Risk","s":"植物性食品の品質が認知症リスクに影響する可能性が示された。食事の質と認知機能低下の関連性に関する研究結果。","m":"糖尿病患者への栄養指導に直結する情報。予防医学の観点から患者指導内容の充実が期待できる。","i":"生活習慣病指導で栄養指導内容を見直し、認知症予防の観点を追加する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/plant-based-diet-quality-may-affect-dementia-risk-2026a1000d1s?src=rss","d":"2026-04-25"},{"t":"Carotid Revascularization May Lower Seizure Risk in Stenosis","s":"頸動脈狭窄症における頸動脈血行再建術が発作リスクを低下させる可能性。循環器疾患の外科的治療効果に関する研究。","m":"循環器内科診療での専門医紹介タイミングの判断に有用。脳血管疾患予防の観点でも参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/carotid-revascularization-may-lower-seizure-risk-stenosis-2026a1000d17?src=rss","d":"2026-04-25"},{"t":"Syphilis Linked to Risk for Major Cardiovascular Events","s":"梅毒感染が主要心血管イベントのリスク増加と関連することが判明。性感染症と循環器疾患の新たな関連性が示された。","m":"内科と感染症診療の接点として重要な知見。性感染症診療での包括的リスク評価の必要性を示している。","i":"STD検査時に心血管リスク評価も併せて実施し、必要に応じて循環器検査を推奨する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/syphilis-linked-risk-major-cardiovascular-events-2026a1000d1c?src=rss","d":"2026-04-25"},{"t":"Poststroke Epilepsy Carries Higher Risk for Dementia","s":"脳卒中後てんかんが認知症発症の高リスクと関連することが示された。脳血管疾患の長期合併症に関する新知見。","m":"循環器内科での脳血管疾患管理において、長期的な認知機能フォローの重要性を示す情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/poststroke-epilepsy-carries-higher-risk-dementia-2026a1000d16?src=rss","d":"2026-04-25"},{"t":"Anemia Linked to Alzheimer’s Biomarkers, Dementia Risk","s":"貧血がアルツハイマー病のバイオマーカーや認知症リスクと関連していることを示す研究結果。貧血患者において、アルツハイマー病の血液バイオマーカーが上昇し、認知症発症リスクが高まる可能性が示された。","m":"内科診療で貧血患者を診る際の参考情報。認知機能評価の必要性を検討する材料となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/anemia-linked-elevated-alzheimers-blood-biomarkers-greater-2026a1000d0t?src=rss","d":"2026-04-25"},{"t":"Medscape Physician Wealth & Debt Report 2026","s":"2026年版医師の資産・負債レポート。医師の純資産状況や負債の動向について調査した結果をまとめたもの。医師の経済状況に関する業界データを提供。","m":"医師の経済状況把握に参考となるが、直接的な経営判断には影響しない業界動向情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/p11/medscape-physician-wealth-debt-report-2026-rising-net-worth-2026a10009up?src=rss","d":"2026-04-25"},{"t":"FDA Declines Stroke Drug Over Manufacturing and Packaging Issues","s":"FDAが製造・包装上の問題により脳卒中治療薬の承認を拒否。製造プロセスや包装に関する品質管理の問題が承認見送りの理由とされた。","m":"脳卒中は循環器内科で扱う疾患だが、この薬剤承認見送りは直接的な診療への影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/fda-declines-stroke-drug-over-manufacturing-and-packaging-2026a1000cyq?src=rss","d":"2026-04-25"},{"t":"Lawmakers introduce bipartisan legislation to improve access, quality of care in Medicare Advantage plans","s":"メディケアアドバンテージプランにおけるアクセス改善と医療の質向上を目的とした超党派法案が議員により提出された。米国の医療保険制度改革に関する動向。","m":"米国の医療保険制度に関する内容で、日本の医療制度とは異なるが、医療政策の参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/lawmakers-introduce-bipartisan-legislation-improve-access-quality-care-medicare","d":"2026-04-25"},{"t":"UnitedHealthcare, Aetna, Cigna tout progress to standardize prior authorization as part of industry-wide commitment","s":"ユナイテッドヘルスケア、エトナ、シグナが事前承認の標準化に向けた業界全体の取り組みの一環として進展を報告。保険者による事前承認プロセスの効率化を推進。","m":"事前承認の標準化は診療現場の事務効率に影響する。国内制度への波及可能性を注視すべき。","i":"国内でも保険診療における事前承認制度の動向を注視し、手続き効率化の準備を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/unitedhealthcare-aetna-tout-progress-standardize-prior-authorization-part-industry-wide","d":"2026-04-25"},{"t":"Industry Voices—Hospitals are very online, but what happens when they're plunged into 'digital darkness'?","s":"病院がデジタル化されているが、「デジタル・ダークネス」に陥った場合の対応について論じた記事。医療機関のIT障害やサイバーセキュリティリスクへの対策の重要性を指摘。","m":"電子カルテやネットワーク障害時の診療継続体制構築は喫緊の課題。対策強化が必要。","i":"クリニックのIT障害・サイバー攻撃対策を見直し、BCP策定を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/industry-voices-hospitals-are-very-online-what-happens-when-theyre-plunged-digital","d":"2026-04-25"},{"t":"Northwell Health unveils toolkit for gun violence prevention in healthcare settings","s":"ノースウェル・ヘルスが医療現場での銃暴力予防のためのツールキットを発表。医療機関における暴力予防対策に関する取り組みを紹介。","m":"日本では銃暴力は稀だが、医療現場での暴力予防対策の参考として有用な情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/hospitals/northwell-health-unveils-first-its-kind-toolkit-gun-violence-prevention-healthcare","d":"2026-04-25"},{"t":"AI-powered prior authorizations for Medicare have greatly delayed care, Washington state hospitals say","s":"米国メディケアでAI活用の事前承認システムが医療提供を大幅に遅延させているとワシントン州の病院が報告。AI導入時の課題が浮き彫りになっている。","m":"日本でもAI活用が進む中、システム導入時の患者ケアへの影響を慎重に検討する必要がある。米国の事例は導入時の注意点として参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/ai-powered-prior-authorizations-medicare-have-greatly-delayed-care-wash-hospitals-say","d":"2026-04-25"},{"t":"Healthcare finance leaders cite federal funding uncertainty, Medicaid cuts as top concerns","s":"米国の医療財務責任者が連邦政府資金の不確実性とメディケイド削減を最大の懸念として挙げている。医療財政への影響が深刻化している。","m":"米国の医療財政問題は日本の医療制度改革の参考事例となる。診療報酬制度や公的医療保険の将来動向を予測する上で重要な情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/finance/govt-funding-uncertainty-medicaid-cuts-top-concern-66-healthcare-finance-leaders-strata","d":"2026-04-25"},{"t":"FTC files suit over telemarketing scheme selling fake PPO insurance","s":"FTCが偽のPPO保険を販売するテレマーケティング詐欺に対して訴訟を提起。医療保険詐欺に関する規制当局の対応事例を紹介。","m":"医療保険詐欺への注意喚起として参考になるが、日本の制度では直接的な影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/ftc-files-suit-over-telemarketing-scheme-selling-fake-ppo-insurance","d":"2026-04-25"},{"t":"Molina strikes 'prudent' tone on 2026 outlook amid positive signs on Medicaid spending","s":"米国保険会社モリーナがメディケイド支出の前向きな兆候を受けながらも2026年の見通しについて慎重な姿勢を示している。医療保険市場の動向を反映。","m":"米国の医療保険市場動向は日本の医療経営にも間接的に影響する。保険制度の変化や医療費動向の参考情報として活用できる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/molina-strikes-prudent-tone-2026-outlook-amid-positive-signs-medicaid-spending","d":"2026-04-25"},{"t":"医師の病院離れ深刻に　診療所に転出、地域に偏り","s":"医師の病院離れが深刻化し、診療所への転出が増加している。地域による偏りも生じており、医療提供体制に大きな変化が起きている。","m":"病院から診療所への医師転出増加は当法人にとって医師確保の機会となる可能性がある。一方で地域医療連携への影響も考慮が必要。","i":"医師確保戦略の見直しと、病院からの医師転出を受け入れる体制整備を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD133ML0T10C26A4000000/","d":"2026-04-25"},{"t":"はしか感染、4月で25年の通年上回る　厚労相がワクチン接種呼びかけ","s":"はしか感染が4月時点で2025年通年を上回り、厚労相がワクチン接種を呼びかけている。感染拡大が深刻化している状況。","m":"小児科を運営する当法人では、はしかワクチン接種の需要増加に対応する必要がある。在庫確保と接種スケジュール調整が急務。","i":"小児科でのはしかワクチン接種体制強化と、患者・保護者への積極的な接種勧奨を実施する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA240RU0U6A420C2000000/","d":"2026-04-25"},{"t":"中外製薬の純利益19%増　1〜3月、血友病薬の販売増","s":"中外製薬の1-3月純利益が19%増となり、血友病薬の販売増が寄与している。製薬業界の好調な業績を示している。","m":"製薬企業の業績は薬価や新薬開発動向の指標となる。血友病薬の需要増加は専門的治療への注目度上昇を示している。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB22A8A0S6A420C2000000/","d":"2026-04-25"},{"t":"明治HD系など3社、新会社設立へ 杏林製薬の後発薬事業を承継","s":"明治HD系企業などが3社で新会社を設立し、杏林製薬の後発薬事業を承継する。後発薬市場における企業再編が進んでいる。","m":"後発薬の供給体制変化により、薬価や安定供給に影響する可能性がある。処方薬選択における情報収集が必要。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC247IM0U6A420C2000000/","d":"2026-04-25"},{"t":"学研HDが葬儀ホール新設 高齢者住宅の居住者以外にも対応","s":"学研ホールディングスが高齢者住宅の居住者以外も対象とした葬儀ホールを新設。高齢者向けサービスの拡充を図る。","m":"高齢者医療に関連する周辺サービスの動向として参考になる。直接的な診療への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC16A0S0W6A410C2000000/","d":"2026-04-25"},{"t":"第一三共、26年3月期決算の発表を5月11日に延期 供給計画見直し","s":"第一三共が2026年3月期決算発表を5月11日に延期。供給計画の見直しが理由とされている。","m":"大手製薬会社の供給計画見直しは処方薬の安定調達に影響する可能性。糖尿病・循環器薬への影響を要確認。","i":"第一三共の医薬品供給への影響を注視し、処方薬の在庫管理を確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUB240ON0U6A420C2000000/","d":"2026-04-25"},{"t":"メドトロニック系、手術学習の支援システム AIで個人情報保護","s":"メドトロニック系企業が手術学習支援システムを開発。AI技術を活用しつつ個人情報保護に配慮したシステムとなっている。","m":"クリニックでの外科系診療はないが、医療従事者の技術向上支援システムとして今後の動向を注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC236DY0T20C26A4000000/","d":"2026-04-25"},{"t":"東和薬品、スズケン系に後発薬の生産委託 28年度までに7億錠","s":"東和薬品がスズケン系企業に後発薬の生産委託を行い、2028年度までに7億錠を生産予定。後発薬業界の生産体制再編が進行。","m":"後発薬メーカーの生産体制変化はクリニックの薬剤費に直接影響。調剤薬局との連携も重要。","i":"後発薬の安定供給体制変化を注視し、ジェネリック薬品の調達戦略を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF237K50T20C26A4000000/","d":"2026-04-25"},{"t":"川崎重工、日医大千葉北総病院に搬送ロボット 医療従事者の負担軽減","s":"川崎重工が日医大千葉北総病院に搬送ロボットを導入し、医療従事者の負担軽減を図る。医療現場での自動化・ロボット化が本格的に進展している。","m":"クリニック規模でも活用可能な搬送ロボットや自動化技術の導入により、スタッフの業務負担軽減と効率化が期待できる。コスト対効果を含めた検討が必要。","i":"将来的なクリニック運営効率化のため、ロボット技術の動向と導入可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC243IN0U6A420C2000000/","d":"2026-04-25"},{"t":"ダイト松森社長「後発薬498品目で生産統合協議」 半年で9倍に","s":"ダイトの松森社長が後発薬498品目で生産統合協議を行うと発表。半年前の9倍の品目数に拡大。","m":"後発薬メーカーの生産統合は薬価や供給安定性に影響。特に慢性疾患薬への影響を要確認。","i":"後発薬業界の統合動向を注視し、処方薬の安定供給への影響を評価する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC233SJ0T20C26A4000000/","d":"2026-04-25"},{"t":"透析用チューブや手袋、99%超が海外頼み 医療物資に供給リスク","s":"透析用チューブや医療用手袋の99%超が海外製品に依存しており、供給リスクが指摘されている。医療物資の安定供給に懸念。","m":"日常診療で使用する手袋等の医療物資が対象。供給不安定化に備えた調達戦略の検討が重要。","i":"医療物資の在庫管理見直しと代替品確保の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA15BHN0V10C26A4000000/","d":"2026-04-25"},{"t":"膵臓がん治療前進 米新薬治験5割で腫瘍縮小、mRNAワクチンも効果","s":"膵臓がん治療において米国で新薬治験により5割の症例で腫瘍縮小が確認され、mRNAワクチンも効果を示している。がん治療の新たな選択肢として期待される。","m":"当法人では消化器内科・外科を運営しており、膵臓がん患者の紹介先選定や治療情報提供に活用できる。新治療法の動向は患者・家族への説明にも重要。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN22D6J0S6A420C2000000/","d":"2026-04-25"},{"t":"医薬品をドローンで離島へ 伊予銀行などが瀬戸内で試験フライト","s":"伊予銀行などが瀬戸内海でドローンによる離島への医薬品配送の試験フライトを実施。医療アクセスが困難な地域への新たな薬剤供給手段として注目される。","m":"地方クリニックの薬剤配送効率化に将来的に影響する可能性。患者の利便性向上につながる技術動向として注視が必要。","i":"将来的な薬剤配送システムの変化に備え、オンライン診療との連携可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC197N30Z10C26A3000000/","d":"2026-04-25"},{"t":"メディ、中外製薬の「エレビジス」使用を支援 主治医と専門家つなぐ","s":"メディ社が中外製薬の「エレビジス」使用を支援するサービスを開始。主治医と専門家をつなぐ遠隔相談システムを提供。","m":"専門薬使用時の連携支援サービスの事例。当院での専門医連携の参考となる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC201NZ0Q6A420C2000000/","d":"2026-04-25"},{"t":"田辺ファーマ、マラリア新薬開発でファンドから7億円助成 1回投与型","s":"田辺ファーマが1回投与型マラリア新薬開発のため、ファンドから7億円の助成を受けた。新たな治療法の開発が進展している。","m":"マラリアは国内での診療機会は限定的。製薬会社の新薬開発動向として一般的な情報にとどまる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF223R60S6A420C2000000/","d":"2026-04-25"},{"t":"エーザイの腎細胞がん向け3剤併用療法の治験 評価項目達成せず","s":"エーザイの腎細胞がん向け3剤併用療法の治験において、主要評価項目が達成されなかった。新薬開発の困難さを示す事例。","m":"当院の診療科目には直接関係しないが、製薬企業の治験動向を示す情報として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC21B6U0R20C26A4000000/","d":"2026-04-25"},{"t":"ネクセラファーマ、神経疾患の創薬提携で16億円受領","s":"ネクセラファーマが神経疾患治療薬の創薬提携により16億円を受領。神経疾患分野での新薬開発が活発化している。","m":"神経疾患は専門性が高く、一般クリニックでの直接的な診療機会は少ない。創薬業界の動向として参考程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC227IF0S6A420C2000000/","d":"2026-04-25"},{"t":"大分大学と大分銀行、大学病院の急性期医療について全国初の共同研究","s":"大分大学と大分銀行が大学病院の急性期医療について全国初の共同研究を開始。産学連携による医療経営改善の新たなモデルケースとして注目される。","m":"地域金融機関との連携による医療経営改善の事例として参考になる。当法人でも地域銀行との関係構築や経営相談の可能性を検討する価値がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC21CHL0R20C26A4000000/","d":"2026-04-25"},{"t":"更年期の女性の精神的な不調、こころと体からの警告","s":"更年期女性の精神的不調について、心身両面からのアプローチの重要性を解説。女性の健康課題への理解と対応が求められている。","m":"内科診療で更年期症状を訴える患者は多い。適切な診断・治療・紹介体制の構築により患者満足度向上が期待できる。","i":"更年期外来や女性の健康相談体制の整備を検討し、スタッフ教育を実施する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOSG156290V10C26A4000000/","d":"2026-04-25"},{"t":"東北大学、ゲノム情報基盤6.9万人分に拡充 国内最大規模に","s":"東北大学がゲノム情報基盤を6.9万人分まで拡充し、国内最大規模となった。個別化医療の基盤となるビッグデータが蓄積されている。","m":"将来的な個別化医療の発展につながる基盤整備。現時点では一般クリニック診療への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC2422Z0U6A420C2000000/","d":"2026-04-25"},{"t":"低温サウナ、60度前後で水風呂入らず 無理なく\"ととのう\"","s":"60度前後の低温サウナが水風呂なしで無理なく健康効果を得られる方法として注目されている。従来のサウナより負担が少ない。","m":"患者の健康増進指導の際の選択肢として参考になる。循環器疾患患者への運動指導の代替手段として検討可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD091YA0Z00C26A4000000/","d":"2026-04-25"},{"t":"1日1万歩より効果的 「インターバル速歩」で老化を防ぐ","s":"1日1万歩よりも効果的とされる「インターバル速歩」により老化予防効果が期待される。効率的な運動療法として注目されている。","m":"糖尿病・循環器内科での運動療法指導に直接活用できる。患者への具体的で実践しやすい指導方法として有用。","i":"糖尿病や循環器疾患患者への運動指導にインターバル速歩を取り入れる。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD087470Y6A400C2000000/","d":"2026-04-25"},{"t":"「がんを知る本」で備え、向き合う 大人も子どももがん教育","s":"がん教育に関する啓発活動が大人と子どもの両方を対象に展開されている。健康教育・予防医療の重要性が注目されている。","m":"予防医療や健康教育の観点から、当院でも患者への啓発活動強化を検討する材料となる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD105270Q6A410C2000000/","d":"2026-04-25"},{"t":"バテる子供たち 便利で快適な現代に足りないものは","s":"現代の便利で快適な環境で育つ子供たちの体力低下や疲労感の問題について解説。子供の健康課題への対応が必要とされている。","m":"小児科診療で頻繁に遭遇する現代的な健康課題。保護者への生活指導や環境改善提案に直接活用できる知見。","i":"小児科診療で体力低下や疲労感を訴える子供への指導体制を見直す。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD3160I0R30C26A3000000/","d":"2026-04-25"},{"t":"ブータンの胃がん減らせ、ピロリ菌の検査キット開発 大分大学など","s":"大分大学などがブータンの胃がん減少を目指し、ピロリ菌の検査キットを開発。国際医療協力における技術開発事例。","m":"ピロリ菌検査は当院の消化器内科でも実施。新しい検査技術の動向として参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC2033N0Q6A420C2000000/","d":"2026-04-25"},{"t":"佐々木貴史さん（1）夢のシャツで人々健康に","s":"佐々木貴史氏による健康に関するシャツ開発について。人々の健康向上を目指した製品開発の取り組み。","m":"健康関連商品の開発に関する記事。予防医学や健康管理の観点でクリニックの健康指導に参考となる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD221HJ0S6A320C2000000/","d":"2026-04-25"},{"t":"Therapy company mixes emotional and artificial intelligence to top ranking","s":"セラピー企業のGrow Therapyがアメリカ成長企業ランキング1位を獲得。感情知能と人工知能を組み合わせたサービスでAIの可能性を探求している。","m":"メンタルヘルス×AI技術は医療分野に関連。当院では直接関係しないが、ヘルスケア業界の技術動向として把握が必要。","i":"メンタルヘルス分野での AI活用事例として、心療内科・精神科領域での技術動向を注視する。","src":"FT","p":"要注視","u":"https://www.ft.com/content/aa2f2471-4616-4f1d-baa0-75fffec57362","d":"2026-04-25"},{"t":"Glucagon-like peptide-1: a critical link between gut microbiota dysbiosis and degenerative musculoskeletal diseases.","s":"GLP-1が腸内細菌叢の異常と変形性関節症、骨粗しょう症、サルコペニアなどの変性筋骨格疾患との関連について論じた基礎研究。これらの疾患は慢性炎症、酸化ストレス、細胞死の調節異常という共通の病理学的特徴を持つ。","m":"高齢化により変性筋骨格疾患患者の来院が増加傾向。GLP-1薬処方時の新たな効果として患者説明に活用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42021124/","d":"2026-04-24"},{"t":"GLP-1 receptor agonists: The good, the bad, and the ugly-A comprehensive guide for NPs.","s":"プライマリケア従事者向けのGLP-1受容体作動薬の総合ガイド。糖尿病、肥満治療での有効性と消化器副作用、膵炎等のリスクを詳述。心血管、肝臓、神経認知への新たな効果についても言及。","m":"当院でのGLP-1薬処方患者増加に伴い、看護師への教育と患者モニタリング体制の充実が必要。副作用対応プロトコールの策定を検討。","i":"GLP-1薬処方時の副作用監視体制を強化し、患者教育資材を更新して安全な処方を徹底する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/42021007/","d":"2026-04-24"},{"t":"Sex differences in glycemic outcomes: a systematic review and meta-analysis of diabetes treatments.","s":"糖尿病治療における性差を検討したメタ解析。1型糖尿病では女性でHbA1c 7%未満達成に有意差なし、2型糖尿病での詳細な解析結果を報告。個別化医療と医療の公平性向上を目的とした研究。","m":"糖尿病患者の多い内科診療で性差を考慮した治療選択が求められる可能性。診療プロトコールの見直しが必要になるかもしれない。","i":"性別を考慮した糖尿病治療の個別化アプローチを検討し、診療ガイドラインの更新に注意する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/42020119/","d":"2026-04-24"},{"t":"Is There a Causal Link Between GLP-1 Receptor Agonists and Non-Arteritic Anterior Ischaemic Optic Neuropathy? A Critique of the Clinical Evidence.","s":"GLP-1受容体作動薬と非動脈炎性前部虚血性視神経症（NAION）の因果関係について検討した臨床エビデンスの批判的評価。セマグルチド使用との関連が疑われているが、観察研究では一致しない結果。","m":"処方前の眼科的既往歴確認と定期的な眼科受診勧告が必要。インフォームドコンセントの内容見直しと同意書の更新を検討。","i":"GLP-1薬処方時にNAION発症リスクについて患者への十分な説明と同意取得、定期的な視機能チェックを実施する。","src":"PubMed","p":"要対応","u":"https://pubmed.ncbi.nlm.nih.gov/42020100/","d":"2026-04-24"},{"t":"Impact of SGLT2 Inhibitors on Clinical Outcomes in Patients with Diabetes Mellitus Following Heart Transplantation: A Meta-analysis.","s":"心移植後の糖尿病患者におけるSGLT2阻害薬の臨床効果に関するメタ解析。心移植患者の30%以上が既存の糖尿病を有し、移植片不全や死亡リスクが高いことが報告されている。","m":"心移植患者は当院では稀だが、SGLT2阻害薬の多面的効果に関する知見として参考になる。循環器内科での薬剤選択時の情報として活用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42018057/","d":"2026-04-24"},{"t":"[Transport the thrombectomist to the patient].","s":"北スウェーデンでの急性虚血性脳卒中に対する機械的血栓除去術の新しいアプローチ。患者を治療センターに搬送する従来方法に対し、血栓除去術医師を患者のもとに派遣する取り組みを紹介。","m":"地域医療体制の参考事例だが、当院では脳血管疾患の急性期治療は実施していない。連携病院への紹介体制確認の参考情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42023772/","d":"2026-04-24"},{"t":"Optimal Strategy of Resistance Training Combined With Other Rehabilitation Interventions for Lower-Limb Dysfunction in Stroke Patients: A Systematic Review and Network Meta-Analysis.","s":"脳卒中後下肢機能障害に対する抵抗運動訓練と他のリハビリテーション介入の最適な組み合わせを検討したネットワークメタ解析。電気刺激療法との併用が最も効果的であることが示された。","m":"脳卒中後患者のリハビリテーション指導の参考情報。理学療法士との連携や患者家族への指導内容検討時に活用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42020998/","d":"2026-04-24"},{"t":"The Evolution of Transcatheter Aortic Valve Replacement: From Novel to Normal.","s":"経カテーテル大動脈弁置換術（TAVR）の進歩について、新しい治療法から標準治療への変遷を解説。低侵襲アプローチにより従来の外科的大動脈弁置換術と比べてリスクが軽減され、第一選択治療となった。","m":"循環器内科での大動脈弁狭窄症患者管理の参考情報。高齢患者の治療選択肢として患者・家族への説明に活用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42020982/","d":"2026-04-24"},{"t":"Primary intracranial infantile hemangioma presenting with hemorrhage: histopathological and immunohistochemical confirmation of a rare lesion.","s":"新生児期に出血で発症した稀な原発性頭蓋内乳児血管腫の症例報告。生後7日で頭蓋内圧亢進症状を呈し、画像で脳梁出血性腫瘤を認め、緊急手術により完全摘出された症例。","m":"極めて稀な疾患だが小児科での新生児診療時の鑑別診断として知識を蓄積。症状出現時の迅速な専門施設紹介の重要性を再認識。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42020850/","d":"2026-04-24"},{"t":"Bacillus Calmette-Gu&#xe9;rin scar reactivation (BCGitis) in Kawasaki disease: a scoping review.","s":"川崎病におけるBCG瘢痕再活性化（BCGitis）に関するスコーピングレビュー。アジア5か国15研究のデータを統合し、BCGitisの有病率と年齢、性別、川崎病の型、冠動脈異常との関係を検討。","m":"小児科での川崎病診断時の補助的指標として有用。BCG接種歴のある患児での診断精度向上に活用可能な知見。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42020814/","d":"2026-04-24"},{"t":"Pharmacist-Led Integrated Management for Patients with Chronic Obstructive Pulmonary Disease: A Systematic Review and Meta-Analysis.","s":"慢性閉塞性肺疾患（COPD）患者に対する薬剤師主導の統合管理について、システマティックレビューとメタアナリシスを実施。薬剤師による介入が薬剤使用と臨床アウトカムの改善に有効である可能性を評価した研究。","m":"当法人では内科・小児科でCOPD患者を診療。薬剤師との連携強化による患者管理の質向上が検討できる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42021780/","d":"2026-04-24"},{"t":"Dapagliflozin improves hemoglobin and anemia in chronic kidney disease: a systematic review and meta-analysis.","s":"慢性腎疾患患者におけるダパグリフロジン（SGLT2阻害薬）の貧血改善効果についてのシステマティックレビューとメタアナリシス。糖尿病治療薬が腎疾患に伴う貧血の改善に有効である可能性を示した。","m":"当法人の糖尿病外来でSGLT2阻害薬を処方中。腎機能低下・貧血を伴う患者への治療選択肢として重要な知見。","i":"糖尿病患者へのSGLT2阻害薬処方時に腎機能・貧血の改善効果も期待できることを患者説明に活用。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/42021630/","d":"2026-04-24"},{"t":"Is the intraportal or renal subcapsular space a preferable site for islet allo- and xeno-transplantation? A brief historical review.","s":"糖尿病治療における膵島移植について、門脈内移植と腎被膜下移植の比較検討を行った歴史的レビュー。末期腎不全を伴う糖尿病患者における移植部位の選択に関する基礎的知見。","m":"当法人の糖尿病診療では移植治療は対象外。基礎研究レベルの情報で直接的な診療への影響は限定的。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42017902/","d":"2026-04-24"},{"t":"Cardiovascular Trials in Hemodialysis: Closing the Evidence Gap.","s":"血液透析患者における心血管疾患の臨床試験について、エビデンスギャップの問題を論じたレビュー。腎不全患者は心血管試験から除外されることが多く、適切な治療指針の確立が課題。","m":"当法人では血液透析は実施していないが、糖尿病・循環器患者の腎機能管理における参考情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42017553/","d":"2026-04-24"},{"t":"The effect of nutrition education interventions on dialysis patients' outcomes: a systematic review and meta-analysis.","s":"透析患者に対する栄養教育介入の効果についてのシステマティックレビューとメタアナリシス。食事・水分制限の遵守不良による臨床アウトカム悪化に対する栄養教育の有効性を評価。","m":"当法人では透析は実施しないが、糖尿病・腎疾患患者への栄養指導の重要性を再確認する知見。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42015790/","d":"2026-04-24"},{"t":"Evolving therapeutics in colorectal cancer peritoneal metastases.","s":"大腸癌腹膜転移の治療法について、細胞減量術とハイパーサーミック腹腔内化学療法の役割に関するレビュー。最近の臨床試験を踏まえた治療方針の変遷を解説。","m":"当法人の消化器外科では腹膜転移の専門治療は行わないが、大腸癌診療の最新動向として参考。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42024175/","d":"2026-04-24"},{"t":"Single-cell dissection of persistent tumor antigens in non-responders reveals opportunities for TAA-targeted vaccination after neoadjuvant therapy in esophageal squamous cell carcinoma.","s":"食道扁平上皮癌の術前免疫チェックポイント阻害薬治療における腫瘍抗原の単細胞解析。治療不応例における腫瘍抗原標的ワクチン療法の可能性を示唆する基礎研究。","m":"当法人では食道癌の専門治療は行わないが、がん免疫療法の動向として消化器外科診療の参考。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42019971/","d":"2026-04-24"},{"t":"Envafolimab combined with lenvatinib and albumin-bound paclitaxel in previously treated advanced gastric/gastroesophageal junction (G/GEJ) adenocarcinoma: a prospective, phase II, multi-cohort trial.","s":"進行胃癌・胃食道接合部癌に対するエンバホリマブとレンバチニブ、アルブミン結合パクリタキセルの併用療法についての第2相試験。既治療患者における新たな治療選択肢を検討。","m":"当法人の消化器内科・外科で胃癌患者を診療。新規治療法の情報として専門医療機関への紹介時の参考。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42012665/","d":"2026-04-24"},{"t":"Ivonescimab combined with chemotherapy for the treatment of metastatic cervical cancer: A case report and literature review.","s":"転移性子宮頸癌に対するイボネスシマブと化学療法の併用治療の症例報告と文献レビュー。PD-1とVEGF-Aを同時標的とする二重特異性抗体の新たな治療選択肢。","m":"当法人では婦人科がんの専門治療は行わないが、がん治療の最新動向として一般的な参考情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42012232/","d":"2026-04-24"},{"t":"Early transanal irrigation in spinal cord injury-related neurogenic bowel dysfunction: preliminary insights.","s":"脊髄損傷による神経因性腸機能障害に対する早期経肛門洗浄の効果を検討した前向き研究。従来治療と比較した早期介入の有効性と生活の質への影響を評価。","m":"当法人では脊髄損傷の専門治療は行わないが、排便障害のある患者への新たな治療選択肢として参考。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42009662/","d":"2026-04-24"},{"t":"Barriers to hearing aid adoption in hearing loss.","s":"米国人口の5分の1以上が聴覚障害を抱えているが、聴覚障害者の10人に1人未満しか補聴器を使用していない。聴覚健康知識不足、スクリーニング不足、偏見、費用、使用困難さが補聴器導入の主な障壁として挙げられている。","m":"耳鼻咽喉科での補聴器処方率向上のため、患者教育や相談体制の充実が重要。補聴器導入時の障壁を理解し、患者サポートを強化する必要がある。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42023764/","d":"2026-04-24"},{"t":"Health-related quality of life in patients with obstructive sleep apnea - a systematic review update assessing the quality of measurement properties of patient-reported outcome measures.","s":"閉塞性睡眠時無呼吸症患者の健康関連生活の質に関する患者報告アウトカム測定ツールを評価するシステマティックレビュー。2016年の既存レビューを更新し、新たなエビデンスと測定ツールを合成評価した。","m":"耳鼻咽喉科で睡眠時無呼吸症を診療する際の患者QOL評価ツール選択の参考となる。適切な評価指標により治療効果の客観的測定が可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42014575/","d":"2026-04-24"},{"t":"Comparison of the Hearing Benefits and User Satisfaction With Hearing Aids and Personal Sound Amplification Products: A Multicenter Prospective Randomized Crossover Trial.","s":"補聴器と個人用音響増幅製品（PSAP）の聴覚改善効果とユーザー満足度を比較する多施設前向きランダム化クロスオーバー試験。73名の感音難聴患者を対象に、補聴器とPSAPをそれぞれ3ヶ月間使用して比較評価した。","m":"耳鼻咽喉科での難聴診療において、費用対効果の高い治療選択肢としてPSAPの有効性を検討する参考となる。患者への治療選択肢提案に活用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42011002/","d":"2026-04-24"},{"t":"Bacillus Calmette-Gu&#xe9;rin scar reactivation (BCGitis) in Kawasaki disease: a scoping review.","s":"川崎病におけるBCG瘢痕の再活性化（BCGitis）に関するスコーピングレビュー。アジア5カ国15研究を対象に、BCGitisの有病率と年齢、性別、川崎病の病型、冠動脈異常、治療反応との関係を検討した。","m":"小児科診療において川崎病の診断精度向上に寄与する可能性がある。BCG接種歴のある患児の川崎病診断時の参考情報となる。","i":"小児科で川崎病診療時にBCG瘢痕の再活性化を診断指標として活用できる知見を蓄積する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/42020814/","d":"2026-04-24"},{"t":"Childhood immunization barriers and interventions in low- and middle-income countries: A scoping review of access, delivery systems, and health literacy.","s":"低・中所得国における小児予防接種の障壁と介入策に関するスコーピングレビュー。2000-2024年の32研究を分析し、アクセス、配送システム、健康リテラシーの3領域で予防接種率向上の介入策を評価した。","m":"小児科での予防接種率向上のための参考情報。地域での予防接種普及活動や保護者教育プログラムの企画に活用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41995428/","d":"2026-04-24"},{"t":"Mumps disease and vaccination in Africa: A scoping review.","s":"アフリカにおけるおたふく風邪疾患とワクチン接種に関するスコーピングレビュー。1994-2024年の22研究を分析し、発症率、死亡率、ワクチン安全性、感染伝播、分子的特徴について検討した。","m":"小児科でのおたふく風邪診療とワクチン推奨に関する国際的な動向把握の参考となる。アフリカでの研究動向から感染症対策の知見を得られる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41992566/","d":"2026-04-24"},{"t":"Long-term immune protection after infant hepatitis B vaccination in children.","s":"小児におけるB型肝炎ワクチン接種後の長期免疫保護に関する文献レビュー。2013-2023年の研究を分析し、ワクチン接種完了者では20年後まで長期保護が維持され、免疫能正常者には追加接種は不要との知見を示した。","m":"小児科でのB型肝炎ワクチン接種後のフォローアップ方針の参考となる。追加接種の必要性判断や保護者への説明に活用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41992529/","d":"2026-04-24"},{"t":"Classifying American Society of Anesthesiologists Physical Status With a Low-Rank-Adapted Large Language Model: Development and Validation Study.","s":"低ランク適応大規模言語モデルを用いたASA身体状態分類の開発と検証研究。電子健康記録からASA-PS分類を予測し、臨床医が理解可能な根拠を提供するパラメータ効率的なAIモデルの開発を目指した。","m":"AI技術の医療現場導入に関する参考情報。将来的に術前評価業務の効率化や診療支援システム導入の検討材料となる可能性がある。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42013456/","d":"2026-04-24"},{"t":"Clinical Model Autophagy: The Risk of Interpretative Drift in Recursive Medical AI.","s":"電子医療記録システムにAIが統合される際、未検証のAI生成データで再帰的に訓練されることで診断の整合性が劣化する「臨床モデル自食症」という理論的脆弱性を提起。稀な病態が統計的平均に回帰し、複雑な疾患が良性の平均値に均質化される「解釈的ドリフト」現象が懸念される。","m":"AIを活用した診断支援システムの導入を検討する際、品質管理とデータの信頼性確保が重要。特に稀少疾患の見落としリスクに注意が必要。","i":"電子カルテやAI診断システム導入時は、検証済みデータによる訓練を重視し、稀少疾患の診断精度維持を確認する必要がある。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/42013455/","d":"2026-04-24"},{"t":"Mortality Prediction Among People Living With HIV on Antiretroviral Therapy in Public Health Facilities in Gondar City Administration, Northwest Ethiopia: Machine Learning-Based Study.","s":"エチオピア・ゴンダール市のHIV患者を対象に、抗レトロウイルス療法開始時の基礎的臨床データを用いて機械学習により死亡率を予測する研究。電子医療記録データを活用し、早期の予防的介入を可能にすることを目的とした。","m":"HIV診療は専門性が高く当クリニックでは対象外。ただし機械学習による予後予測の手法は他の慢性疾患にも応用可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42008628/","d":"2026-04-24"},{"t":"CDR-Net: A computerized framework to detect Alzheimer's diseases and mild cognitive impairment.","s":"脳波を用いてアルツハイマー病と軽度認知障害を診断するCDR-Netフレームワークを提案。従来の機械学習手法の制約を克服し、多クラス分類の性能と効率を向上させることで、迅速かつ正確な診断を可能にする。","m":"認知症の早期診断技術の進歩は高齢者診療に関連。小児科以外の診療科で将来的に認知機能評価の需要が増加する可能性。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42008601/","d":"2026-04-24"},{"t":"End-to-end pipeline for automated heart failure diagnosis with clinical notes using SNOMED-CT.","s":"ドイツの臨床記録を用いた心不全診断のエンドツーエンドパイプラインを開発。略語の曖昧性解消、英語翻訳、SNOMED-CTへの医療エンティティリンク、分類を統合し、サポートベクターマシンとmedBERT.deの比較検証を実施。","m":"心不全は循環器内科で重要な疾患。自然言語処理による診断支援技術の発展は電子カルテの活用高度化につながる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42002595/","d":"2026-04-24"},{"t":"Mobile Pharmacy Vehicles as Disaster Response Units: Insights from the 2024 Noto Peninsula Earthquake.","s":"2024年能登半島地震における日本独自の災害対策である移動薬局車の運用報告。13台が派遣され1,834件の災害処方箋を発行。災害薬事コーディネーターによる調整により迅速で柔軟な医療サービス提供を実現した。","m":"災害時の医療提供体制として移動薬局車の仕組みを理解しておくことは重要。大規模災害時の地域医療継続計画の参考になる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42023420/","d":"2026-04-24"},{"t":"Pharmacist-Led Integrated Management for Patients with Chronic Obstructive Pulmonary Disease: A Systematic Review and Meta-Analysis.","s":"COPD患者に対する薬剤師主導の統合管理に関するシステマティックレビューとメタ解析。薬剤師による介入がCOPD患者の薬物療法最適化と臨床転帰改善に効果的であることを検証し、急性増悪や予防可能な医療利用を減少させる可能性を示した。","m":"COPDは内科で管理する慢性疾患。薬剤師連携による包括的ケアの効果が実証されており、チーム医療の参考になる。","i":"COPD管理において薬剤師との連携強化を検討し、患者の服薬指導や病状モニタリング体制を見直す必要がある。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/42021780/","d":"2026-04-24"},{"t":"Comparison of Tools for Nutrition Assessment in Stable Subjects with Chronic Obstructive Pulmonary Disease: Which is the Best Mortality Predictor in Real Clinical Practice?","s":"安定期COPD患者における栄養評価ツール5種類の死亡率予測能力を比較検討。外来診療の実臨床において、どの栄養指標が最も全死因死亡率を予測するかを前向きコホート研究で評価した。","m":"COPD患者の栄養状態評価は重要。複数の栄養評価指標の中で最も有用なものを特定することで、より効果的な患者管理が可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42021779/","d":"2026-04-24"},{"t":"Differences in association between gestational weight gain and perinatal outcomes according to pre-pregnancy body mass index categories and gestational diabetes mellitus status: findings from a large Japanese cohort.","s":"日本の大規模コホートにおいて、妊娠前BMIカテゴリーと妊娠糖尿病の有無による妊娠中体重増加と周産期転帰の関連性を検討。BMI分類と妊娠糖尿病状態が体重増加と全ての転帰に有意な交互作用効果を示した。","m":"妊娠糖尿病は専門的管理が必要で当クリニックでは対応困難。ただし糖尿病専門医として関連知識として参考になる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/42020118/","d":"2026-04-24"},{"t":"Three Low-Dose Antihypertensive Agents in a Single Pill after Intracerebral Hemorrhage.","s":"脳内出血後の患者を対象とした多国籍二重盲検無作為化プラセボ対照試験。3種類の低用量降圧薬を組み合わせた単一錠剤が標準治療に追加された場合の血圧低下効果と脳卒中再発リスク減少効果を検証した。","m":"循環器内科診療で高血圧管理は中核業務。脳内出血既往患者への配合剤使用のエビデンスは実臨床で参考になる。","i":"脳内出血後患者の血圧管理において、低用量配合剤の有効性を考慮し、処方選択肢として検討する価値がある。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/42019018/","d":"2026-04-24"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-24"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-24"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-24"},{"t":"Medscape Physician Wealth & Debt Report 2026","s":"2026年の米国医師の資産・負債レポート。医師の純資産増加傾向について報告したメディスケープの調査結果。","m":"海外医師の経済状況調査で、日本のクリニック経営には直接影響しないが、医師の経済状況トレンドとして参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/p11/medscape-physician-wealth-debt-report-2026-rising-net-worth-2026a10009up?src=rss","d":"2026-04-24"},{"t":"Three Psychiatric Emergencies Most Clinicians Misdiagnose","s":"臨床医が最も誤診しやすい3つの精神科救急疾患について解説。適切な診断と対応方法に関する医療従事者向けの教育的内容。","m":"精神科救急の誤診は医療安全上重要。当院での精神科関連患者の対応プロトコール見直しに活用可能。","i":"精神科救急の誤診リスクを把握し、スタッフ教育や診断プロセスの見直しを検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/three-psychiatric-emergencies-most-clinicians-misdiagnose-2026a1000bg2?src=rss","d":"2026-04-24"},{"t":"FXIa Inhibitor Hits Mark in Recurrent Stroke Prevention","s":"FXIa阻害薬が再発性脳卒中予防で有効性を示したとの臨床試験結果。新たな脳卒中予防治療選択肢の可能性。","m":"当院の循環器内科で脳卒中リスク患者を多く診ており、新しい予防薬の選択肢として重要な情報。","i":"循環器内科診療において、脳卒中再発予防の新治療選択肢として情報収集と導入検討を行う。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/factor-xia-inhibitor-hits-mark-secondary-stroke-prevention-2026a1000cwm?src=rss","d":"2026-04-24"},{"t":"Cognitive Impairment Tied to Increase Risk for Sleep Apnea","s":"認知機能障害が睡眠時無呼吸症候群のリスク増加と関連することが判明。認知症と睡眠障害の関係性が明らかになっている。","m":"内科循環器診療での睡眠時無呼吸症候群スクリーニングに活用。認知症リスク評価の参考として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/cognitive-impairment-tied-increase-risk-sleep-apnea-2026a1000cw8?src=rss","d":"2026-04-24"},{"t":"Loneliness Tied to Degenerative Valvular Heart Disease Risk","s":"孤独感が変性弁膜疾患のリスクと関連することが研究で示された。循環器疾患の新たなリスク因子として孤独感が注目されている。","m":"循環器内科での患者指導において、社会的孤立も健康リスクとして考慮する必要性。高齢患者の包括的ケアの観点で参考になる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/can-loneliness-increase-risk-degenerative-valvular-heart-2026a1000cti?src=rss","d":"2026-04-24"},{"t":"One Pill, Three Meds, Fewer Strokes After ICH","s":"脳内出血後の患者に対する3剤配合薬により脳卒中再発が減少した。単一薬剤での多成分治療の有効性が示された。","m":"循環器内科での脳卒中二次予防における新たな治療選択肢。服薬コンプライアンス向上の可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/one-pill-three-meds-fewer-strokes-after-ich-trident-results-2026a1000crp?src=rss","d":"2026-04-24"},{"t":"Fosfomycin Combo Shows Promise in Paediatric MDR Infections","s":"小児の多剤耐性感染症に対するホスホマイシン併用療法が有望な結果を示した。薬剤耐性菌感染症の新たな治療選択肢となる可能性。","m":"小児科での薬剤耐性菌感染症治療に直接関連。重症例の治療選択肢拡大の可能性。","i":"小児科での重症感染症治療において新たな選択肢として情報収集を継続する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/fosfomycin-combo-shows-promise-paediatric-mdr-infections-2026a1000cd9?src=rss","d":"2026-04-24"},{"t":"Competing Stroke Causes Common in AF Despite Anticoagulation","s":"心房細動患者の抗凝固療法中でも他の原因による脳卒中が多く発生することが判明。心房細動以外の脳卒中原因の重要性が示された。","m":"循環器内科での心房細動患者管理において、抗凝固療法以外のリスク評価も重要。包括的な脳卒中予防戦略の必要性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/competing-stroke-causes-common-af-despite-anticoagulation-2026a1000cda?src=rss","d":"2026-04-24"},{"t":"Novel Kv7 Channel Opener Reduces Seizures Without Titration","s":"新規Kv7チャネル開口薬がてんかん発作を減少させ、用量調整不要で効果を示した。てんかん治療における新たな治療選択肢。","m":"当院では神経内科は扱っていないが、他科で発作性疾患患者に遭遇した際の参考情報。","i":"","src":"Medscape","p":" "},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-22"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-22"},{"t":"Medscape Physician Wealth & Debt Report 2026","s":"米国医師の資産と負債に関する2026年調査報告。医師の経済状況や純資産の動向を示すデータが公表された。","m":"海外の医師経営状況データ。日本の医療経営との直接的な関連は薄いが、業界動向の参考情報として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/p11/medscape-physician-wealth-debt-report-2026-rising-net-worth-2026a10009up?src=rss","d":"2026-04-22"},{"t":"Can a Common, Safe, Low-Cost Med Boost Cognition After TBI?","s":"外傷性脳損傷後の認知機能改善に、一般的で安全かつ低コストの薬剤が効果を示す可能性について報告された。","m":"脳外傷は当院診療科目外だが、安価な治療選択肢の研究として医療全般の参考情報。認知機能改善は高齢患者にも関連。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/can-common-safe-low-cost-med-boost-cognition-and-cut-2026a1000cl2?src=rss","d":"2026-04-22"},{"t":"Look Once, Think Twice: The Art of Neurologic Diagnosis","s":"神経学的診断の技術向上に関する記事。診断プロセスの改善と臨床判断能力の向上について解説されている。","m":"診断技術向上は全診療科に共通する重要テーマ。内科診療での鑑別診断能力向上の参考として活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/look-once-think-twice-art-neurologic-diagnosis-2026a1000c4h?src=rss","d":"2026-04-22"},{"t":"High-Dose Flu Vaccine Linked to Lower Dementia Risk","s":"高用量インフルエンザワクチンが認知症リスク低下と関連することが示された。予防医学の観点から注目すべき知見。","m":"当院では内科・小児科でワクチン接種を実施。高齢患者の認知症予防効果は患者・家族への説明材料として有用。","i":"高齢患者へのインフルエンザワクチン接種時の選択肢検討が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/high-dose-flu-vaccine-linked-lower-dementia-risk-2026a1000cjf?src=rss","d":"2026-04-22"},{"t":"Novel Copper-Binding Agent Shows Benefit in Wilson Disease","s":"ウィルソン病に対する新規銅結合薬が有効性を示した。希少疾患治療の新たな選択肢として期待される。","m":"希少疾患のため当院での直接的診療機会は少ないが、新薬情報として把握。肝疾患との関連で消化器内科に関連する可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/novel-copper-binding-agent-shows-benefit-wilson-disease-2026a1000cif?src=rss","d":"2026-04-22"},{"t":"Targeting the Proximal Nerve: Faster Implant for Sleep Apnea","s":"睡眠時無呼吸症候群に対する新しい神経刺激インプラント技術が開発された。より迅速な治療法として期待される。","m":"耳鼻咽喉科で睡眠時無呼吸症候群を診療。新技術の動向把握と専門医療機関との連携検討が重要。","i":"睡眠時無呼吸症候群患者の紹介先選択肢として情報収集が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/targeting-proximal-nerve-faster-implant-sleep-apnea-2026a1000ci2?src=rss","d":"2026-04-22"},{"t":"Researchers, Advocates Welcome EO on Psychedelics","s":"精神医学分野での幻覚剤研究に関する大統領令を研究者と支援者が歓迎している。精神疾患治療の新たな可能性について議論。","m":"精神科診療は当院対象外だが、将来的な治療選択肢の変化として業界動向を把握する価値あり。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/researchers-advocates-welcome-executive-order-psychedelics-2026a1000cg0?src=rss","d":"2026-04-22"},{"t":"Cardiac Rehab Remains Underutilized Despite Benefits","s":"心臓リハビリテーションは効果があるにもかかわらず、十分に活用されていないという報告。循環器疾患の継続管理に関する課題。","m":"循環器内科を標榜するクリニックとして、心臓リハビリとの連携は患者予後改善と差別化につながる重要な要素。","i":"循環器疾患患者に対する心臓リハビリの紹介・連携体制を見直し強化する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/cardiac-rehabilitation-remains-underutilized-despite-2026a1000chr?src=rss","d":"2026-04-22"},{"t":"Medscape Most Popular Specialties for Doctors Report 2026","s":"2026年の医師に人気の専門分野調査報告。医療従事者の専門選択傾向や需要動向を示すデータが公表された。","m":"医師採用や専門分野の需要動向として参考情報。将来の人材確保戦略検討時に活用可能なデータ。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/p11/race-relevance-medscape-most-popular-specialties-doctors-2026a1000a3c?src=rss","d":"2026-04-22"},{"t":"Aerobic Exercise Tied to Improved Mobility, Alertness in PD","s":"パーキンソン病患者において有酸素運動が運動機能改善と日中の眠気軽減に効果的であることが示された。","m":"神経変性疾患は当院診療範囲外だが、運動療法の効果に関する知見として参考。生活習慣病患者への運動指導にも応用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/aerobic-exercise-tied-improved-mobility-daytime-sleepiness-2026a1000ce7?src=rss","d":"2026-04-22"},{"t":"'Don't be a wimp,' Mark Cuban tells lawmakers hesitant to break up PBMs","s":"マーク・キューバン氏が議員らに対し、薬剤給付管理会社（PBM）の解体を躊躇する姿勢を批判し、「弱腰になるな」と発言。PBMは薬価交渉や給付管理を行う中間業者として医療費高騰の一因とされている。","m":"PBM問題は主に米国の保険システムに関する話題。日本のクリニック経営には直接的な影響は限定的だが、薬価制度の動向として参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/dont-be-wimp-mark-cuban-tells-lawmakers-hesitant-break-pbms","d":"2026-04-22"},{"t":"UnitedHealth Group spotlights AI investments as part of operational turnaround","s":"米国の大手医療保険会社ユナイテッドヘルス・グループが、業務改革の一環としてAI投資に焦点を当てていることを発表した。同社は2026年の業績見通しを上方修正し、第1四半期の収益も予想を上回った。","m":"海外の医療保険会社のAI活用事例として参考になる。日本の医療DXの方向性を考える上で示唆を得られる可能性がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/unitedhealth-group-boosts-2026-outlook-it-posts-q1-earnings-revenue-beat","d":"2026-04-22"},{"t":"Merger to create nation's largest suicide prevention nonprofit","s":"米国で自殺予防活動を行う非営利団体の合併により、全米最大規模の自殺予防組織が誕生する見込み。精神保健分野での支援体制強化が期待されている。","m":"精神科診療は当院の診療科目ではないが、地域医療連携の観点から精神保健分野の動向把握は有用。患者紹介先の選択肢拡大につながる可能性。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/merger-create-nations-largest-suicide-prevention-nonprofit","d":"2026-04-22"},{"t":"Oz previews new plan to push states toward revalidating Medicaid providers","s":"米国でメディケイド提供者の再認証を州に推進する新たな計画が検討されている。これは医療提供者の資格要件や認証プロセスの見直しに関連している。","m":"米国の医療制度の動向であり、日本の診療所運営には直接影響しない。医療制度改革の参考程度の価値。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/oz-previews-plan-push-states-revalidate-medicaid-providers","d":"2026-04-22"},{"t":"Covera Health, Medmo combine to create end-to-end diagnostic imaging platform","s":"画像診断企業のCovera HealthとMedmoが統合し、画像診断の予約から結果解釈まで一貫したプラットフォームを構築。AI技術を活用した診断支援サービスの拡充を図る。","m":"当院では循環器・消化器領域で画像診断を多用。診断精度向上や業務効率化につながる技術として注目すべき統合案件。","i":"画像診断の効率化技術として、将来的な導入検討が必要","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/digital-health/covera-health-medmo-combine-create-first-complete-diagnostic-imaging-platform","d":"2026-04-22"},{"t":"ECRI spins out healthcare supply chain division into Staritas, backed by PE firm Accel-KKR","s":"医療技術評価機関ECRIが医療サプライチェーン部門をスタリタスとしてスピンアウトし、プライベートエクイティ会社の支援を受けた。医療供給網の効率化を目指している。","m":"医療サプライチェーンの効率化は医療機関の運営コスト削減に関連する。海外動向として今後の参考になり得る。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/ecri-spins-out-healthcare-supply-chain-division-staritas-backed-pe-firm-accel-kkr","d":"2026-04-22"},{"t":"'Hospitals adverse to transparency'—clashing industry groups spar on mulligan 340B rebate pilot","s":"米国の340B薬価割引プログラムをめぐり、病院団体と製薬業界が透明性の問題で対立。リベート試験プログラムの実施について業界内で議論が続いている。","m":"米国の薬価制度に関する話題で、日本の診療報酬制度とは異なる仕組み。参考程度の情報として把握しておく。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/hospitals-adverse-transparency-clashing-industry-groups-spar-mulligan-340b-rebate-pilot","d":"2026-04-22"},{"t":"UnitedHealthcare to eliminate most prior authorizations for rural providers","s":"ユナイテッドヘルスケアが地方医療機関向けに事前承認手続きの大部分を廃止すると発表。地方の医療アクセス改善と事務負担軽減を目的としている。","m":"米国の保険会社の取り組みだが、事前承認制度の簡素化は医療機関の事務負担軽減として参考になる考え方。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/unitedhealthcare-unveils-pilot-accelerate-payments-rural-hospitals","d":"2026-04-22"},{"t":"CVS, Mass General Brigham primary care deal would increase annual care spending by $40M, report predicts","s":"CVSとマサチューセッツ・ジェネラル・ブリガムの提携により、年間医療費が4000万ドル増加するとの予測レポートが発表された。大規模医療チェーンの統合が医療費に与える影響が注目されている。","m":"米国の大型医療統合事例として参考情報。日本でも医療法人の統合・連携が進む中、医療費への影響分析は重要な視点。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/cvs-mass-general-brigham-primary-care-deal-would-increase-annual-care-spending-40m-report","d":"2026-04-22"},{"t":"Chutes & Ladders—Blue Shield of California names chief pharmacy officer; ChristianaCare CEO to retire","s":"ブルーシールド・オブ・カリフォルニアが最高薬剤責任者を任命、クリスティアナケアのCEOが退任予定など、米国医療業界の人事異動情報。","m":"米国医療業界の人事情報。直接的な影響はないが、業界トレンドや組織運営の参考として把握。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/chutes-ladders-2026-hires-departures-firings-retirements-ceo-executives-healthcare","d":"2026-04-22"},{"t":"人材紹介料に消える医療費　10年で2.4倍1000億円超、上限制要望の声","s":"医療機関の人材紹介料が10年で2.4倍の1000億円超に膨張し、医療費を圧迫している。医療業界から上限制を求める声が高まっている。","m":"クリニックも看護師や医療事務の採用で人材紹介会社を利用することが多い。紹介料上限制が導入されれば採用コストに影響する。","i":"人材採用コストの見直しと、紹介料以外の採用手段の検討を行う必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA017YR0R00C26A4000000/","d":"2026-04-22"},{"t":"医療機器のアボット、検体の自動搬送システム　血液や尿など","s":"医療機器大手のアボットが血液や尿などの検体を自動で搬送するシステムを開発した。検査業務の効率化と人的ミスの削減を目指している。","m":"検体検査業務の自動化技術として興味深い。将来的にクリニックでの検査業務効率化の参考になる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC219920R20C26A4000000/","d":"2026-04-22"},{"t":"がんの治療向け「放射性医薬品」、開発支援へ専門部会　内閣府","s":"内閣府ががん治療向けの放射性医薬品開発支援のため専門部会を設置した。がん治療技術の国家的支援体制強化。","m":"放射性医薬品は専門施設での使用が中心で、一般クリニックでの直接的な影響は少ない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG2046M0Q6A420C2000000/","d":"2026-04-22"},{"t":"「昆虫の嗅覚」搭載センサー、がんや感染症の診断に　農研機構など","s":"農研機構などが昆虫の嗅覚を活用したセンサーを開発し、がんや感染症の診断への応用を目指している。新しい診断技術の研究開発事例。","m":"将来的な診断技術として興味深いが、実用化は先の話。現在の診療への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG316CP0R30C26A3000000/","d":"2026-04-22"},{"t":"大塚製薬、乳酸菌に歯肉炎改善効果 東京科学大と共同研究","s":"大塚製薬が東京科学大との共同研究で、乳酸菌に歯肉炎改善効果があることを確認した。口腔ケア分野での新知見。","m":"歯肉炎治療は主に歯科領域だが、耳鼻咽喉科での口腔ケア指導に活用できる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC214350R20C26A4000000/","d":"2026-04-22"},{"t":"アステラス製薬、抗がん剤「パドセブ」適応追加申請 米FDAが受理","s":"アステラス製薬の抗がん剤「パドセブ」の適応追加申請が米FDAに受理された。がん治療薬の適応拡大に関する動向。","m":"がん治療薬の適応拡大は専門病院への影響が大きく、クリニックレベルでの直接的影響は少ない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2127K0R20C26A4000000/","d":"2026-04-22"},{"t":"介護事業の群馬・孫の手 プロ市場上場で認知度高め全国展開狙う","s":"群馬県の介護事業会社「孫 スタッフの活用を検討する場合がある。定着率向上のノウハウは重要な経営課題。","i":"外国人スタッフの採用・定着のためのサポート体制や待遇改善策を検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD134LD0T10C26A4000000/","d":"2026-04-22"},{"t":"再生医療とは 傷ついた組織や臓器を修復、iPS細胞発見で注目","s":"再生医療の基本概念について解説した記事。iPS細胞の発見により注目が高まり、傷ついた組織や臓器の修復・再生を目指す医療分野として発展している。","m":"再生医療は将来的な治療選択肢として患者から相談される可能性がある。基本知識として把握しておく価値がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG17A3T0X10C26A4000000/","d":"2026-04-22"},{"t":"膝関節の再生医療、7月に世界初の治験 藤田医科大学やサイフューズ","s":"藤田医科大学とサイフューズが膝関節の再生医療について、7月に世界初の治験を開始予定。関節疾患の新たな治療法として期待されている。","m":"整形外科との連携や患者の紹介に関連する可能性がある。膝関節疾患を抱える患者への情報提供として有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG041CX0U6A300C2000000/","d":"2026-04-22"},{"t":"米製薬団体、日本での薬価上げ要望 米薬価制度の波及に懸念","s":"米製薬団体が日本での薬価引き上げを要望している。米国の薬価制度改革の影響が日本に波及することへの懸念が背景にある。","m":"薬価上昇は直接的にクリニックの薬剤費に影響する。特に糖尿病や循環器疾患の治療薬コストに注意が必要。","i":"薬剤費の動向を注視し、処方薬の選択や在庫管理への影響を検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC174ZB0X10C26A4000000/","d":"2026-04-22"},{"t":"大日本印刷、単一素材の医療用包材 資源の再利用しやすく","s":"大日本印刷が単一素材を使用した医療用包装材を開発し、リサイクルしやすい環境配慮型製品として展開している。医療廃棄物の削減に貢献する技術。","m":"医療廃棄物のコスト削減や環境対応として将来的に関連する可能性がある。持続可能な医療経営の参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1745I0X10C26A4000000/","d":"2026-04-22"},{"t":"GEヘルスケア、新型CTを国内で発売 同社初の光子計測技術","s":"GEヘルスケアが光子計測技術を搭載した新型CTを国内で発売。医療機器の技術革新により画像診断の精度向上が期待される。","m":"クリニックでは直接CTを保有しないが、連携先病院の診断精度向上や紹介時の検査品質に影響する可能性。","i":"画像診断設備の更新時期や連携先選定の参考情報として活用する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC173KI0X10C26A4000000/","d":"2026-04-22"},{"t":"「がんを知る本」で備え、向き合う 大人も子どももがん教育","s":"がん教育に関する書籍を通じて、大人と子どもの両方に対するがん教育の推進について取り上げている。がんへの理解と向き合い方を学ぶための教育リソースの重要性を論じている。","m":"がん教育の推進は患者教育の参考になる。内科での生活習慣病指導や予防啓発活動に応用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD105270Q6A410C2000000/","d":"2026-04-22"},{"t":"バテる子供たち 便利で快適な現代に足りないものは","s":"現代の子供たちが疲れやすくなっている現象について論じた記事。便利で 科診療でのAI導入検討や、神経内科との連携強化を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/necessity-not-option-ai-neurology-2026a10009z7?src=rss","d":"2026-04-21"},{"t":"Can Fasting Reprogram Chronic Pain?","s":"断食が慢性疼痛の治療に効果的である可能性について検討した記事。断食による慢性疼痛の改善メカニズムや臨床応用の可能性を議論している。","m":"糖尿病患者や消化器疾患患者への断食指導時の注意点として参考になる。疼痛管理への新しいアプローチとして知っておくべき情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/can-fasting-reprogram-chronic-pain-2026a1000cbj?src=rss","d":"2026-04-21"},{"t":"Low-Dose Aspirin May Reduce Cardiovascular Risk in GCA","s":"巨細胞動脈炎患者において低用量アスピリンが心血管リスクを軽減する可能性が示された。循環器疾患の予防戦略に影響を与える研究結果。","m":"内科（循環器）での希少疾患患者管理に関連。心血管リスク管理戦略の更新につながる可能性がある。","i":"循環器内科での巨細胞動脈炎患者に対するアスピリン投与の検討が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/use-low-dose-aspirin-diagnosis-giant-cell-arteritis-may-2026a1000c9w?src=rss","d":"2026-04-21"},{"t":"Implementing BFR in MS Rehab: Efficacy & Safety Insights","s":"多発性硬化症のリハビリテーションにおける血流制限トレーニングの有効性と安全性に関する知見。神経疾患患者への新たなリハビリ手法を紹介。","m":"専門的なリハビリ手法として参考程度。一般的なクリニックでの実施は困難だが、将来的な治療選択肢として注目。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/implementing-bfr-ms-rehab-efficacy-safety-insights-2026a1000am6?src=rss","d":"2026-04-21"},{"t":"No Clinical Benefit of Antiamyloids in AD: Review","s":"アルツハイマー病に対するアミロイド標的薬に臨床的効果がないとするレビュー結果。認知症治療の方向性に影響を与える可能性がある研究。","m":"認知症患者への治療選択に関する参考情報。内科での認知症患者診療における薬物療法の考え方に影響する可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/no-clinical-benefit-antiamyloids-alzheimers-review-concludes-2026a1000c32?src=rss","d":"2026-04-21"},{"t":"Researchers Eye Potential Down Syndrome Fix Via Advanced Gene Editing","s":"研究者らが先進的な遺伝子編集技術を用いてダウン症候群の治療法開発を検討している。遺伝子編集による根本的治療アプローチの研究が進展している。","m":"小児科診療において遺伝性疾患の知識が必要。将来的な治療選択肢として情報収集が重要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/researchers-eye-potential-down-syndrome-fix-advanced-gene-2026a1000c3t?src=rss","d":"2026-04-21"},{"t rchestration","d":"2026-04-21"},{"t":"Breast cancer’s next precision medicine revolution may lie in molecular residual disease","s":"乳がんの次世代精密医療革命が分子残存病変の分野で起こる可能性について。がん治療における個別化医療の進歩に関する内容。","m":"消化器内科・外科での精密医療導入時の参考情報。専門医との連携強化の観点で有用。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/practices/breast-cancers-next-precision-medicine-revolution-may-lie-molecular-residual-disease","d":"2026-04-21"},{"t":"Beyond the Visit: How AI Companion Technology Is Reshaping Outcomes for Aging Populations","s":"高齢者向けAIコンパニオン技術が診療以外の時間で患者の健康状態改善に貢献している事例を紹介。高齢者のアウトカム改善への新しいアプローチを示している。","m":"高齢患者の多い内科・小児科での遠隔モニタリングや継続ケアの参考になる。患者満足度向上にも寄与する可能性がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/sponsored/beyond-visit-how-ai-companion-technology-reshaping-outcomes-aging-populations","d":"2026-04-21"},{"t":"Oscar unveils Lucie, its one-stop shop for individual market plans, supplemental benefits","s":"オスカー社が個人市場向け保険プランと補助給付のワンストップショップ「ルーシー」を発表。保険サービスの統合プラットフォーム。","m":"患者の保険選択が複雑化する中、統合サービスの動向は参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/oscar-unveils-lucie-one-stop-shop-individual-market-plans-and-supplemental-benefits","d":"2026-04-21"},{"t":"DOJ seeks immediate asset freeze, receivership against telehealth company Zealthy","s":"米司法省がテレヘルス企業Zealthyに対して即座の資産凍結と管財人制度を求めている。テレヘルス業界の規制強化やコンプライアンス問題を示している。","m":"オンライン診療を検討する際の法的リスクや規制動向として重要。適切な運営体制構築の必要性を示している。","i":"テレヘルス導入時の法的リスクやコンプライアンス体制の確認を行う。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/doj-seeks-immediate-asset-freeze-receivership-against-telehealth-company-zealthy","d":"2026-04-21"},{"t":"人材紹介料に消える医療費　10年で2.4倍1000億円超、上限制要望の声","s":"医療機関の人材紹介料が10年で2.4倍の1000億円超に増加し、医療費を圧迫している。上限制を求める声が高まっており、制度改正の可能性がある。","m":"クリニック経営における人件費管理に直接影響する重要な情報。看護師や医師確保のコスト増加に対応が必要。","i":"人材採用戦略の見直しと紹介料以外の採用手段の確保を検討する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA017YR0R00C26A4000000/","d":"2026-04-21"},{"t":"介護事業の群馬・孫の手　プロ市場上場で認知度高め全国展開狙う","s":"群馬県の介護事業者「孫の手」がプロ市場上場により認知度を高め、全国展開を目指している。介護事業の成長戦略や市場動向を示している。","m":"高齢患者の増加により介護連携の重要性が高まる中、介護事業者の動向は参考になる。医療と介護の連携強化のヒントとなる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC182T90Y6A410C2000000/","d":"2026-04-21"},{"t":"薬剤師不在でも買える市販薬、ロキソニンなど候補　厚労省が拡大検討","s":"厚労省が薬剤師不在でも購入可能な市販薬の拡大を検討しており、ロキソニンなどが候補に挙がっている。医薬品販売規制の緩和動向。","m":"市販薬で対応可能な症状での受診減少が予想される。特に感冒や軽度の痛みでの内科・耳鼻科受診への影響を注視。","i":"市販薬拡大による受診患者数への影響を分析し、軽症患者向けサービスの差別化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA136X30T10C26A4000000/","d":"2026-04-21"},{"t":"要介護4の父とハワイ旅行　ケア支える仕組みの大切さ実感","s":"要介護4の父親との海外旅行体験を通じて、ケアを支える仕組みの重要性を実感した体験談。介護と日常生活の両立における支援体制の大切さを示している。","m":"患者家族への支援体制やケア連携の重要性を示す事例。クリニックでの家族支援サービス検討の参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD096UB0Z00C26A4000000/","d":"2026-04-21"},{"t":"デジタルで病院を快適に　待ち時間短縮アプリ、車いすを自動運転","s":"病院でのデジタル化による患者体験向上の取り組み。待ち時間短縮アプリや車椅子の自動運転など、テクノロジーを活用した医療サービスの改善事例を紹介。","m":"クリニックでの患者満足度向上や業務効率化に直接応用できる技術動向。競合優位性確保の観点でも重要。","i":"待ち時間管理システムや患者体験向上のためのデジタルツール導入を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQODK073US0X00C26A4000000/","d":"2026-04-21"},{"t":"イーライ・リリー、血液がん治療薬開発のケロニアを買収　最大1兆円","s":"イーライ・リリーが血液がん治療薬開発のケロニアを最大1兆円で買収。製薬大手による血液がん領域への投資拡大を示している。","m":"血液がん治療薬の開発は専門領域であり、プライマリケアクリニックへの直接影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN20B1E0Q6A420C2000000/","d":"2026-04-21"},{"t":"がんの治療向け「放射性医薬品」、開発支援へ専門部会　内閣府","s":"内閣府ががん治療向けの放射性医薬品開発支援のため専門部会を設置。国家戦略としてがん治療技術の開発を推進する方針。","m":"放射性医薬品は高度専門領域での治療であり、クリニックレベルでの直接的な関わりは少ない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG2046M0Q6A420C2000000/","d":"2026-04-21"},{"t":"「昆虫の嗅覚」搭載センサー、がんや感染症の診断に　農研機構など","s":"農研機構などが昆虫の嗅覚を応用したセンサーを開発し、がんや感染症の診断への応用を目指している。新しい診断技術の可能性を示している。","m":"将来的な診断技術として注目すべきだが、実用化は数年先。現時点では直接的な経営影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG316CP0R30C26A3000000/","d":"2026-04-21"},{"t":"膝関節の再生医療、7月に世界初の治験　藤田医科大学やサイフューズ","s":"藤田医科大学とサイフューズが膝関節再生医療の世界初治験を7月に開始予定。再生医療技術の臨床応用が進展していることを示している。","m":"将来的な整形外科分野との連携や、糖尿病患者の関節合併症治療への応用可能性として参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG041CX0U6A300C2000000/","d":"2026-04-21"},{"t":"アッヴィ日本法人、片頭痛予防の飲み薬 治療の選択肢拡大","s":"アッヴィが片頭痛予防の新しい飲み薬を日本で承認取得し、治療選択肢が拡大した。従来の治療法に加えて新たな治療オプションが利用可能になる。","m":"内科で片頭痛患者を診療する際の新たな治療薬選択肢。患者の治療効果向上と差別化につながる可能性がある。","i":"内科での片頭痛患者への新しい治療選択肢として処方検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC1785H0X10C26A4000000/","d":"2026-04-21"},{"t":"協和キリン、高崎市の自動倉庫が稼働 73億円投資","s":"協和キリンが高崎市に73億円を投資して自動倉庫を稼働させました。医薬品流通の効率化が図られます。","m":"製薬会社の物流効率化は医薬品供給に間接的に影響します。クリニックでの医薬品調達に関連する可能性があります。","i":"医薬品供給の安定性向上が期待できる動向として把握","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC206QG0Q6A420C2000000/","d":"2026-04-21"},{"t":"旭化成、ドイツ製薬企業の買収完了 重症感染症向け強化","s":"旭化成がドイツ製薬企業の買収を完了し、重症感染症向けの医薬品事業を強化した。製薬業界の再編動向の一例。","m":"製薬業界の統合は長期的に医薬品供給や価格に影響する可能性があるが、クリニック経営への直接影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC204CS0Q6A420C2000000/","d":"2026-04-21"},{"t":"テルモの鮫島社長「M&A機会、引き続き探る」","s":"テルモの社長がM&A機会を引き続き探ると発言しました。医療機器業界の統合が進む可能性があります。","m":"医療機器メーカーの統合は機器価格や供給体制に影響する可能性があります。クリニックの設備投資計画に関連します。","i":"医療機器市場の動向として情報収集を継続","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC196YU0Z10C26A1000000/","d":"2026-04-21"},{"t":"外国人の都市流出、穴埋めも外国人 帯広の病院「実習後に全員辞めた」","s":"帯広の病院で外国人実習生が実習終了後に全員離職する事態が発生。地方の医療機関における外国人労働者の定着が課題となっている。都市部への人材流出が地方医療の人手不足を深刻化させている。","m":"看護師や医療事務での外国人材活用を検討する際の参考情報。定着率向上策の事前検討が重要。","i":"外国人スタッフの採用・定着戦略の見直しと、長期雇用に向けた労働環境改善の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD134LD0T10C26A4000000/","d":"2026-04-21"},{"t":"再生医療とは 傷ついた組織や臓器を修復、iPS細胞発見で注目","s":"再生医療の基本概念について解説。傷ついた組織や臓器の修復技術で、iPS細胞の発見により注目が高まっている分野。将来的な治療法として期待されている。","m":"将来的に糖尿病合併症や循環器疾患の治療選択肢として関連する可能性。現時点では直接的な診療への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG17A3T0X10C26A4000000/","d":"2026-04-21"},{"t":"米製薬団体、日本での薬価上げ要望 米薬価制度の波及に懸念","s":"米製薬団体が日本での薬価引き上げを要望している。米国の薬価制度改革の影響が日本にも波及することへの懸念が背景にある。","m":"薬価上昇は医療機関の薬剤費負担に直接影響する。特に生活習慣病薬を多く処方する内科診療での収益性に注意が必要。","i":"薬価動向を注視し、処方薬のコスト変動に備えた経営計画の見直しを検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC174ZB0X10C26A4000000/","d":"2026-04-21"},{"t":"大日本印刷、単一素材の医療用包材 資源の再利用しやすく","s":"大日本印刷が単一素材を使用した医療用包装材料を開発。資源の再利用を促進し、環境負荷軽減を図る取り組み。医療材料のサステナビリティ向上が狙い。","m":"医療材料費への影響は軽微だが、環境配慮型医療機関としてのブランディングに活用可能。将来的なSDGs対応の参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1745I0X10C26A4000000/","d":"2026-04-21"},{"t":"GEヘルスケア、新型CTを国内で発売 同社初の光子計測技術","s":"GEヘルスケアが光子計測技術を搭載した新型CTを国内で発売しました。画像診断技術の向上が期待されます。","m":"新型CTの導入は画像診断の質向上につながります。循環器内科での診断能力向上や患者獲得に影響する可能性があります。","i":"新技術CTの導入可能性と競合クリニック動向を調査検討","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC173KI0X10C26A4000000/","d":"2026-04-21"},{"t":"「脱ヘリウムMRI」に熱視線 フィリップス、中東緊迫で引き合い増","s":"フィリップスの脱ヘリウムMRIが中東情勢の影響でヘリウム不足懸念から注目を集めています。","m":"ヘリウム不足は既存MRI運用コストに影響します。設備更新時の選択肢として脱ヘリウム技術を検討する必要があります。","i":"MRI設備更新時の脱ヘリウム機種検討とヘリウム供給リスク評価","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC137QP0T10C26A4000000/","d":"2026-04-21"},{"t":"厚労相「一部医療機関で手袋確保困難」 5月に備蓄放出","s":"厚生労働大臣が一部医療機関で医療用手袋の確保が困難な状況にあることを発表。5月に国家備蓄からの放出を実施予定。医療物資の供給不足が再び課題となっている。","m":"感染対策に必須の医療材料。在庫管理の見直しと、複数業者からの調達ルート確保が急務。","i":"医療用手袋の在庫状況を緊急確認し、必要に応じて追加調達や備蓄放出への申請を検討する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA170RU0X10C26A4000000/","d":"2026-04-21"},{"t":"サワイGHDの沢井会長「後発薬の産業構造変わる」 特許切れ薬価改革","s":"サワイGHDの会長が後発薬の産業構造変化について言及。特許切れ薬の薬価改革により、ジェネリック医薬品業界の再編が進むとの見解。","m":"ジェネリック医薬品の供給不安や価格変動は処方選択と医療機関の収益に直接影響。糖尿病・循環器薬での影響が大きい。","i":"ジェネリック医薬品の供給安定性と価格動向を注視し、薬剤選択方針の見直しを検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF067ZR0W6A400C2000000/","d":"2026-04-21"},{"t":"参天製薬の伊藤毅社長、近視治療「急拡大より定着を」","s":"参天製薬社長が近視治療について「急拡大より定着を重視」との方針を示した。小児の近視治療市場の慎重な発展を目指している。","m":"小児近視治療は眼科領域であり、小児科での直接的な取り扱いは限定的。将来的な連携の可能性程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF165LE0W6A110C2000000/","d":"2026-04-21"},{"t":"介護就業体験のベトナム人学生、川崎市長を表敬訪問 人材確保の一環","s":"川崎市でベトナム人学生が介護就業体験を実施し、市長を表敬訪問。外国人材の介護分野での活用促進が進んでいる。人材確保策の一環として注目されている。","m":"医療機関での外国人材活用の参考事例。介護分野の取り組みを医療分野にも応用できる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC1647E0W6A410C2000000/","d":"2026-04-21"},{"t":"バテる子供たち 便利で快適な現代に足りないものは","s":"現代の子供たちの体力低下や疲れやすさについて便利で快適な現代生活との関連性を指摘した記事です。","m":"小児の体力低下は小児科診療で実際に直面する問題です。生活習慣指導や予防医学的アプローチの強化が必要かもしれません。","i":"小児科診療での生活指導や健康管理アプローチの見直し検討","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD3160I0R30C26A3000000/","d":"2026-04-21"},{"t":"ブータンの胃がん減らせ、ピロリ菌の検査キット開発 大分大学など","s":"大分大学などがブータンの胃がん減少を目指し、ピロリ菌検査キットを開発。国際協力による医療技術開発の事例。発展途上国での胃がん予防対策に貢献する取り組み。","m":"消化器内科での胃がん検診におけるピロリ菌検査の重要性を再確認。検査技術の進歩動向として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC2033N0Q6A420C2000000/","d":"2026-04-21"},{"t":"佐々木貴史さん（1）夢のシャツで人々健康に","s":"佐々木貴史氏による健康をサポートするシャツの開発に関する記事。ウェアラブル技術を活用した健康管理アプローチについて紹介している。","m":"ヘルスケア関連の新技術動向として参考程度。直接的な診療への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD221HJ0S6A320C2000000/","d":"2026-04-21"},{"t":"医療政策の専門家、がんになり「認識不足を痛感」 自己負担のあり方は","s":"医療政策専門家ががんに罹患し、患者としての立場から医療費自己負担のあり方について認識を改めたとの体験談。医療政策への示唆を含む。","m":"医療費負担制度の議論は長期的に診療報酬制度にも影響し得るが、現時点では参考情報の範囲。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA137Q90T10C26A4000000/","d":"2026-04-21"},{"t":"iPS細胞治療が承認、恩恵は？ まずはパーキンソン病と心不全治療に","s":"iPS細胞治療がパーキンソン病と心不全治療で承認された。再生医療の臨床応用が本格化し、将来的に治療の選択肢が大幅に拡大する可能性がある。","m":"将来的な治療技術として注目すべきだが、クリニックレベルでの即座の対応は不要。循環器領域での長期的な治療変革の可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD311Z50R30C26A3000000/","d":"2026-04-21"},{"t":"Who is liable when artificial intelligence makes mistakes?","s":"AIが間違いを犯した場合の責任の所在について議論されている。保険会社は企業責任保険からAI関連の損害を除外しようとしており、AI利用に関する法的リスクが課題となっている。","m":"AI問診や診療支援システム導入時の責任問題として関連する可能性がある。医療AIの責任範囲について今後検討が必要な分野。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/51b55431-30e8-4eb3-9730-f5e89c24ad56","d":"2026-04-21"},{"t":"NHS’s deal with Palantir could be good for its financial health","s":"英国の国民保健サービス（NHS）がパランティア社との提携により医療データ統合で時間とコスト削減を図る取り組みです。","m":"医療データ統合は日本でも医療DX推進の重要テーマです。将来的にクリニックでも同様のシステム導入が求められる可能性があります。","i":"医療DXの海外動向として情報収集し国内展開時期を注視","src":"FT","p":"参考","u":"https://www.ft.com/content/99478748-0b3a-4424-b528-26b73a1415ee","d":"2026-04-21"},{"t":"Anthropic’s Mythos AI model tests limits of global cyber defences","s":"AnthropicのMythos AIモデルが世界のサイバー防御の限界をテストしており、ハッキングを加速し、修正される前に弱点を露呈する可能性への懸念が高まっている。","m":"電子カルテやクリニックの情報システムのセキュリティリスクに関連する可能性がある。医療機関のサイバーセキュリティ対策の重要性が増している。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/b9e79c53-9f14-4b7a-b250-d7a230ca8433","d":"2026-04-21"},{"t":"診療報酬改定","s":"厚生労働省の診療報酬改定に関する公式情報。医療機関の収入に直接影響する制度変更の詳細が含まれる。","m":"診療報酬改定は医療機関経営の根幹に関わる最重要事項。改定内容の把握と対応策検討が必須。","i":"最新の診療報酬改定内容を確認し、当院の算定項目への影響を分析する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-20"},{"t":"消費税と診療報酬について","s":"厚生労働省の消費税と診療報酬に関する公式見解。消費税率変更時の診療報酬への影響について説明している。","m":"消費税は医療機関の経営に直接影響する税制。診療報酬との関係性を正しく理解することが重要。","i":"消費税と診療報酬の関係を理解し、税制変更時の影響を把握する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-20"},{"t":"ジカウイルス感染症","s":"厚生労働省のジカウイルス感染症に関する公式情報。感染症の概要と対策について記載されている。","m":"感染症対策の一般的な情報として有用だが、現在日本での発生は稀で緊急性は低い。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-20"},{"t":"Implementing BFR in MS Rehab: Efficacy & Safety Insights","s":"多発性硬化症のリハビリテーションにおける血流制限訓練（BFR）の有効性と安全性に関する知見。リハビリ手法の改善に向けた研究報告。","m":"当院では直接的なリハビリ提供はないが、患者紹介時の参考情報として有用。多発性硬化症患者の管理における新知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/implementing-bfr-ms-rehab-efficacy-safety-insights-2026a1000am6?src=rss","d":"2026-04-20"},{"t":"No Clinical Benefit of Antiamyloids in AD: Review","s":"アルツハイマー病に対するアミロイド薬物治療に臨床的利益がないとするレビュー結果。認知症治療戦略の見直しが示唆される。","m":"高齢患者が多い当院では認知症の早期発見・管理が重要。治療薬の有効性に関する知見は患者家族への説明時に参考になる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/no-clinical-benefit-antiamyloids-alzheimers-review-concludes-2026a1000c32?src=rss","d":"2026-04-20"},{"t":"Researchers Eye Potential Down Syndrome Fix Via Advanced Gene Editing","s":"ダウン症候群の治療に向けた遺伝子編集技術の応用研究。先進的な遺伝子治療技術の開発動向を示す基礎研究段階の報告。","m":"小児科での遺伝性疾患管理に将来的に関連する可能性があるが、現時点では基礎研究段階で実臨床への影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/researchers-eye-potential-down-syndrome-fix-advanced-gene-2026a1000c3t?src=rss","d":"2026-04-20"},{"t":"Stroke and Embolism After Ablation for AF Patients","s":"心房細動患者でのカテーテルアブレーション後の脳卒中・塞栓症のリスクに関する研究。循環器治療における重要な合併症情報。","m":"循環器内科を標榜する当院では心房細動患者が多く、アブレーション適応判断や患者説明に直接関連する重要な情報。","i":"循環器患者の治療選択肢説明時にアブレーション後のリスク情報を更新し、適切なインフォームドコンセントを実施する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/stroke-and-embolism-after-ablation-af-patients-2026a1000c2d?src=rss","d":"2026-04-20"},{"t":"‘Dancing’ Molecules Spur Healing in Spinal Cord Tissue","s":"脊髄組織の治癒を促進する「踊る」分子に関する基礎研究。再生医療や神経系疾患治療における新しいアプローチの可能性を示す。","m":"神経系疾患の新治療法として将来的に注目すべき分野だが、現時点では基礎研究段階で直接的な臨床応用は遠い。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/dancing-molecules-spur-healing-spinal-cord-tissue-2026a1000c1s?src=rss","d":"2026-04-20"},{"t":"Pollution, Weather Linked to Severe Migraine Attacks","s":"大気汚染と天候が重度の片頭痛発作と関連していることが研究で明らかになった。環境要因が片頭痛症状に与える影響について医学的知見が得られている。","m":"内科で頭痛患者を診察する際の参考情報。環境要因を考慮した診療や患者指導に活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/pollution-weather-linked-severe-migraine-attacks-2026a1000c1r?src=rss","d":"2026-04-20"},{"t":"ACC 2026: ATTR-CM Advances Extend Survival and Function","s":"ACC 2026でのATTR心筋症の治療進歩により生存期間と機能の改善が報告された。心不全の特殊な病型に対する治療選択肢の拡大。","m":"循環器を標榜する当院では心不全患者を診るため、ATTR心筋症の診断・治療に関する知見は将来的に参考になる可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mdangle-acc-2026-amyloidosis-attr-cm-clinical-impact-2026a10005am?src=rss","d":"2026-04-20"},{"t":"Poststroke Virtual Therapy No Better Than Standard Care","s":"脳卒中後のバーチャル運動療法が標準治療と比較して優位性を示さなかったという研究結果。遠隔リハビリの有効性に関する知見。","m":"脳卒中患者のフォローアップ時に遠隔リハビリオプションを検討する際の参考情報。デジタル治療の限界を示す事例。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/poststroke-virtual-movement-therapy-no-better-than-standard-2026a1000bxe?src=rss","d":"2026-04-20"},{"t":"Common Genetic Cause of Intellectual Disability Identified","s":"知的障害の一般的な遺伝的原因が特定されたという研究報告。遺伝的要因による知的障害の診断や治療に関する新たな知見が得られた。","m":"小児科診療での発達評価や遺伝カウンセリングの際の参考情報となる。直接的な診療報酬への影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/common-genetic-cause-intellectual-disability-epilepsy-2026a1000bw8?src=rss","d":"2026-04-20"},{"t":"Roche: New Elevidys Study After Feedback From EU Regulator","s":"ロシュ社が欧州規制当局からのフィードバックを受けて、エレビディス（デュシェンヌ型筋ジストロフィー治療薬）の新たな臨床試験を開始。","m":"希少疾患治療薬の動向として参考程度。当クリニックの対象患者は限定的で、直接的な経営への影響は小さい。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/roche-launches-new-elevidys-study-after-feedback-european-2026a1000bxm?src=rss","d":"2026-04-20"},{"t":"Affordability, transparency: A look at large employers' top healthcare concerns","s":"大企業の医療費に関する主要な懸念として、コスト負担と透明性が挙げられている。医療費の適正化と透明性向上が求められている状況。","m":"企業健診や産業医業務を検討する際の参考情報。患者の医療費負担に対する社会的な関心の高まりを示す。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/affordability-transparency-look-large-employers-top-healthcare-concerns","d":"2026-04-20"},{"t":"Gen AI chatbots continually struggle with differential diagnoses, Mass General Brigham study finds","s":"マサチューセッツ総合病院の研究により、生成AI チャットボットが鑑別診断において継続的に困難を抱えていることが判明した。医療AIの限界が明確化されている。","m":"クリニックでのAI導入検討時の重要な判断材料。診療の質と効率のバランスを考慮した導入計画が必要。","i":"AI問診システム導入時は診断支援機能に過度に依存せず、医師の最終判断を重視する体制を維持する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/gen-ai-chatbots-continually-struggle-differential-diagnoses-mass-general","d":"2026-04-20"},{"t":"Over 80% of PCPs concerned about financial stability over next several years","s":"プライマリケア医師の80%以上が今後数年間の財政安定性について懸念を抱いているという調査結果。クリニック経営の厳しい現状が浮き彫りになった。","m":"同じプライマリケアを担う当クリニックにとって非常に関連性が高い。経営戦略の見直しが必要。","i":"同業他院の経営状況を把握し、自院の収益性向上策を再検討する必要がある。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/over-80-pcps-concerned-about-financial-stability-over-next-several-years-elation-health","d":"2026-04-20"},{"t":"SocialRx teams up with FQHC in NYC to prescribe arts and culture for chronically ill patients","s":"ニューヨークの連邦認定保健センターがソーシャルプリスクリプション（芸術・文化活動の処方）を慢性疾患患者に導入する取り組み。","m":"慢性疾患管理の新しいアプローチとして参考。糖尿病患者の生活指導に応用可能性がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/socialrx-teams-nyc-federally-qualified-health-center-social-prescribing","d":"2026-04-20"},{"t":"Former Deputy Surgeon General Erica Schwartz, M.D., nominated as CDC director","s":"元副公衆衛生長官のエリカ・シュワルツ医師がCDC長官に指名された。公衆衛生政策の方向性に影響を与える可能性がある。","m":"感染症対策や公衆衛生政策の変化を注視する必要があるが、直接的な診療への影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/former-deputy-surgeon-general-erica-schwartz-md-nominated-cdc-director","d":"2026-04-20"},{"t":"APA launches resource library for trusted digital mental health tools","s":"米国精神医学会が信頼できるデジタルメンタルヘルスツールのリソースライブラリを開設。精神的不調への対応ツールが整備された。","m":"心療内科的な対応が必要な患者への参考情報として活用可能。デジタルヘルス導入の検討材料。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/digital-health/apa-launches-digital-badge-solutions-library-trusted-digital-health-tools","d":"2026-04-20"},{"t":"Providers' advantage on out-of-network billing disputes likely to continue: Capstone","s":"ネットワーク外請求に関する紛争において、医療提供者側が有利な状況が続く見通しとの分析。保険外診療の請求に関する動向。","m":"自費診療の料金設定や保険適用外治療の請求に直接関わる重要な情報。収益に影響する可能性。","i":"保険外診療や自費診療の請求体制を見直し、適切な料金設定を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/finance/providers-advantage-out-network-billing-disputes-likely-continue-capstone","d":"2026-04-20"},{"t":"RFK Jr. kicks off string of congressional hearings to talk White House budget plan","s":"RFKジュニアが議会公聴会で政権の予算計画について説明を開始。医療政策や予算配分に影響する可能性がある政治的動向。","m":"医療政策の大幅な変更が予想される中、診療報酬制度や医療規制への影響を監視する必要。","i":"医療政策の変化を注視し、診療報酬や規制変更への対応準備を行う。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/regulatory/rfk-jr-kicks-string-congressional-hearings-talk-white-house-budget-plan","d":"2026-04-20"},{"t":"Fierce Healthcare Layoff Tracker—UnityPoint outsourcing hits at least 207; Baylor Scott & White sheds 321 insurance staff","s":"大手医療システムで人員削減が続いており、ユニティポイントで207人、ベイラー・スコット・アンド・ホワイトで321人の保険部門スタッフが削減された。","m":"大手医療機関の経営効率化の動向として参考。クリニック規模では直接的な影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/finance/fierce-healthcare-layoff-tracker-2026-job-cuts-eliminations-health-systems-hospitals","d":"2026-04-20"},{"t":"昆虫の嗅覚搭載センサー、がんや感染症の診断に　農研機構など","s":"農研機構などが昆虫の嗅覚を搭載したセンサーを開発し、がんや感染症の診断への応用を研究している。","m":"将来的な診断技術の進歩として注目すべきだが、実用化までは時間を要する。現在の診療への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG316CP0R30C26A3000000/","d":"2026-04-20"},{"t":"外国人の都市流出、穴埋めも外国人　帯広の病院「実習後に全員辞めた」","s":"外国人労働者の都市部流出により地方病院が人材不足に直面し、実習生も全員辞職するケースが発生している帯広の病院事例が報告されている。","m":"地方クリニックでも外国人スタッフ雇用が現実的選択肢となる中、定着率向上が経営課題となる。","i":"外国人スタッフ採用時は定着率向上のための労働環境整備と継続的なサポート体制を構築する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD134LD0T10C26A4000000/","d":"2026-04-20"},{"t":"薬剤師不在でも買える市販薬、ロキソニンなど候補　厚労省が拡大検討","s":"厚労省が薬剤師不在でも購入可能な市販薬の拡大を検討している。ロキソニンなどの候補が挙がっている。","m":"市販薬の範囲拡大は軽症患者の受診行動に影響する可能性がある。特に内科・小児科の外来に影響大。","i":"市販薬拡大による外来患者数への影響を検討し、診療戦略の見直しを検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA136X30T10C26A4000000/","d":"2026-04-20"},{"t":"要介護4の父とハワイ旅行　ケア支える仕組みの大切さ実感","s":"要介護4の父親とのハワイ旅行体験を通じて、介護を支える社会システムの重要性について実感した体験談が紹介されている。","m":"高齢患者の生活の質向上に向けた社会システムの重要性。地域包括ケアでの連携強化の参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD096UB0Z00C26A4000000/","d":"2026-04-20"},{"t":"デジタルで病院を快適に　待ち時間短縮アプリ、車いすを自動運転","s":"病院でのデジタル化が進み、待ち時間短縮アプリや車椅子の自動運転など患者の利便性向上を目指す技術が導入されている。","m":"クリニックでも導入可能な患者サービス向上技術。待ち時間問題の解決策として有効。","i":"患者満足度向上のため、予約システムや待ち時間管理のデジタル化導入を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQODK073US0X00C26A4000000/","d":"2026-04-20"},{"t":"厚労相「一部医療機関で手袋確保困難」　5月に備蓄放出","s":"厚生労働相が一部医療機関で医療用手袋の確保が困難な状況であることを発表し、5月に国家備蓄からの放出を実施すると表明した。","m":"感染対策に必須の医療資材不足は診療継続に直結する問題。早急な対応が必要。","i":"医療用手袋の在庫状況を早急に確認し、不足が予想される場合は複数の調達ルートを確保する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA170RU0X10C26A4000000/","d":"2026-04-20"},{"t":"膝関節の再生医療、7月に世界初の治験　藤田医科大学やサイフューズ","s":"藤田医科大学とサイフューズが膝関節の再生医療について7月に世界初の治験を開始すると発表した。画期的な治療法開発が進展している。","m":"整形外科分野での将来的な治療選択肢拡大。関節疾患患者への情報提供材料として有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG041CX0U6A300C2000000/","d":"2026-04-20"},{"t":"再生医療とは 傷ついた組織や臓器を修復、iPS細胞発見で注目","s":"再生医療の基本概念について、傷ついた組織や臓器の修復技術としてiPS細胞発見により注目が高まっていることが解説されている。","m":"患者への治療説明や将来の医療技術動向把握のための基礎知識として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG17A3T0X10C26A4000000/","d":"2026-04-20"},{"t":"米製薬団体、日本での薬価上げ要望 米薬価制度の波及に懸念","s":"米製薬団体が日本での薬価引き上げを要望している。米国の薬価制度の変更が日本の薬価政策に波及することを懸念している。","m":"薬価改定は直接的に医薬品コストと診療報酬に影響する。特に慢性疾患の多い当院では薬剤費への影響が大きい。","i":"薬価動向を注視し、使用頻度の高い薬剤の薬価変更が経営に与える影響を試算する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC174ZB0X10C26A4000000/","d":"2026-04-20"},{"t":"大日本印刷、単一素材の医療用包材 資源の再利用しやすく","s":"大日本印刷が単一素材を使用した医療用包装材を開発し、資源のリサイクルを容易にする環境配慮型製品を発表した。","m":"医療廃棄物処理コスト削減や環境負荷軽減に寄与する可能性があるが、直接的な経営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1745I0X10C26A4000000/","d":"2026-04-20"},{"t":"GEヘルスケア、新型CTを国内で発売 同社初の光子計測技術","s":"GEヘルスケアが光子計測技術を搭載した新型CTを国内で発売することが発表されました。これは同社初の技術で、画像診断の精度向上が期待されます。","m":"クリニックでのCT導入は一般的ではありませんが、医療機器技術の進歩として参考になります。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC173KI0X10C26A4000000/","d":"2026-04-20"},{"t":"「脱ヘリウムMRI」に熱視線 フィリップス、中東緊迫で引き合い増","s":"フィリップスがヘリウムを使わないMRI装置への注目が高まっており、中東情勢の緊迫化によりヘリウム供給への懸念から引き合いが増加しています。","m":"MRI設備はクリニックレベルでは導入が限定的ですが、医療機器の供給リスクとして参考になります。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC137QP0T10C26A4000000/","d":"2026-04-20"},{"t":"サワイGHDの沢井会長「後発薬の産業構造変わる」 特許切れ薬価改革","s":"サワイGHDの会長が特許切れ薬価改革により後発薬の産業構造が変わると発言している。","m":"後発薬の産業構造変化は薬剤選択と薬剤費に直接影響。安定供給と品質確保の観点で重要。","i":"後発薬の選定方針と薬剤費削減戦略を見直し、安定供給可能な製薬会社を確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF067ZR0W6A400C2000000/","d":"2026-04-20"},{"t":"参天製薬の伊藤毅社長、近視治療「急拡大より定着を」","s":"参天製薬社長が近視治療について急拡大より定着を重視すると発言している。","m":"眼科領域の話題で当院の診療科目とは直接関係しない。小児の近視予防程度の関連性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF165LE0W6A110C2000000/","d":"2026-04-20"},{"t":"介護就業体験のベトナム人学生、川崎市長を表敬訪問 人材確保の一環","s":"川崎市でベトナム人学生が介護就業体験を行い、市長を表敬訪問した。介護分野の人材確保の一環として外国人材の活用が進んでいる。","m":"介護と医療は連携する分野。外国人材活用の動向は今後の医療スタッフ確保の参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC1647E0W6A410C2000000/","d":"2026-04-20"},{"t":"東和薬品、独系製造受託と後発薬製造で協業 供給不安解消へ増産","s":"東和薬品がドイツ系製造受託企業と協業し、後発薬の製造体制を強化することで供給不安の解消を目指すと発表されました。増産体制の構築が進められます。","m":"後発薬の供給不安は処方薬選択に直接影響するため、クリニックの薬剤コストに関わります。","i":"後発薬の供給状況改善により、薬剤処方選択肢の拡大と薬剤費削減効果を注視する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF1664E0W6A410C2000000/","d":"2026-04-20"},{"t":"塩野義のCVCが初出資 視覚再生遺伝子治療のレストアビジョンに","s":"塩野義製薬のCVCが視覚再生遺伝子治療を手がけるレストアビジョンに初出資。製薬企業による遺伝子治療分野への投資動向。","m":"糖尿病合併症としての糖尿病網膜症患者への将来的治療選択肢として関連。眼科連携の観点でも重要な動向。","i":"遺伝子治療の進歩により将来的に眼科疾患の治療選択肢が拡大する可能性を把握しておく。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC168HG0W6A410C2000000/","d":"2026-04-20"},{"t":"サントリーHD、医薬品20年ぶり「再参入」の勝算 健康軸に実取る","s":"サントリーホールディングスが20年ぶりに医薬品事業に再参入。健康を軸とした事業展開の勝算について分析した記事。","m":"大手企業の医薬品市場参入は業界動向として把握すべき。新たな治療薬開発や医薬品供給体制に影響する可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC14AA10U6A410C2000000/","d":"2026-04-20"},{"t":"ネクセラファーマ、台湾で不眠症治療薬の販売承認 年内発売へ","s":"ネクセラファーマが台湾で不眠症治療薬の販売承認を取得し、年内発売予定。海外での新薬承認事例として注目される。","m":"不眠症患者は内科でも診ることがあり、新規治療選択肢として将来的に参考になる可能性。海外承認のため直接的な影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1581N0V10C26A4000000/","d":"2026-04-20"},{"t":"川崎重工、名古屋の中京病院などに搬送ロボット納入 累計10施設に","s":"川崎重工が名古屋の中京病院などに搬送ロボットを納入し、累計10施設に導入された。医療機関での自動化・省人化が進展している。","m":"クリニックでも将来的に搬送業務の自動化需要が高まる可能性。労働効率化の一つの選択肢。","i":"院内物流の自動化検討、労働力不足対策として搬送ロボット導入の可能性を調査する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC161MD0W6A410C2000000/","d":"2026-04-20"},{"t":"参天製薬、成長懸ける「自由診療」市場 近視薬など5000施設へ","s":"参天製薬が自由診療市場に注力し、近視薬などを5000施設に展開する方針。眼科領域の自由診療市場が拡大している。","m":"小児科で近視治療のニーズが高まっている。自由診療による収益機会の拡大が期待できる。","i":"自由診療メニューの拡充、特に眼科・近視関連の治療オプション導入を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF139AM0T10C26A3000000/","d":"2026-04-20"},{"t":"第一三共、がん領域に集中投資で世界追う サントリーに市販薬売却","s":"第一三共ががん領域に集中投資するため、サントリーに市販薬事業を売却する。製薬会社の事業再編が進んでいる。","m":"消化器がん治療薬の開発動向に注目。将来的に新薬の選択肢が増える可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC154BL0V10C26A4000000/","d":"2026-04-20"},{"t":"佐々木貴史さん（1）夢のシャツで人々健康に","s":"佐々木貴史氏による健康シャツに関する記事。ウェアラブル技術や健康管理ツールの開発動向に関する内容と推測される。","m":"詳細不明だが、患者の健康管理や予防医療に関連する可能性。具体的な医療機器でなければ直接的な経営影響は小さい。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD221HJ0S6A320C2000000/","d":"2026-04-20"},{"t":"医療政策の専門家、がんになり「認識不足を痛感」 自己負担のあり方は","s":"医療政策の専門家ががんになった経験から、患者自己負担のあり方について認識不足を痛感したという内容。","m":"患者視点での医療政策理解は重要だが、直接的な経営への影響は少ない。患者対応の参考程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA137Q90T10C26A4000000/","d":"2026-04-20"},{"t":"iPS細胞治療が承認、恩恵は？ まずはパーキンソン病と心不全治療に","s":"iPS細胞治療が承認され、パーキンソン病と心不全治療への応用が期待される。再生医療の実用化により治療選択肢が拡大する。","m":"循環器を標榜する当院にとって心不全治療の新選択肢は重要。パーキンソン病も高齢患者で遭遇する可能性がある。","i":"循環器内科における心不全治療の選択肢拡大を注視し、将来の連携体制構築を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD311Z50R30C26A3000000/","d":"2026-04-20"},{"t":"リンパ節の腫れ、痛みがなくても油断禁物 見極め方は","s":"リンパ節の腫れについて、痛みがない場合でも注意が必要で、適切な見極め方について解説している健康情報記事です。","m":"内科診療でのリンパ節腫脹の診察に参考となる情報で、患者への説明時に活用可能です。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD019U00R00C26A4000000/","d":"2026-04-20"},{"t":"「脳は老化する」とあきらめない 脳を活性化する秘策とは","s":"脳の老化に対する認識を改め、脳を活性化する方法について解説している健康情報記事です。認知症予防や脳機能維持に関する内容と推測されます。","m":"高齢患者への健康指導や認知症予防相談時に参考となる情報として活用できます。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD316LJ0R30C26A3000000/","d":"2026-04-20"},{"t":"The NHS’s deal with Palantir could be good for its financial health","s":"英国NHSがPalantir社とのデータ統合契約を締結。医療データが異なるソフトウェアシステムに分散している問題を解決し、データ連携により時間、病床、コストの削減を目指す取り組み。","m":"医療データ統合は日本の医療DXでも重要課題。電子カルテやシステム連携の参考事例として注目。海外の医療システム効率化動向として情報収集価値あり。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/99478748-0b3a-4424-b528-26b73a1415ee","d":"2026-04-20"},{"t":"Why we must shield our children from social media","s":"子どもたちをソーシャルメディアから保護すべきとする論説。スペインの取り組みを例に、テクノロジー企業から子どもを守ることの法的・道徳的義務について論じている。","m":"小児科を有するクリニックとして、患者である子どもたちのデジタル環境への理解は重要。診療時の参考情報として活用可能。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/128b2e15-eb46-4083-80be-704b170d9600","d":"2026-04-20"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-19"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-19"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m": :"Pollution, Weather Linked to Severe Migraine Attacks","s":"大気汚染と気象条件が重度の偏頭痛発作と関連しているという研究結果が報告されている。","m":"環境要因と頭痛の関連は患者への生活指導や予防的アプローチに参考となる情報。内科診療での患者指導に活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/pollution-weather-linked-severe-migraine-attacks-2026a1000c1r?src=rss","d":"2026-04-19"},{"t":"ACC 2026: ATTR-CM Advances Extend Survival and Function","s":"ACC 2026でのATTR心筋症（遺伝性心アミロイドーシス）治療の進歩に関する報告。生存期間延長と機能改善効果についての最新知見。","m":"循環器内科診療で稀だが重要な疾患。早期発見・専門医連携のために最新治療動向の把握が必要。","i":"心疾患患者の鑑別診断において、ATTR心筋症の可能性を考慮した診療体制の検討。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/mdangle-acc-2026-amyloidosis-attr-cm-clinical-impact-2026a10005am?src=rss","d":"2026-04-19"},{"t":"Poststroke Virtual Therapy No Better Than Standard Care","s":"脳梗塞後のバーチャル理学療法が従来の標準治療と比較して優位性を示さなかったという研究結果。リハビリテーション手法の有効性評価。","m":"脳梗塞後患者のフォローアップにおける情報だが、当院では専門的リハビリは提供していない。参考程度の情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/poststroke-virtual-movement-therapy-no-better-than-standard-2026a1000bxe?src=rss","d":"2026-04-19"},{"t":"Common Genetic Cause of Intellectual Disability Identified","s":"知的障害の一般的な遺伝的原因が特定されたという研究報告。遺伝子レベルでの原因解明による診断・治療法開発への期待。","m":"小児科診療における発達評価の背景知識として有用。ただし現在の診療レベルでの直接的影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/common-genetic-cause-intellectual-disability-epilepsy-2026a1000bw8?src=rss","d":"2026-04-19"},{"t":"Roche: New Elevidys Study After Feedback From EU Regulator","s":"ロシュ社がEU規制当局のフィードバックを受けてElevidys（遺伝子治療薬）の新たな臨床試験を開始。筋ジストロフィー治療薬の開発動向。","m":"稀少疾患の遺伝子治療に関する情報。当院の診療範囲外だが、医療技術の進歩として把握しておく価値あり。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/roche-launches-new-elevidys-study-after-feedback-european-2026a1000bxm?src=rss","d":"2026-04-19"},{"t":"Gen AI chatbots continually struggle with differential diagnoses, Mass General Brigham study finds","s":"マサチューセッツ総合病院の研究により、生成AI チャットボットが鑑別診断において継続的に課題を抱えていることが判明した。AI診断支援ツールの精度と限界が
