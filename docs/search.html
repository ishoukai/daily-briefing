mes: A Systematic Review and Meta-Analysis.","s":"GLP-1受容体作動薬の神経精神学的効果に関する系統的レビューとメタ解析。認知機能低下、気分障害、物質使用障害への効果を検討している。","m":"当院でのGLP-1薬使用患者で認知機能や精神状態の変化を観察する価値あり。多科連携の強化も検討課題。","i":"GLP-1薬処方時の多面的効果を患者説明に含め、精神科的既往の確認を強化する","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41862354/","d":"2026-03-23"},{"t":"Angiography-derived fractional flow reserve versus coronary angiography to guide coronary artery bypass grafting in patients undergoing surgical valve procedures with concomitant coronary artery disease in China (FAVOR IV-QVAS): a multicentre, triple-blind, randomised trial.","s":"心臓弁膜症手術と同時冠動脈バイパス術において、血管造影由来FFRによる生理学的評価が従来の解剖学的評価より良好な結果をもたらすかを検討した中国の多施設無作為化試験。","m":"循環器診療での参考情報だが、クリニックレベルでの直接的な影響は限定的。専門医療機関への紹介判断の参考程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41864747/","d":"2026-03-23"},{"t":"Effect of a clinical decision support system on stroke care quality and outcomes in patients with acute ischaemic stroke (GOLDEN BRIDGE II): cluster randomised clinical trial.","s":"急性虚血性脳卒中患者に対する臨床意思決定支援システム（CDSS）の効果を検討した中国の多施設クラスター無作為化試験。AI支援画像解析等を含む。","m":"脳卒中診療の質向上に関する参考情報。当院では脳卒中の急性期治療は行わないが、予防・管理での参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41862204/","d":"2026-03-23"},{"t":"Increased risk of stroke in patients with psoriasis: A systematic review and meta-analysis.","s":"乾癬患者における脳卒中リスク増加を示すメタ解析。70万人超の乾癬患者を含む18研究を解析し、脳卒中リスクの有意な増加を確認。","m":"耳鼻科外来でも皮膚症状を訴える患者がいる。乾癬疑い患者では心血管リスク評価と適切な専門医紹介が重要。","i":"皮膚症状で受診する患者の心血管リスク評価を強化し、必要に応じて循環器科紹介を検討","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861197/","d":"2026-03-23"},{"t":"On-target, off-tumor oral toxicities of talquetamab in heavily pretreated multiple myeloma.","s":"多発性骨髄腫治療薬タルケタマブの口腔毒性に関するレビュー。GPRC5D標的療法による舌・唾液腺・角化組織への副作用について解説。","m":"血液悪性疾患の専門的治療に関する内容で、クリニックでの直接的な関連性は低い。専門医療機関での治療情報として参考程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860737/","d":"2026-03-23"},{"t":"Management of Takayasu Arteritis - A 2026 Update.","s":"高安動脈炎の管理に関する2026年版アップデート。疾患活動性と血管損傷の評価法、PET血管活動性スコア等の新しい評価指標について解説。","m":"稀少疾患に関する専門的内容で、クリニックでの遭遇頻度は極めて低い。専門医療機関への紹介判断時の参考情報程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860699/","d":"2026-03-23"},{"t":"What Psychology Can Do For Everyday Life.","s":"心理学が日常生活において、コミュニケーション能力や人間関係の改善、ストレス管理に役立つことが証明されている。ポジティブな感情を対象とした練習により、人々はより幸福感を感じ、うつ症状が軽減されることが示されている。","m":"患者やスタッフのメンタルヘルス向上に応用可能。クリニックの職場環境改善や患者満足度向上の参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41863102/","d":"2026-03-23"},{"t":"Features of mobile apps for diabetic kidney disease self-management: A scoping review.","s":"糖尿病性腎症の自己管理を支援するモバイルアプリの機能に関するレビュー研究。糖尿病性腎症と慢性腎臓病の長期管理において、効果的な自己管理を支援するモバイルアプリが患者に利益をもたらす可能性がある。","m":"糖尿病内科として、患者の腎症管理にモバイルアプリを活用できる。治療成績向上と患者満足度向上につながる可能性。","i":"糖尿病患者の自己管理支援ツールの導入検討や、デジタルヘルス活用戦略の策定が必要。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860840/","d":"2026-03-23"},{"t":"IMPlementing IMProved Asthma self-management as RouTine (IMP2ART) in UK primary care: An internal pilot for a cluster randomised controlled trial.","s":"英国のプライマリケアにおいて、個別化された喘息アクションプランと定期的な専門家レビューを含む支援付き自己管理の実装に関する研究。この支援により予定外の受診が減少し、喘息の転帰と生活の質が改善される。","m":"小児科での小児喘息管理に応用可能。患者教育プログラムの充実により、急患対応の負担軽減が期待できる。","i":"呼吸器疾患患者の自己管理支援プログラムの導入を検討し、予定外受診の削減を図る。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860818/","d":"2026-03-23"},{"t":"Fecal microbiota transplantation in chronic liver disease: Current and future state of the art.","s":"慢性肝疾患における腸内細菌叢移植（FMT）の現状と将来展望に関するレビュー。肝硬変、肝性脳症、アルコール性肝疾患の治療にFMTが有効である可能性が示されている。","m":"消化器内科として、将来的な治療選択肢として注視が必要。現時点では研究段階だが、慢性肝疾患患者への新たなアプローチとなる可能性。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860558/","d":"2026-03-23"},{"t":"A person-centred ehealth intervention for fall prevention in nursing homes lacking geriatric expertise: cost-effectiveness analysis within a randomised controlled trial.","s":"老人医学の専門知識が不足している介護施設における転倒予防のための個人中心型eヘルス介入の費用対効果分析。遠隔医療プログラムが医療過疎地域の介護施設入居者の転倒予防に効果的である可能性が示された。","m":"高齢患者の多いクリニックとして、転倒予防への取り組みや遠隔医療の活用に関する参考情報。地域医療連携の観点でも有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860310/","d":"2026-03-23"},{"t":"Cost-effectiveness of treatment and care of patients with gastrointestinal inflammatory diseases: a systematic review.","s":"炎症性腸疾患患者の治療とケアの費用対効果に関する系統的レビュー。生物学的製剤と非生物学的製剤の比較、異なる生物学的療法間の比較、治療順序戦略について検討している。","m":"消化器内科として、IBD患者の治療選択や費用対効果を考慮した治療戦略の策定に参考となる情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861399/","d":"2026-03-23"},{"t":"Artificial intelligence for acute appendicitis diagnosis: A systematic review of current evidence, challenges, and future directions.","s":"急性虫垂炎診断における人工知能の活用に関する系統的レビュー。AIが診断精度の向上、臨床意思決定の支援、陰性虫垂切除術率の削減に有望なツールとして注目されている。","m":"消化器外科として、急性虫垂炎の診断精度向上は重要課題。AI活用により誤診リスク軽減と医療の質向上が期待できる。","i":"AI診断支援ツールの導入検討や、急性腹症患者の診断精度向上のための体制整備を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861187/","d":"2026-03-23"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"進行食道扁平上皮癌の一次治療におけるPD-1阻害剤と化学療法併用の有効な患者サブグループに関する系統的レビューとメタ解析。欧州医薬品庁が高PD-1発現ESCCの一次治療として承認している。","m":"消化器外科分野の最新治療情報として参考。食道癌患者の紹介タイミングや連携先選択の判断材料となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-23"},{"t":"Effectiveness of exercise interventions in patients with colorectal cancer during adjuvant chemotherapy: a systematic review and meta-analysis.","s":"大腸癌患者の術後補助化学療法中における運動介入の有効性に関する系統的レビューとメタ解析。運動能力、筋力、疲労、痛み、末梢神経障害、不安、うつ、生活の質への影響を検討している。","m":"大腸癌患者の術後ケアや生活指導において、運動療法の重要性を認識し、患者教育や連携先との情報共有に活用できる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860634/","d":"2026-03-23"},{"t":"The roles and heterogeneity of CD8+ T cells in inflammatory bowel disease: A narrative review of insights from single&#x2011;cell transcriptomics (Review).","s":"単一細胞トランスクリプトミクスを用いた炎症性腸疾患におけるCD8+ T細胞の役割と不均一性に関するレビュー。IBDにおいてCD8+ T細胞は顕著な表現型と機能的多様性を示し、特定のT細胞サブセットの標的調節により治療機会が期待される。","m":"IBD患者の病態理解と将来的な個別化治療の可能性を示す研究。消化器内科として患者への説明や治療選択の参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860039/","d":"2026-03-23"},{"t":"PD-1/PD-L1 inhibitors in recurrent or metastatic nasopharyngeal carcinoma: A systematic review and meta-analysis.","s":"上咽頭がんの再発・転移例に対するPD-1/PD-L1阻害薬の治療効果について9つの研究を対象とした系統的レビュー。883人の患者データを解析し、免疫チェックポイント阻害薬の有効性と安全性を評価している。","m":"耳鼻咽喉科での上咽頭がん診療への参考となる最新治療情報。一般クリニックでは直接的な影響は限定的だが、専門医との連携時の知識として有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861185/","d":"2026-03-23"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"進行食道扁平上皮がんの一次治療において、PD-1阻害薬と化学療法の併用療法の有効な患者群を特定するための系統的レビューとメタ解析。欧州医薬品庁がPD-1高発現例での併用療法を承認している。","m":"消化器がん診療の最新動向として把握。当院では内視鏡診断から専門病院への紹介判断に活用できる情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-23"},{"t":"Telehealth Approaches for Pediatric Otitis Media and Clinical Outcomes: Scoping Review.","s":"小児中耳炎に対するテレヘルス技術の応用と臨床成果に関するスコーピングレビュー。従来の対面診療に代わるデジタルツールの診断精度や実装成果を包括的に調査している。","m":"当院の小児科・耳鼻咽喉科での中耳炎診療効率化に直結。テレヘルス導入による診療アクセス向上と収益機会の拡大が期待される。","i":"小児科・耳鼻咽喉科でのテレヘルス導入可能性を検討し、遠隔診療体制の構築を準備する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41850731/","d":"2026-03-23"},{"t":"Advances in imaging modalities and tumor classification for vestibular schwannomas.","s":"前庭神経鞘腫に対する画像診断技術の進歩と腫瘍分類に関するレビュー。MRIが診断のゴールドスタンダードであり、高解像度MRIやDTIなどの先進技術が病変の特徴づけや手術計画の精緻化に貢献している。","m":"耳鼻咽喉科診療での画像診断精度向上の参考情報。めまい患者の精査時により適切な専門医紹介判断が可能となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41838294/","d":"2026-03-23"},{"t":"Maternal 12-HETE is associated with childhood asthma and the responses to prenatal omega-3 supplementation.","s":"母体血中12-HETEが小児喘息発症と関連し、妊娠中のオメガ3脂肪酸 26-03-23"},{"t":"アインHD純利益39%増 5〜1月期、販管費抑制で計画上振れ","s":"アインホールディングスが5-1月期純利益39%増を記録し、販管費抑制により計画を上回った。調剤薬局チェーンの好業績。","m":"近隣調剤薬局との連携において、業界動向として把握しておく価値がある。薬局業界の経営効率化事例として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFC1765K0X10C26A3000000/","d":"2026-03-23"},{"t":"キヤノンメディカル、MRIの旗艦モデル刷新 撮影時の息止め不要","s":"キヤノンメディカルがMRIの新型モデルを発表し、撮影時の息止めが不要になる技術を搭載した。医療機器の技術進歩。","m":"当クリニックではMRI設備はないが、患者紹介先での検査技術向上として把握しておく価値がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1740X0X10C26A3000000/","d":"2026-03-23"},{"t":"関節リウマチなどが寒いと症状が変化するメカニズム、大阪大学解明","s":"大阪大学が関節リウマチなどの症状が寒さで変化するメカニズムを解明した。基礎研究レベルの成果と推測される。","m":"リウマチ患者の診療時に季節要因を考慮する参考情報。患者説明の根拠として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG05A8O0V00C26A3000000/","d":"2026-03-23"},{"t":"システム開発のOmi Japan、医療業界精通のIT人材 福岡で300人育成","s":"システム開発会社Omi Japanが福岡で医療IT人材300人の育成を計画。医療DX推進の人材供給に関する業界動向。","m":"将来的な医療IT人材の供給改善により、電子カルテやシステム導入コストが下がる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC1618I0W6A310C2000000/","d":"2026-03-23"},{"t":"サワイGHD会長｢新薬メーカーの工場取得検討｣ 後発薬の供給力高める","s":"サワイGHDが後発薬供給力強化のため新薬メーカー工場取得を検討。ジェネリック医薬品の安定供給に影響する可能性。","m":"ジェネリック医薬品の安定供給は薬価差益に直結。供給改善は経営にプラス影響。","i":"処方するジェネリック医薬品の供給状況を継続的に確認し、代替薬の準備を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF1678R0W6A310C2000000/","d":"2026-03-23"},{"t":"アツギが着圧靴下、一般医療機器で販売 むくみ改善うたう","s":"アツギが一般医療機器として着圧靴下を販売開始。むくみ改善効果をうたう製品展開。","m":"循環器内科でむくみ患者への生活指導時の選択肢として認識。医療機器扱いで信頼性向上。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC166CL0W6A310C2000000/","d":"2026-03-23"},{"t":"ロート製薬、中国で頻尿治療の医療機器発売","s":"ロート製薬が中国市場で頻尿治療用医療機器を発売。泌尿器科領域の新規治療機器動向。","m":"泌尿器科疾患の治療選択肢拡大の参考情報。将来的な日本市場参入の可能性を注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF162ED0W6A310C2000000/","d":"2026-03-23"},{"t":"帝人系、iPS細胞保管サービスでバイオ新興と提携 将来の病気に備え","s":"帝人系企業がバイオ新興企業と提携してiPS細胞保管サービスを開始。再生医療分野の新サービス。","m":"将来の再生医療普及時の患者ニーズを理解する参考情報。現時点では直接的影響なし。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC166BR0W6A310C2000000/","d":"2026-03-23"},{"t":"睡眠リズム、起きる時間で調整してみよう","s":"睡眠リズムの調整方法について、起床時間を重視した生活指導に関する記事。","m":"生活習慣病患者への睡眠指導時の参考情報。糖尿病患者の血糖管理にも関連。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG116UR0R10C26A3000000/","d":"2026-03-23"},{"t":"肥満症は「要治療」 増える専門外来、健康障害防ぐ","s":"肥満症治療への関心が高まり、専門外来の設置が増加している。肥満は糖尿病や循環器疾患の重要なリスク要因として認識されている。","m":"糖尿病・循環器内科との連携で肥満症治療の収益機会拡大。生活習慣病管理指導料の算定機会増加。","i":"内科・糖尿病外来での肥満症治療強化、専門外来設置の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD038GK0T00C26A3000000/","d":"2026-03-23"},{"t":"目の前の命と向き合い続ける ジャパンハート創設者・吉岡秀人さん","s":"国際医療支援団体ジャパンハートの創設者・吉岡秀人氏の活動や理念について紹介された記事。医療従事者の使命感に関する内容と推測される。","m":"医療従事者のモチベーション向上や理念共有に参考となる。直接的な経営影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD16AU20W6A310C2000000/","d":"2026-03-23"},{"t":"不調の原因は「普段の呼吸」の可能性 死亡リスクにも影響を及ぼす","s":"日常的な呼吸の質が健康状態や死亡リスクに影響する可能性が指摘されている。呼吸器系疾患や全身の健康管理への新たな視点。","m":"耳鼻咽喉科での呼吸障害診療や内科での生活習慣病指導に活用可能。新たな指導料算定の機会。","i":"呼吸指導や呼吸器系診療の強化、患者教育プログラムの検討。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD045XB0U6A300C2000000/","d":"2026-03-23"},{"t":"放射線の知識、国民に周知を 福島の中間貯蔵施設を訪ねて","s":"福島の中間貯蔵施設を通じて、放射線に関する正確な知識の普及啓発の重要性について論じられている。","m":"放射線検査時の患者説明に参考となるが、直接的な診療や経営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD045BG0U6A300C2000000/","d":"2026-03-23"},{"t":"テレワーク社会の落とし穴 体力が10歳分下がり、議論が偏りがちに","s":"テレワークの普及により体力低下や議論の偏りなどの健康・社会的問題が生じている。働き方の変化が健康に与える影響を指摘。","m":"糖尿病・循環器疾患患者の増加予測。特定保健指導や生活習慣病管理指導の需要拡大。","i":"生活習慣病患者の増加対応、運動指導強化、企業健診での啓発活動検討。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOSG174BJ0X10C26A2000000/","d":"2026-03-23"}];
var input=document.getElementById('search-input');
var info=document.getElementById('search-info');
var results=document.getElementById('search-results');
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pclass(p){return p==='要対応'?'p-high':p==='要注視'?'p-mid':p==='テック'?'p-tech':'p-info'}
function dpri(p){return p==='要対応'?'いますぐチェック！':p==='要注視'?'あとで読む':p||''}
function search(){
  var q=input.value.trim().toLowerCase();
  if(!q){info.style.display='none';results.innerHTML='';return}
  var matches=DATA.filter(function(a){
    return (a.t+' '+a.s+' '+a.m+' '+a.i+' '+a.src).toLowerCase().indexOf(q)>=0;
  });
  info.style.display='block';
  info.innerHTML='<b>'+matches.length+'</b> 件見つかりました';
  results.innerHTML=matches.slice(0,50).map(function(a){
    return '<div class="card"><div class="card-head"><h3>'+esc(a.t)+'</h3><span class="priority '+pclass(a.p)+'">'+esc(dpri(a.p))+'</span></div>'
      +'<div class="source-line"><span class="source">'+esc(a.src)+' — '+esc(a.d)+'</span>'
      +(a.u?'<a class="link-btn" href="'+esc(a.u)+'" target="_blank" rel="noopener">原文 ↗</a>':'')
      +'</div><div class="body">'+esc(a.s)+'</div></div>';
  }).join('');
}
input.addEventListener('input',search);
</script>
