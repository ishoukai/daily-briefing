<head>

<title>Search — 管理くんニュース</title>

<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--card:#FFFFFF;--border:#E8E6E0;--text:#1A1A18;--sub:#6B6960;--accent:#1A5F4A;--red:#9B2C2C;--amber:#92600A;--blue:#1A4B8C;--purple:#5B21B6;--tag-red:#FEF2F2;--tag-amber:#FFFBEB;--tag-blue:#EFF6FF;--tag-green:#F0FDF4;--tag-purple:#F5F3FF;--font-sans:'Noto Sans JP',sans-serif;--font-serif:'Noto Serif JP',serif}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.app-header h1{font-family:var(--font-serif);font-size:18px;font-weight:700;letter-spacing:0.02em;white-space:nowrap}
.app-header nav{display:flex;gap:12px;align-items:center;flex:1}
.app-header nav a{font-size:13px;color:var(--sub);text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;transition:all .15s}
.app-header nav a:hover,.app-header nav a.active{color:var(--accent);background:var(--tag-green)}
.container{max-width:820px;margin:0 auto;padding:24px 20px 80px}
.date-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.date-nav a{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;text-decoration:none;color:var(--sub);background:var(--card);transition:all .15s}
.date-nav a:hover,.date-nav a.current{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card.read{opacity:0.55}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.card h3{font-size:14.5px;font-weight:700;line-height:1.55}
.priority{font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.p-high{background:var(--tag-red);color:var(--red)}
.p-mid{background:var(--tag-amber);color:var(--amber)}
.p-info{background:var(--tag-green);color:var(--accent)}
.p-tech{background:var(--tag-purple);color:var(--purple)}
.card .source-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.card .source{font-size:11px;color:var(--sub)}
.card .link-btn{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid rgba(26,95,74,.25);border-radius:4px;transition:all .15s}
.card .link-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card .body{font-size:13px;color:#3D3D3A;line-height:1.8}
.card .impact{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12.5px;color:var(--accent);font-weight:500;line-height:1.7}
.card .impact::before{content:'-> '}
.card .memo{margin-top:8px;background:#F7F7F5;border-radius:6px;padding:10px 14px;font-size:12.5px;line-height:1.7}
.card .memo strong{color:var(--accent);font-weight:700}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sub);margin:28px 0 14px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.archive-list{list-style:none}
.archive-list li{margin-bottom:8px}
.archive-list li a{font-size:14px;color:var(--accent);text-decoration:none;padding:10px 16px;display:block;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.archive-list li a:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.archive-list li a .count{font-size:12px;color:var(--sub);margin-left:8px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
.collapsible-section{margin-top:8px}
.collapsible-section>summary{list-style:none}
.collapsible-section>summary::-webkit-details-marker{display:none}
.collapsible-section>summary::after{content:' \25B6';font-size:10px}
.collapsible-section[open]>summary::after{content:' \25BC'}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:13.5px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;text-decoration:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:5px;vertical-align:1px}
.panel{display:none}.panel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--sub);margin-top:2px}
.source-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.source-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--sub);background:var(--card)}
.source-pill b{color:var(--text);font-weight:700}
.footer-note{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--sub);line-height:1.7;text-align:center}
.search-box{margin-bottom:20px;display:flex;gap:8px}
.search-box input{flex:1;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-sans);background:var(--card)}
.search-box input:focus{outline:none;border-color:var(--accent)}
.search-results-info{font-size:13px;color:var(--sub);margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.search-results-info b{color:var(--text)}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.card-head{flex-direction:column;gap:4px}.priority{align-self:flex-start}.app-header{flex-direction:column;align-items:flex-start}}</style>
</head>

</div><script>
var DATA=[{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。医療機関の収益に直接影響する重要な制度変更。","m":"診療報酬は医療機関経営の根幹。改定内容の確認と院内システム・運用の見直しが急務。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応が必要。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-26"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が説明。医療機関の税負担と収益構造に関わる重要な制度情報。","m":"医療機関は消費税の特殊な取り扱いがあるため、制度理解と適切な経営判断が重要。","i":"消費税負担の影響を分析し、経営計画の見直しが必要。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-26"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。感染症対策として把握すべき疾患情報。","m":"感染症対策として認識必要だが、国内での流行リスクは低い。基礎知識として把握。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-26"},{"t":"Don&apos;t Sleep on Heart Disease: Cardiac Risk of Sleep Disorders","s":"睡眠障害が心疾患リスクを高めることについて報じている。睡眠関連の心疾患リスクの認識が重要視されている。","m":"循環器内科で心疾患患者を診療している。睡眠障害と心疾患の関連は診療に直結する重要な情報。","i":"循環器診療で睡眠障害の評価と連携体制を強化し、心疾患予防に活用。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dont-sleep-heart-disease-identifying-sleep-related-cardiac-2026a100081a?src=rss","d":"2026-03-26"},{"t":"Nasal Brush Biopsy Flags Preclinical Alzheimer’s Disease","s":"鼻腔ブラシ生検がアルツハイマー病の前臨床段階を発見できることが報告された。認知症の早期診断技術が進歩している。","m":"認知症の早期診断は高齢患者が多い当院でも関心が高い分野。ただし専門的検査のため直接的影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/nasal-brush-biopsy-flags-preclinical-alzheimers-disease-2026a1000932?src=rss","d":"2026-03-26"},{"t":"Eptinezumab Sustains Long-Term Migraine Response","s":"エプチネズマブが偏頭痛に対して長期間の効果を維持することが報告された。偏頭痛治療の新たな選択肢として注目。","m":"内科や耳鼻咽喉科での頭痛患者治療に関連。新薬情報として把握するが直接的な経営影響は小。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/eptinezumab-sustains-long-term-migraine-response-2026a10008r8?src=rss","d":"2026-03-26"},{"t":"Where Are the Adult ADHD Guidelines?","s":"成人ADHDの診療ガイドラインの必要性について議論されている記事。現在のガイドライン不足が診療の標準化を困難にしている可能性を指摘。","m":"内科での成人ADHD患者への対応方針検討の参考になる。今後ガイドライン策定により診療体制の見直しが必要になる可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/where-are-adult-adhd-guidelines-2026a100093q?src=rss","d":"2026-03-26"},{"t":"Executive Dysfunction Tied to ASM Load in Resistant Epilepsy","s":"薬剤耐性てんかん患者において、抗てんかん薬の負荷量と実行機能障害の関連性を示した研究。薬剤選択と認知機能への影響について検討。","m":"専門外ではあるが、薬剤選択時の副作用考慮の重要性を示唆。他疾患での多剤併用時の参考にもなる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/executive-dysfunction-tied-asm-load-drug-resistant-epilepsy-2026a100092z?src=rss","d":"2026-03-26"},{"t":"Spotting the Signs of Postpartum Psychosis","s":"産後精神病の早期発見・診断に関する記事。症状の見極めポイントと適切な対応方法について解説されている。","m":"小児科診療で母親の精神状態把握は重要。早期発見により適切な専門医紹介につながる。","i":"小児科での産後母親への対応時に精神症状への注意深い観察を行う","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/spotting-signs-postpartum-psychosis-2026a100091w?src=rss","d":"2026-03-26"},{"t":"Mandrola’s Top 4 Trials from ACC 2026","s":"ACC 2026で発表された循環器領域の主要臨床試験結果のトップ4について解説。循環器診療の最新エビデンスを紹介。","m":"循環器内科を標榜する当院にとって最新の臨床試験結果は診療方針に直接影響。定期的な知識アップデートが必要。","i":"循環器内科の診療プロトコール見直しと最新エビデンスに基づく治療方針の検討","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/mandrolas-top-4-trials-acc-2026-details-matter-2026a10008ti?src=rss","d":"2026-03-26"},{"t":"Arterial Stiffness Changes Linked to Developing Dementia","s":"動脈硬化の進行変化と認知症発症リスクの関連性を示した研究。血管の硬化度変化が将来の認知機能低下予測因子となる可能性。","m":"糖尿病・循環器内科での血管評価が認知症予防にもつながる。包括的な患者管理により付加価値提供が可能。","i":"糖尿病・循環器患者の動脈硬化評価を認知症予防の観点からも強化する","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/arterial-stiffness-changes-linked-development-dementia-2026a10008v7?src=rss","d":"2026-03-26"},{"t":"Scotland Introduces Newborn Screening for SMA","s":"スコットランドで脊髄性筋萎縮症（SMA）の新生児スクリーニングが導入された。早期発見による治療開始効果が期待される。","m":"小児科領域での新生児スクリーニング拡充の動向として参考。日本での導入時期と対応体制の準備が今後必要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/scotland-introduces-newborn-screening-sma-2026a10008pc?src=rss","d":"2026-03-26"},{"t":"Exercise: A Disease-Modifying Therapy for PD","s":"パーキンソン病に対する運動療法の疾患修飾効果について解説。運動が病気の進行抑制に有効である可能性を示唆。","m":"生活習慣病患者への運動指導の重要性を再認識。パーキンソン病以外でも運動療法の積極的な推進が有効。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/exercise-disease-modifying-therapy-parkinsons-disease-2026a10003uw?src=rss","d":"2026-03-26"},{"t":"CMS reveals new Medicaid model that supports coordination for children with complex needs","s":"米国CMSが複雑なニーズを持つ小児患者の調整を支援する新しいメディケイドモデルを発表。米国の小児医療制度改革。","m":"米国の小児医療制度の動向。日本の小児科診療への直接的影響はないが、制度設計の参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/cms-reveals-new-medicaid-model-supports-coordination-children-complex-needs","d":"2026-03-26"},{"t":"The evolving state of exome and genome sequencing","s":"エクソーム・ゲノム解析技術の進歩と臨床応用の現状について解説。個別化医療の発展における技術的進歩を紹介。","m":"将来的に個別化医療への対応検討が必要。現時点では情報収集段階だが技術動向の把握は重要。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/evolving-state-exome-and-genome-sequencing","d":"2026-03-26"},{"t":"Study: Nearly 1 in 5 pediatric hospital deaths involve sepsis","s":"小児病院死亡例の約5分の1に敗血症が関与しているという研究結果。小児敗血症の早期診断・治療の重要性を強調。","m":"小児科での重篤感染症への対応力向上が必要。敗血症の早期診断により患者転帰改善につながる。","i":"小児科での感染症診療における敗血症の早期発見体制を強化する","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/study-nearly-1-5-pediatric-hospital-deaths-involve-sepsis","d":"2026-03-26"},{"t":"Qualified Health locks in $125M in fresh funding to scale enterprise AI at health systems","s":"Qualified Healthがヘルスシステム向けエンタープライズAI拡大のため1億2500万ドルの資金調達を実施。医療AIの投資が活発化。","m":"海外の医療AI投資動向。将来的なAI技術導入の参考情報だが、現時点での直接的影響はない。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/qualified-health-locks-125m-fresh-funding-scale-ai-health-systems","d":"2026-03-26"},{"t":"CVS Caremark, FTC reach settlement in insulin pricing case","s":"CVS Caremartがインスリン価格問題でFTCと和解に達した。PBMの価格設定慣行に対する規制当局の監視強化を示す事例。","m":"糖尿病診療での薬剤費負担は患者の治療継続に影響。価格動向と患者への情報提供体制の整備が必要。","i":"糖尿病患者のインスリン治療における薬剤費負担軽減の動向を注視する","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/cvs-caremark-ftc-reach-settlement-insulin-pricing-case","d":"2026-03-26"},{"t":"Fewer patients traveled for abortions in 2025 as telehealth care increased, report finds","s":"2025年に中絶のための患者移動が減少し、テレヘルス利用が増加したという報告。遠隔医療の活用拡大を示すデータ。","m":"テレヘルス活用の参考事例として注目。当院でのオンライン診療拡充検討時の参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/telehealth/fewer-patients-traveled-abortions-2025-telehealth-care-increased-guttmacher","d":"2026-03-26"},{"t":"Highmark reports $175M net loss for 2025 as financial headwinds batter health plan","s":"Highmantが2025年に1億7500万ドルの純損失を報告。健康保険業界の財務的困難を示す事例として紹介。","m":"保険者の財務状況は診療報酬や患者負担に影響する可能性。業界動向として情報収集は重要。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/highmark-reports-175m-net-loss-2025-financial-headwinds-batter-health-plan","d":"2026-03-26"},{"t":"AI chatbot use for health information up 16% from 2024: Rock Health survey","s":"Rock Health調査によると、健康情報取得でのAIチャットボット利用が2024年から16%増加。患者の情報収集行動が変化している。","m":"患者がAIで事前情報収集する傾向増加。問診や説明方法の見直し、デジタル対応の重要性。","i":"患者の情報収集行動変化を踏まえた診療体制の検討が必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/ai-chatbot-use-health-information-16-2024-rock-health-survey","d":"2026-03-26"},{"t":"Fierce Healthcare Layoff Tracker—UCI Health cutting 1% of workforce; more layoffs at NSHA","s":"医療機関での人員削減動向を追跡する記事。UCI Healthが1%の人員削減を実施するなど業界の雇用状況を報告。","m":"医療業界の人材需給バランスの参考情報。人材採用戦略検討時の業界動向として活用可能。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/finance/fierce-healthcare-layoff-tracker-2026-job-cuts-eliminations-health-systems-hospitals","d":"2026-03-26"},{"t":"がん治療向け放射性元素「アスタチン」　住友重機械、27年製造開始へ","s":"住友重機械ががん治療向け放射性元素「アスタチン」の製造を2027年に開始予定。新たながん治療技術の産業化が進展。","m":"がん治療の新技術だが、クリニックレベルでの直接的な影響は少ない。業界動向として把握。","i":"","src":"日経","p":"参考","u":"https: ed geriatric syndrome in older adults with type 2 diabetes.","s":"2型糖尿病高齢者における栄養失調が見過ごされがちな老年症候群として注目されている。糖尿病研究で栄養失調が軽視される傾向を指摘。","m":"当院の糖尿病外来で高齢患者の栄養評価が不十分な可能性。栄養士との連携強化と評価システム構築を検討すべき。","i":"糖尿病高齢患者の栄養状態評価を診療プロトコルに組み込む検討が必要","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41863684/","d":"2026-03-23"},{"t":"Effect of Glucagon-Like-Peptide-1 Receptor Agonists (GLP-1 RA) on Neuropsychiatric Outcomes: A Systematic Review and Meta-Analysis.","s":"GLP-1受容体作動薬の神経精神学的効果に関する系統的レビューとメタ解析。認知機能低下、気分障害、物質使用障害への効果を検討している。","m":"当院でのGLP-1薬使用患者で認知機能や精神状態の変化を観察する価値あり。多科連携の強化も検討課題。","i":"GLP-1薬処方時の多面的効果を患者説明に含め、精神科的既往の確認を強化する","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41862354/","d":"2026-03-23"},{"t":"Angiography-derived fractional flow reserve versus coronary angiography to guide coronary artery bypass grafting in patients undergoing surgical valve procedures with concomitant coronary artery disease in China (FAVOR IV-QVAS): a multicentre, triple-blind, randomised trial.","s":"心臓弁膜症手術と同時冠動脈バイパス術において、血管造影由来FFRによる生理学的評価が従来の解剖学的評価より良好な結果をもたらすかを検討した中国の多施設無作為化試験。","m":"循環器診療での参考情報だが、クリニックレベルでの直接的な影響は限定的。専門医療機関への紹介判断の参考程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41864747/","d":"2026-03-23"},{"t":"Effect of a clinical decision support system on stroke care quality and outcomes in patients with acute ischaemic stroke (GOLDEN BRIDGE II): cluster randomised clinical trial.","s":"急性虚血性脳卒中患者に対する臨床意思決定支援システム（CDSS）の効果を検討した中国の多施設クラスター無作為化試験。AI支援画像解析等を含む。","m":"脳卒中診療の質向上に関する参考情報。当院では脳卒中の急性期治療は行わないが、予防・管理での参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41862204/","d":"2026-03-23"},{"t":"Increased risk of stroke in patients with psoriasis: A systematic review and meta-analysis.","s":"乾癬患者における脳卒中リスク増加を示すメタ解析。70万人超の乾癬患者を含む18研究を解析し、脳卒中リスクの有意な増加を確認。","m":"耳鼻科外来でも皮膚症状を訴える患者がいる。乾癬疑い患者では心血管リスク評価と適切な専門医紹介が重要。","i":"皮膚症状で受診する患者の心血管リスク評価を強化し、必要に応じて循環器科紹介を検討","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861197/","d":"2026-03-23"},{"t":"On-target, off-tumor oral toxicities of talquetamab in heavily pretreated multiple myeloma.","s":"多発性骨髄腫治療薬タルケタマブの口腔毒性に関するレビュー。GPRC5D標的療法による舌・唾液腺・角化組織への副作用について解説。","m":"血液悪性疾患の専門的治療に関する内容で、クリニックでの直接的な関連性は低い。専門医療機関での治療情報として参考程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860737/","d":"2026-03-23"},{"t":"Management of Takayasu Arteritis - A 2026 Update.","s":"高安動脈炎の管理に関する2026年版アップデート。疾患活動性と血管損傷の評価法、PET血管活動性スコア等の新しい評価指標について解説。","m":"稀少疾患に関する専門的内容で、クリニックでの遭遇頻度は極めて低い。専門医療機関への紹介判断時の参考情報程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860699/","d":"2026-03-23"},{"t":"What Psychology Can Do For Everyday Life.","s":"心理学が日常生活において、コミュニケーション能力や人間関係の改善、ストレス管理に役立つことが証明されている。ポジティブな感情を対象とした練習により、人々はより幸福感を感じ、うつ症状が軽減されることが示されている。","m":"患者やスタッフのメンタルヘルス向上に応用可能。クリニックの職場環境改善や患者満足度向上の参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41863102/","d":"2026-03-23"},{"t":"Features of mobile apps for diabetic kidney disease self-management: A scoping review.","s":"糖尿病性腎症の自己管理を支援するモバイルアプリの機能に関するレビュー研究。糖尿病性腎症と慢性腎臓病の長期管理において、効果的な自己管理を支援するモバイルアプリが患者に利益をもたらす可能性がある。","m":"糖尿病内科として、患者の腎症管理にモバイルアプリを活用できる。治療成績向上と患者満足度向上につながる可能性。","i":"糖尿病患者の自己管理支援ツールの導入検討や、デジタルヘルス活用戦略の策定が必要。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860840/","d":"2026-03-23"},{"t":"IMPlementing IMProved Asthma self-management as RouTine (IMP2ART) in UK primary care: An internal pilot for a cluster randomised controlled trial.","s":"英国のプライマリケアにおいて、個別化された喘息アクションプランと定期的な専門家レビューを含む支援付き自己管理の実装に関する研究。この支援により予定外の受診が減少し、喘息の転帰と生活の質が改善される。","m":"小児科での小児喘息管理に応用可能。患者教育プログラムの充実により、急患対応の負担軽減が期待できる。","i":"呼吸器疾患患者の自己管理支援プログラムの導入を検討し、予定外受診の削減を図る。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860818/","d":"2026-03-23"},{"t":"Fecal microbiota transplantation in chronic liver disease: Current and future state of the art.","s":"慢性肝疾患における腸内細菌叢移植（FMT）の現状と将来展望に関するレビュー。肝硬変、肝性脳症、アルコール性肝疾患の治療にFMTが有効である可能性が示されている。","m":"消化器内科として、将来的な治療選択肢として注視が必要。現時点では研究段階だが、慢性肝疾患患者への新たなアプローチとなる可能性。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860558/","d":"2026-03-23"},{"t":"A person-centred ehealth intervention for fall prevention in nursing homes lacking geriatric expertise: cost-effectiveness analysis within a randomised controlled trial.","s":"老人医学の専門知識が不足している介護施設における転倒予防のための個人中心型eヘルス介入の費用対効果分析。遠隔医療プログラムが医療過疎地域の介護施設入居者の転倒予防に効果的である可能性が示された。","m":"高齢患者の多いクリニックとして、転倒予防への取り組みや遠隔医療の活用に関する参考情報。地域医療連携の観点でも有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860310/","d":"2026-03-23"},{"t":"Cost-effectiveness of treatment and care of patients with gastrointestinal inflammatory diseases: a systematic review.","s":"炎症性腸疾患患者の治療とケアの費用対効果に関する系統的レビュー。生物学的製剤と非生物学的製剤の比較、異なる生物学的療法間の比較、治療順序戦略について検討している。","m":"消化器内科として、IBD患者の治療選択や費用対効果を考慮した治療戦略の策定に参考となる情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861399/","d":"2026-03-23"},{"t":"Artificial intelligence for acute appendicitis diagnosis: A systematic review of current evidence, challenges, and future directions.","s":"急性虫垂炎診断における人工知能の活用に関する系統的レビュー。AIが診断精度の向上、臨床意思決定の支援、陰性虫垂切除術率の削減に有望なツールとして注目されている。","m":"消化器外科として、急性虫垂炎の診断精度向上は重要課題。AI活用により誤診リスク軽減と医療の質向上が期待できる。","i":"AI診断支援ツールの導入検討や、急性腹症患者の診断精度向上のための体制整備を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861187/","d":"2026-03-23"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"進行食道扁平上皮癌の一次治療におけるPD-1阻害剤と化学療法併用の有効な患者サブグループに関する系統的レビューとメタ解析。欧州医薬品庁が高PD-1発現ESCCの一次治療として承認している。","m":"消化器外科分野の最新治療情報として参考。食道癌患者の紹介タイミングや連携先選択の判断材料となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-23"},{"t":"Effectiveness of exercise interventions in patients with colorectal cancer during adjuvant chemotherapy: a systematic review and meta-analysis.","s":"大腸癌患者の術後補助化学療法中における運動介入の有効性に関する系統的レビューとメタ解析。運動能力、筋力、疲労、痛み、末梢神経障害、不安、うつ、生活の質への影響を検討している。","m":"大腸癌患者の術後ケアや生活指導において、運動療法の重要性を認識し、患者教育や連携先との情報共有に活用できる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860634/","d":"2026-03-23"},{"t":"The roles and heterogeneity of CD8+ T cells in inflammatory bowel disease: A narrative review of insights from single&#x2011;cell transcriptomics (Review).","s":"単一細胞トランスクリプトミクスを用いた炎症性腸疾患におけるCD8+ T細胞の役割と不均一性に関するレビュー。IBDにおいてCD8+ T細胞は顕著な表現型と機能的多様性を示し、特定のT細胞サブセットの標的調節により治療機会が期待される。","m":"IBD患者の病態理解と将来的な個別化治療の可能性を示す研究。消化器内科として患者への説明や治療選択の参考となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860039/","d":"2026-03-23"},{"t":"PD-1/PD-L1 inhibitors in recurrent or metastatic nasopharyngeal carcinoma: A systematic review and meta-analysis.","s":"上咽頭がんの再発・転移例に対するPD-1/PD-L1阻害薬の治療効果について9つの研究を対象とした系統的レビュー。883人の患者データを解析し、免疫チェックポイント阻害薬の有効性と安全性を評価している。","m":"耳鼻咽喉科での上咽頭がん診療への参考となる最新治療情報。一般クリニックでは直接的な影響は限定的だが、専門医との連携時の知識として有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861185/","d":"2026-03-23"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"進行食道扁平上皮がんの一次治療において、PD-1阻害薬と化学療法の併用療法の有効な患者群を特定するための系統的レビューとメタ解析。欧州医薬品庁がPD-1高発現例での併用療法を承認している。","m":"消化器がん診療の最新動向として把握。当院では内視鏡診断から専門病院への紹介判断に活用できる情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-23"},{"t":"Telehealth Approaches for Pediatric Otitis Media and Clinical Outcomes: Scoping Review.","s":"小児中耳炎に対するテレヘルス技術の応用と臨床成果に関するスコーピングレビュー。従来の対面診療に代わるデジタルツールの診断精度や実装成果を包括的に調査している。","m":"当院の小児科・耳鼻咽喉科での中耳炎診療効率化に直結。テレヘルス導入による診療アクセス向上と収益機会の拡大が期待される。","i":"小児科・耳鼻咽喉科でのテレヘルス導入可能性を検討し、遠隔診療体制の構築を準備する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41850731/","d":"2026-03-23"},{"t":"Advances in imaging modalities and tumor classification for vestibular schwannomas.","s":"前庭神経鞘腫に対する画像診断技術の進歩と腫瘍分類に関するレビュー。MRIが診断のゴールドスタンダードであり、高解像度MRIやDTIなどの先進技術が病変の特徴づけや手術計画の精緻化に貢献している。","m":"耳鼻咽喉科診療での画像診断精度向上の参考情報。めまい患者の精査時により適切な専門医紹介判断が可能となる。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41838294/","d":"2026-03-23"},{"t":"Maternal 12-HETE is associated with childhood asthma and the responses to prenatal omega-3 supplementation.","s":"母体血中12-HETEが小児喘息発症と関連し、妊娠中のオメガ3脂肪酸補給の効果に影響することを2つのコホート研究で実証。母体の12-HETE欠乏が小児の呼吸器疾患リスクと関連している。","m":"小児科での喘息予防相談時の参考情報。妊娠中の栄養指導や小児喘息の予防的アプローチに活用できる知見。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41850235/","d":"2026-03-23"},{"t":"An observational, cohort, multi-centre, open label phase IV extension study comparing IPV immune responses to preschool dTaP-IPV booster vaccines in children whose mothers received or did not receive an IPV-containing pertussis vaccine during pregnancy in England.","s":"英国での妊娠中百日咳ワクチン接種が小児のポリオワクチン免疫応答に与える影響を調査した第IV相拡大試験。妊娠中dTaP-IPVワクチン接種母の児では、就学前ブースター接種後の抗体価を評価している。","m":"小児科でのワクチン接種スケジュールと効果に関する参考情報。妊娠中ワクチン接種の影響を理解した適切な予防接種指導に活用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41690287/","d":"2026-03-23"},{"t":"Long-term protection of an inactivated enterovirus type 71 vaccine against hand, foot, and mouth diseases in children: a modelling study.","s":"エンテロウイルス71型ワクチンの手足口病に対する20年間の長期防御効果を数学モデルで予測した研究。第3相試験データを用い、抗体減衰動態をSegmented Power-law Modelで解析している。","m":"小児科での手足口病対策とワクチン相談時の参考情報。ワクチンの長期有効性を理解した適切な予防接種指導に役立つ。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41650673/","d":"2026-03-23"},{"t":"Ontology-Based Medication Named Entity Recognition Using Pretrained Transformer Models From a Thai Hospital: Model Fine-Tuning and Validation Study.","s":"タイの病院記録から薬剤情報を抽出するため、オントロジーベースのアノテーションと事前訓練済みTransformerモデルを活用した固有表現認識フレームワークの構築と検証を行った研究。","m":"医療DX推進における電子カルテデータ活用の参考事例。タイ・英語混合記録の処理技術は当院の多言語対応にも応用可能性あり。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861368/","d":"2026-03-23"},{"t":"Feasibility of a Large Language Model Chatbot to Support Parental Understanding in the PICU.","s":"PICU（小児集中治療室）での保護者支援を目的とした大規模言語モデルチャットボットの実現可能性を評価した前向き研究。GPT-4oベースのHIPAA準拠チャットボットで患者固有のEHRデータを活用している。","m":"小児科での保護者への説明支援ツールとして応用可能。AI技術による診療効率化と患者満足度向上の両立が期待される新しいアプローチ。","i":"AI診療支援ツールの導入可能性を検討し、患者・家族とのコミュニケーション向上策を準備する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41860987/","d":"2026-03-23"},{"t":"SegMan-based dual-prior network with boundary-augmented hybrid attention for robust skin lesion segmentation.","s":"皮膚病変の自動分割技術を向上させるAI手法に関する研究。境界の曖昧さや形態学的多様性などの課題に対処する新しいネットワークアーキテクチャを提案している。","m":"皮膚科診療でのAI診断支援技術の発展。直接的な診療報酬への影響は現時点では限定的だが、将来的な診療効率化の可能性。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41849365/","d":"2026-03-23"},{"t":"Detection of rare medical events in electronic health records using machine learning: Current practices and suggestions - A scoping review.","s":"電子健康記録（EHR）での稀少医療事象をAIで検出する研究のスコーピングレビュー。医療データの不均衡やAI異常検知の現状と課題を整理している。","m":"当クリニックの電子カルテデータを活用した診断支援AI導入の参考となる。稀少疾患の見逃し防止に寄与する可能性。","i":"電子カルテシステムでのAI活用による稀少疾患の早期発見体制構築を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41838695/","d":"2026-03-23"},{"t":"Generating synthetic CEM from low-energy images using deep learning: A future without contrast media? A proof-of-concept study.","s":"深層学習を用いて低エネルギー画像から造影剤使用画像を合成生成する技術の概念実証研究。将来的に造影剤なしでの診断が可能になる可能性を示している。","m":"放射線画像診断での造影剤使用量削減の可能性。患者負担軽減と診療効率化の観点で将来的に注目すべき技術動向。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41838331/","d":"2026-03-23"},{"t":"Impact of Basal Ganglia Perivascular Spaces on Ischemic and Hemorrhagic Risks in Patients Taking Antithrombotic Therapies.","s":"抗血栓療法を受けている患者において、基底核周囲血管周囲腔の拡大が虚血性・出血性イベントリスクに与える影響を調査した多施設前向き観察研究。","m":"当院の循環器内科診療で抗凝固薬処方時の判断材料として活用可能。脳出血リスク評価の精度向上に寄与。","i":"循環器患者の抗血栓療法選択時にMRI所見も考慮したリスク評価を強化する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861278/","d":"2026-03-23"},{"t":"Relationship between cerebral perfusion and cognition in white matter hyperintensities of presumed vascular origin: A prospective 3D-pCASL study.","s":"血管性白質病変における脳血流と認知機能の関係を3D動脈スピンラベリング法で調査した前向き研究。脳小血管疾患の病態解明を目的としている。","m":"認知症予防や早期発見の観点で参考となる基礎研究。直接的な診療への応用は限定的だが、将来的な診断技術向上に寄与。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861232/","d":"2026-03-23"},{"t":"Experienced stigma in Japanese outpatients with diabetes: Age and polypharmacy matter.","s":"日本の糖尿病外来患者における体験的スティグマの調査研究。年齢や多剤服用が糖尿病関連スティグマに影響することを明らかにした単施設横断研究。","m":"当院の糖尿病診療において患者の心理的負担を理解し、より良い療養指導や診療環境整備の参考となる重要な知見。","i":"糖尿病患者の心理的負担軽減のための診療体制やコミュニケーション方法を見直す。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41861231/","d":"2026-03-23"},{"t":"Factors involved in the improvement of prolonged symptoms in patients with COVID-19 treated with Japanese traditional (Kampo) medicine: A single-center, prospective, observational study.","s":"COVID-19後遺症患者に対する漢方薬を含む治療レジメンの効果を調査した単施設前向き観察研究。症状改善に関与する因子を分析している。","m":"COVID-19後遺症への対応として漢方薬併用の参考データ。当院でも後遺症患者への治療選択肢として検討可能。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41861186/","d":"2026-03-23"},{"t":"The lived experience of adolescents with X-linked hypophosphataemia treated with burosumab at end of skeletal growth: a mixed-methods analysis.","s":"X連鎖性低リン血症の思春期患者におけるburosumab治療の経験を調査した多施設混合研究法による前向き研究。骨格成長終了前後での治療体験を記述している。","m":"稀少疾患の治療に関する研究で、小児科診療での参考情報。直接的な診療機会は限定的だが、専門的知識として有用。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41860923/","d":"2026-03-23"},{"t":"診療報酬改定","s":"診療報酬改定","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-23"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬について","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-23"},{"t":"ジカウイルス感染症","s":"ジカウイルス感染症","m":"","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/buny var input=document.getElementById('search-input');
var info=document.getElementById('search-info');
var results=document.getElementById('search-results');
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pclass(p){return p==='要対応'?'p-high':p==='要注視'?'p-mid':p==='テック'?'p-tech':'p-info'}
function search(){
  var q=input.value.trim().toLowerCase();
  if(!q){info.style.display='none';results.innerHTML='';return}
  var matches=DATA.filter(function(a){
    return (a.t+' '+a.s+' '+a.m+' '+a.i+' '+a.src).toLowerCase().indexOf(q)>=0;
  });
  info.style.display='block';
  info.innerHTML='<b>'+matches.length+'</b> 件見つかりました';
  results.innerHTML=matches.slice(0,50).map(function(a){
    return '<div class="card"><div class="card-head"><h3>'+esc(a.t)+'</h3><span class="priority '+pclass(a.p)+'">'+esc(a.p)+'</span></div>'
      +'<div class="source-line"><span class="source">'+esc(a.src)+' — '+esc(a.d)+'</span>'
      +(a.u?'<a class="link-btn" href="'+esc(a.u)+'" target="_blank" rel="noopener">原文 ↗</a>':'')
      +'</div><div class="body">'+esc(a.s)+'</div></div>';
  }).join('');
}
input.addEventListener('input',search);
</script>
