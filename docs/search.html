<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理くんニュース</title>
<link rel="icon" href="/daily-briefing/kanri-kun.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--card:#FFFFFF;--border:#E8E6E0;--text:#1A1A18;--sub:#6B6960;--accent:#1A5F4A;--red:#9B2C2C;--amber:#92600A;--blue:#1A4B8C;--purple:#5B21B6;--tag-red:#FEF2F2;--tag-amber:#FFFBEB;--tag-blue:#EFF6FF;--tag-green:#F0FDF4;--tag-purple:#F5F3FF;--font-sans:'Noto Sans JP',sans-serif;--font-serif:'Noto Serif JP',serif}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.app-header h1{font-family:var(--font-serif);font-size:18px;font-weight:700;letter-spacing:0.02em;white-space:nowrap}
.app-header nav{display:flex;gap:12px;align-items:center;flex:1}
.app-header nav a{font-size:13px;color:var(--sub);text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;transition:all .15s}
.app-header nav a:hover,.app-header nav a.active{color:var(--accent);background:var(--tag-green)}
.container{max-width:820px;margin:0 auto;padding:24px 20px 80px}
.date-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.date-nav a{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;text-decoration:none;color:var(--sub);background:var(--card);transition:all .15s}
.date-nav a:hover,.date-nav a.current{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card.read{opacity:0.55}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.card h3{font-size:14.5px;font-weight:700;line-height:1.55}
.priority{font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.p-high{background:var(--tag-red);color:var(--red)}
.p-mid{background:var(--tag-amber);color:var(--amber)}
.p-info{background:var(--tag-green);color:var(--accent)}
.p-tech{background:var(--tag-purple);color:var(--purple)}
.card .source-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.card .source{font-size:11px;color:var(--sub)}
.card .link-btn{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid rgba(26,95,74,.25);border-radius:4px;transition:all .15s}
.card .link-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card .body{font-size:13px;color:#3D3D3A;line-height:1.8}
.card .impact{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12.5px;color:var(--accent);font-weight:500;line-height:1.7}
.card .impact::before{content:'-> '}
.card .memo{margin-top:8px;background:#F7F7F5;border-radius:6px;padding:10px 14px;font-size:12.5px;line-height:1.7}
.card .memo strong{color:var(--accent);font-weight:700}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sub);margin:28px 0 14px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.archive-list{list-style:none}
.archive-list li{margin-bottom:8px}
.archive-list li a{font-size:14px;color:var(--accent);text-decoration:none;padding:10px 16px;display:block;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.archive-list li a:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.archive-list li a .count{font-size:12px;color:var(--sub);margin-left:8px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
.collapsible-section{margin-top:8px}
.collapsible-section>summary{list-style:none}
.collapsible-section>summary::-webkit-details-marker{display:none}
.collapsible-section>summary::after{content:' \25B6';font-size:10px}
.collapsible-section[open]>summary::after{content:' \25BC'}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:13.5px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;text-decoration:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:5px;vertical-align:1px}
.panel{display:none}.panel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--sub);margin-top:2px}
.source-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.source-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--sub);background:var(--card)}
.source-pill b{color:var(--text);font-weight:700}
.footer-note{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--sub);line-height:1.7;text-align:center}
.search-box{margin-bottom:20px;display:flex;gap:8px}
.search-box input{flex:1;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-sans);background:var(--card)}
.search-box input:focus{outline:none;border-color:var(--accent)}
.search-results-info{font-size:13px;color:var(--sub);margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.search-results-info b{color:var(--text)}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.card-head{flex-direction:column;gap:4px}.priority{align-self:flex-start}.app-header{flex-direction:column;align-items:flex-start}}</style>
</head>

</div><script>
var DATA=[{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-01"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-01"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-01"},{"t":"How Symptoms Affect Social Lives, Loneliness Near Life&apos;s End","s":"終末期における症状が社会生活や孤独感に与える影響について分析した研究。症状管理と患者の社会的つながりの関係性を検討。","m":"高齢患者の終末期ケアや在宅医療を検討する際の参考情報。患者の生活の質向上への示唆。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/how-symptoms-affect-social-lives-and-loneliness-final-year-2026a10009uk?src=rss","d":"2026-04-01"},{"t":"Protecting the Hearts of Patients with Hypertension","s":"高血圧患者の心臓保護に関する医療情報。高血圧治療における心血管イベント予防のアプローチについて解説。","m":"当院の循環器内科・糖尿病内科で多数診療する高血圧患者への治療方針に直接関連。診療の質向上につながる重要情報。","i":"循環器内科での高血圧治療プロトコルの見直し検討が必要","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/protecting-hearts-patients-hypertension-2026a10009o3?src=rss","d":"2026-04-01"},{"t":"Myotonia Drug Gets Green Light for Pediatric Patients in EU","s":"筋強直症治療薬がEUで小児患者への適応承認を取得。小児の筋疾患治療における新たな選択肢として注目。","m":"当院小児科での筋疾患診療は限定的だが、小児専門治療薬の承認動向として参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/myotonia-drug-gets-green-light-pediatric-patients-eu-2026a10009si?src=rss","d":"2026-04-01"},{"t":"No Link Between Common ADHD Treatment and Psychosis Risk","s":"ADHD治療薬と精神病発症リスクとの間に関連性がないことを示した研究結果。一般的なADHD治療の安全性を支持する知見。","m":"小児科でのADHD診療における薬物療法の安全性に関する参考情報。保護者への説明時の根拠として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/no-link-between-common-adhd-treatment-and-psychosis-risk-2026a10009sc?src=rss","d":"2026-04-01"},{"t":"Fibromyalgia Reframed and Linked to Altered Pain Processing","s":"線維筋痛症が痛み処理の変化と関連付けて再定義された。慢性疼痛疾患の理解が深まり、診断・治療アプローチが進歩している。","m":"内科外来でも慢性疼痛の相談があり、線維筋痛症の新たな理解は診療に参考となる知識。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/fibromyalgia-reframed-and-linked-altered-pain-processing-2026a10009r9?src=rss","d":"2026-04-01"},{"t":"Posttraumatic Headaches May Masquerade as Migraines","s":"外傷後頭痛が片頭痛として誤診される可能性があることが報告された。頭痛の鑑別診断における注意点が示されている。","m":"内科外来での頭痛診療において、外傷歴の聴取と適切な鑑別診断の重要性を再認識する情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/posttraumatic-headaches-may-masquerade-migraines-2026a10009s2?src=rss","d":"2026-04-01"},{"t":"Lithium Beyond Bipolar: A New Role in Brain Health","s":"リチウムが双極性障害治療以外の脳の健康維持において新たな役割を持つ可能性について報告された。神経保護作用や認知機能改善への応用が研究されている。","m":"内科での気分障害併存患者への対応や、認知症予防への応用可能性として関心がある。現時点では研究段階のため直接的な診療変更は不要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/lithium-beyond-bipolar-new-role-brain-health-2026a10009nk?src=rss","d":"2026-04-01"},{"t":"Anesthetic Risk Linked to Venezuelan Maternal Lineage","s":"ベネズエラ系母系血統と麻酔リスクとの関連性が報告された研究。特定の遺伝的背景における麻酔管理上の注意点について。","m":"外科手術時の麻酔リスク評価の参考情報。消化器外科での術前評価において遺伝的背景考慮の重要性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/anesthetic-risk-linked-venezuelan-maternal-lineage-2026a10009ni?src=rss","d":"2026-04-01"},{"t":"The Death of the Medical Fax Is Foretold — Again","s":"医療現場でのファックス使用廃止が再び議論されている。デジタル化推進により、従来の紙ベース情報伝達からの転換が求められている。","m":"他医療機関や薬局との連携でファックスに依存している業務が多い。段階的なデジタル移行計画が必要になる。","i":"電子カルテや医療DXへの対応準備とファックス依存体制の見直し検討が必要。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/death-medical-fax-foretold-again-2026a10009mx?src=rss","d":"2026-04-01"},{"t":"Even Low HIV Load Can Double Heart Disease Risk","s":"HIV感染者では低ウイルス量でも心疾患リスクが約2倍になることが判明。HIV感染と心血管疾患の関連性を示した研究結果。","m":"HIV患者の心血管リスク管理に関する知見。当院での該当患者は少ないが、循環器診療の参考情報として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/even-low-hiv-load-can-double-heart-disease-risk-2026a100098o?src=rss","d":"2026-04-01"},{"t":"HHS urges hospitals to align patient menus with updated dietary guidance","s":"米国保健福祉省が病院に対し、患者向けメニューを最新の食事ガイダンスに合わせるよう促している。入院患者の栄養管理の質向上を目指す取り組み。","m":"日本では診療報酬で栄養管理実施加算がある。海外動向として参考になるが直接的な経営影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/hhs-urges-hospitals-align-patient-menus-updated-dietary-guidance","d":"2026-04-01"},{"t":"Hartford HealthCare, K Health launch PatientGPT, new AI tool to help patients find health information","s":"ハートフォードヘルスケアとK Healthが患者向けAI健康情報ツール「PatientGPT」を開発・導入した。患者の医療情報アクセスを改善する取り組み。","m":"患者が事前に症状や疑問をAIで整理してから受診することで、診療効率が向上する可能性がある。導入コストと効果を評価したい。","i":"患者向けAIツール導入による診療効率化と患者満足度向上の検討が必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/hartford-healthcare-k-health-launch-patientgpt-new-ai-tool-help-patients","d":"2026-04-01"},{"t":"Ensemble partners with Cohere to build first RCM-native large language model","s":"EnsembleがCohereと提携し、診療報酬管理（RCM）専用の大規模言語モデルを構築。医療事務の自動化・効率化を目指す技術開発。","m":"レセプト作成や医療事務の自動化は人件費削減に直結。AI技術の医療事務分野への応用として注目すべき動向。","i":"AIによる医療事務効率化技術の動向を追跡し、導入可能性を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/ensemble-partners-cohere-build-first-rcm-native-large-language-model","d":"2026-04-01"},{"t":"Mental health provider platform Headway acquires team behind AI company Tezi","s":"メンタルヘルス事業者プラットフォームHeadwayがAI企業Teziのチームを買収した。メンタルヘルス分野でのAI活用が進展している。","m":"小児科での発達障害や心身症患者への対応でメンタルヘルス分野との連携機会がある。AI活用トレンドとして把握しておく。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/mental-health-provider-platform-headway-acquires-team-behind-ai-company-tezi","d":"2026-04-01"},{"t":"Employer telehealth company eMed raises $200M at $2B valuation","s":"企業向けテレヘルス企業eMedが20億ドル評価で2億ドルの資金調達を実施した。企業向け医療サービス市場の成長を示している。","m":"企業健診や産業医業務への展開可能性として参考になる。テレヘルス市場の成長トレンドを把握できる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/employer-telehealth-company-emed-raises-200m-2b-valuation","d":"2026-04-01"},{"t":"States pay Deloitte, others millions to comply with Trump law to cut Medicaid rolls","s":"各州がメディケイド登録者削減のためのトランプ政権法令への対応で、デロイトなどに数百万ドルの費用を支払っている。","m":"米国の医療保険制度変更だが、日本の医療制度には直接影響しない。海外動向として参考程度に留める。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/states-pay-deloitte-others-millions-comply-trump-law-cut-medicaid-rolls","d":"2026-04-01"},{"t":"CMS: This year's open enrollment brought fewer signups, higher premiums","s":"米国CMSの報告で、今年のオープン enrollment期間中の加入者数が減少し、保険料は上昇した。医療保険市場の動向に関する情報。","m":"米国の医療保険市場の動向であり、日本の医療制度とは異なる。参考情報として把握する程度。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/cms-years-open-enrollment-brought-fewer-signups-higher-premiums-fewer-silver-sign-ups","d":"2026-04-01"},{"t":"Nonprofit Electronic Frontier Foundation sues CMS over AI prior authorization demonstration","s":"非営利団体電子フロンティア財団がCMSのAI事前承認実証に対して訴訟を起こした。AIによる医療承認プロセスへの法的懸念が表面化。","m":"日本でもAI診断支援ツール導入時に同様の問題が生じる可能性がある。患者説明と同意プロセスの整備が重要。","i":"AI導入時のコンプライアンスと患者権利保護への配慮を強化する必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/regulatory/nonprofit-electronic-frontier-foundation-sues-cms-over-ai-prior-authorization","d":"2026-04-01"},{"t":"Nearly half of US hospital markets entirely controlled by 1 or 2 health systems: KFF","s":"KFFの調査によると、米国の病院市場のほぼ半数が1-2つの医療システムに完全に支配されている。医療市場の寡占化に関する報告。","m":"米国の病院市場集約化の動向。日本でも地域医療構想により病床統合が進む中、参考となる海外事例。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/nearly-half-us-hospital-markets-entirely-controlled-1-or-2-health-systems-kff","d":"2026-04-01"},{"t":"持田製薬、子宮内膜症の治療薬を海外に 韓化学大手と販売契約","s":"持田製薬が子宮内膜症治療薬を韓国化学大手と販売契約を締結し海外展開を図る。婦人科領域の治療薬の国際展開が進展。","m":"子宮内膜症は内科でも相談されることがある疾患。治療薬の動向として参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC3192U0R30C26A3000000/","d":"2026-04-01"},{"t":"帝人が過去最大950億円の赤字 26年3月期最終、医薬子会社で減損","s":"帝人が2026年3月期に過去最大の950億円の赤字を計上。医薬子会社での減損処理が主因。製薬業界の企業動向。","m":"大手製薬企業の業績悪化は薬価への影響や新薬開発への影響が考えられる。業界動向として把握しておく。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUB316NO0R30C26A3000000/","d":"2026-04-01"},{"t":"DNP、横浜市立大とAI使ったX線画像分析 肺がん検診支援","s":"大日本印刷が横浜市立大学と連携してAIを活用したX線画像分析による肺がん検診支援システムを開発。医療AI技術の実用化が進展している。","m":"内科での胸部X線検査にAI支援技術が導入される可能性がある。診断精度向上と効率化が期待される。","i":"AI画像診断技術の動向を注視し、将来的な導入可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC302LS0Q6A330C2000000/","d":"2026-04-01"},{"t":"杏林製薬、仏製薬企業とライセンス契約 神経障害性の疼痛治療薬","s":"杏林製薬がフランスの製薬企業と神経障害性疼痛治療薬のライセンス契約を締結。新たな疼痛治療選択肢の開発が進展。","m":"糖尿病性神経障害による疼痛治療など、内科でも関連する領域の新薬開発動向として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC316X30R30C26A3000000/","d":"2026-04-01"},{"t":"田辺ファーマ、ワクチン製造の合弁解消 BIKEN財団に株式譲渡","s":"田辺ファーマがワクチン製造合弁事業を解消し、BIKEN財団に株式を譲渡する。製薬企業の事業再編による影響。","m":"ワクチン供給体制に変更があるかもしれないが、クリニックレベルでの直接的影響は限定的。小児科での予防接種業務への間接的影響を注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF312330R30C26A3000000/","d":"2026-04-01"},{"t":"JMDC、企業向け健康管理システムを刷新 派遣やパートも網羅","s":"JMDCが企業向け健康管理システムを刷新し、派遣社員やパート社員も対象範囲に含めるシステムを開発。企業の健康管理業務の効率化を図る。","m":"企業健診市場の動向として注目。産業医との連携や企業健診受託の参考情報となる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC3073B0Q6A330C2000000/","d":"2026-04-01"},{"t":"日本薬科大など3大学、「薬屋のひとりごと」と連携 漢方の魅力発信","s":"日本薬科大学など3大学が人気アニメ「薬屋のひとりごと」と連携し、漢方の魅力を発信する取り組みを開始。薬学教育の新しいアプローチ。","m":"漢方需要の拡大につながる可能性。消化器内科で漢方を扱う場合、患者の関心向上が期待できる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC257DL0V20C26A3000000/","d":"2026-04-01"},{"t":"DNP、インド工科大学に研究拠点 モビリティー・医療分野で連携","s":"大日本印刷がインド工科大学にモビリティー・医療分野の研究拠点を設立。国際的な医療技術開発連携が拡大している。","m":"医療分野の国際研究開発動向として参考程度。直接的なクリニック運営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2758M0X20C26A3000000/","d":"2026-04-01"},{"t":"明治HD系、米バイオ新興に出資 インフルワクチン開発後押し","s":"明治ホールディングス系企業が米バイオ新興企業に出資し、インフルエンザワクチン開発を支援する。新型ワクチン開発への投資。","m":"小児科と内科でインフルエンザワクチン接種を実施している。新しいワクチンの効果や接種スケジュール変更に備える必要がある。","i":"新しいインフルエンザワクチンの臨床応用時期と特徴を把握し導入準備が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC302UN0Q6A330C2000000/","d":"2026-04-01"},{"t":"「医療モール」3000施設突破、SCに並ぶ 美・食で待ち時間も商機に","s":"医療モールが3000施設を突破し、ショッピングセンター並みの規模に成長している。美容・飲食サービスとの融合で患者の待ち時間を商機に変える動き。","m":"複数専門科を持つ当法人にとって、医療モール展開は患者利便性向上と収益拡大の機会。立地戦略の見直しも必要かもしれない。","i":"医療モール参画や患者サービス向上による差別化戦略の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC185MS0Y6A310C2000000/","d":"2026-04-01"},{"t":"AI創薬の実力引き出せ データ生かし、有力候補を素早く","s":"AI創薬技術の活用により、データを効率的に活用して有力な新薬候補を迅速に発見する取り組みについて報じている。AI技術を活用した創薬プロセスの効率化が進んでいる。","m":"AI創薬の進歩は将来的に新薬開発期間の短縮と治療選択肢の拡大をもたらす。クリニックでの診療における新薬選択肢に間接的に影響する可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD208YD0Q6A220C2000000/","d":"2026-04-01"},{"t":"国立大学44病院、赤字脱却の見込み 26年度診療報酬改定で試算","s":"2026年度診療報酬改定により国立大学44病院が赤字脱却の見込みとなる試算が発表された。診療報酬改定の具体的な内容と影響度が注目される。","m":"診療報酬改定は直接的に収益に影響する。改定内容によっては算定体制の見直しが必要になる可能性がある。","i":"2026年度診療報酬改定の詳細内容を確認し、自院への影響を試算する必要がある。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA252JC0V20C26A3000000/","d":"2026-04-01"},{"t":"高度な小児医療、県またぎ集約方針 少子化受け心臓手術やがん治療","s":"少子化を受けて高度な小児医療（心臓手術やがん治療）を県をまたいで集約する方針が示された。小児専門医療の地域再編が進む。","m":"小児科を持つクリニックとして、高度医療との連携体制や紹介先の変化を把握しておく必要がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA278PD0X20C26A2000000/","d":"2026-04-01"},{"t":"大塚製薬、米バイオ企業を1100億円で買収 PTSDの新薬候補取得","s":"大塚製薬が米国のバイオテクノロジー企業を1100億円で買収し、PTSD治療薬の新薬候補を取得した。精神科領域での治療選択肢拡大に向けた企業戦略。","m":"PTSD治療薬の開発は精神科・心療内科での治療選択肢拡大に関連する。当クリニックでは直接的な診療科目ではないが、患者紹介時の参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC279AT0X20C26A3000000/","d":"2026-04-01"},{"t":"エーザイと米メルク 腎臓がん向けに抗がん剤を併用、日本で申請","s":"エーザイと米メルクが腎臓がん治療に向けて抗がん剤を併用する治療法について日本で承認申請を行った。がん治療における新たな併用療法の選択肢拡大。","m":"がん治療の進歩は患者の長期予後改善に寄与する。当クリニックでがん患者の併存疾患管理や専門医への紹介判断に参考となる情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273SQ0X20C26A3000000/","d":"2026-04-01"},{"t":"知識と行動が運命変える がんのリテラシー向上を","s":"がんに関する正しい知識の普及と行動変容の重要性について論じている。がんリテラシーの向上により患者の治療成果や予後改善が期待される。","m":"がんリテラシー向上は早期発見・適切な治療選択に繋がる。当クリニックでの健診や患者教育の際に、がん予防に関する情報提供の重要性を再認識。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD187QJ0Y6A310C2000000/","d":"2026-04-01"},{"t":"口の中が燃えるようにピリピリ 原因不明の「舌痛症」かも","s":"口の中が燃えるようにピリピリする原因不明の「舌痛症」について解説した記事。患者への説明や診断に役立つ情報。","m":"舌痛症は耳鼻咽喉科での診療対象。患者への説明や診断精度向上に活用できる情報。","i":"耳鼻咽喉科や内科での患者対応時の参考として活用を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD029AV0S6A200C2000000/","d":"2026-04-01"},{"t":"長崎市内3病院、緊急性ない救急車利用は7700円徴収 7月から","s":"長崎市内の3病院が7月から緊急性のない救急車利用に対して7700円を徴収する制度を開始する。不適切な救急車利用を抑制し、真に必要な患者への対応を優先する取り組み。","m":"救急医療の適正利用は全国的な課題。当クリニックでも夜間・休日対応時の患者教育や、適切な医療機関選択の指導が重要になる。","i":"救急医療適正利用の動向を注視し、患者への啓発強化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOJC2795L0X20C26A3000000/","d":"2026-04-01"},{"t":"「覚悟と工夫、時に諦めと希望も」 安藤忠雄さん、がんでも信念貫く","s":"建築家の安藤忠雄氏ががんを患いながらも信念を貫いて活動を続けている体験談。がんとの向き合い方や治療継続の重要性についての啓発的内容。","m":"著名人のがん体験談は患者の治療意欲向上に参考となる。当クリニックでがん患者への精神的サポートや治療継続の動機づけに活用できる事例。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD255TK0V20C26A2000000/","d":"2026-04-01"},{"t":"医療事故、報告件数の低迷続く 制度10年で警察頼みが増加","s":"医療事故調査制度が開始から10年経過したが、報告件数の低迷が続いている。医療安全の向上に向けた制度運用の課題が浮き彫りになっている。","m":"医療事故調査制度の動向は医療安全管理に直結する。当クリニックでもインシデント報告体制の強化と安全管理の継続的改善が必要。","i":"医療安全管理体制の見直しと事故報告の適切な運用を確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-04-01"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を高めるためには「痛気持ちいい」レベルより強めに伸ばすことが重要という運動療法に関する情報。","m":"患者への運動指導やリハビリテーション指導時の参考情報として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-04-01"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクと関連があるという食事習慣と健康に関する研究情報。","m":"糖尿病外来や生活習慣病指導での患者教育に活用できる予防医学的な情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-04-01"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法整備と精密検査受診率向上が急務とされている。企業健診におけるがん検診体制の充実が求められている。","m":"内科で実施可能ながん検診項目があり、職域健診の法整備により受託機会が増える可能性がある。","i":"職域がん検診の動向を注視し、企業健診受託の機会拡大を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-04-01"},{"t":"不調の多くは過剰から 頑張り過ぎず、体の声に耳傾けて","s":"体調不良の多くは過剰な活動から生じるため、頑張り過ぎず体の声に耳を傾けることの重要性を説いた健康管理に関する記事。","m":"患者への生活指導や健康管理アドバイス時の参考として活用できる情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD258CZ0V20C26A2000000/","d":"2026-04-01"},{"t":"患者の血管ソックリ再現 東北大発新興、カテーテル治療の精度向上へ","s":"東北大発のベンチャー企業が、患者の血管を精密に再現する技術を開発。カテーテル治療の精度向上と安全性向上に貢献する技術。","m":"循環器診療の技術向上に関する情報。当院の循環器内科診療の将来的な治療選択肢として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC1684H0W6A310C2000000/","d":"2026-04-01"},{"t":"Is this social media's tobacco moment?","s":"ソーシャルメディアが健康に与える影響について、タバコ産業との類似性の観点から論じている。メタやグーグルに対する法的判断に関する内容。","m":"ソーシャルメディアの健康影響は精神的健康に関連する。特に小児科診療において、デジタルデバイス使用と健康の関係性への注意が必要。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/5a7324b8-d553-46b2-8c6d-26c2a73a43dd","d":"2026-04-01"},{"t":"Whoop hits $10bn valuation as health tracking takes off","s":"ウェアラブルデバイスメーカーのフープが100億ドルの企業価値で5.75億ドルを調達。健康トラッキング技術の普及により株式公開を検討中。","m":"ウェアラブル健康管理デバイスの普及は、患者の健康意識向上や予防医療への関心増加につながる可能性がある。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/0a1e069c-adfd-4ea7-9472-0ff64bb63e25","d":"2026-04-01"},{"t":"Eli Lilly signs $2bn deal for AI drug development with Hong Kong biotech","s":"イーライリリーが香港のバイオテック企業とAI創薬開発で20億ドルの契約を締結。世界の製薬会社が中国での新薬開発を積極的に進めている。","m":"イーライリリーはGLP-1薬メーカーであり、当院の糖尿病診療に直接関連。AI創薬による新治療薬開発は注目すべき。","i":"新薬開発動向を注視し、糖尿病治療薬など関連分野での治療選択肢拡大の可能性を把握する。","src":"FT","p":"要注視","u":"https://www.ft.com/content/4efaf8cd-d415-46bb-8fb9-367e4eb3a781","d":"2026-04-01"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-31"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-31"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-31"},{"t":"Lithium Beyond Bipolar: A New Role in Brain Health","s":"双極性障害治療薬として知られるリチウムが、双極性障害以外の脳の健康維持において新たな役割を果たす可能性についての研究報告。","m":"直接的な診療科への影響は限定的。内科での精神科薬剤の知識として参考程度。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/lithium-beyond-bipolar-new-role-brain-health-2026a10009nk?src=rss","d":"2026-03-31"},{"t":"Anesthetic Risk Linked to Venezuelan Maternal Lineage","s":"ベネズエラ系母系血統において麻酔リスクが高まる可能性が示された。特定の遺伝的背景と麻酔合併症との関連性に関する研究報告。","m":"外科処置時の麻酔管理において、患者の遺伝的背景を考慮する必要性を示唆。消化器外科での参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/anesthetic-risk-linked-venezuelan-maternal-lineage-2026a10009ni?src=rss","d":"2026-03-31"},{"t":"The Death of the Medical Fax Is Foretold — Again","s":"医療分野でのファックス使用終了について再度議論されている。医療機関間の情報伝達手段のデジタル化が進展する見込み。","m":"他医療機関や薬局との連携方法の変更が必要。電子カルテシステムとの連携強化が求められる。","i":"ファックスに依存した業務プロセスの見直しとデジタル化対応を準備する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/death-medical-fax-foretold-again-2026a10009mx?src=rss","d":"2026-03-31"},{"t":"Even Low HIV Load Can Double Heart Disease Risk","s":"HIV感染者では低ウイルス量でも心疾患リスクが2倍に上昇することが判明。従来考えられていたよりも軽度の感染状態でも循環器合併症に注意が必要。","m":"循環器内科での診療において、HIV感染歴のある患者の心血管リスク評価がより重要になる。定期的な心機能チェックが必要。","i":"HIV患者の循環器スクリーニング強化と、内科での継続的な心血管リスク評価体制を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/even-low-hiv-load-can-double-heart-disease-risk-2026a100098o?src=rss","d":"2026-03-31"},{"t":"Exercise, CVD Risk Control: Heart Benefit, No Brain Gain?","s":"運動と心血管疾患リスクコントロールに関する研究で、心臓への利益は確認されたが脳への利益は見られなかったという結果が報告された。","m":"循環器内科での運動療法指導の根拠として参考。糖尿病患者への運動指導でも活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/exercise-cvd-risk-control-good-heart-no-brain-gain-2026a10009l6?src=rss","d":"2026-03-31"},{"t":"The Thyroid Cancer Dilemma: Doing More Isn’t Always Better","s":"甲状腺がん診療において過剰な治療介入が必ずしも良い結果をもたらさないという考え方が示された。適切な治療選択の重要性を強調。","m":"内科での甲状腺疾患管理において、過剰な精密検査や治療を避け、適切なタイミングでの専門医紹介が重要。","i":"甲状腺疾患患者の紹介基準を見直し、過剰診療回避のための診療連携体制を構築する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/thyroid-cancer-dilemma-doing-more-isnt-always-doing-better-2026a10008zs?src=rss","d":"2026-03-31"},{"t":"Shared Decision-Making in Sleep Apnea and Obesity","s":"睡眠時無呼吸症候群と肥満の管理において、患者との共同意思決定の重要性が強調された。個別化された治療選択肢の提案が鍵。","m":"内科での生活習慣病管理において、患者の価値観や希望を取り入れた治療選択が重要。GLP-1薬使用時の意思決定にも応用可能。","i":"睡眠時無呼吸と肥満患者に対する診療方針で、患者参加型の治療選択プロセスを導入する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/obstructive-sleep-apnea-obesity-glp1s-shared-decision-making-2026a100055n?src=rss","d":"2026-03-31"},{"t":"Meningococcal Disease Has Been Increasing Since 2021","s":"2021年以降、髄膜炎菌感染症の発生率が増加傾向にある。成人を含む幅広い年齢層での警戒が必要な状況。","m":"内科・小児科での発熱患者診療において、髄膜炎菌感染症の鑑別診断と迅速な専門医療機関への紹介体制が重要。","i":"発熱患者の診療で髄膜炎菌感染症の可能性を考慮し、早期診断・迅速対応体制を確認する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/meningococcal-disease-has-been-increasing-2021-adults-and-2026a10008zq?src=rss","d":"2026-03-31"},{"t":"Contemporary Diagnosis and Treatment of AR","s":"大動脈弁閉鎖不全症の現代的な診断と治療法についての最新情報。診断技術の進歩と治療選択肢の拡大が紹介されている。","m":"循環器内科での心弁膜疾患診療において、最新の診断・治療指針を把握しておく必要がある。専門医紹介タイミングの判断に有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/contemporary-diagnosis-and-treatment-aortic-regurgitation-2026a10007jy?src=rss","d":"2026-03-31"},{"t":"Dementia Risk May Triple With Type 1 Diabetes","s":"1型糖尿病患者では認知症リスクが3倍に上昇する可能性が示された。長期的な血糖管理と脳機能保護の重要性が浮き彫りになった。","m":"糖尿病内科での1型糖尿病管理において、血糖コントロールだけでなく認知機能の長期的なモニタリングが重要になる。","i":"1型糖尿病患者の長期フォローにおいて、認知機能評価を定期的に実施する体制を整備する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dementia-risk-may-triple-type-1-diabetes-2026a10009ek?src=rss","d":"2026-03-31"},{"t":"CMS: This year's open enrollment brought fewer signups, higher premiums","s":"米国の今年度のオープン登録では、登録者数減少と保険料上昇が見られた。医療保険市場の動向に関する米国の状況報告。","m":"米国の医療保険制度の動向であり、日本のクリニック経営への直接的影響は限定的。医療制度の国際比較の参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/cms-years-open-enrollment-brought-fewer-signups-higher-premiums-fewer-silver-sign-ups","d":"2026-03-31"},{"t":"Nearly half of US hospital markets entirely controlled by 1 or 2 health systems: KFF","s":"米国の病院市場の約半分が1〜2の医療システムによって完全に支配されているとの調査結果。医療機関の寡占化が進んでいる状況。","m":"米国の医療機関統合の動向であり、日本の医療法人経営への直接的影響は少ない。業界構造変化の参考情報として有用。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/nearly-half-us-hospital-markets-entirely-controlled-1-or-2-health-systems-kff","d":"2026-03-31"},{"t":"Oral GLP-1s, COVID preventatives: 3 more drugs in the pipeline, Optum says payers should watch","s":"オプタム社が保険会社が注視すべき薬剤として、経口型GLP-1薬、新型コロナ予防薬など3つの新薬を挙げた。これらの薬剤が市場に与える影響が大きいと予測される。","m":"糖尿病内科として経口GLP-1薬の登場は治療選択肢拡大に直結。患者ニーズと薬価動向を監視。","i":"GLP-1薬市場の動向を注視し、糖尿病診療への影響を評価する必要がある。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/oral-glp-1s-covid-preventatives-3-more-drugs-pipeline-optum-says-payers-should-watch","d":"2026-03-31"},{"t":"Advocate Health to launch ‘nation’s largest’ hospital drone delivery program in Zipline partnership","s":"米国のAdvocate Healthが全米最大規模の病院ドローン配送プログラムをZiplineと提携して開始する。医療物流の効率化を図る取り組み。","m":"将来的に日本でも医療物流のドローン活用が普及する可能性がある。現時点では海外事例として参考程度。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/advocate-health-launch-nations-largest-hospital-drone-delivery-program-zipline","d":"2026-03-31"},{"t":"Op-ed: Empathy meets efficiency—how the responsible use of AI can transform Medicare","s":"メディケアにおけるAIの責任ある活用が、共感と効率性を両立させることで医療制度を変革する可能性についての論説。","m":"将来的な医療DX推進の参考情報。AI活用による診療効率化の検討材料として有用。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/op-ed-empathy-meets-efficiency-how-responsible-use-ai-can-transform","d":"2026-03-31"},{"t":"SCAN taps biopharma, CMS vet Aman Bhandari as its first chief AI officer","s":"米国の医療保険会社SCANが、製薬業界とCMS出身の専門家Aman Bhandari氏を初代AI責任者として採用したと発表。","m":"医療分野でのAI専門人材の重要性を示す事例。将来的なAI導入時の人材確保の参考。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/scan-taps-aman-bhandari-its-first-chief-ai-officer","d":"2026-03-31"},{"t":"調剤業務の外部委託、対象範囲で論戦　厚労省「県またぎ」提示","s":"調剤業務の外部委託について、厚労省が県をまたいだ委託を提示し、対象範囲について議論が続いている。調剤業務の効率化に向けた制度変更が検討中。","m":"院内処方を行う場合の調剤業務効率化に関連。制度変更による影響は限定的だが動向は把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA306WH0Q6A330C2000000/","d":"2026-03-31"},{"t":"高度な小児医療、県またぎ集約方針　少子化受け心臓手術やがん治療","s":"少子化を受けて、高度な小児医療（心臓手術やがん治療）を県をまたいで集約化する方針が示された。専門性の高い医療の集約が進む。","m":"小児科を運営するクリニックとして、専門医療の集約化による患者紹介体制への影響を注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA278PD0X20C26A2000000/","d":"2026-03-31"},{"t":"日本薬科大など3大学、「薬屋のひとりごと」と連携 漢方の魅力発信","s":"日本薬科大学など3大学が人気アニメ「薬屋のひとりごと」と連携し、漢方薬の魅力を発信する取り組みを開始。薬学教育と一般啓発の新しいアプローチ。","m":"漢方薬への関心が高まれば、内科診療での漢方処方需要が増加する可能性がある。患者の漢方への理解促進につながるかもしれない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC257DL0V20C26A3000000/","d":"2026-03-31"},{"t":"DNP、インド工科大学に研究拠点 モビリティー・医療分野で連携","s":"大日本印刷がインド工科大学と研究拠点を設立し、モビリティーと医療分野で連携する。海外との医療技術開発協力が拡大している。","m":"医療技術の国際的な開発動向として参考。クリニック経営への直接的影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2758M0X20C26A3000000/","d":"2026-03-31"},{"t":"明治HD系、米バイオ新興に出資 インフルワクチン開発後押し","s":"明治ホールディングス系列が米国のバイオテック企業に出資し、インフルエンザワクチン開発を支援すると発表。新たなワクチン技術の開発が期待される。","m":"将来的な新型インフルエンザワクチンの供給や技術動向として参考。小児科での予防接種業務に関連。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC302UN0Q6A330C2000000/","d":"2026-03-31"},{"t":"「医療モール」3000施設突破、SCに並ぶ 美・食で待ち時間も商機に","s":"医療モールが全国で3000施設を突破し、ショッピングセンター並みの規模に成長。美容や飲食サービスとの複合化により待ち時間も商機として活用されている。","m":"クリニック経営の新しいモデルとして注目。複数診療科を持つ強みを活かした医療モール展開の可能性を検討。","i":"競合環境の変化を分析し、患者サービス向上と複合化戦略を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC185MS0Y6A310C2000000/","d":"2026-03-31"},{"t":"AI創薬の実力引き出せ データ生かし、有力候補を素早く","s":"人工知能を活用した創薬技術の発展により、データを活用して有望な薬剤候補を迅速に特定する取り組みが進んでいる。AI創薬の実用化が加速している。","m":"AI創薬の進展により新薬の市場投入が早まれば、当院での治療選択肢拡大に繋がる可能性がある。特に糖尿病・循環器分野での新薬動向を追跡すべき。","i":"将来的に新薬開発の迅速化により治療選択肢が増加する可能性を注視する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD208YD0Q6A220C2000000/","d":"2026-03-31"},{"t":"国立大学44病院、赤字脱却の見込み 26年度診療報酬改定で試算","s":"2026年度診療報酬改定により、国立大学44病院が赤字から脱却する見込みとなった。診療報酬改定が病院経営に大きな改善効果をもたらすことが示された。","m":"診療報酬改定は民間クリニックにも直接的に影響。改定内容の詳細把握が経営判断に重要。","i":"診療報酬改定の影響を詳細に分析し、クリニック経営への影響度を評価する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA252JC0V20C26A3000000/","d":"2026-03-31"},{"t":"大塚製薬、米バイオ企業を1100億円で買収 PTSDの新薬候補取得","s":"大塚製薬が米国のバイオテクノロジー企業を1100億円で買収し、PTSD治療薬の候補物質を取得した。精神疾患治療薬分野への投資が活発化している。","m":"PTSD治療薬は当院の診療科目とは直接関係しないが、製薬業界の投資動向として参考情報。大塚製薬の事業拡大戦略の一環と考えられる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC279AT0X20C26A3000000/","d":"2026-03-31"},{"t":"エーザイと米メルク 腎臓がん向けに抗がん剤を併用、日本で申請","s":"エーザイと米メルクが腎臓がん治療に向けて抗がん剤の併用療法を日本で承認申請した。がん治療における併用療法の開発が進んでいる。","m":"腎臓がん治療は当院の診療範囲外だが、併用療法の承認動向は製薬業界の治療戦略として参考になる。消化器外科での連携病院への紹介時の知識として有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273SQ0X20C26A3000000/","d":"2026-03-31"},{"t":"塩野義製薬、3000億円借り入れ エイズ治療薬の英社への追加出資で","s":"塩野義製薬がエイズ治療薬の英企業への追加出資のため3000億円を借り入れ。製薬業界の大型投資が続いている。","m":"製薬業界の投資動向として参考。エイズ治療はクリニック診療範囲外のため直接的影響なし。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2762M0X20C26A3000000/","d":"2026-03-31"},{"t":"GSKやアストラゼネカ、ぜんそくにバイオ薬 効果長持ち・価格10倍超","s":"GSKとアストラゼネカが効果が長持ちするぜんそく用バイオ薬を開発。従来薬の10倍以上の価格だが効果持続期間が長いのが特徴。","m":"内科診療でぜんそく患者を診察する際の治療選択肢が広がる。高価格だが効果的な新薬は患者の治療満足度向上につながる可能性がある。","i":"新しいぜんそく治療薬の承認状況と保険適用を注視し、処方選択肢の拡大を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC09A3G0Z00C25A6000000/","d":"2026-03-31"},{"t":"調剤報酬改定で「医療モール薬局」苦難 収益力低下、M&A加速へ","s":"調剤報酬改定により医療モール内薬局の収益が低下し、経営難からM&A加速が予想される。薬局業界の再編が進む可能性がある。","m":"調剤報酬改定は当院と連携する薬局の経営に直接影響する。薬局の経営状況変化は患者の利便性や当院の診療にも波及する可能性がある。","i":"隣接薬局との連携体制への影響を評価し、必要に応じて薬局との関係強化を検討する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOFC051Z00V00C26A3000000/","d":"2026-03-31"},{"t":"プラ単一素材に対応可能な医薬品の錠剤包装技術 CKD､リサイクル容易","s":"CKDが医薬品の錠剤包装において、リサイクルしやすいプラスチック単一素材に対応可能な技術を開発。環境負荷軽減と持続可能な包装材料への取り組み。","m":"医薬品包装の環境対応技術。現在のクリニック運営への直接影響は限定的だが、将来的な医薬品コスト・調達に関わる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD2743G0X20C26A3000000/","d":"2026-03-31"},{"t":"エーザイ、肺がん治療薬を欧州で承認申請","s":"エーザイが肺がん治療薬の欧州での承認申請を行った。がん治療薬の開発・承認が進んでいる。","m":"がん治療薬の進歩は消化器がん患者の治療選択肢拡大に関連。専門医療機関との連携強化要検討。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273FW0X20C26A3000000/","d":"2026-03-31"},{"t":"小野薬品、希少がん治療薬の承認申請 既存薬使用後の患者対象","s":"小野薬品が希少がん治療薬の承認申請を行った。既存薬使用後の患者を対象とした新たな治療選択肢が開発されている。","m":"希少がん治療の進歩。消化器がん診療での早期発見・適切な紹介体制の重要性が増す。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2646K0W6A320C2000000/","d":"2026-03-31"},{"t":"がん治療向け放射性元素「アスタチン」 住友重機械、27年製造開始へ","s":"住友重機械工業ががん治療向け放射性元素「アスタチン」の製造を2027年に開始予定。新しいがん治療技術の実用化が進む。","m":"放射線治療技術の進歩。がん診療の高度化により、早期発見・適切紹介の重要性がより高まる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG16B430W6A110C2000000/","d":"2026-03-31"},{"t":"メルク、がん治療薬新興を1兆円で買収 主力薬特許切れで連続M&A","s":"メルクが主力薬の特許切れに備え、がん治療薬新興企業を1兆円で買収。製薬業界の大型M&Aが続いている。","m":"製薬業界の統合による新薬開発力強化。将来的な治療薬の選択肢拡大につながる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN25C390V20C26A3000000/","d":"2026-03-31"},{"t":"武田薬品、27年3月期に構造再編費1500億円 特許切れや新薬に備え","s":"武田薬品が2027年3月期に1500億円の構造再編費を計上予定。主力薬の特許切れと新薬開発に向けた組織改革を実施する方針。","m":"大手製薬会社の構造改革は薬価や医薬品供給に影響。当クリニックで使用する武田薬品の医薬品への影響を確認する必要。","i":"武田薬品の薬価変動や供給体制変化を注視し、処方薬の切り替え準備を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC258FO0V20C26A3000000/","d":"2026-03-31"},{"t":"口の中が燃えるようにピリピリ 原因不明の「舌痛症」かも","s":"口の中がピリピリと燃えるような痛みを感じる原因不明の「舌痛症」について解説。診断や治療方法に関する情報提供記事。","m":"耳鼻咽喉科で診察する可能性のある症状。患者からの相談に備えて基礎知識を共有し、必要に応じて専門医連携を準備。","i":"舌痛症の症状を訴える患者への適切な対応方法と専門医への紹介体制を整備する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD029AV0S6A200C2000000/","d":"2026-03-31"},{"t":"長崎市内3病院、緊急性ない救急車利用は7700円徴収 7月から","s":"長崎市内の3病院が緊急性のない救急車利用に対して7700円の徴収を7月から開始する。救急医療の適正利用を促進する取り組みが広がっている。","m":"救急車の適正利用は全国的な課題。当院も時間外受診の増加に悩んでおり、患者教育や緊急度トリアージの参考になる取り組みである。","i":"当院での救急対応体制と患者への啓発活動について検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOJC2795L0X20C26A3000000/","d":"2026-03-31"},{"t":"医療事故、報告件数の低迷続く 制度10年で警察頼みが増加","s":"医療事故調査制度開始から10年経過したが、報告件数は低迷が続いている。警察への届出に依存する傾向が増加しており、制度の課題が浮き彫りになっている。","m":"医療事故調査制度は全医療機関に関わる重要な制度。当院でも医療安全管理者の配置や事故時の対応手順を改めて確認する必要がある。","i":"院内の医療安全管理体制の見直しと事故報告制度への対応方針を確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-03-31"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を高めるため「痛気持ちいい」程度よりも強めに伸ばすことが有効とする健康情報。運動指導の参考となる内容。","m":"生活習慣病指導や患者への運動指導時の参考情報。糖尿病・循環器疾患患者への生活指導に活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-03-31"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクの増加と関連するという研究結果。食事タイミングが骨の健康に与える影響について報告。","m":"生活習慣病指導に活用できる知見。特に糖尿病患者や高齢患者への食事指導で、食事時間の重要性も併せて指導可能。","i":"糖尿病や高齢患者への栄養指導に食事タイミングの重要性を組み込む。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-03-31"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法制度整備について検討されており、精密検査の受診率向上が急務とされている。法整備により職域検診の義務化や基準変更の可能性がある。","m":"内科での生活習慣病管理と連携したがん検診体制の構築機会。法制化により企業からの検診依頼が増加する可能性。","i":"職域検診対応の準備と、がん検診体制の見直しを検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-03-31"},{"t":"Eli Lilly signs $2bn deal for AI drug development with Hong Kong biotech","s":"米イーライリリーが香港のバイオテクノロジー企業と20億ドルのAI創薬開発契約を締結した。世界の製薬大手が中国での新薬開発を積極的に進めている。","m":"海外製薬企業のAI創薬投資動向として参考情報。将来的に新薬開発の加速により治療選択肢が増える可能性がある。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/4efaf8cd-d415-46bb-8fb9-367e4eb3a781","d":"2026-03-31"},{"t":"Ministers explore triggering break clause in Palantir’s NHS contract","s":"英国政府がパランティア社とのNHSデータシステム契約の解約条項発動を検討。論議を呼ぶ米国企業のNHS参入に対する圧力が高まっている状況。","m":"海外の医療データシステムに関する動向。日本の医療DXや電子カルテシステム選定の参考として、データ管理会社選定の重要性を示唆。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/2d2b1af1-edea-4fd0-a081-3811e34bc52e","d":"2026-03-31"},{"t":"Why recruiters are making interviews ‘AI-free zones’","s":"採用担当者が面接を「AI禁止区域」にする動きが広がっている。AIを使った求職応募が増加する中、雇用主は対面式や実技評価に回帰している。","m":"採用プロセスでのAI利用への対応策で、クリニックスタッフ採用時の参考となる。面接手法の見直しが必要かもしれない。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/bcc3becc-859e-4628-b6a7-b4788e6f20a6","d":"2026-03-31"},{"t":"診療報酬改定","s":"厚生労働省の診療報酬改定に関する公式情報。クリニック経営に直接的な影響を与える制度変更の最新情報が含まれている可能性が高い。","m":"診療報酬改定はクリニック経営の根幹に関わる。算定要件の変更や新設項目への対応が直接収益に影響する。","i":"診療報酬改定の詳細を確認し、算定要件や点数変更への対応準備を開始する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-30"},{"t":"消費税と診療報酬について","s":"厚生労働省による消費税と診療報酬の関係に関する公式情報。消費税率変更時の診療報酬への影響や補填措置について記載されている可能性がある。","m":"消費税の取り扱いはクリニック経営における重要な会計事項。診療報酬での補填状況を正確に把握する必要がある。","i":"消費税と診療報酬の関係を確認し、税務処理や収益計算への影響を評価する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-30"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。蚊媒介感染症として注意喚起されている疾患の概要。","m":"海外渡航歴のある患者での鑑別診断として認識。小児科では特に妊婦への影響について留意が必要。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-30"},{"t":"The Thyroid Cancer Dilemma: Doing More Isn’t Always Better","s":"甲状腺癌の治療において、過度な治療が必ずしも良い結果をもたらすわけではないという治療方針のジレンマについて議論。","m":"専門外の分野だが、過度な医療介入に対する慎重なアプローチは、当院の内科診療でも参考になる考え方。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/thyroid-cancer-dilemma-doing-more-isnt-always-doing-better-2026a10008zs?src=rss","d":"2026-03-30"},{"t":"Meningococcal Disease Has Been Increasing Since 2021","s":"2021年以降、髄膜炎菌感染症の発症が増加傾向にある。成人・小児ともに感染者数の増加が報告されている。","m":"小児科を有する当院にとって、髄膜炎菌感染症の増加は重要な感染症動向。早期診断と適切な対応が求められる。","i":"小児科診療で髄膜炎菌感染症の診断・対応体制を再確認し、必要に応じて研修を実施する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/meningococcal-disease-has-been-increasing-2021-adults-and-2026a10008zq?src=rss","d":"2026-03-30"},{"t":"Contemporary Diagnosis and Treatment of AR","s":"大動脈弁閉鎖不全症の現代的な診断と治療方法について解説。最新の診断技術と治療選択肢が紹介されている。","m":"循環器内科の専門領域。当院での循環器診療の参考情報として、最新の診断・治療指針を把握しておく価値がある。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/contemporary-diagnosis-and-treatment-aortic-regurgitation-2026a10007jy?src=rss","d":"2026-03-30"},{"t":"Dementia Risk May Triple With Type 1 Diabetes","s":"1型糖尿病患者において認知症リスクが3倍に増加する可能性が示された。糖尿病管理と認知症予防の関連性が注目される。","m":"糖尿病専門の内科を有する当院にとって極めて重要な情報。1型糖尿病患者の長期管理方針の見直しが必要。","i":"糖尿病診療で認知機能評価を強化し、患者・家族への認知症リスク説明を充実させる。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dementia-risk-may-triple-type-1-diabetes-2026a10009ek?src=rss","d":"2026-03-30"},{"t":"Biocomputer From Human Neurons Plays Doom, Raises Ethics","s":"人間のニューロンを使用したバイオコンピューターがゲームをプレイすることに成功し、倫理的な課題が提起されている。医療技術の新たな可能性を示している。","m":"基礎研究段階の技術で直接的な臨床応用は遠い。将来的な医療AI発展の基盤技術として注目。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/biocomputer-human-neurons-plays-doom-raises-ethics-2026a10009e0?src=rss","d":"2026-03-30"},{"t":"Physicians Must Lead AI Integration in Medicine","s":"医師が医療分野でのAI統合をリードする必要性が強調されている。医療現場でのAI導入において医師の主導的役割が重要とされている。","m":"診療業務の効率化と質向上のためのAI活用が必須となる時代。電子カルテやAI問診導入の判断材料。","i":"AI導入計画の策定と医師の研修体制構築を検討する必要がある。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/physician-ai-adoption-surging-we-must-lead-its-integration-2026a100095u?src=rss","d":"2026-03-30"},{"t":"S1 Episode 2: Can Early Genetic Testing Change ATTR-CM Outcomes?","s":"ATTR心筋症における早期遺伝子検査が治療成績に与える影響について議論するポッドキャスト番組。","m":"専門性の高い循環器領域の話題。当院の循環器診療での知識向上には有用だが、直接的な診療への影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep2-2026a10006ha?src=rss","d":"2026-03-30"},{"t":"S1 Episode 1: Rethinking Rhythm Control in ATTR-CM","s":"ATTR心筋症における不整脈治療の新しいアプローチについて議論するポッドキャスト番組。","m":"高度専門領域の循環器疾患に関する内容。当院の循環器診療レベルでは直接的な適用は困難だが、知識として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep1-2026a10006h9?src=rss","d":"2026-03-30"},{"t":"Preventing Deficiencies After Bariatric Surgery","s":"肥満手術後の栄養欠乏症予防について解説した記事。手術後の患者に適切な栄養管理と継続的なモニタリングが重要であることを説明している。","m":"消化器外科での肥満手術後患者の栄養管理に参考となる情報。継続的な栄養指導体制の検討材料。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/preventing-deficiencies-after-bariatric-surgery-2026a100098g?src=rss","d":"2026-03-30"},{"t":"Higher Meat Intake, Lower Dementia Risk — But Only in APOE4","s":"APOE4遺伝子保有者において、肉類の摂取量増加が認知症リスク低下と関連するという研究結果。遺伝的背景により栄養指導のアプローチが異なる可能性を示唆している。","m":"内科診療での認知症予防指導や栄養相談において、個別化医療の視点を取り入れる際の参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/higher-meat-intake-lower-dementia-risk-only-apoe4-carriers-2026a100098j?src=rss","d":"2026-03-30"},{"t":"Oral GLP-1s, COVID preventatives: 3 more drugs in the pipeline, Optum says payers should watch","s":"経口GLP-1薬、COVID予防薬など新薬パイプラインについてOptumが保険者に注意喚起。糖尿病診療を行うクリニックにとって治療選択肢の拡大を意味する。","m":"内科で糖尿病診療を行うクリニックとして、新しいGLP-1製剤の登場は治療選択肢の拡大につながる。患者ニーズや処方動向の変化に対応が必要。","i":"GLP-1経口薬の承認動向を注視し、糖尿病患者への治療選択肢拡大に備える。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/oral-glp-1s-covid-preventatives-3-more-drugs-pipeline-optum-says-payers-should-watch","d":"2026-03-30"},{"t":"Op-ed: Empathy meets efficiency—how the responsible use of AI can transform Medicare","s":"メディケアにおけるAIの責任ある活用により、共感と効率性を両立させることができるとの論考。医療制度でのAI活用の可能性を論じている。","m":"米国の事例だが医療AIの活用方向性として参考になる。日本の医療制度への応用可能性を検討する価値。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/op-ed-empathy-meets-efficiency-how-responsible-use-ai-can-transform","d":"2026-03-30"},{"t":"SCAN taps biopharma, CMS vet Aman Bhandari as its first chief AI officer","s":"SCAN社がバイオファーマ・CMS出身のアマン・バンダリ氏を初のチーフAI責任者に任命した。医療保険会社でのAI責任者設置の動き。","m":"米国での医療AI責任者設置トレンド。日本でも医療機関でのAI統括責任者の必要性が高まる可能性。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/scan-taps-aman-bhandari-its-first-chief-ai-officer","d":"2026-03-30"},{"t":"Infosys to acquire Optimum Healthcare IT in $465M deal","s":"インフォシス社が医療ITコンサルティング会社のOptimum Healthcare ITを4億6500万ドルで買収すると発表。医療IT分野の統合が進んでいる。","m":"医療IT分野の企業統合動向。電子カルテやシステム導入時のベンダー選定に影響する可能性。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/infosys-acquire-optimum-healthcare-it-465m-deal","d":"2026-03-30"},{"t":"New therapy animal program aims to support 100K patients, providers","s":"10万人の患者と医療従事者を支援することを目的とした新しいセラピー動物プログラムが開始された。医療現場での動物療法の拡大。","m":"小児科や高齢者医療での導入可能性。患者満足度向上や治療効果向上の手段として検討余地あり。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/new-therapy-animal-program-aims-support-100k-patients-providers","d":"2026-03-30"},{"t":"Gen Z nurses prioritize schedule flexibility, need more manager interactions to avoid turnover","s":"Z世代の看護師は勤務スケジュールの柔軟性を重視し、離職防止には管理者とのコミュニケーション増加が必要という調査結果。世代別の労働価値観の変化を示している。","m":"クリニックでの若手スタッフ採用・定着戦略において、世代別のニーズを理解する参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/gen-z-nurses-prioritize-schedule-flexibility-need-more-manager-interactions-avoid","d":"2026-03-30"},{"t":"ダイハツ、介護の送迎支援サービス強化　昼の「遊休車両」を活用","s":"ダイハツが昼間の遊休車両を活用して介護の送迎支援サービスを強化している。高齢者の移動支援における民間企業の取り組み。","m":"高齢患者の通院支援サービスとして連携可能性あり。アクセス改善により患者数増加の機会となる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF127BM0S6A310C2000000/","d":"2026-03-30"},{"t":"「医療モール」3000施設突破、SCに並ぶ　美・食で待ち時間も商機に","s":"医療モールが3000施設を突破し、ショッピングセンター並みの規模となった。美容や飲食施設と組み合わせて待ち時間を商機とする動き。","m":"競合他院との差別化や患者満足度向上の手段として重要。立地戦略や施設運営方針の見直し材料。","i":"医療モール出店や既存施設でのサービス拡充について検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC185MS0Y6A310C2000000/","d":"2026-03-30"},{"t":"高度な小児医療、県またぎ集約方針　少子化受け心臓手術やがん治療","s":"少子化を受けて高度な小児医療（心臓手術やがん治療）を県をまたいで集約する方針が示された。小児科を運営するクリニックの診療体制に影響する可能性がある。","m":"小児科を運営するクリニックとして、高度医療機関への紹介体制や役割分担の変化に対応が必要。患者の流れに影響する可能性がある。","i":"小児科の専門診療体制と他院との連携体制を見直し、患者紹介ルートを確認する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA278PD0X20C26A2000000/","d":"2026-03-30"},{"t":"医療事故、報告件数の低迷続く　制度10年で警察頼みが増加","s":"医療事故の報告制度開始から10年が経過したが、報告件数の低迷が続いている。医療機関による内部報告よりも警察への通報に依存する傾向が強まっているとみられる。","m":"医療事故報告制度への適切な対応は法的リスク管理の観点で重要。報告体制の整備と職員教育が必要。","i":"医療安全管理体制の見直しと事故報告制度への対応強化が必要","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-03-30"},{"t":"調剤報酬改定で「医療モール薬局」苦難　収益力低下、M&A加速へ","s":"調剤報酬改定により医療モール内薬局の収益性が悪化している。この影響で薬局業界のM&A活動が加速する見込み。","m":"医療モール内薬局の経営悪化は患者利便性に影響する可能性。薬局との連携体制や紹介関係の見直しが必要。","i":"医療モール運営や薬局との連携戦略の見直しを検討する","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOFC051Z00V00C26A3000000/","d":"2026-03-30"},{"t":"AI創薬の実力引き出せ データ生かし、有力候補を素早く","s":"AI技術を活用した創薬開発において、データの効果的な活用により有望な薬剤候補をより迅速に特定する取り組みが進んでいる。","m":"AI創薬の進展は将来的に新薬の開発スピードと治療選択肢の拡大につながる可能性。業界トレンドとして注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCD208YD0Q6A220C2000000/","d":"2026-03-30"},{"t":"国立大学44病院、赤字脱却の見込み 26年度診療報酬改定で試算","s":"2026年度診療報酬改定により国立大学44病院が赤字脱却する見込みとの試算が発表された。診療報酬改定が病院経営に与える影響の具体例として注目される。","m":"診療報酬改定がクリニック経営に与える影響を予測する参考材料となる。改定内容によっては収益構造の見直しが必要になる可能性がある。","i":"自院の診療報酬改定による収益影響を詳細に試算し、経営戦略を見直す必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA252JC0V20C26A3000000/","d":"2026-03-30"},{"t":"大塚製薬、米バイオ企業を1100億円で買収 PTSDの新薬候補取得","s":"大塚製薬が米バイオテクノロジー企業を1100億円で買収し、PTSD治療薬の新薬候補を取得した。精神科領域での治療選択肢拡大を狙う。","m":"PTSD治療薬の開発は精神科領域の治療選択肢拡大につながるが、現在の診療科目との直接的な関連は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC279AT0X20C26A3000000/","d":"2026-03-30"},{"t":"エーザイと米メルク 腎臓がん向けに抗がん剤を併用、日本で申請","s":"エーザイと米メルクが腎臓がん治療を目的とした抗がん剤の併用療法について、日本での承認申請を行った。","m":"がん治療の進歩は重要だが、当クリニックの診療科目（内科・耳鼻咽喉科・小児科・消化器）との直接的関連は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273SQ0X20C26A3000000/","d":"2026-03-30"},{"t":"塩野義製薬、3000億円借り入れ エイズ治療薬の英社への追加出資で","s":"塩野義製薬がエイズ治療薬開発企業への追加出資のため3000億円を借り入れ。製薬企業の投資戦略として注目されるが、クリニック診療への直接的影響は限定的。","m":"製薬企業の投資動向として参考程度。エイズ治療はクリニックレベルでの診療機会は少なく、直接的な影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2762M0X20C26A3000000/","d":"2026-03-30"},{"t":"GSKやアストラゼネカ、ぜんそくにバイオ薬 効果長持ち・価格10倍超","s":"GSKやアストラゼネカがぜんそく治療向けバイオ薬を展開。効果が長持ちする一方で価格は従来薬の10倍超となる。新たな治療選択肢として注目される。","m":"内科でのぜんそく治療に直結する情報。高価格帯の新薬による患者負担と治療効果のバランスを考慮した診療方針の検討が必要。","i":"ぜんそく患者への新治療選択肢として情報収集し、適応患者の選定基準を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC09A3G0Z00C25A6000000/","d":"2026-03-30"},{"t":"プラ単一素材に対応可能な医薬品の錠剤包装技術 CKD､リサイクル容易","s":"CKDが医薬品の錠剤包装でプラスチック単一素材に対応可能な技術を開発。リサイクルが容易になる環境配慮型の包装技術。","m":"医薬品供給の環境対応動向として参考情報。直接的なクリニック経営への影響は限定的だが、業界の持続可能性への取り組みとして注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD2743G0X20C26A3000000/","d":"2026-03-30"},{"t":"エーザイ、肺がん治療薬を欧州で承認申請","s":"エーザイが肺がん治療薬を欧州で承認申請。がん治療薬の開発動向として注目されるが、クリニックレベルでの直接的な処方機会は限定的。","m":"がん治療薬の開発動向として参考。クリニックでの処方機会は少ないが、がん患者の紹介や連携に間接的に関わる可能性がある。","i":"","src":" XZQOUC254ZM0V20C26A3000000/","d":"2026-03-30"},{"t":"スズケン､セイノーHDなどと資本業務提携 メーカー物流を強化","s":"スズケンがセイノーHDなどと資本業務提携を締結。メーカー向け物流機能の強化により、医薬品流通体制の効率化を図る。","m":"医薬品卸大手の物流強化により、クリニックへの医薬品供給の安定性や効率性に間接的な影響あり。供給体制の変化として注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD255FE0V20C26A3000000/","d":"2026-03-30"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を高める方法について解説。従来の「痛気持ちいい」程度より強めに伸ばすことで効果が向上するという研究結果。","m":"患者への健康指導や予防医学的アドバイスとして活用可能。特に整形外科的な観点からの生活指導に参考となる情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-03-30"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクと関連するという研究結果。食事のタイミングが骨の健康に影響を与える可能性を示唆。","m":"生活習慣病指導や骨粗鬆症予防の観点で患者指導に活用可能。内科診療での栄養指導や健康管理アドバイスとして有用な情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-03-30"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法整備と精密検査受診率向上が課題となっている。企業での健康管理体制強化が求められている状況。","m":"がん検診の法制化により企業からの紹介患者増加の可能性。内科での健診後フォロー需要拡大が見込まれる。","i":"職域がん検診連携体制の構築検討、企業健診との連携強化を図る必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-03-30"},{"t":"不調の多くは過剰から 頑張り過ぎず、体の声に耳傾けて","s":"体の不調の多くは過剰な活動や負荷が原因とする健康管理の考え方。頑張り過ぎず体の声に耳を傾けることの重要性を解説。","m":"患者の健康管理指導や予防医学的アプローチとして参考になる情報。ストレス管理や生活習慣改善の指導に活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD258CZ0V20C26A2000000/","d":"2026-03-30"},{"t":"患者の血管ソックリ再現 東北大発新興、カテーテル治療の精度向上へ","s":"東北大学発のベンチャー企業が患者の血管を精密に再現する技術を開発。カテーテル治療の精度向上が期待される。","m":"循環器内科を有する当院にとって、カテーテル治療の精度向上は診療の質向上に直結する重要な技術革新。","i":"循環器診療での治療精度向上技術として、将来的な導入可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC1684H0W6A310C2000000/","d":"2026-03-30"},{"t":"Eli Lilly to sign $2bn deal for AI drug development with Hong Kong biotech","s":"米製薬大手イーライリリーが香港のバイオテック企業と20億ドル規模のAI創薬開発契約を締結する。グローバル製薬会社が中国での新薬探索を積極的に進めている。","m":"AI創薬の国際的な動向として注目すべきだが、クリニックの診療業務への直接的影響は現時点では限定的。","i":"","src":"FT","p":"参考","u":"h :"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-28"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-28"},{"t":"The Thyroid Cancer Dilemma: Doing More Isn’t Always Better","s":"甲状腺がんの治療において、過度な治療が必ずしも良い結果をもたらすわけではないという治療方針に関する議論。","m":"甲状腺がんは内科で扱う可能性があるが、専門性が高く当院での直接的な診療機会は限定的。治療方針の変化として参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/thyroid-cancer-dilemma-doing-more-isnt-always-doing-better-2026a10008zs?src=rss","d":"2026-03-28"},{"t":"Meningococcal Disease Has Been Increasing Since 2021","s":"2021年以降、髄膜炎菌感染症の発症が増加傾向にある。感染症対策と早期発見の重要性が高まっている。","m":"小児科を有する当院では髄膜炎菌感染症の増加は重要な情報。早期診断と適切な対応体制の確認が必要。","i":"小児科・内科での髄膜炎菌感染症の診断力向上と感染対策の見直しを検討。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/meningococcal-disease-has-been-increasing-2021-adults-and-2026a10008zq?src=rss","d":"2026-03-28"},{"t":"Contemporary Diagnosis and Treatment of AR","s":"大動脈弁閉鎖不全症の現代的な診断と治療法について。循環器疾患の専門的な治療アプローチに関する内容。","m":"循環器内科を有するが、大動脈弁疾患は高度専門医療が必要で当院での対応は限定的。専門医療機関への紹介判断の参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/contemporary-diagnosis-and-treatment-aortic-regurgitation-2026a10007jy?src=rss","d":"2026-03-28"},{"t":"Dementia Risk May Triple With Type 1 Diabetes","s":"1型糖尿病患者において認知症リスクが3倍に増加する可能性があるという研究結果。糖尿病管理の重要性を示唆。","m":"糖尿病専門の当院にとって重要な情報。1型糖尿病患者の長期予後管理で認知症リスクを考慮した診療体制の検討が必要。","i":"1型糖尿病患者の長期管理において認知機能評価の組み込みと包括的ケア体制の検討。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dementia-risk-may-triple-type-1-diabetes-2026a10009ek?src=rss","d":"2026-03-28"},{"t":"Biocomputer From Human Neurons Plays Doom, Raises Ethics","s":"人間のニューロンを使用したバイオコンピュータがゲームをプレイし、医療応用への倫理的課題が議論されている。","m":"バイオコンピュータ技術の医療応用は将来的な話題。現在のクリニック運営には直接関係しない基礎研究段階。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/biocomputer-human-neurons-plays-doom-raises-ethics-2026a10009e0?src=rss","d":"2026-03-28"},{"t":"Physicians Must Lead AI Integration in Medicine","s":"医師がAI統合の主導権を握る必要があるとの提言。医療現場でのAI活用が急速に進展し、医師の役割変化が求められている。","m":"クリニックでのAI問診や診断支援導入が現実的課題。競合優位性確保のため早期対応が重要。","i":"AI診療支援ツールの導入検討と、医師・スタッフのAIリテラシー向上研修を計画する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/physician-ai-adoption-surging-we-must-lead-its-integration-2026a100095u?src=rss","d":"2026-03-28"},{"t":"S1 Episode 2: Can Early Genetic Testing Change ATTR-CM Outcomes?","s":"ATTR心筋症における早期遺伝子検査が治療成果に与える影響についてのポッドキャスト。専門的な心疾患の診断法に関する内容。","m":"ATTR心筋症は高度専門領域で当院での直接診療は困難。循環器専門医療機関への適切な紹介判断の参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep2-2026a10006ha?src=rss","d":"2026-03-28"},{"t":"S1 Episode 1: Rethinking Rhythm Control in ATTR-CM","s":"ATTR心筋症におけるリズムコントロール治療の再考についてのポッドキャスト。専門的な心疾患治療法に関する内容。","m":"高度専門領域の内容で当院での直接対応は困難。循環器疾患の治療動向として知識のアップデートには有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep1-2026a10006h9?src=rss","d":"2026-03-28"},{"t":"Preventing Deficiencies After Bariatric Surgery","s":"肥満外科手術後の栄養欠乏症予防について。手術後の長期管理における栄養管理の重要性を扱った内容。","m":"当院では肥満外科手術は実施していないが、術後患者の継続管理を行う可能性があり、栄養管理の知識として参考になる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/preventing-deficiencies-after-bariatric-surgery-2026a100098g?src=rss","d":"2026-03-28"},{"t":"Higher Meat Intake, Lower Dementia Risk — But Only in APOE4","s":"APOE4遺伝子保有者においてのみ、肉類摂取量の増加が認知症リスク低下と関連するという研究結果。","m":"糖尿病・循環器患者への食事指導において、遺伝的背景を考慮した個別化医療の可能性を示唆する情報として参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/higher-meat-intake-lower-dementia-risk-only-apoe4-carriers-2026a100098j?src=rss","d":"2026-03-28"},{"t":"Oral GLP-1s, COVID preventatives: 3 more drugs in the pipeline, Optum says payers should watch","s":"経口型GLP-1薬とコロナ予防薬を含む3つの新薬について、保険支払者が注視すべきとOptumが報告。薬剤費への影響が予想される。","m":"当院糖尿病診療に直結。経口GLP-1薬が承認されれば注射薬からの切り替え需要と薬剤費増加が見込まれる。","i":"経口GLP-1薬の動向を把握し、糖尿病診療での処方選択肢拡大と薬剤費管理を準備する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/oral-glp-1s-covid-preventatives-3-more-drugs-pipeline-optum-says-payers-should-watch","d":"2026-03-28"},{"t":"Op-ed: Empathy meets efficiency—how the responsible use of AI can transform Medicare","s":"AIがメディケアを変革する可能性について論じた意見記事。効率性と共感性を両立させた責任あるAI活用の重要性を指摘している。医療現場でのAI導入に関する考察を示している。","m":"クリニックでのAI問診やAI診断支援システム導入の参考となる。医療AIの責任ある活用方針策定に有用。","i":"AI導入による診療効率化と患者満足度向上の検討が必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/op-ed-empathy-meets-efficiency-how-responsible-use-ai-can-transform","d":"2026-03-28"},{"t":"SCAN taps biopharma, CMS vet Aman Bhandari as its first chief AI officer","s":"SCAN社がバイオ医薬品とCMS経験者のアマン・バンダリ氏を初の最高AI責任者に任命した。医療保険会社におけるAI活用体制の強化を示している。","m":"保険会社のAI活用動向は診療報酬や審査体制の変化につながる可能性がある。業界のAI活用トレンドの参考事例。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/scan-taps-aman-bhandari-its-first-chief-ai-officer","d":"2026-03-28"},{"t":"UnitedHealth shareholder sues over proposal to include details on integration in annual proxy","s":"ユナイテッドヘルス社の株主が、事業統合の詳細を年次株主総会資料に含める提案をめぐって訴訟を起こした。企業統合に関する透明性の問題を提起している。","m":"大手医療保険会社の統合動向は医療業界全体の構造変化を示唆する。診療報酬や保険審査への影響を注視する必要がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/unitedhealth-shareholder-sues-over-proposal-include-details-integration-annual-proxy","d":"2026-03-28"},{"t":"New therapy animal program aims to support 100K patients, providers","s":"10万人の患者と医療従事者を支援する新しいセラピー動物プログラムが開始された。医療現場での心理的サポートとしてのセラピー動物活用が注目されている。","m":"小児科や耳鼻咽喉科での患者不安軽減に活用可能。医療現場の患者体験向上の新しいアプローチとして参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/new-therapy-animal-program-aims-support-100k-patients-providers","d":"2026-03-28"},{"t":"Gen Z nurses prioritize schedule flexibility, need more manager interactions to avoid turnover","s":"Z世代の看護師は勤務スケジュールの柔軟性を重視し、上司との密な相互作用を求める。離職防止には管理者との関係性構築が重要との調査結果。","m":"クリニックの人材確保・定着において、若手職員の価値観変化への対応が必要。スタッフ管理方針の見直しが求められる。","i":"若手スタッフの働き方ニーズを理解し、柔軟な勤務体制や定期面談の導入を検討。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/gen-z-nurses-prioritize-schedule-flexibility-need-more-manager-interactions-avoid","d":"2026-03-28"},{"t":"高度な小児医療、県またぎ集約方針　少子化受け心臓手術やがん治療","s":"少子化の影響で高度な小児医療（心臓手術やがん治療）を都道府県を越えて集約する方針が示された。小児科専門医療の地域集約化が進む。","m":"当院小児科への直接的影響は限定的だが、小児医療全体の再編動向として把握が必要。地域での小児科ポジション見直しの参考になる。","i":"小児科診療の競合環境変化を注視し、軽症患者の囲い込みや専門医連携の強化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA278PD0X20C26A2000000/","d":"2026-03-28"},{"t":"医療事故、報告件数の低迷続く　制度10年で警察頼みが増加","s":"医療事故報告制度が開始から10年経過したが、報告件数の低迷が続いている。警察への依存が増加傾向にあり、制度の実効性に課題がある。","m":"クリニックでも医療事故報告義務がある。適切な報告体制構築と医療安全管理の徹底が法的リスク回避に重要。","i":"医療安全管理体制の見直しと事故報告の適切な実施体制確保が必要。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-03-28"},{"t":"調剤報酬改定で「医療モール薬局」苦難　収益力低下、M&A加速へ","s":"調剤報酬改定により医療モール内の薬局が収益力低下に直面している。経営難によりM&Aが加速する見通しとなっている。","m":"医療モール内薬局の経営悪化は処方箋応需に影響する可能性。薬局との連携体制や患者への影響を注視すべき。","i":"併設薬局との連携見直しや処方箋応需薬局の変更検討が必要。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOFC051Z00V00C26A3000000/","d":"2026-03-28"},{"t":"がん治療向け放射性元素「アスタチン」　住友重機械、27年製造開始へ","s":"住友重機械工業ががん治療向け放射性元素「アスタチン」の製造を2027年に開始予定。新しい放射線治療選択肢として期待される。","m":"クリニックレベルでの直接的関連は低いが、がん治療の選択肢拡大として情報共有価値あり。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG16B430W6A110C2000000/","d":"2026-03-28"},{"t":"大塚製薬、米バイオ企業を1100億円で買収 PTSDの新薬候補取得","s":"大塚製薬が米バイオ企業を1100億円で買収し、PTSD治療薬の新薬候補を取得した。精神疾患領域での新薬開発強化を示している。","m":"PTSD治療薬の選択肢拡大により、内科や小児科でも精神的ケアが必要な患者への対応が変わる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC279AT0X20C26A3000000/","d":"2026-03-28"},{"t":"エーザイと米メルク 腎臓がん向けに抗がん剤を併用、日本で申請","s":"エーザイと米メルクが腎臓がん向けの抗がん剤併用療法について日本で承認申請を行った。がん治療の選択肢拡大につながる可能性がある。","m":"腎臓がん治療の進歩により消化器内科での早期発見・連携が重要。がん治療の選択肢拡大は患者説明にも影響する。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273SQ0X20C26A3000000/","d":"2026-03-28"},{"t":"塩野義製薬、3000億円借り入れ エイズ治療薬の英社への追加出資で","s":"塩野義製薬がエイズ治療薬開発企業への追加出資のため3000億円を借り入れ。HIV治療薬開発への大型投資。","m":"HIV診療は当院業務範囲外。製薬業界の投資動向として参考程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2762M0X20C26A3000000/","d":"2026-03-28"},{"t":"GSKやアストラゼネカ、ぜんそくにバイオ薬 効果長持ち・価格10倍超","s":"GSKやアストラゼネカが喘息治療向けバイオ医薬品を開発。従来薬より効果が長続きするが価格は10倍以上高額。治療選択肢の拡大と医療費への影響が注目される。","m":"内科診療において喘息患者の治療選択肢が拡大。薬剤費増加と治療効果のバランスを考慮した処方判断が重要。","i":"高額な新薬の登場により、適応患者への治療選択肢と費用対効果を検討する必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC09A3G0Z00C25A6000000/","d":"2026-03-28"},{"t":"プラ単一素材に対応可能な医薬品の錠剤包装技術 CKD､リサイクル容易","s":"CKDが医薬品の錠剤包装でプラスチック単一素材に対応可能な技術を開発。リサイクルが容易になり環境負荷軽減に貢献する包装技術。","m":"医薬品包装の環境対応技術で、クリニック経営への直接的影響は限定的。製薬業界の環境配慮動向として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD2743G0X20C26A3000000/","d":"2026-03-28"},{"t":"エーザイ、肺がん治療薬を欧州で承認申請","s":"エーザイが肺がん治療薬の欧州承認申請を実施。がん治療薬の開発パイプライン情報。","m":"当院では肺がん治療は行わないが、がん治療薬開発動向として把握。患者の治療選択肢拡大の参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273FW0X20C26A3000000/","d":"2026-03-28"},{"t":"小野薬品、希少がん治療薬の承認申請 既存薬使用後の患者対象","s":"小野薬品が希少がん患者向け治療薬（既存薬使用後対象）の承認申請を行った。希少疾患治療選択肢の拡大。","m":"希少がん治療は当院業務外だが、オンコロジー分野の治療進歩として情報価値あり。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2646K0W6A320C2000000/","d":"2026-03-28"},{"t":"メルク、がん治療薬新興を1兆円で買収 主力薬特許切れで連続M&A","s":"メルクが主力薬の特許切れ対策として、がん治療薬新興企業を1兆円で買収。製薬業界の大型M&A案件。","m":"製薬業界再編の動向として把握。将来的な薬剤供給や価格に間接的影響の可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN25C390V20C26A3000000/","d":"2026-03-28"},{"t":"武田薬品、27年3月期に構造再編費1500億円 特許切れや新薬に備え","s":"武田薬品が2027年3月期に1500億円の構造再編費を計上すると発表。特許切れや新薬開発に備えた事業再編の一環。医薬品業界の大幅な構造改革を示している。","m":"大手製薬会社の事業再編は薬価政策や薬剤供給に間接的に影響する可能性。クリニックで使用する薬剤の価格動向に注意が必要。","i":"薬価や薬剤供給への影響を継続的に注視する必要がある。","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC258FO0V20C26A3000000/","d":"2026-03-28"},{"t":"介護のソラストがMBO、上場廃止へ 経営自由度高める","s":"介護サービス大手のソラストがMBOにより上場廃止する方針を発表した。経営の自由度を高めることが目的とされている。","m":"介護業界の再編は高齢患者の介護サービス連携に影響する可能性。地域包括ケアシステムでの連携先変化を注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC24B530U6A320C2000000/","d":"2026-03-28"},{"t":"杏林製薬、ヤンセンファーマと販売の契約締結 抗結核薬で","s":"杏林製薬がヤンセンファーマと抗結核薬の販売契約を締結した。結核治療薬の供給体制強化を図る取り組みとなっている。","m":"結核治療薬の供給安定化により、内科での結核患者対応がより適切に行える。感染症対応の選択肢拡大につながる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2587B0V20C26A3000000/","d":"2026-03-28"},{"t":"川崎重工、介護職員の行動を自動で記録できるシステム 業務改善に","s":"川崎重工が介護職員の行動を自動記録するシステムを開発し、業務改善に活用する。介護現場での労働効率化とデジタル化が進んでいる。","m":"介護分野での業務効率化技術は医療現場でも応用可能。スタッフの働き方改善や業務最適化への示唆がある。","i":"将来的にクリニックでも類似の職員行動記録システムの導入可能性を検討する価値がある。","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC254ZM0V20C26A3000000/","d":"2026-03-28"},{"t":"スズケン､セイノーHDなどと資本業務提携 メーカー物流を強化","s":"医薬品卸大手のスズケンがセイノーホールディングスなどと資本業務提携を発表。メーカー物流機能の強化が目的。医薬品流通体制の効率化を図る取り組み。","m":"医薬品卸の物流強化は薬剤供給の安定化につながる。クリニックの薬剤調達に間接的にプラス効果が期待される。","i":"薬剤調達の安定性向上が期待できるが、直接的な対応は不要。","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD255FE0V20C26A3000000/","d":"2026-03-28"},{"t":"ジェイファーマ上場 吉武社長「独自の胆道がん薬を世界で発売」","s":"ジェイファーマが株式上場し、独自開発の胆道がん治療薬の世界展開を目指している。がん治療薬の新たな選択肢として注目される。","m":"胆道がん治療薬は専門性が高く、内科クリニックでは直接的な関連は少ない。製薬業界の動向として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC255L00V20C26A3000000/","d":"2026-03-28"},{"t":"「ファンド病院」監視へ、4月から財務諸表の提出義務化 営利重視防ぐ","s":"4月から病院経営に投資ファンドが関与する場合、財務諸表の提出が義務化される。営利重視の経営を防ぐ監視体制が強化される。","m":"医療法人への規制強化の一環として、財務透明性の要求が高まっている。コンプライアンス対応が重要。","i":"医療法人の財務管理体制を見直し、透明性の高い経営報告体制を構築する必要がある。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA240OQ0U6A320C2000000/","d":"2026-03-28"},{"t":"アステラス、中之島クロスのラボ公開 ロボット・AIで細胞培養自動化","s":"アステラス製薬が中之島クロスの研究所で、ロボットとAIを活用した細胞培養の自動化システムを公開した。創薬研究の効率化が進んでいる。","m":"製薬会社の研究開発効率化は新薬開発期間短縮につながり、将来的に治療選択肢の拡大に寄与する可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF241070U6A320C2000000/","d":"2026-03-28"},{"t":"静岡県、医療産業集積拠点に4社誘致 スタートアップとの協業も","s":"静岡県が医療産業集積拠点に4社を誘致し、スタートアップとの協業も推進している。地方での医療産業育成が進んでいる。","m":"地方自治体の医療産業振興策は、新しい医療技術やサービスの創出につながる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC246VD0U6A320C2000000/","d":"2026-03-28"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を高めるには「痛気持ちいい」程度より強めに伸ばすことが重要という研究結果。適切なストレッチ方法に関する最新知見。","m":"患者への生活指導や健康相談で活用できる情報。特に整形外科的な症状を持つ患者への指導に有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-03-28"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクと関連があることが研究で判明。食事のタイミングが骨の健康に影響を与える可能性が示された。","m":"高齢患者の多いクリニックでは骨折予防が重要な課題。食事指導による予防医療として活用できる有用な情報。","i":"患者の生活習慣指導で食事タイミングの重要性を説明し、骨折予防につなげる。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-03-28"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法整備が提言され、精密検査受診率向上が急務とされている。検診体制強化の制度化が進む可能性。","m":"当院での健診・検診業務拡大機会。職域検診制度化により、企業からの検診受託増加の可能性。","i":"がん検診関連の制度変更を注視し、検診業務拡大や精密検査対応体制の整備を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-03-28"},{"t":"不調の多くは過剰から 頑張り過ぎず、体の声に耳傾けて","s":"不調の多くは過剰な行動から生じるという考え方について。頑張り過ぎず体の声に耳を傾けることの重要性を説く健康に関する記事。","m":"患者の心身の健康管理に関する考え方として参考になる。ストレス関連疾患の患者への指導や説明に活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD258CZ0V20C26A2000000/","d":"2026-03-28"},{"t":"患者の血管ソックリ再現 東北大発新興、カテーテル治療の精度向上へ","s":"東北大学発の新興企業が患者の血管を精密に再現する技術を開発し、カテーテル治療の精度向上を目指している。","m":"循環器内科を有する当院にとって、カテーテル治療の精度向上技術は診療の質向上に直結。技術動向と実用化時期を継続監視が必要。","i":"循環器診療での治療精度向上技術として、将来的な導入検討や関連医療機関との連携可能性を注視。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC1684H0W6A310C2000000/","d":"2026-03-28"},{"t":"睡眠リズム、起きる時間で調整してみよう","s":"睡眠リズムの調整には起きる時間を一定にすることが重要という睡眠に関する知見。良質な睡眠のための具体的な方法について。","m":"睡眠障害や不眠を訴える患者への生活指導で活用できる情報。内科診療での患者指導に有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG116UR0R10C26A3000000/","d":"2026-03-28"},{"t":"Prevalence and incidence of infections among people with type 2 diabetes: a systematic review and meta-analysis.","s":"2型糖尿病患者における感染症の有病率と発生率を評価したメタアナリシス。70の研究を分析し、2型糖尿病患者では重篤な歯周病などの感染症リスクが高いことを示している。","m":"糖尿病内科を持つクリニックでは、感染症予防の重要性を患者に啓発する根拠となる。歯科との連携強化も検討価値がある。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41886636/","d":"2026-03-27"},{"t":"Safety of GLP-1 and Dual GLP-1/GIP Receptor Agonists in Preconception, Pregnancy, and Lactation: A Systematic Review of Maternal, Fetal, and Neonatal Outcomes.","s":"GLP-1受容体作動薬と二重受容体作動薬の妊娠期・授乳期における安全性を評価したシステマティックレビュー。妊娠可能年齢女性での使用が増加しているが、妊娠中の安全性データは限定的。","m":"糖尿病治療でGLP-1薬を使用する際、女性患者への妊娠・授乳期のリスク説明が重要。診療ガイドライン更新に注意が必要。","i":"GLP-1薬処方時は妊娠可能性の確認と適切な避妊指導を徹底する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41885132/","d":"2026-03-27"},{"t":"Incretin polyagonists as an alternative to bariatric surgery to manage obesity.","s":"インクレチン多重作動薬が肥満治療における外科手術の代替選択肢として注目されている。二重・三重作動薬は外科手術に匹敵する体重減少効果を示すクリニカル試験結果が報告されている。","m":"糖尿病・循環器内科で肥満患者が多い中、薬物治療による大幅な減量効果は診療方針に大きく影響する可能性がある。","i":"肥満症治療の選択肢拡大に備え、新薬情報の収集と適応患者の選定基準を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41884205/","d":"2026-03-27"},{"t":"[Research advances on the targeted programmed cell death regulatory network for treatment of refractory diabetic wounds].","s":"Refractory diabetic wounds are severe complications of diabetes mellitus, for which conventional treatments yield limited efficacy. Recent studies have demonstrated that the core pathogenesis lies in the dysregulation of the programmed cell death regulatory network induced by the hyperglycemic microenvironment. Specifically, excessive activation of lytic cell death such as necroptosis, ferroptosis, and pyroptosis drives persistent inflammation; while impairment of non-lytic cell death including apoptosis and cytoprotective autophagy as well as efferocytosis dysfunction results in impaired initiation of the inflammation resolution program. Distinct cell death pathways form a dynamic network through shared regulatory hubs and downstream signaling crosstalk, ultimately locking the wound in a vicious cycle of \"cell death-inflammation-repair impairment\". This review systematically elaborates on the dysregulation characteristics and interaction mechanisms of the programmed cell death regulatory network in diabetic wounds, and discusses the application prospects of combination therapies and precision stratified treatment. &#x7cd6;&#x5c3f;&#x75c5;&#x96be;&#x6108;&#x521b;&#x9762;&#x662f;&#x7cd6;&#x5c3f;&#x75c5;&#x4e25;&#x91cd;&#x5e76;&#x53d1;&#x75c7;&#xff0c;&#x4f20;&#x7edf;&#x6cbb;&#x7597;&#x6548;&#x679c;&#x6709;&#x9650;&#x3002;&#x8fd1;&#x5e74;&#x7814;&#x7a76;&#x8868;&#x660e;&#xff0c;&#x5176;&#x75c5;&#x7406;&#x6838;&#x5fc3;&#x5728;&#x4e8e;&#x9ad8;&#x7cd6;&#x5fae;&#x73af;&#x5883;&#x5bfc;&#x81f4;&#x7684;&#x7a0b;&#x5e8f;&#x6027;&#x7ec6;&#x80de;&#x6b7b;&#x4ea1;&#x8c03;&#x63a7;&#x7f51;&#x7edc;&#x5931;&#x8c03;&#xff0c;&#x5177;&#x4f53;&#x8868;&#x73b0;&#x4e3a;&#x574f;&#x6b7b;&#x6027;&#x51cb;&#x4ea1;&#x3001;&#x94c1;&#x6b7b;&#x4ea1;&#x3001;&#x7126;&#x4ea1;&#x7b49;&#x88c2;&#x89e3;&#x6027;&#x7ec6;&#x80de;&#x6b7b;&#x4ea1;&#x8fc7;&#x5ea6;&#x6fc0;&#x6d3b;&#x9a71;&#x52a8;&#x708e;&#x75c7;&#x6301;&#x7eed;&#xff1b;&#x51cb;&#x4ea1;&#x3001;&#x4fdd;&#x62a4;&#x6027;&#x7ec6;&#x80de;&#x81ea;&#x566c;&#x7b49;&#x975e;&#x88c2;&#x89e3;&#x6027;&#x7ec6;&#x80de;&#x6b7b;&#x4ea1;&#x53d7;&#x635f;&#x53ca;&#x80de;&#x846c;&#x4f5c;&#x7528;&#x969c;&#x788d;&#x5bfc;&#x81f4;&#x708e;&#x75c7;&#x6d88;&#x9000;&#x7a0b;&#x5e8f;&#x53d7;&#x963b;&#x3002;&#x5404;&#x6b7b;&#x4ea1;&#x9014;&#x5f84;&#x901a;&#x8fc7;&#x5171;&#x4eab;&#x8c03;&#x63a7;&#x67a2;&#x7ebd;&#x548c;&#x4e0b;&#x6e38;&#x4fe1;&#x53f7;&#x4e32;&#x6270;&#x5f62;&#x6210;&#x52a8;&#x6001;&#x7f51;&#x7edc;&#xff0c;&#x6700;&#x7ec8;&#x4f7f;&#x521b;&#x9762;&#x9677;&#x5165;&#x201c;&#x6b7b;&#x4ea1;&#x2014;&#x708e;&#x75c7;&#x2014;&#x4fee;&#x590d;&#x969c;&#x788d;&#x201d;&#x7684;&#x6076;&#x6027;&#x5faa;&#x73af;&#x3002;&#x8be5;&#x6587;&#x7cfb;&#x7edf;&#x9610;&#x8ff0;&#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x4e2d;&#x7a0b;&#x5e8f;&#x6027;&#x7ec6;&#x80de;&#x6b7b;&#x4ea1;&#x8c03;&#x63a7;&#x7f51;&#x7edc;&#x7684;&#x5931;&#x8c03;&#x7279;&#x5f81;&#x3001;&#x4ea4;&#x4e92;&#x673a;&#x5236;&#xff0c;&#x5e76;&#x63a2;&#x8ba8;&#x7ec4;&#x5408;&#x7597;&#x6cd5;&#x4e0e;&#x7cbe;&#x51c6;&#x5206;&#x5c42;&#x6cbb;&#x7597;&#x7684;&#x5e94;&#x7528;&#x524d;&#x666f;&#x3002;.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41881587/","d":"2026-03-27"},{"t":"[Mechanism of actions and reflections of Masquelet induced membrane technique in diabetic wound].","s":"Diabetic wounds are hindered in the healing process due to chronic inflammation , vasculari-zation disorder, and abnormal expression of growth factors caused by the high glucose microenvironment. Masquelet induced membrane technique (hereinafter referred to as the induced membrane technique) creates a bioactive membrane composed of various cellular components and rich in growth factors and microvessels by inserting bone cement into the wound. The membrane mainly promotes wound healing by remodeling the inflammatory microenvironment, promoting functional angiogenesis, and producing endogenous growth factors. This article briefly explains the mechanism by which the induced membrane technique improves wound healing and summarizes its clinical application in diabetic wounds. It is expected to provide new ideas and effective means for the clinical treatment of difficult-to-heal diabetic wounds. Future research needs to focus on the key molecular pathways for the application of the induced membrane technique in therapy and the development of new membrane induction materials, so as to provide new strategies for the treatment of diabetic wounds. &#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x56e0;&#x9ad8;&
