<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理くんニュース</title>
<link rel="icon" href="/daily-briefing/kanri-kun.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--card:#FFFFFF;--border:#E8E6E0;--text:#1A1A18;--sub:#6B6960;--accent:#1A5F4A;--red:#9B2C2C;--amber:#92600A;--blue:#1A4B8C;--purple:#5B21B6;--tag-red:#FEF2F2;--tag-amber:#FFFBEB;--tag-blue:#EFF6FF;--tag-green:#F0FDF4;--tag-purple:#F5F3FF;--font-sans:'Noto Sans JP',sans-serif;--font-serif:'Noto Serif JP',serif}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.app-header h1{font-family:var(--font-serif);font-size:18px;font-weight:700;letter-spacing:0.02em;white-space:nowrap}
.app-header nav{display:flex;gap:12px;align-items:center;flex:1}
.app-header nav a{font-size:13px;color:var(--sub);text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;transition:all .15s}
.app-header nav a:hover,.app-header nav a.active{color:var(--accent);background:var(--tag-green)}
.container{max-width:820px;margin:0 auto;padding:24px 20px 80px}
.date-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.date-nav a{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;text-decoration:none;color:var(--sub);background:var(--card);transition:all .15s}
.date-nav a:hover,.date-nav a.current{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card.read{opacity:0.55}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.card h3{font-size:14.5px;font-weight:700;line-height:1.55}
.priority{font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.p-high{background:var(--tag-red);color:var(--red)}
.p-mid{background:var(--tag-amber);color:var(--amber)}
.p-info{background:var(--tag-green);color:var(--accent)}
.p-tech{background:var(--tag-purple);color:var(--purple)}
.card .source-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.card .source{font-size:11px;color:var(--sub)}
.card .link-btn{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid rgba(26,95,74,.25);border-radius:4px;transition:all .15s}
.card .link-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card .body{font-size:13px;color:#3D3D3A;line-height:1.8}
.card .impact{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12.5px;color:var(--accent);font-weight:500;line-height:1.7}
.card .impact::before{content:'-> '}
.card .memo{margin-top:8px;background:#F7F7F5;border-radius:6px;padding:10px 14px;font-size:12.5px;line-height:1.7}
.card .memo strong{color:var(--accent);font-weight:700}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sub);margin:28px 0 14px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.archive-list{list-style:none}
.archive-list li{margin-bottom:8px}
.archive-list li a{font-size:14px;color:var(--accent);text-decoration:none;padding:10px 16px;display:block;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.archive-list li a:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.archive-list li a .count{font-size:12px;color:var(--sub);margin-left:8px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
.collapsible-section{margin-top:8px}
.collapsible-section>summary{list-style:none}
.collapsible-section>summary::-webkit-details-marker{display:none}
.collapsible-section>summary::after{content:' \25B6';font-size:10px}
.collapsible-section[open]>summary::after{content:' \25BC'}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:13.5px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;text-decoration:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:5px;vertical-align:1px}
.panel{display:none}.panel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--sub);margin-top:2px}
.source-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.source-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--sub);background:var(--card)}
.source-pill b{color:var(--text);font-weight:700}
.footer-note{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--sub);line-height:1.7;text-align:center}
.search-box{margin-bottom:20px;display:flex;gap:8px}
.search-box input{flex:1;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-sans);background:var(--card)}
.search-box input:focus{outline:none;border-color:var(--accent)}
.search-results-info{font-size:13px;color:var(--sub);margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.search-results-info b{color:var(--text)}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.card-head{flex-direction:column;gap:4px}.priority{align-self:flex-start}.app-header{flex-direction:column;align-items:flex-start}}</style>
</head>

</div><script>
var DATA=[{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-08"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-08"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-08"},{"t":"Is Your Patient a Migraine Prophylaxis Candidate?","s":"片頭痛の予防治療の適応患者の選定に関する医学的指針。プライマリケア医師向けに、どのような患者が片頭痛予防薬の候補となるかについての臨床判断の指針を提供。","m":"内科診療で片頭痛患者を診察する際の治療方針決定に参考となる医学的知識。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/migraine-prophylaxis-indications-every-primary-care-2026a10009yz?src=rss","d":"2026-04-08"},{"t":"Midlife Vitamin D Levels Tied to Lower Tau Burden","s":"中年期のビタミンD血中濃度が高いほど、後年のタウ蛋白蓄積が少ないという研究結果。アルツハイマー病予防におけるビタミンDの役割が示唆された。","m":"糖尿病外来でのビタミンD測定・補充療法の検討材料。認知症予防の観点からも重要な知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/midlife-vitamin-d-levels-tied-lower-tau-burden-later-life-2026a1000akn?src=rss","d":"2026-04-08"},{"t":"Hormonal Contraception and IIH Risk: New Data","s":"ホルモン避妊薬と特発性頭蓋内圧亢進症リスクに関する新たなデータが発表された。女性患者への処方時の注意点が明らかになった。","m":"内科での女性患者診療時に頭痛症状があるケースでの鑑別診断の参考。専門医連携の判断材料。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/hormonal-contraception-and-iih-risk-new-data-2026a1000akg?src=rss","d":"2026-04-08"},{"t":"Meningitis Deaths Top 250,000 a Year, Despite Global Decline","s":"世界的に減少傾向にあるものの、髄膜炎による死亡者数は年間25万人を超えている。早期診断・治療の重要性が改めて強調された。","m":"小児科・内科で発熱患者診療時の髄膜炎の鑑別診断能力向上が必要。早期専門医紹介の重要性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/meningitis-deaths-top-250-000-year-despite-global-decline-2026a1000aji?src=rss","d":"2026-04-08"},{"t":"Kids With Developmental Disabilities Often Face Chronic Pain","s":"発達障害を持つ小児が慢性的な疼痛を抱えることが多いという研究報告。小児科診療において発達障害児の疼痛管理についての認識と対応の重要性を示す。","m":"小児科診療において発達障害児の疼痛評価や管理について、より注意深い対応が求められる可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/kids-developmental-disabilities-often-face-chronic-pain-2026a1000aj8?src=rss","d":"2026-04-08"},{"t":"Treating IgG4-RD: How Far Will B-Cell Drugs Take the Field?","s":"IgG4関連疾患の治療において、B細胞標的薬の有効性と今後の治療展開について議論されている。専門的な治療選択肢が拡大している。","m":"希少疾患のため直接的な診療機会は少ないが、消化器科で膵炎等を診る際の鑑別診断知識として重要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/treating-igg4-related-disease-how-far-will-b-cell-drugs-take-2026a1000aij?src=rss","d":"2026-04-08"},{"t":"Shingles Vaccine Lowers Cardiovascular Risk","s":"帯状疱疹ワクチン接種により心血管リスクが低下することが示された。循環器疾患予防の新たな視点として注目される。","m":"循環器疾患患者への帯状疱疹ワクチン接種推奨により、心血管イベント予防効果が期待できる。","i":"循環器内科で帯状疱疹ワクチン接種を積極的に推奨、接種体制の整備検討","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/shingles-vaccine-protective-against-serious-cardiac-events-2026a1000aif?src=rss","d":"2026-04-08"},{"t":"Can Severe Infections Raise Your Dementia Risk?","s":"重篤な感染症が将来の認知症リスクを高める可能性についての研究報告。感染症治療と長期的な神経学的影響の関連性についての医学的知見。","m":"高齢患者の感染症治療後の長期フォローアップにおいて、認知機能の変化に注意を払う必要性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/can-severe-infections-raise-your-dementia-risk-2026a1000aie?src=rss","d":"2026-04-08"},{"t":"New Evidence Strengthens the Case for Iatrogenic Alzheimer’s","s":"医原性アルツハイマー病の存在を示す新たな証拠が発表された。医療行為に起因する認知症発症の可能性が議論されている。","m":"医療安全管理の観点から注意すべき知見。感染制御や医療器具管理の重要性を再認識。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/new-evidence-strengthens-case-iatrogenic-alzheimers-2026a1000ah9?src=rss","d":"2026-04-08"},{"t":"Novel Opioid Offers Pain Relief Without Classic Side Effects","s":"従来の副作用なしに疼痛緩和効果を提供する新しいオピオイド系薬剤の開発について。疼痛管理における新たな治療選択肢として期待される薬剤の研究。","m":"疼痛を訴える患者への治療選択肢として、将来的に利用可能になる可能性がある新薬情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/novel-opioid-offers-potent-pain-relief-without-classic-side-2026a1000age?src=rss","d":"2026-04-08"},{"t":"Yale New Haven Health hospital's tele-ICU model highlighted in wrongful death lawsuit","s":"イェール・ニューヘイブン・ヘルスの病院におけるテレICUモデルが医療過誤訴訟で注目されている。遠隔医療の責任問題が議論された。","m":"遠隔医療導入時のリスク管理と責任の所在について参考になる事例。医療安全体制構築の参考。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/yale-new-haven-health-hospitals-tele-icu-model-highlighted-wrongful-death-lawsuit","d":"2026-04-08"},{"t":"Insurers have eliminated 11% of prior authorizations under reform pledge","s":"米国の保険会社が改革公約の下、事前承認手続きを11%削減したことが報告された。医療提供者の負担軽減と患者の治療アクセス改善が期待される。","m":"米国の制度改革事例として参考になる。日本でも保険審査の効率化が求められており、将来的な制度変更の参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/insurers-have-eliminated-11-prior-authorizations-under-reform-pledge","d":"2026-04-08"},{"t":"Judge vacates HRSA's restriction on 340B hospital 'replenishment models'","s":"米国の連邦裁判所が、HRSAによる340B病院の「補充モデル」制限を無効化した。薬価割引制度に関する規制緩和が行われた。","m":"米国の薬価制度に関する判決。日本の薬価制度とは異なるが、医薬品調達コスト管理の観点で参考となる情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/judge-vacates-hrsas-restriction-340b-hospital-replenishment-models","d":"2026-04-08"},{"t":"Menopause care provider Alloy Health expands weight care program","s":"更年期ケア提供者のAlloy Healthが体重管理プログラムを拡大した。更年期女性向けの包括的ヘルスケアサービスの拡充が進んでいる。","m":"更年期障害と肥満治療の複合ニーズが高まっている。内科での女性ヘルスケア領域の診療機会拡大の可能性。","i":"内科での更年期・肥満症治療の需要増加に備え、診療体制の検討が必要","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/menopause-care-provider-alloy-health-expands-weight-care-program","d":"2026-04-08"},{"t":"Counsel Health expands primary AI care model to include lifestyle, chronic conditions","s":"Counsel HealthがAIを活用したプライマリケアモデルを拡張し、生活習慣や慢性疾患管理を含むサービスを開始。AI技術を用いた医療サービスの新たな展開。","m":"糖尿病等の慢性疾患管理にAI技術が活用される動向は、今後のクリニック経営に影響する可能性。","i":"AI活用医療サービスの動向を把握し、自院のデジタル化戦略を検討する必要がある","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/telehealth/counsel-health-expands-primary-ai-care-model-include-lifestyle-chronic-conditions","d":"2026-04-08"},{"t":"Waystar builds out AI solution to uncover lost provider revenue from payer 'take-backs'","s":"米国のヘルスケアIT企業Waystarが、保険者による支払い「取り戻し」から失われた医療機関の収益を発見するAIソリューションを構築している。医療機関の収益回収支援技術の進歩に関する情報。","m":"海外の医療収益管理技術動向として参考になるが、日本の診療報酬制度とは異なる。将来的な収益管理システムの参考情報として捉えるべき。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/waystar-builds-out-ai-solution-uncover-lost-revenue-payer-takebacks","d":"2026-04-08"},{"t":"CMS gives Medicare Advantage rates a 2.48% bump for 2027 plan year in final rule","s":"CMSが2027年度メディケアアドバンテージの料率を2.48%引き上げる最終規則を発表した。米国の高齢者向け保険制度の診療報酬が増額される。","m":"米国の高齢者医療制度の動向。日本の診療報酬改定の参考情報として、高齢者医療の価値評価トレンドを把握。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/cms-gives-medicare-advantage-rates-248-bump-2027-plan-year-final-rule","d":"2026-04-08"},{"t":"Patient cost sharing plays bigger role in rural hospital revenues, claims study shows","s":"米国の研究で、患者負担が地方病院の収益により大きな役割を果たしていることが示された。地方医療機関の収益構造に関する分析結果。","m":"海外の地方医療機関の収益構造に関する知見。日本の地方クリニック経営においても患者負担の重要性を再認識する参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/patient-cost-sharing-plays-bigger-role-rural-hospital-revenues-claims-study-shows","d":"2026-04-08"},{"t":"チュラロンコン大学、超高齢化に向けた介護教育施設で学ぶ","s":"タイのチュラロンコン大学が超高齢化社会に向けた介護教育施設での学習について報じられている。アジアの高齢化対応に関する教育的取り組み。","m":"海外の高齢化対応策として参考になる。当院でも高齢患者の増加に伴い、介護との連携強化が今後重要になる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD111DZ0R10C26A2000000/","d":"2026-04-08"},{"t":"消費税コスト、病院にも軽減案　自民・維新が物価高で再び改革論点に","s":"自民党・維新が物価高対応として病院への消費税コスト軽減案を検討している。医療機関の消費税負担軽減に向けた政治 者に","s":"70歳まで働く社会において職場の5人に1人ががん患者となる見通し。高齢化と就労継続により職場でのがん患者が大幅増加。","m":"がん検診、早期発見、治療と仕事の両立支援が重要になる。内科・消化器外科での対応強化が必要かもしれない。","i":"がん患者の就労支援や治療と仕事の両立を考慮した診療体制を検討すべき","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD263030W6A320C2000000/","d":"2026-04-08"},{"t":"薬学部のない大分大学、同志社女子大学薬学部と連携 薬剤師確保など","s":"薬学部のない大分大学が同志社女子大学薬学部と連携協定を結び、薬剤師確保などの課題解決を目指している。","m":"薬剤師不足問題への対応策の一例。地域医療における薬剤師確保の課題認識として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC070770X00C26A4000000/","d":"2026-04-08"},{"t":"ステロイドの塗り薬、使うのが「怖い」と感じたときは","s":"ステロイド外用薬への恐怖感について解説した記事。患者の薬剤に対する不安や誤解について扱っている。","m":"内科や小児科でステロイド薬処方時の患者説明の改善点として活用可能。服薬指導の質向上に直結。","i":"患者へのステロイド薬に関する適切な説明と安心感の提供を強化する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD1629A0W6A310C2000000/","d":"2026-04-08"},{"t":"KINTO、健康状態から運転傾向分析 トヨタや東京海上日動と実証","s":"KINTOが健康状態から運転傾向を分析する実証実験を開始。トヨタや東京海上日動と共同でヘルスケア×モビリティ領域を探索。","m":"健康データと運転行動の関連分析は新しいヘルスケア活用例。将来的に患者の生活指導や健康管理への応用可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD0636A0W6A400C2000000/","d":"2026-04-08"},{"t":"生のトマトやリンゴを食べると、口がかゆくなる 花粉症のせいかも","s":"花粉症患者が生の果物を食べると口腔内にかゆみを生じる花粉食物アレルギー症候群について解説している。","m":"耳鼻科と内科で花粉症患者の診療時に有用な情報。交差反応への理解と患者指導に活用。","i":"花粉症患者への食物アレルギーに関する問診と説明を強化する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA015G10R00C26A4000000/","d":"2026-04-08"},{"t":"中高生らの「心の不調」防げ アプリなど活用、早期把握・治療に期待","s":"中高生の心の不調の早期発見・治療にアプリなどのデジタル技術を活用する取り組みが注目されている。メンタルヘルス分野でのデジタルヘルス活用が進む。","m":"小児科において思春期患者の心の不調を早期発見できるデジタルツール導入は有効。連携体制構築が重要。","i":"小児科での思春期メンタルヘルスケア体制の検討、アプリ連携システム導入の検討","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD18AWM0Y6A310C2000000/","d":"2026-04-08"},{"t":"AI dolls offer companionship to the elderly","s":"韓国で高齢者向けのAI人形が登場。人口高齢化に対応する社会保障制度の負担軽減策として、ChatGPT搭載デバイスが活用されている。","m":"高齢化社会における医療・介護分野でのAI活用事例。将来の患者ケアや待合室での活用可能性を示唆する参考情報。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/88911383-2a17-42e1-aef4-36daac1bd9dd","d":"2026-04-08"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-07"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-07"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-07"},{"t":"Novel Opioid Offers Pain Relief Without Classic Side Effects","s":"従来の副作用を持たない新しいオピオイド系鎮痛薬が疼痛緩和効果を示した。薬物依存や呼吸抑制などの典型的な副作用がない可能性がある。","m":"疼痛管理における新たな治療選択肢として注目。内科での慢性疼痛患者や術後疼痛管理に将来的に影響する可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/novel-opioid-offers-potent-pain-relief-without-classic-side-2026a1000age?src=rss","d":"2026-04-07"},{"t":"Conference MDAngle: AAN 2026 Relapsing-Remitting Multiple Sclerosis","s":"AAN2026会議における再発寛解型多発性硬化症に関する医学会議の発表予定。多発性硬化症の最新治療動向について議論される見込み。","m":"専門性が高く当院診療科目外の疾患だが、神経内科領域の治療動向として一般的な知識として参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mdangle-aan-2026-multiple-sclerosis-rrms-overview-and-poll-2026a10007p6?src=rss","d":"2026-04-07"},{"t":"AAN 2026: Anticipating Updates in Relapsing MS Care","s":"AAN2026会議で再発性多発性硬化症ケアのアップデートが予想される。多発性硬化症治療の最新情報が発表される予定。","m":"記事1と同様、専門性が高く当院診療科目外だが神経内科領域の参考情報として位置づけ。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mdangle-aan-2026-multiple-sclerosis-rrms-preview-2026a10007p3?src=rss","d":"2026-04-07"},{"t":"For Angina Relief With CTO PCI, Choose Your Patients Wisely","s":"慢性完全閉塞病変に対するPCI治療において、狭心症の症状改善のためには適切な患者選択が重要であることが示された。","m":"循環器内科診療に直接関連。専門的な心血管インターベンション治療の適応基準として参考。","i":"循環器内科での患者紹介基準の見直し検討","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/angina-relief-cto-pci-choose-your-patients-wisely-orbita-cto-2026a1000a2y?src=rss","d":"2026-04-07"},{"t":"Neurologists Alone Can’t Meet the Demand for Brain Health","s":"脳の健康管理に対する需要が増加している中、神経内科医だけでは対応が困難な状況について論じた記事。医療体制の課題を指摘。","m":"認知症や脳血管疾患患者の増加により、内科での初期対応や継続管理の重要性が高まる可能性。専門医不足による役割分担の変化。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/neurologists-alone-cant-meet-demand-brain-health-scaling-2026a100087n?src=rss","d":"2026-04-07"},{"t":"Docs, Lawsuit Challenge Medicare WISeR Prior Auth Experiment","s":"医師らがメディケアのWISeR事前承認実験に対して訴訟を起こした。この制度が医師の診療に与える負担や影響について争点となっている。","m":"海外の医療保険制度変化だが、日本の医療行政への将来的影響の可能性として参考。","i":"米国の医療保険制度変化として今後の日本への影響を注視","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/unsustainable-physicians-lawsuit-challenge-medicares-wiser-2026a1000ae8?src=rss","d":"2026-04-07"},{"t":"NICE Gives Green Light to New Low-Grade Glioma Therapy","s":"英国NICEが新たな低悪性度グリオーマ治療薬を承認した。脳腫瘍治療における新しい治療選択肢が利用可能となった。","m":"脳外科・神経外科領域で当院診療科目外だが、がん治療の新薬承認動向として参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/nice-gives-green-light-new-low-grade-glioma-therapy-2026a1000adi?src=rss","d":"2026-04-07"},{"t":"Is Parkinson’s Disease More Than a Movement Disorder?","s":"パーキンソン病が単なる運動障害以上の疾患である可能性について論じている。パーキンソン病の理解や診断アプローチに新たな視点を提供。","m":"神経内科領域で当院診療科目外だが、高齢患者への総合的アプローチの参考として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/parkinsons-disease-more-than-movement-disorder-2026a1000a8x?src=rss","d":"2026-04-07"},{"t":"EBV Antibodies May Aid MS Differential Diagnosis","s":"エプスタイン・バーウイルス（EBV）抗体が多発性硬化症の鑑別診断に有用である可能性が示された。診断精度向上に貢献する可能性。","m":"神経疾患の鑑別診断における新たな検査手法。内科での神経症状を訴える患者の診断に将来的に活用される可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/ebv-antibodies-may-aid-ms-differential-diagnosis-2026a1000a8d?src=rss","d":"2026-04-07"},{"t":"Antipsychotic Efficacy Plateaus at Lower Doses in Acute SSD","s":"急性統合失調症スペクトラム障害において、抗精神病薬の効果は低用量でもプラトーに達することが示された。用量調整の指針となる知見。","m":"精神科領域で当院診療科目外だが、薬物療法における用量設定の考え方として参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/antipsychotic-efficacy-plateaus-lower-doses-acute-ssd-2026a10009x2?src=rss","d":"2026-04-07"},{"t":"CMS unveils new Medicare pilot for hemp, CBD products","s":"CMSがヘンプ・CBD製品に関する新しいメディケア試験プログラムを発表した。医療用大麻関連製品の保険適用拡大に向けた動きが始まっている。","m":"米国の制度変化だが、日本でも医療用大麻の議論が進んでおり将来的な制度変化の参考。","i":"日本での医療用大麻製品の動向と規制変化を継続監視","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/regulatory/cms-unveils-new-medicare-pilot-hemp-cbd-products","d":"2026-04-07"},{"t":"Fierce Healthcare Fundraising Tracker '26: Yuzu Health picks up $35M for health plan infrastructure; Insight Health snags $11M","s":"Yuzu Healthが保険プラン基盤構築で3500万ドル、Insight Healthが1100万ドルの資金調達を実施。ヘルステック分野への投資が活発。","m":"海外のヘルステック投資動向。日本の医療DX推進や保険制度改革の参考情報として有用だが、直接的な影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/fierce-healthcare-fundraising-tracker-26","d":"2026-04-07"},{"t":"Ambience Healthcare launches Chart Chat, an EHR-integrated AI copilot for nurses","s":"Ambience Healthcareが看護師向けのEHR統合型AIコパイロット「Chart Chat」を発表。電子カルテとAIの統合による業務効率化を目指す。","m":"看護師やスタッフの業務効率化に直結する技術。電子カルテシステムの更新時期にAI機能の導入を検討する材料となる。","i":"電子カルテへのAI統合技術の動向を注視し、将来的な導入検討の参考とする。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/ambience-healthcare-launches-chart-chat-first-ehr-integrated-ai-copilot-nurses","d":"2026-04-07"},{"t":"Anthropic acquires stealth AI startup Coefficient Bio in $400M deal: reports","s":"AnthropicがAIスタートアップのCoefficient Bioを4億ドルで買収したと報じられた。AI技術のバイオ・創薬分野での活用が加速している。","m":"AI創薬分野の大型買収案件。将来的な新薬開発や治療選択肢の拡大につながる可能性があるが、現段階では研究開発段階。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/biotech/anthropic-acquires-stealth-ai-startup-coefficient-bio-400m-deal","d":"2026-04-07"},{"t":"Overcoming Pharmacy Distractions that Hinder Patient Care","s":"薬局における業務の障害が患者ケアに与える影響について論じている記事。薬局での効率的な業務運営と患者への適切な薬物療法提供の重要性を扱っている。","m":"クリニック内での薬剤管理業務効率化の参考になる。患者待ち時間短縮や薬剤説明の質向上に活用できる視点を含む。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/sponsored/overcoming-pharmacy-distractions-hinder-patient-care","d":"2026-04-07"},{"t":"Prior authorization: Today’s innovators speak out","s":"医療における事前承認制度について革新的な取り組みを紹介している記事。事前承認プロセスの効率化や患者ケアへの影響について論じている。","m":"高額医療機器使用時や特定薬剤処方時の事前承認業務に直結する。事務効率化により診療時間確保につながる。","i":"保険診療での事前承認手続きの効率化手法を検討し、事務負担軽減策を準備する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/sponsored/prior-authorization-todays-innovators-speak-out","d":"2026-04-07"},{"t":"Kaiser Permanente breaks ground on Oregon’s ‘first fully electric and sustainable’ hospital in Oregon, sets 2029 opening","s":"カイザー・パーマネンテがオレゴン州で初の完全電力・持続可能な病院の建設に着手し、2029年の開院を予定している。病院の環境配慮設計の先進事例として注目される。","m":"海外の事例だが、今後の医療施設の環境対応の参考になる。日本でも脱炭素の流れが加速する可能性がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/hospitals/kaiser-permanente-breaks-ground-oregons-first-fully-electric-and-sustainable-hospital","d":"2026-04-07"},{"t":"White House floats 12.5% budget cut for HHS in FY2027, reiterates reorganization plan","s":"アメリカの保健福祉省予算を2027年度に12.5%削減する提案と組織再編計画について報じている。アメリカの医療政策変更に関する内容。","m":"米国の医療政策変更であり日本のクリニック経営への直接影響は限定的。ただし国際的な医療トレンドの参考として理解しておく価値がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/white-house-floats-125-budget-cut-hhs-fy2027-reiterates-reorganization-plan","d":"2026-04-07"},{"t":"高齢外国人10年で1.5倍、高まる介護ニーズ　言語・習慣が支援の壁に","s":"高齢外国人が10年で1.5倍に増加し、介護ニーズが高まっている。言語や習慣の違いが支援の障壁となっており、医療・介護現場での対応が課題となっている。","m":"地域の外国人住民増加に伴い、クリニックでも多言語対応や文化的配慮が必要になる可能性が高い。","i":"外国人患者対応の準備（多言語対応、文化的配慮）を検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD09A7L0Z00C26A1000000/","d":"2026-04-07"},{"t":"医療版マクロ経済スライドは「調整弁」の争いに　主戦場は窓口負担か","s":"医療版マクロ経済スライドの導入を巡り、調整弁としての窓口負担が主要な争点になっている。医療費抑制策の具体的な仕組みが検討されている状況。","m":"医療費抑制策は診療報酬や患者の受診行動に直接影響するため、クリニック経営にとって重要な制度変更。","i":"診療報酬や患者負担の変更可能性を踏まえ、経営計画の見直しを準備する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA309QI0Q6A330C2000000/","d":"2026-04-07"},{"t":"病院や交通向け燃料、石油元売りが直接販売　政府が要請へ","s":"政府が石油元売り各社に対し、病院や交通機関向け燃料の直接販売を要請する方針。エネルギー供給の安定化を図る措置として検討されている。","m":"燃料供給の安定化は医療機関の事業継続性に関わるが、直接的な経営判断への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA0528Q0V00C26A4000000/","d":"2026-04-07"},{"t":"高市首相「医療分野で情報収集を」　中東情勢で関係閣僚に対応指示","s":"高市首相が中東情勢を受けて医療分野での情報収集を関係閣僚に指示。地政学的リスクが医療分野に与える影響への警戒が背景にある。","m":"中東情勢は間接的にエネルギーコストや医療材料価格に影響する可能性があるが、直接的な対応は不要。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA03ABO0T00C26A4000000/","d":"2026-04-07"},{"t":"介護のケアプラン作成費1割負担導入　介護保険法改正案を国会提出","s":"介護保険法改正案が国会に提出され、ケアプラン作成費の1割自己負担導入が盛り込まれた。介護保険制度の大きな変更となる。","m":"介護分野の制度変更だが、高齢患者の介護負担増加によりクリニック受診への影響や相談が増える可能性。間接的な影響にとどまる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUA02AC60S6A400C2000000/","d":"2026-04-07"},{"t":"「コードブルー」半減させたシステム　広尾病院、患者異変を迅速共有","s":"広尾病院がコードブルーを半減させるシステムを導入し、患者の異変を迅速に共有できるようになった。医療安全向上とスタッフ負担軽減を両立する事例。","m":"患者安全向上とスタッフ負担軽減を両立する技術として、将来的にクリニックでも導入検討の価値がある。","i":"医療安全システムや患者モニタリング技術の導入検討を行う。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC232JV0T20C26A3000000/","d":"2026-04-07"},{"t":"患者の細胞使い肝硬変の再生医療　長崎大学、4月から臨床研究開始","s":"長崎大学が肝硬変に対する患者自身の細胞を使った再生医療の臨床研究を4月から開始する。肝硬変治療の新しいアプローチとして注目される。","m":"消化器内科での肝疾患患者への新たな治療選択肢として将来的に影響する可能性。現段階では研究段階であり直接的な影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG061760W6A400C2000000/","d":"2026-04-07"},{"t":"ブレない人 エーザイ代表執行役専務・井池輝繁","s":"エーザイの代表執行役専務である井池輝繁氏に関する人物紹介記事。製薬業界のリーダーの経営方針や考え方について扱っていると推測される。","m":"製薬企業の経営方針は新薬動向や薬価政策に影響する可能性がある。業界トレンド把握の参考情報として価値がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC129WJ0S6A310C2000000/","d":"2026-04-07"},{"t":"種子島に初の看護師養成学校 鹿児島市の専門学校がサテライト教室","s":"種子島に初の看護師養成学校が設立され、鹿児島市の専門学校がサテライト教室を開校するという地方医療人材確保に関するニュース。","m":"地方での医療人材確保の取り組み事例。自院での看護師確保戦略や地域医療連携の参考になる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC316260R30C26A3000000/","d":"2026-04-07"},{"t":"ノバルティス、希少疾患の遺伝子治療薬 全年齢向けで承認取得","s":"ノバルティスが希少疾患を対象とした遺伝子治療薬の全年齢向け承認を取得したというニュース。新しい治療選択肢の拡大を示している。","m":"希少疾患の遺伝子治療薬承認は直接的にクリニック診療に影響しないが、医療技術の進歩として把握すべき情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC0678D0W6A400C2000000/","d":"2026-04-07"},{"t":"川崎重工、東京女子医大の付属病院に搬送ロボット 薬剤運ぶ","s":"川崎重工が東京女子医大付属病院に薬剤搬送ロボットを導入。病院内の物流効率化と人的ミス削減を目指した自動化技術の活用事例。","m":"大病院向けの技術だが、将来的にクリニック規模でも業務効率化技術の導入可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC061XA0W6A400C2000000/","d":"2026-04-07"},{"t":"中外製薬、ベア1万円 大卒初任給は1万円増の31万円","s":"中外製薬がベースアップ1万円、大卒初任給を1万円増の31万円に設定。製薬業界の賃上げ動向を示す事例として注目される。","m":"製薬業界の賃上げは薬価や医療従事者の転職市場に間接的に影響する可能性があるが、直接的な影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC063KI0W6A400C2000000/","d":"2026-04-07"},{"t":"都立病院、電子カルテ統一 赤字脱却へ「最強カスタマイズ」解消断行","s":"都立病院が電子カルテを統一し、過度なカスタマイズを解消して赤字脱却を図る取り組みを実施。システム運用コストの最適化事例として注目される。","m":"電子カルテの運用コスト削減は多くのクリニックにとって共通の課題であり、参考になる事例。","i":"電子カルテの運用コストとカスタマイズのバランスを見直し、効率化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC21BZZ0R20C26A1000000/","d":"2026-04-07"},{"t":"GEヘルス日本法人社長「新型CT、日本でも展開を準備」","s":"GEヘルスケア日本法人が新型CTスキャナーの日本展開を準備していることを発表。医療機器の技術革新と導入準備について報じている。","m":"高度医療機器の導入は患者紹介増加や収益向上につながる可能性がある。投資効果と競合優位性を慎重に検討すべき。","i":"新型CT導入による検査精度向上と患者獲得効果を検討し、設備投資計画を見直す。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC01AKP0R00C26A4000000/","d":"2026-04-07"},{"t":"補聴器最大手リオン、半導体向け計測器が業績けん引 利益の7割稼ぐ","s":"補聴器最大手のリオンが半導体向け計測器事業で利益の7割を稼いでいるという業績に関するニュース。医療機器メーカーの事業構造について報じている。","m":"耳鼻咽喉科での補聴器取り扱いに関連する企業動向として参考になる。補聴器メーカーの経営状況は供給安定性に影響する可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF096IJ0Z00C26A2000000/","d":"2026-04-07"},{"t":"新興EEFUL、介護施設の買収で従業員3倍に 4億円調達","s":"新興企業EEFULが介護施設買収により従業員を3倍に拡大し、4億円を調達。介護業界の統合・拡大戦略の事例として注目される。","m":"介護業界の統合動向は医療・介護連携に影響する可能性があるが、直接的なクリニック経営への影響は限定的。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC024J70S6A400C2000000/","d":"2026-04-07"},{"t":"総合メディカル社長、医療モール「新設から買収へ」 報酬改定で変化","s":"総合メディカルの社長が、診療報酬改定の影響を受けて医療モール事業の戦略を「新設から買収へ」転換すると発表。報酬改定が医療モール運営会社の経営戦略に影響を与えている。","m":"診療報酬改定がテナント需要や賃料水準に影響する可能性がある。医療モール入居クリニックの経営環境変化を注視すべき。","i":"医療モール運営会社の戦略変更を参考に、自院の立地戦略や賃料交渉への影響を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOJC178QM0X10C26A3000000/","d":"2026-04-07"},{"t":"医薬品関税、日系製薬大手は影響限定的 米国生産拡大で","s":"米国の関税政策により医薬品関税が課される可能性があるが、日系製薬大手は現地生産拡大により影響は限定的とされる。薬価への間接的影響が考えられる。","m":"製薬会社の収益構造変化が将来的に薬価や医薬品供給に影響する可能性がある。間接的だが薬事費への影響を長期的に注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC027430S6A400C2000000/","d":"2026-04-07"},{"t":"若者の市販薬乱用防止へ販売規制 買い回り対策、デジタル活用が必須","s":"若者の市販薬乱用防止のため販売規制が検討されている。買い回り対策としてデジタル技術の活用が必須とされている。","m":"市販薬の適正使用は医療機関での処方薬指導にも関連。規制強化により処方薬への切り替え需要が増加する可能性。","i":"薬剤師や患者への適正使用指導強化、デジタル対応システムの検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD232290T20C26A3000000/","d":"2026-04-07"},{"t":"名大発新興、島根県美郷町でがん尿検査を提供 町が公費補助","s":"名古屋大学発の新興企業が島根県美郷町でがん尿検査サービスを提供開始。自治体が公費補助を実施し、新たな早期がん発見手法の実用化が進む。","m":"尿検査による簡便ながん検診は患者負担が軽く、クリニックでも導入しやすい可能性がある。自治体補助の動向も重要。","i":"新しいがん検診手法の動向を注視し、将来的な導入可能性や連携機会を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC029M30S6A400C2000000/","d":"2026-04-07"},{"t":"EIZOが手術用4Kモニター バックライト制御、微細な血管描写","s":"EIZOが手術用4Kモニターを開発し、バックライト制御により微細な血管描写が可能になった。医療機器の技術向上に関する情報。","m":"消化器外科での内視鏡検査等で画像診断精度向上に寄与。設備投資の参考情報として有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC028Y70S6A400C2000000/","d":"2026-04-07"},{"t":"ステロイドの塗り薬 使うのが「怖い」と感じたときは","s":"ステロイド外用薬に対する患者の不安について解説した記事。適切な使用方法や安全性に関する情報提供の内容と推測される。","m":"内科や耳鼻咽喉科でのステロイド処方時の患者説明に直接活用可能。患者理解向上により治療効果改善が期待される。","i":"ステロイド薬への患者不安に対する説明方法の改善、適正使用指導の強化。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD1629A0W6A310C2000000/","d":"2026-04-07"},{"t":"KINTO、健康状態から運転傾向分析 トヨタや東京海上日動と実証","s":"KINTOがトヨタ・東京海上日動と協力し、健康状態から運転傾向を分析する実証実験を実施。ヘルスケアデータと自動車保険の融合事例。","m":"健康データ活用の新しいアプローチだが、クリニック診療への直接的な影響は限定的。ヘルステック動向として参考程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD0636A0W6A400C2000000/","d":"2026-04-07"},{"t":"生のトマトやリンゴを食べると、口がかゆくなる 花粉症のせいかも","s":"生のトマトやリンゴを食べると口がかゆくなる症状が花粉症に関連している可能性について説明した記事。花粉食物アレルギー症候群に関する内容と推測される。","m":"耳鼻咽喉科での花粉症診療と直接関連。患者への生活指導や他科連携の参考情報として重要。","i":"耳鼻咽喉科での花粉症患者への食物アレルギー指導の充実、診断精度向上。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA015G10R00C26A4000000/","d":"2026-04-07"},{"t":"中高生らの「心の不調」防げ アプリなど活用、早期把握・治療に期待","s":"中高生の心の不調をアプリなどのデジタル技術で早期把握・治療する取り組みが注目されている。若年層のメンタルヘルス対策への期待が高まっている。","m":"小児科を有するクリニックにとって中高生のメンタルヘルス早期発見は重要。デジタル問診導入の参考にもなる。","i":"小児科診療でのメンタルヘルススクリーニング強化と、デジタル活用の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD18AWM0Y6A310C2000000/","d":"2026-04-07"},{"t":"自閉スペクトラム症、脳からの過剰な「合図」が一因 東海大学など","s":"東海大学などの研究により、自閉スペクトラム症の原因として脳からの過剰な信号が一因であることが判明した。基礎研究の成果に関する報告。","m":"小児科での発達障害診療の背景知識として有用。将来的な診断・治療法改善への基礎情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG016440R00C26A4000000/","d":"2026-04-07"},{"t":"手術を模擬する「デジタル心臓」、不整脈の治療で有用 米大学が成果","s":"米大学の研究で、不整脈治療において手術を事前に模擬できる「デジタル心臓」技術の有用性が示された。この技術により手術計画の精度向上が期待される。","m":"循環器内科における将来的な治療技術として参考情報。当院の循環器診療での最新技術動向として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG0275S0S6A400C2000000/","d":"2026-04-07"},{"t":"AI dolls offer companionship to the elderly","s":"韓国では高齢化により社会保障制度が圧迫される中、ChatGPT機能を搭載したAI人形が高齢者の社会的孤立解消手段として活用されている。","m":"高齢者医療において、AI技術による精神的支援は今後重要な分野となる可能性がある。小児科でも応用可能性を検討できる。","i":"高齢患者のメンタルヘルス支援や認知症予防の新たなツールとして検討する価値がある。","src":"FT","p":"要注視","u":"https://www.ft.com/content/88911383-2a17-42e1-aef4-36daac1bd9dd","d":"2026-04-07"},{"t":"診療報酬改定","s":"厚生労働省による診療報酬改定の公式情報。医療機関の収入に直結する診療報酬の算定方法や点数が変更される可能性がある。","m":"クリニック経営の根幹となる診療報酬制度。改定内容により収益構造が大きく変わる可能性がある。","i":"診療報酬改定内容を詳細確認し、各診療科への影響分析と対応策の策定が必要。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-06"},{"t":"消費税と診療報酬について","s":"厚生労働省が消費税と診療報酬の関係について説明している。消費税率変更時の診療報酬への影響や補填措置について言及していると推測される。","m":"消費税は医療機関の実質的な負担増要因。診療報酬での補填状況を正確に把握する必要がある。","i":"消費税変更による診療報酬への影響を確認し、経営計画の見直しが必要。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-06"},{"t":"ジカウイルス感染症","s":"厚生労働省がジカウイルス感染症に関する情報を提供している。蚊媒介感染症の一つで、妊婦感染時の胎児への影響が問題となる感染症である。","m":"小児科や内科での感染症対策として基礎知識は必要。特に妊婦の診療時には注意が必要。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-06"},{"t":"Is Parkinson’s Disease More Than a Movement Disorder?","s":"パーキンソン病が単なる運動障害を超えた疾患であることについての医学的見解が示された。運動症状以外の多様な症状の重要性が議論されている。","m":"内科診療において神経症状を呈する患者の診断・紹介判断に参考となる情報。専門医連携の観点で有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/parkinsons-disease-more-than-movement-disorder-2026a1000a8x?src=rss","d":"2026-04-06"},{"t":"EBV Antibodies May Aid MS Differential Diagnosis","s":"エプスタイン・バーウイルス抗体が多発性硬化症の鑑別診断に有用である可能性を示した研究。神経内科領域の診断精度向上に寄与する可能性がある。","m":"内科での神経症状患者の診療において、専門医への紹介判断の参考情報として活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/ebv-antibodies-may-aid-ms-differential-diagnosis-2026a1000a8d?src=rss","d":"2026-04-06"},{"t":"Antipsychotic Efficacy Plateaus at Lower Doses in Acute SSD","s":"急性統合失調症スペクトラム障害における抗精神病薬の効果が低用量でプラトーに達するという研究結果が報告された。用量調整の参考となる知見。","m":"精神科領域は専門外だが、身体合併症を持つ精神科患者の診療時に薬物相互作用等を考慮する際の参考情報として活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/antipsychotic-efficacy-plateaus-lower-doses-acute-ssd-2026a10009x2?src=rss","d":"2026-04-06"},{"t":"Short IV Methylprednisolone Pulses May Speed GCA Remission","s":"巨細胞性動脈炎（GCA）に対する短期間の静脈内メチルプレドニゾロンパルス療法が寛解を早める可能性が示された。ステロイド治療の効果的な使用法に関する知見。","m":"内科診療で遭遇する可能性のある血管炎の治療に関する最新知見。専門医への紹介タイミングや初期対応の参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/short-iv-methylprednisolone-pulses-may-speed-gca-remission-2026a1000a7v?src=rss","d":"2026-04-06"},{"t":"Stroke Support System Linked to Fewer Vascular Events","s":"脳卒中サポートシステムの導入により血管イベントの減少が確認されたとの報告。患者支援システムの有効性が示された研究結果。","m":"循環器疾患を扱うクリニックとして、脳卒中予防や再発防止のための患者サポート体制構築の参考となる情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/stroke-support-system-linked-fewer-vascular-events-2026a1000a7u?src=rss","d":"2026-04-06"},{"t":"Experts Push Back on WHO’s ‘Misleading’ Portrayal of ECT","s":"WHO の電気痙攣療法（ECT）に関する記述について専門家が「誤解を招く」として反論している。精神科治療法の評価をめぐる議論。","m":"クリニック診療には直接関係しないが、精神科治療に関する医学界の動向として把握。身体合併症を持つ患者の治療連携時の参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/experts-push-back-whos-misleading-portrayal-2026a1000a6s?src=rss","d":"2026-04-06"},{"t":"How Gut Bacteria Could Trigger Memory Loss as We Age","s":"加齢に伴う記憶喪失に腸内細菌が関与する可能性についての研究が報告された。腸脳相関の新たな知見として注目される内容。","m":"消化器内科・内科診療において、認知機能と腸内環境の関係性について患者説明や生活指導に活用できる可能性のある情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/how-gut-bacteria-could-trigger-memory-loss-we-age-2026a1000a6n?src=rss","d":"2026-04-06"},{"t":"Do Early Birds Have a Lower Risk for ALS?","s":"朝型の生活習慣が筋萎縮性側索硬化症（ALS）のリスク低下と関連する可能性が示された。生活習慣と神経変性疾患の関係に関する研究結果。","m":"予防医学の観点から、生活習慣指導時に活用できる情報。神経疾患のリスク因子として患者教育に参考となる可能性がある。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/do-early-birds-have-lower-risk-als-2026a1000a6k?src=rss","d":"2026-04-06"},{"t":"New Lipid Guidelines: A User’s Guide","s":"新しい脂質管理ガイドラインに関する使用者向けガイドが公開された。臨床現場での脂質異常症治療の標準化と実践方法について解説されている。","m":"内科・循環器・糖尿病診療の核となる脂質管理の最新指針。診療の質向上と標準化に直結する重要な情報。","i":"循環器・糖尿病診療での脂質管理プロトコル見直しと職員教育を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/new-lipid-guidelines-users-guide-2026a10009so?src=rss","d":"2026-04-06"},{"t":"Mentally Active vs Passive Sitting May Lower Dementia Risk","s":"座位行動でも精神的に活発な活動は受動的な座位と比較して認知症リスクを低下させる可能性が示された。座位時間の質に関する新たな知見。","m":"高齢患者への生活指導において、単に座位時間の短縮だけでなく、座位中の活動内容についても指導する根拠として活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mentally-active-vs-passive-sitting-may-lower-dementia-risk-2026a1000a2w?src=rss","d":"2026-04-06"},{"t":"Blue Shield of California’s virtual-first plan continues to show lower costs, increased access for members","s":"カリフォルニア州ブルーシールドのバーチャルファースト保険プランが引き続き低コストと患者アクセス向上を実現している。遠隔診療の効果を示す事例である。","m":"遠隔診療の効果を示す海外事例。国内でのオンライン診療導入の参考になる可能性がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/blue-shield-californias-virtual-blue-plan-continues-show-lower-costs-increased-access","d":"2026-04-06"},{"t":"Industry Voices—Hospitals are fueling AI innovation, should they own a piece of it?","s":"病院がAI技術革新を推進する中で、その成果の所有権について議論している記事。医療機関とテック企業の協力関係における知的財産の取り扱いが焦点となっている。","m":"将来的にAI技術導入時の契約条件や知的財産権の扱いについて参考となる視点を提供。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/industry-voices-hospitals-are-fueling-ai-innovation-should-they-own-piece","d":"2026-04-06"},{"t":"Novo Nordisk launches discounted subscription program for Wegovy through telehealth providers","s":"ノボノルディスク社が遠隔医療プロバイダー経由でウェゴビーの割引サブスクリプションプログラムを開始した。GLP-1薬の新しい提供モデルである。","m":"糖尿病診療でGLP-1薬を扱う当院にとって、新しい提供モデルは患者ニーズや競合状況に影響する可能性。","i":"GLP-1薬の処方体制や患者アクセス向上への対応を検討する必要がある。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/telehealth/novo-nordisk-launches-first-and-only-wegovy-subscription-program","d":"2026-04-06"},{"t":"Fierce Healthcare Fundraising Tracker '26: Autism VC AIF closes second fund; Doctronic picks up $40M","s":"米国でヘルスケア関連企業への投資が活発化しており、自閉症関連のベンチャーキャピタルや医療テック企業が資金調達を完了している。","m":"海外の医療テック投資動向として参考情報。直接的な経営影響は限定的だが、業界トレンドの把握に有用。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/fierce-healthc com/content/dbb67083-bd1d-46e9-b196-1438d54c5795","d":"2026-04-06"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-05"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-05"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-05"},{"t":"Is Parkinson’s Disease More Than a Movement Disorder?","s":"パーキンソン病が単なる運動障害を超えた疾患である可能性について論じた医学記事。疾患の多面的理解の重要性。","m":"神経内科的疾患の理解深化。循環器内科での患者対応時に参考となる知識。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/parkinsons-disease-more-than-movement-disorder-2026a1000a8x?src=rss","d":"2026-04-05"},{"t":"EBV Antibodies May Aid MS Differential Diagnosis","s":"エプスタイン・バーウイルス抗体が多発性硬化症の鑑別診断に役立つ可能性があるという研究結果。診断精度の向上が期待される。","m":"多発性硬化症の鑑別診断は専門的で、一般的なクリニックでの頻度は低いが、神経内科との連携時の参考情報として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/ebv-antibodies-may-aid-ms-differential-diagnosis-2026a1000a8d?src=rss","d":"2026-04-05"},{"t":"Antipsychotic Efficacy Plateaus at Lower Doses in Acute SSD","s":"急性統合失調症スペクトラム障害において、抗精神病薬の効果が低用量でプラトーに達するという研究結果。用量設定の見直し。","m":"精神科薬物療法の最適化。内科での向精神薬処方時の参考情報として活用可能。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/antipsychotic-efficacy-plateaus-lower-doses-acute-ssd-2026a10009x2?src=rss","d":"2026-04-05"},{"t":"Short IV Methylprednisolone Pulses May Speed GCA Remission","s":"巨細胞性動脈炎の寛解促進において、短期間の静脈内メチルプレドニゾロン投与が有効である可能性を示した研究。","m":"血管炎治療のステロイド療法最適化。循環器内科での炎症性血管疾患治療の参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/short-iv-methylprednisolone-pulses-may-speed-gca-remission-2026a1000a7v?src=rss","d":"2026-04-05"},{"t":"Stroke Support System Linked to Fewer Vascular Events","s":"脳卒中支援システムが血管イベントの減少と関連することが示された研究について報告。支援システムの導入により、脳卒中患者の長期的な血管合併症が減少する可能性が示唆されている。","m":"循環器内科での脳卒中後フォローアップ体制の参考となる情報。患者管理システムの導入効果を示すエビデンスとして注目。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/stroke-support-system-linked-fewer-vascular-events-2026a1000a7u?src=rss","d":"2026-04-05"},{"t":"Experts Push Back on WHO’s ‘Misleading’ Portrayal of ECT","s":"専門家がWHOの電気けいれん療法（ECT）に関する「誤解を招く」表現に反発している。ECTの有効性や安全性について、WHOの見解と臨床専門家の間で意見の相違が生じている。","m":"クリニックでは精神科治療は行わないため直接的影響は少ない。ただし医療情報の信頼性や国際機関の見解について理解しておく価値あり。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/experts-push-back-whos-misleading-portrayal-2026a1000a6s?src=rss","d":"2026-04-05"},{"t":"How Gut Bacteria Could Trigger Memory Loss as We Age","s":"腸内細菌が加齢に伴う記憶喪失を引き起こす可能性についての研究報告。腸脳軸の機能と認知症リスクとの関連性が示唆され、腸内環境の改善が記憶機能保持に寄与する可能性がある。","m":"糖尿病患者への生活指導や消化器疾患患者への治療方針検討時の参考情報。腸内環境と全身疾患の関連について理解を深める機会。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/how-gut-bacteria-could-trigger-memory-loss-we-age-2026a1000a6n?src=rss","d":"2026-04-05"},{"t":"Do Early Birds Have a Lower Risk for ALS?","s":"早起きの習慣がALS（筋萎縮性側索硬化症）のリスク低下と関連するかについての研究報告。生活習慣と神経変性疾患の関係について新たな知見が提示されている。","m":"患者への生活指導の際の参考情報として活用可能。早起きという生活習慣が神経疾患予防に与える影響について理解を深められる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/do-early-birds-have-lower-risk-als-2026a1000a6k?src=rss","d":"2026-04-05"},{"t":"New Lipid Guidelines: A User’s Guide","s":"新しい脂質管理ガイドラインの利用者向けガイドが発表された。脂質異常症の診断・治療に関する最新の推奨事項と実践的な適用方法が示されている。","m":"内科（循環器・糖尿病）での日常診療に直結する重要な情報。現在の治療方針と新ガイドラインとの整合性確認が必要。","i":"循環器・糖尿病診療での脂質管理プロトコルの見直しを検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/new-lipid-guidelines-users-guide-2026a10009so?src=rss","d":"2026-04-05"},{"t":"Mentally Active vs Passive Sitting May Lower Dementia Risk","s":"精神的に活発な座位行動が受動的な座位行動と比較して認知症リスクを低下させる可能性についての研究報告。座位時間の質が認知機能維持に重要であることが示唆されている。","m":"患者への生活指導や認知症予防相談の際の参考情報。特に高齢患者への活動量指導に活用できる知見。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mentally-active-vs-passive-sitting-may-lower-dementia-risk-2026a1000a2w?src=rss","d":"2026-04-05"},{"t":"White House floats 12.5% budget cut for HHS in FY2027, reiterates reorganization plan","s":"ホワイトハウスが2027会計年度にHHS（保健福祉省）予算の12.5%削減を提案し、組織再編計画を再表明した。米国の医療政策と予算配分に大きな変更が検討されている。","m":"米国の医療政策動向として参考程度。日本の医療制度への直接的影響は限定的だが、国際的な医療政策トレンドとして把握。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/white-house-floats-125-budget-cut-hhs-fy2027-reiterates-reorganization-plan","d":"2026-04-05"},{"t":"Blue Shield of California’s virtual-first plan continues to show lower costs, increased access for members","s":"カリフォルニア州ブルーシールドのバーチャルファーストプランが継続的に低コストと会員のアクセス向上を示している。遠隔医療主体の保険プランの有効性が実証されている。","m":"テレヘルス事業展開の参考情報。遠隔診療の普及とコスト効果について海外事例から学べる内容。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/blue-shield-californias-virtual-blue-plan-continues-show-lower-costs-increased-access","d":"2026-04-05"},{"t":"Industry Voices—Hospitals are fueling AI innovation, should they own a piece of it?","s":"病院がAI技術革新を牽引している中で、その知的財産権の所有について議論が展開されている。医療機関とAI企業の関係性が焦点。","m":"AI技術の医療分野への導入が進む中で、クリニックでもAIツール導入時の契約条件や権利関係を慎重に検討する必要がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/industry-voices-hospitals-are-fueling-ai-innovation-should-they-own-piece","d":"2026-04-05"},{"t":"CMS locks in MA star ratings overhaul, bumps proposed special enrollment window for provider terminations","s":"CMSがメディケアアドバンテージのスター評価制度改革を確定し、プロバイダー契約終了時の特別加入期間提案を延期した。米国の医療保険制度における評価システムに変更が加えられた。","m":"米国の医療保険制度改革として参考程度。日本の診療報酬制度や医療機関評価システムへの示唆として理解。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/cms-locks-ma-star-ratings-overhaul-bumps-proposed-special-enrollment-window-provider","d":"2026-04-05"},{"t":"Novo Nordisk launches discounted subscription program for Wegovy through telehealth providers","s":"ノボノルディスクがテレヘルス提供者を通じたWegovyの割引サブスクリプションプログラムを開始した。GLP-1薬の新たな提供モデルとして、テレヘルスと組み合わせた患者アクセス改善策が展開されている。","m":"糖尿病診療でのGLP-1薬使用が増加する中、新たな処方・提供モデルとして参考となる。テレヘルス活用の可能性も検討材料。","i":"GLP-1薬処方とテレヘルス活用の動向を注視し、当院での対応を検討する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/telehealth/novo-nordisk-launches-first-and-only-wegovy-subscription-program","d":"2026-04-05"},{"t":"Fierce Healthcare Fundraising Tracker '26: Autism VC AIF closes second fund; Doctronic picks up $40M","s":"自閉症関連のベンチャーキャピタルが第2号ファンドを設立し、医療テック企業への投資が活発化している。ヘルステック分野の資金調達動向。","m":"ヘルステック分野への投資動向は、将来的にクリニック運営に影響する新サービスや技術の登場を予測する参考情報となる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/fierce-healthcare-fundraising-tracker-26","d":"2026-04-05"},{"t":"Corti releases agentic model for medical coding, says it outperforms OpenAI, Anthropic","s":"Corti社が医療コーディング用のエージェント型AIモデルを発表し、OpenAIやAnthropic社の製品を上回る性能を示すと発表した。医療現場での事務処理の自動化・効率化に向けた技術革新として注目される。","m":"医療コーディングの自動化はクリニックの事務効率化に直結する。レセプト業務の省力化により人件費削減効果が期待できる。","i":"医事課業務の効率化につながる可能性があり、導入可能性を検討する価値がある。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/cortis-new-agentic-model-medical-coding-outperforms-openai-and-others","d":"2026-04-05"},{"t":"4 out of 10 family physicians report feelings of burnout, Weill Cornell Medicine study finds","s":"ワイル・コーネル医学大学の研究により、家庭医の10人中4人がバーンアウト症状を報告していることが判明した。医師の職業負担が深刻化している。","m":"医師のバーンアウトは日本でも課題。スタッフの働き方改革や職場環境改善の参考になる情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/435-family-physicians-report-feelings-burnout-weill-cornell","d":"2026-04-05"},{"t":"介護のケアプラン作成費1割負担導入　介護保険法改正案を国会提出","s":"政府が介護保険法改正案を国会に提出。ケアプラン作成費に1割の利用者負担を導入する内容が含まれている。","m":"高齢患者が多いクリニックでは、介護保険制度の変更が患者の医療費負担や受診行動に影響する可能性がある。","i":"介護保険制度改正の影響を把握し、連携医療機関との情報共有が必要","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA02AC60S6A400C2000000/","d":"2026-04-05"},{"t":"医療物資の安定確保へ窓口　厚労省、情報提供呼びかけ","s":"厚生労働省が医療物資の安定確保に向けた窓口を設置し、情報提供を呼びかけている。医療現場での物資不足対策として、供給体制の整備が進められている。","m":"マスクや消毒液などの医療物資の供給不足はクリニック運営に直結する問題。調達先の多様化や備蓄計画の見直しが重要。","i":"医療物資の調達ルートの見直しや在庫管理体制の確認が必要","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA028G90S6A400C2000000/","d":"2026-04-05"},{"t":"名大発新興、島根県美郷町でがん尿検査を提供 町が公費補助","s":"名古屋大学発のベンチャー企業が島根県美郷町でがんの尿検査サービスを提供開始。町が公費補助を行い、住民の早期がん発見に向けた取り組みを実施している。","m":"尿検査による簡便ながん検査は患者負担が軽く、クリニックでの健診メニューに追加できる可能性がある。自治体の補助制度も参考になる。","i":"新しいがん検診手法として患者に紹介できる可能性があり、情報収集を継続する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC029M30S6A400C2000000/","d":"2026-04-05"},{"t":"EIZOが手術用4Kモニター バックライト制御、微細な血管描写","s":"EIZOが手術用4Kモニターを発表。バックライト制御技術により微細な血管の描写が可能で、手術精度の向上に貢献する。","m":"消化器外科での内視鏡手術等で高精度モニターの需要がある。医療機器の技術動向として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC028Y70S6A400C2000000/","d":"2026-04-05"},{"t":"ロート製薬、東京大学と連携講座 食と健康をテーマに","s":"ロート製薬が東京大学と食と健康をテーマにした連携講座を開設。産学連携による健康分野の研究推進を図っている。","m":"予防医学や栄養指導の分野で新たな知見が得られる可能性がある。将来的にクリニックでの健康指導に応用できるかもしれない。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF027UU0S6A400C2000000/","d":"2026-04-05"},{"t":"与那国島唯一の診療所、指定管理者を変更 医療提供を継続","s":"与那国島唯一の診療所で指定管理者の変更があったが、医療提供は継続される予定。離島医療の継続性確保に関する取り組みが報じられている。","m":"離島医療の経営課題は参考になるが、都市部のクリニック経営とは環境が大きく異なる。地域医療政策の動向として知識に留める。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOJC015VS0R00C26A4000000/","d":"2026-04-05"},{"t":"アインHD大谷社長、コスメ業態「300店規模に成長」","s":"アインホールディングスの大谷社長がコスメ業態を300店規模まで成長させる計画を発表した。調剤薬局大手の事業多角化戦略。","m":"調剤薬局大手の多角化戦略。クリニック併設薬局との競合環境の変化を把握する参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC024720S6A400C2000000/","d":"2026-04-05"},{"t":"米FDA、イーライ・リリーの経口肥満薬を承認","s":"米FDAがイーライ・リリーの経口肥満治療薬を承認した。注射薬に続く新たな治療選択肢として期待される。","m":"糖尿病・循環器内科での肥満合併症例に新たな治療選択肢。将来的に日本承認時の処方検討が必要。","i":"肥満治療の新薬動向を把握し、糖尿病診療での処方選択肢の拡大を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOGN01CZI0R00C26A4000000/","d":"2026-04-05"},{"t":"アルフレッサHD、医薬品の新製造棟稼働 抗がん剤など生産","s":"アルフレッサホールディングスが医薬品の新製造棟を稼働開始し、抗がん剤などの生産体制を強化した。医薬品供給体制の充実に向けた設備投資が実施されている。","m":"医薬品卸大手の生産体制強化は将来的な医薬品供給の安定化につながる。クリニックでの医薬品調達への間接的なメリットがある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC01A100R00C26A4000000/","d":"2026-04-05"},{"t":"参天製薬、まぶた下がる「眼瞼下垂」点眼薬を5月発売","s":"参天製薬がまぶたが下がる眼瞼下垂に対する点眼薬を5月に発売予定。これまで手術治療が主流だった疾患に対する新しい治療選択肢として注目される。","m":"眼瞼下垂は高齢患者に多く、内科外来でも相談を受けることがある。点眼治療という選択肢は患者にとって低侵襲で有用。","i":"眼瞼下垂患者への新治療選択肢として情報を把握し、必要に応じて専門医への紹介を検討。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF013BW0R00C26A4000000/","d":"2026-04-05"},{"t":"富士フイルム、医療向け診断装置で新モデル AIで身体負担減","s":"富士フイルムが医療向け診断装置の新モデルを発表。AI技術により患者の身体負担を軽減する機能を搭載している。","m":"AI搭載の診断装置は患者満足度向上と診療効率化につながる。設備投資の優先順位と財務計画への影響を検討すべき。","i":"新しい診断装置の導入検討と投資対効果の分析が必要","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC31BBT0R30C26A3000000/","d":"2026-04-05"},{"t":"放医研、福島教訓に被曝医療体制を強化 甲状腺の線量測定や人材育成","s":"放射線医学総合研究所が福島原発事故の教訓を踏まえ、被曝医療体制を強化している。甲状腺の線量測定技術向上や専門人材の育成に取り組んでいる。","m":"放射線被曝への医療対応体制の話題で、通常のクリニック診療とは関係が薄い。災害医療の知識として参考程度に留める。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG17AAT0X10C26A3000000/","d":"2026-04-05"},{"t":"イヌのiPS細胞研究のベタニック、シスメックス・コージンバイオと提携","s":"イヌのiPS細胞研究のベタニックがシスメックス・コージンバイオと提携。再生医療分野での新たな研究開発体制構築。","m":"iPS細胞技術は将来の医療に大きな影響を与える可能性。当院での応用可能性を中長期的に検討する価値あり。","i":"再生医療技術の進展により将来的な治療選択肢拡大の可能性を情報収集する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC300IK0Q6A330C2000000/","d":"2026-04-05"},{"t":"持田製薬、子宮内膜症の治療薬を海外に 韓化学大手と販売契約","s":"持田製薬が子宮内膜症治療薬を韓国の化学大手と販売契約を締結し、海外展開を進めている。国内製薬企業の国際化が進んでいる。","m":"子宮内膜症は婦人科領域の疾患で、内科クリニックでの直接的な治療機会は少ないが、連携先の婦人科との情報共有に役立つ。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC3192U0R30C26A3000000/","d":"2026-04-05"},{"t":"生のトマトやリンゴを食べると、口がかゆくなる 花粉症のせいかも","s":"生のトマトやリンゴを食べて口がかゆくなる症状は、花粉症と関連する口腔アレルギー症候群（OAS）の可能性がある。花粉症患者に多く見られる交差反応である。","m":"花粉症診療の付加価値向上につながる知識。患者満足度向上と適切な生活指導に活用可能。","i":"耳鼻咽喉科や内科で花粉症患者に口腔アレルギー症候群の説明・指導を検討","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA015G10R00C26A4000000/","d":"2026-04-05"},{"t":"中高生らの「心の不調」防げ アプリなど活用、早期把握・治療に期待","s":"中高生の心の不調対策でアプリ等を活用した早期把握・治療への期待が高まる。デジタル技術による精神的健康管理の推進。","m":"小児科を有する当院にとって重要。デジタルヘルス技術による早期発見体制の構築可能性を検討すべき。","i":"小児科での心の健康スクリーニング手法としてデジタルツール導入を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCD18AWM0Y6A310C2000000/","d":"2026-04-05"},{"t":"宮崎市、適正受診へ小中生の自己負担増 医療費無償化は高校まで拡大","s":"宮崎市が小中学生の医療費自己負担を増やす一方、高校生まで医療費無償化を拡大する方針。適正受診を促進する狙いがある。","m":"小児科を運営するクリニックでは、自己負担増による受診抑制や適正受診促進の影響を注視する必要がある。他自治体での同様の動きも想定される。","i":"小児科への受診動向変化を監視し、患者数や適正受診促進への対応策を検討する必要がある。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOJC021LP0S6A400C2000000/","d":"2026-04-05"},{"t":"口の中にできもの、口腔がんのおそれも 要注意なケースは","s":"口腔内のできものが口腔がんの可能性もあることについて、要注意なケースや早期発見の重要性について解説した記事。","m":"耳鼻咽喉科診療において口腔内病変の診察機会があり、口腔がんの早期発見に関する知識は有用。患者教育や他科連携の参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD184Q30Y6A310C2000000/","d":"2026-04-05"},{"t":"脳のパフォーマンスが変わる 自分だけの「快眠リズム」の見つけ方","s":"個人の睡眠リズムを最適化することで、脳のパフォーマンスが向上するという内容。良質な睡眠の重要性と個別化アプローチについて解説している。","m":"生活習慣病患者への生活指導に活用可能。睡眠の質改善は糖尿病や循環器疾患の管理に有益。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD181650Y6A310C2000000/","d":"2026-04-05"},{"t":"知識と行動が運命変える がんのリテラシー向上を","s":"がんに関する正しい知識と行動がもたらす影響について、がんリテラシーの向上の重要性を訴える内容。","m":"各診療科でがん検診や予防医療を提供する際の患者教育の参考となる。糖尿病患者のがんリスクや消化器がん検診との関連もある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD187QJ0Y6A310C2000000/","d":"2026-04-05"},{"t":"AI使いこなすのは3つが限界…脳疲労「ブレインフライ」とは 米調査","s":"人間がAIを使いこなせるのは3つまでが限界で、それを超えると脳疲労「ブレインフライ」が生じるという米調査結果について報告。","m":"クリニックでAIツールを導入する際の参考情報。電子カルテ、AI問診、診断支援AIなど複数導入時の職員への影響を考慮する必要がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG300YD0Q6A330C2000000/","d":"2026-04-05"},{"t":"口の中が燃えるようにピリピリ 原因不明の「舌痛症」かも","s":"口の中が燃えるようにピリピリする舌痛症について。原因不明とされる症状で、診断や治療が困難な疾患の可能性がある。","m":"内科や耳鼻咽喉科で遭遇する可能性のある症状。適切な鑑別診断と専門医紹介が重要。","i":"舌痛症の症状を訴える患者への対応方法や専門医連携体制を整備","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD029AV0S6A200C2000000/","d":"2026-04-05"},{"t":"長崎市内3病院、緊急性ない救急車利用は7700円徴収 7月から","s":"長崎市内3病院が7月から、緊急性のない救急車利用者に対して7700円を徴収する制度を開始。適正利用促進が狙い。","m":"救急外来や時間外診療を行うクリニックでは、患者の受診行動変化や適正受診促進の動きに注意が必要。全国的な波及も想定される。","i":"救急外来や時間外診療の患者動向変化を監視し、適正受診促進策の検討が必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOJC2795L0X20C26A3000000/","d":"2026-04-05"},{"t":"NHS staff boycott Palantir’s data platform over ethical concerns","s":"英国の国民保健サービス職員が、パランティア社のデータプラットフォームに対して倫理的懸念から反対している。同社は2023年に3億3000万ポンドの契約を獲得し、病院や患者情報を収集している。","m":"医療データプラットフォームの倫理的課題を示す事例。将来的な医療DX導入時の参考情報。","i":"","src":"FT","p":"参考","u":"https://www.ft.com/content/dbb67083-bd1d-46e9-b196-1438d54c5795","d":"2026-04-05"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-04-04"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-04-04"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-04-04"},{"t":"Is Parkinson’s Disease More Than a Movement Disorder?","s":"パーキンソン病が運動障害以外の側面も持つ疾患かどうかを検討した医学記事。疾患概念の拡張について議論。","m":"神経内科領域の疾患理解に関する内容。内科診療での神経疾患対応の参考になるが、直接的な経営影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/parkinsons-disease-more-than-movement-disorder-2026a1000a8x?src=rss","d":"2026-04-04"},{"t":"EBV Antibodies May Aid MS Differential Diagnosis","s":"エプスタイン・バーウイルス（EBV）抗体が多発性硬化症の鑑別診断に有用である可能性が示された。神経内科領域の診断技術向上に関する研究報告。","m":"専門性の高い神経内科領域の知見。当院の診療科目では直接活用機会は少ない。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/ebv-antibodies-may-aid-ms-differential-diagnosis-2026a1000a8d?src=rss","d":"2026-04-04"},{"t":"Antipsychotic Efficacy Plateaus at Lower Doses in Acute SSD","s":"急性統合失調症スペクトラム障害において、抗精神病薬の効果が低用量でも頭打ちになることを示した研究。","m":"精神科領域の薬物療法に関する知見。クリニックでの精神科薬物治療の参考になるが、専門外科目のため参考レベル。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/antipsychotic-efficacy-plateaus-lower-doses-acute-ssd-2026a10009x2?src=rss","d":"2026-04-04"},{"t":"Short IV Methylprednisolone Pulses May Speed GCA Remission","s":"巨細胞性動脈炎の治療において、短期間の静脈内メチルプレドニゾロンパルス療法が寛解を早める可能性を示した研究。","m":"循環器・膠原病領域の治療法に関する知見。内科診療での炎症性血管疾患治療の参考になるが、専門性が高い。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/short-iv-methylprednisolone-pulses-may-speed-gca-remission-2026a1000a7v?src=rss","d":"2026-04-04"},{"t":"Stroke Support System Linked to Fewer Vascular Events","s":"脳卒中支援システムが血管イベントの減少と関連しているという研究結果。システム導入により患者の予後改善が期待される。","m":"脳卒中は循環器内科で管理する疾患。支援システムの有効性は患者ケア向上の参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/stroke-support-system-linked-fewer-vascular-events-2026a1000a7u?src=rss","d":"2026-04-04"},{"t":"Experts Push Back on WHO’s ‘Misleading’ Portrayal of ECT","s":"専門家がWHOの電気けいれん療法（ECT）に関する誤解を招く表現について反発している。精神科治療の適切な理解が求められている。","m":"当クリニックでは精神科診療は行っていないが、患者の紹介判断時の参考情報として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/experts-push-back-whos-misleading-portrayal-2026a1000a6s?src=rss","d":"2026-04-04"},{"t":"How Gut Bacteria Could Trigger Memory Loss as We Age","s":"腸内細菌が加齢に伴う記憶喪失を引き起こす可能性があるという研究。腸脳相関の新たな知見として注目される。","m":"消化器内科と認知症予防の接点として興味深い。高齢患者への生活指導に活用できる可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/how-gut-bacteria-could-trigger-memory-loss-we-age-2026a1000a6n?src=rss","d":"2026-04-04"},{"t":"Do Early Birds Have a Lower Risk for ALS?","s":"早起きの人はALS（筋萎縮性側索硬化症）のリスクが低い可能性があるという研究。生活習慣と神経疾患の関連性を示唆。","m":"生活習慣指導の根拠として参考になるが、直接的な診療への影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/do-early-birds-have-lower-risk-als-2026a1000a6k?src=rss","d":"2026-04-04"},{"t":"New Lipid Guidelines: A User’s Guide","s":"新しい脂質管理ガイドラインのユーザーガイド。循環器疾患予防における脂質管理の最新指針が示されている。","m":"循環器・糖尿病患者の脂質管理は当クリニックの中核診療領域。ガイドライン変更は診療方針に直結。","i":"循環器内科・糖尿病診療での脂質管理方針を新ガイドラインに基づいて見直す","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/new-lipid-guidelines-users-guide-2026a10009so?src=rss","d":"2026-04-04"},{"t":"Mentally Active vs Passive Sitting May Lower Dementia Risk","s":"受動的な座位よりも精神的に活発な座位の方が認知症リスクを低下させる可能性。座位の質が認知機能に影響することを示唆。","m":"高齢患者への生活指導で活用できる情報。認知症予防の観点から有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/mentally-active-vs-passive-sitting-may-lower-dementia-risk-2026a1000a2w?src=rss","d":"2026-04-04"},{"t":"White House floats 12.5% budget cut for HHS in FY2027, reiterates reorganization plan","s":"ホワイトハウスが2027年度にHHS予算の12.5%削減を提案し、組織再編計画を改めて示した。米国の医療政策動向。","m":"米国の医療政策動向だが、日本のクリニック経営への直接的影響は限定的。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/white-house-floats-125-budget-cut-hhs-fy2027-reiterates-reorganization-plan","d":"2026-04-04"},{"t":"Blue Shield of California’s virtual-first plan continues to show lower costs, increased access for members","s":"カリフォルニア州ブルーシールドのバーチャルファーストプランが継続的にコスト削減とアクセス向上を実現している。","m":"遠隔医療の効果を示す事例。当クリニックでのオンライン診療拡充の参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/blue-shield-californias-virtual-blue-plan-continues-show-lower-costs-increased-access","d":"2026-04-04"},{"t":"Industry Voices—Hospitals are f
