i.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-03-29"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食を抜くことと夕食を遅く取る習慣が骨折リスクの増加と関連があるという研究結果を紹介。食事のタイミングが骨の健康に影響することを示している。","m":"糖尿病や循環器疾患患者への食事指導において、食事のタイミングについても言及する根拠として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-03-29"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法整備と精密検査受診率向上が急務とされている。がん検診制度の充実が図られる見通し。","m":"消化器内科・外科を有する当院にとって、がん検診の法整備は受診者数や検査需要に影響する可能性がある。","i":"がん検診の受け入れ体制や連携先との調整を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-03-29"},{"t":"不調の多くは過剰から 頑張り過ぎず、体の声に耳傾けて","s":"体調不良の多くは過剰な活動や負荷が原因であり、頑張り過ぎずに体の声に耳を傾けることの重要性を説明した健康記事。","m":"患者への生活指導や健康相談において、過度な努力や無理な活動を控えるよう指導する際の参考情報として活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD258CZ0V20C26A2000000/","d":"2026-03-29"},{"t":"患者の血管ソックリ再現 東北大発新興、カテーテル治療の精度向上へ","s":"東北大発の新興企業が患者の血管を精密に再現する技術を開発し、カテーテル治療の精度向上を目指している。","m":"循環器内科を有する当クリニックにとって、将来的な治療技術の進歩として注目。精度向上は患者満足度向上にも寄与する可能性。","i":"循環器診療における新技術動向として情報収集を継続する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC1684H0W6A310C2000000/","d":"2026-03-29"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。","m":"全診療科に影響する重要な制度変更。算定漏れや新要件への対応が経営に直結する。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応を準備する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-28"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が解説。医療機関の消費税負担と診療報酬での補填に関する内容。","m":"消費税負担は医療機関の経営圧迫要因。補填状況の理解は収益管理に重要。","i":"消費税負担の影響を正確に把握し、診療報酬での補填状況を確認する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-28"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。","m":"感染症対策の一環として知識を持っておくべき情報だが、日本では現在流行していない。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-28"},{"t":"The Thyroid Cancer Dilemma: Doing More Isn’t Always Better","s":"甲状腺がんの治療において、過度な治療が必ずしも良い結果をもたらすわけではないという治療方針に関する議論。","m":"甲状腺がんは内科で扱う可能性があるが、専門性が高く当院での直接的な診療機会は限定的。治療方針の変化として参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/thyroid-cancer-dilemma-doing-more-isnt-always-doing-better-2026a10008zs?src=rss","d":"2026-03-28"},{"t":"Meningococcal Disease Has Been Increasing Since 2021","s":"2021年以降、髄膜炎菌感染症の発症が増加傾向にある。感染症対策と早期発見の重要性が高まっている。","m":"小児科を有する当院では髄膜炎菌感染症の増加は重要な情報。早期診断と適切な対応体制の確認が必要。","i":"小児科・内科での髄膜炎菌感染症の診断力向上と感染対策の見直しを検討。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/meningococcal-disease-has-been-increasing-2021-adults-and-2026a10008zq?src=rss","d":"2026-03-28"},{"t":"Contemporary Diagnosis and Treatment of AR","s":"大動脈弁閉鎖不全症の現代的な診断と治療法について。循環器疾患の専門的な治療アプローチに関する内容。","m":"循環器内科を有するが、大動脈弁疾患は高度専門医療が必要で当院での対応は限定的。専門医療機関への紹介判断の参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/contemporary-diagnosis-and-treatment-aortic-regurgitation-2026a10007jy?src=rss","d":"2026-03-28"},{"t":"Dementia Risk May Triple With Type 1 Diabetes","s":"1型糖尿病患者において認知症リスクが3倍に増加する可能性があるという研究結果。糖尿病管理の重要性を示唆。","m":"糖尿病専門の当院にとって重要な情報。1型糖尿病患者の長期予後管理で認知症リスクを考慮した診療体制の検討が必要。","i":"1型糖尿病患者の長期管理において認知機能評価の組み込みと包括的ケア体制の検討。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dementia-risk-may-triple-type-1-diabetes-2026a10009ek?src=rss","d":"2026-03-28"},{"t":"Biocomputer From Human Neurons Plays Doom, Raises Ethics","s":"人間のニューロンを使用したバイオコンピュータがゲームをプレイし、医療応用への倫理的課題が議論されている。","m":"バイオコンピュータ技術の医療応用は将来的な話題。現在のクリニック運営には直接関係しない基礎研究段階。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/biocomputer-human-neurons-plays-doom-raises-ethics-2026a10009e0?src=rss","d":"2026-03-28"},{"t":"Physicians Must Lead AI Integration in Medicine","s":"医師がAI統合の主導権を握る必要があるとの提言。医療現場でのAI活用が急速に進展し、医師の役割変化が求められている。","m":"クリニックでのAI問診や診断支援導入が現実的課題。競合優位性確保のため早期対応が重要。","i":"AI診療支援ツールの導入検討と、医師・スタッフのAIリテラシー向上研修を計画する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/physician-ai-adoption-surging-we-must-lead-its-integration-2026a100095u?src=rss","d":"2026-03-28"},{"t":"S1 Episode 2: Can Early Genetic Testing Change ATTR-CM Outcomes?","s":"ATTR心筋症における早期遺伝子検査が治療成果に与える影響についてのポッドキャスト。専門的な心疾患の診断法に関する内容。","m":"ATTR心筋症は高度専門領域で当院での直接診療は困難。循環器専門医療機関への適切な紹介判断の参考情報。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep2-2026a10006ha?src=rss","d":"2026-03-28"},{"t":"S1 Episode 1: Rethinking Rhythm Control in ATTR-CM","s":"ATTR心筋症におけるリズムコントロール治療の再考についてのポッドキャスト。専門的な心疾患治療法に関する内容。","m":"高度専門領域の内容で当院での直接対応は困難。循環器疾患の治療動向として知識のアップデートには有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep1-2026a10006h9?src=rss","d":"2026-03-28"},{"t":"Preventing Deficiencies After Bariatric Surgery","s":"肥満外科手術後の栄養欠乏症予防について。手術後の長期管理における栄養管理の重要性を扱った内容。","m":"当院では肥満外科手術は実施していないが、術後患者の継続管理を行う可能性があり、栄養管理の知識として参考になる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/preventing-deficiencies-after-bariatric-surgery-2026a100098g?src=rss","d":"2026-03-28"},{"t":"Higher Meat Intake, Lower Dementia Risk — But Only in APOE4","s":"APOE4遺伝子保有者においてのみ、肉類摂取量の増加が認知症リスク低下と関連するという研究結果。","m":"糖尿病・循環器患者への食事指導において、遺伝的背景を考慮した個別化医療の可能性を示唆する情報として参考。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/higher-meat-intake-lower-dementia-risk-only-apoe4-carriers-2026a100098j?src=rss","d":"2026-03-28"},{"t":"Oral GLP-1s, COVID preventatives: 3 more drugs in the pipeline, Optum says payers should watch","s":"経口型GLP-1薬とコロナ予防薬を含む3つの新薬について、保険支払者が注視すべきとOptumが報告。薬剤費への影響が予想される。","m":"当院糖尿病診療に直結。経口GLP-1薬が承認されれば注射薬からの切り替え需要と薬剤費増加が見込まれる。","i":"経口GLP-1薬の動向を把握し、糖尿病診療での処方選択肢拡大と薬剤費管理を準備する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/payers/oral-glp-1s-covid-preventatives-3-more-drugs-pipeline-optum-says-payers-should-watch","d":"2026-03-28"},{"t":"Op-ed: Empathy meets efficiency—how the responsible use of AI can transform Medicare","s":"AIがメディケアを変革する可能性について論じた意見記事。効率性と共感性を両立させた責任あるAI活用の重要性を指摘している。医療現場でのAI導入に関する考察を示している。","m":"クリニックでのAI問診やAI診断支援システム導入の参考となる。医療AIの責任ある活用方針策定に有用。","i":"AI導入による診療効率化と患者満足度向上の検討が必要。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/op-ed-empathy-meets-efficiency-how-responsible-use-ai-can-transform","d":"2026-03-28"},{"t":"SCAN taps biopharma, CMS vet Aman Bhandari as its first chief AI officer","s":"SCAN社がバイオ医薬品とCMS経験者のアマン・バンダリ氏を初の最高AI責任者に任命した。医療保険会社におけるAI活用体制の強化を示している。","m":"保険会社のAI活用動向は診療報酬や審査体制の変化につながる可能性がある。業界のAI活用トレンドの参考事例。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/scan-taps-aman-bhandari-its-first-chief-ai-officer","d":"2026-03-28"},{"t":"UnitedHealth shareholder sues over proposal to include details on integration in annual proxy","s":"ユナイテッドヘルス社の株主が、事業統合の詳細を年次株主総会資料に含める提案をめぐって訴訟を起こした。企業統合に関する透明性の問題を提起している。","m":"大手医療保険会社の統合動向は医療業界全体の構造変化を示唆する。診療報酬や保険審査への影響を注視する必要がある。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/payers/unitedhealth-shareholder-sues-over-proposal-include-details-integration-annual-proxy","d":"2026-03-28"},{"t":"New therapy animal program aims to support 100K patients, providers","s":"10万人の患者と医療従事者を支援する新しいセラピー動物プログラムが開始された。医療現場での心理的サポートとしてのセラピー動物活用が注目されている。","m":"小児科や耳鼻咽喉科での患者不安軽減に活用可能。医療現場の患者体験向上の新しいアプローチとして参考になる。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/new-therapy-animal-program-aims-support-100k-patients-providers","d":"2026-03-28"},{"t":"Gen Z nurses prioritize schedule flexibility, need more manager interactions to avoid turnover","s":"Z世代の看護師は勤務スケジュールの柔軟性を重視し、上司との密な相互作用を求める。離職防止には管理者との関係性構築が重要との調査結果。","m":"クリニックの人材確保・定着において、若手職員の価値観変化への対応が必要。スタッフ管理方針の見直しが求められる。","i":"若手スタッフの働き方ニーズを理解し、柔軟な勤務体制や定期面談の導入を検討。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/gen-z-nurses-prioritize-schedule-flexibility-need-more-manager-interactions-avoid","d":"2026-03-28"},{"t":"高度な小児医療、県またぎ集約方針　少子化受け心臓手術やがん治療","s":"少子化の影響で高度な小児医療（心臓手術やがん治療）を都道府県を越えて集約する方針が示された。小児科専門医療の地域集約化が進む。","m":"当院小児科への直接的影響は限定的だが、小児医療全体の再編動向として把握が必要。地域での小児科ポジション見直しの参考になる。","i":"小児科診療の競合環境変化を注視し、軽症患者の囲い込みや専門医連携の強化を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUA278PD0X20C26A2000000/","d":"2026-03-28"},{"t":"医療事故、報告件数の低迷続く　制度10年で警察頼みが増加","s":"医療事故報告制度が開始から10年経過したが、報告件数の低迷が続いている。警察への依存が増加傾向にあり、制度の実効性に課題がある。","m":"クリニックでも医療事故報告義務がある。適切な報告体制構築と医療安全管理の徹底が法的リスク回避に重要。","i":"医療安全管理体制の見直しと事故報告の適切な実施体制確保が必要。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOCD221XW0S6A320C2000000/","d":"2026-03-28"},{"t":"調剤報酬改定で「医療モール薬局」苦難　収益力低下、M&A加速へ","s":"調剤報酬改定により医療モール内の薬局が収益力低下に直面している。経営難によりM&Aが加速する見通しとなっている。","m":"医療モール内薬局の経営悪化は処方箋応需に影響する可能性。薬局との連携体制や患者への影響を注視すべき。","i":"併設薬局との連携見直しや処方箋応需薬局の変更検討が必要。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOFC051Z00V00C26A3000000/","d":"2026-03-28"},{"t":"がん治療向け放射性元素「アスタチン」　住友重機械、27年製造開始へ","s":"住友重機械工業ががん治療向け放射性元素「アスタチン」の製造を2027年に開始予定。新しい放射線治療選択肢として期待される。","m":"クリニックレベルでの直接的関連は低いが、がん治療の選択肢拡大として情報共有価値あり。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG16B430W6A110C2000000/","d":"2026-03-28"},{"t":"大塚製薬、米バイオ企業を1100億円で買収 PTSDの新薬候補取得","s":"大塚製薬が米バイオ企業を1100億円で買収し、PTSD治療薬の新薬候補を取得した。精神疾患領域での新薬開発強化を示している。","m":"PTSD治療薬の選択肢拡大により、内科や小児科でも精神的ケアが必要な患者への対応が変わる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC279AT0X20C26A3000000/","d":"2026-03-28"},{"t":"エーザイと米メルク 腎臓がん向けに抗がん剤を併用、日本で申請","s":"エーザイと米メルクが腎臓がん向けの抗がん剤併用療法について日本で承認申請を行った。がん治療の選択肢拡大につながる可能性がある。","m":"腎臓がん治療の進歩により消化器内科での早期発見・連携が重要。がん治療の選択肢拡大は患者説明にも影響する。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273SQ0X20C26A3000000/","d":"2026-03-28"},{"t":"塩野義製薬、3000億円借り入れ エイズ治療薬の英社への追加出資で","s":"塩野義製薬がエイズ治療薬開発企業への追加出資のため3000億円を借り入れ。HIV治療薬開発への大型投資。","m":"HIV診療は当院業務範囲外。製薬業界の投資動向として参考程度。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2762M0X20C26A3000000/","d":"2026-03-28"},{"t":"GSKやアストラゼネカ、ぜんそくにバイオ薬 効果長持ち・価格10倍超","s":"GSKやアストラゼネカが喘息治療向けバイオ医薬品を開発。従来薬より効果が長続きするが価格は10倍以上高額。治療選択肢の拡大と医療費への影響が注目される。","m":"内科診療において喘息患者の治療選択肢が拡大。薬剤費増加と治療効果のバランスを考慮した処方判断が重要。","i":"高額な新薬の登場により、適応患者への治療選択肢と費用対効果を検討する必要。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC09A3G0Z00C25A6000000/","d":"2026-03-28"},{"t":"プラ単一素材に対応可能な医薬品の錠剤包装技術 CKD､リサイクル容易","s":"CKDが医薬品の錠剤包装でプラスチック単一素材に対応可能な技術を開発。リサイクルが容易になり環境負荷軽減に貢献する包装技術。","m":"医薬品包装の環境対応技術で、クリニック経営への直接的影響は限定的。製薬業界の環境配慮動向として参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD2743G0X20C26A3000000/","d":"2026-03-28"},{"t":"エーザイ、肺がん治療薬を欧州で承認申請","s":"エーザイが肺がん治療薬の欧州承認申請を実施。がん治療薬の開発パイプライン情報。","m":"当院では肺がん治療は行わないが、がん治療薬開発動向として把握。患者の治療選択肢拡大の参考。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC273FW0X20C26A3000000/","d":"2026-03-28"},{"t":"小野薬品、希少がん治療薬の承認申請 既存薬使用後の患者対象","s":"小野薬品が希少がん患者向け治療薬（既存薬使用後対象）の承認申請を行った。希少疾患治療選択肢の拡大。","m":"希少がん治療は当院業務外だが、オンコロジー分野の治療進歩として情報価値あり。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF2646K0W6A320C2000000/","d":"2026-03-28"},{"t":"メルク、がん治療薬新興を1兆円で買収 主力薬特許切れで連続M&A","s":"メルクが主力薬の特許切れ対策として、がん治療薬新興企業を1兆円で買収。製薬業界の大型M&A案件。","m":"製薬業界再編の動向として把握。将来的な薬剤供給や価格に間接的影響の可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOGN25C390V20C26A3000000/","d":"2026-03-28"},{"t":"武田薬品、27年3月期に構造再編費1500億円 特許切れや新薬に備え","s":"武田薬品が2027年3月期に1500億円の構造再編費を計上すると発表。特許切れや新薬開発に備えた事業再編の一環。医薬品業界の大幅な構造改革を示している。","m":"大手製薬会社の事業再編は薬価政策や薬剤供給に間接的に影響する可能性。クリニックで使用する薬剤の価格動向に注意が必要。","i":"薬価や薬剤供給への影響を継続的に注視する必要がある。","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC258FO0V20C26A3000000/","d":"2026-03-28"},{"t":"介護のソラストがMBO、上場廃止へ 経営自由度高める","s":"介護サービス大手のソラストがMBOにより上場廃止する方針を発表した。経営の自由度を高めることが目的とされている。","m":"介護業界の再編は高齢患者の介護サービス連携に影響する可能性。地域包括ケアシステムでの連携先変化を注視。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC24B530U6A320C2000000/","d":"2026-03-28"},{"t":"杏林製薬、ヤンセンファーマと販売の契約締結 抗結核薬で","s":"杏林製薬がヤンセンファーマと抗結核薬の販売契約を締結した。結核治療薬の供給体制強化を図る取り組みとなっている。","m":"結核治療薬の供給安定化により、内科での結核患者対応がより適切に行える。感染症対応の選択肢拡大につながる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC2587B0V20C26A3000000/","d":"2026-03-28"},{"t":"川崎重工、介護職員の行動を自動で記録できるシステム 業務改善に","s":"川崎重工が介護職員の行動を自動記録するシステムを開発し、業務改善に活用する。介護現場での労働効率化とデジタル化が進んでいる。","m":"介護分野での業務効率化技術は医療現場でも応用可能。スタッフの働き方改善や業務最適化への示唆がある。","i":"将来的にクリニックでも類似の職員行動記録システムの導入可能性を検討する価値がある。","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC254ZM0V20C26A3000000/","d":"2026-03-28"},{"t":"スズケン､セイノーHDなどと資本業務提携 メーカー物流を強化","s":"医薬品卸大手のスズケンがセイノーホールディングスなどと資本業務提携を発表。メーカー物流機能の強化が目的。医薬品流通体制の効率化を図る取り組み。","m":"医薬品卸の物流強化は薬剤供給の安定化につながる。クリニックの薬剤調達に間接的にプラス効果が期待される。","i":"薬剤調達の安定性向上が期待できるが、直接的な対応は不要。","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOFD255FE0V20C26A3000000/","d":"2026-03-28"},{"t":"ジェイファーマ上場 吉武社長「独自の胆道がん薬を世界で発売」","s":"ジェイファーマが株式上場し、独自開発の胆道がん治療薬の世界展開を目指している。がん治療薬の新たな選択肢として注目される。","m":"胆道がん治療薬は専門性が高く、内科クリニックでは直接的な関連は少ない。製薬業界の動向として把握。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC255L00V20C26A3000000/","d":"2026-03-28"},{"t":"「ファンド病院」監視へ、4月から財務諸表の提出義務化 営利重視防ぐ","s":"4月から病院経営に投資ファンドが関与する場合、財務諸表の提出が義務化される。営利重視の経営を防ぐ監視体制が強化される。","m":"医療法人への規制強化の一環として、財務透明性の要求が高まっている。コンプライアンス対応が重要。","i":"医療法人の財務管理体制を見直し、透明性の高い経営報告体制を構築する必要がある。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUA240OQ0U6A320C2000000/","d":"2026-03-28"},{"t":"アステラス、中之島クロスのラボ公開 ロボット・AIで細胞培養自動化","s":"アステラス製薬が中之島クロスの研究所で、ロボットとAIを活用した細胞培養の自動化システムを公開した。創薬研究の効率化が進んでいる。","m":"製薬会社の研究開発効率化は新薬開発期間短縮につながり、将来的に治療選択肢の拡大に寄与する可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF241070U6A320C2000000/","d":"2026-03-28"},{"t":"静岡県、医療産業集積拠点に4社誘致 スタートアップとの協業も","s":"静岡県が医療産業集積拠点に4社を誘致し、スタートアップとの協業も推進している。地方での医療産業育成が進んでいる。","m":"地方自治体の医療産業振興策は、新しい医療技術やサービスの創出につながる可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOCC246VD0U6A320C2000000/","d":"2026-03-28"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチの効果を高めるには「痛気持ちいい」程度より強めに伸ばすことが重要という研究結果。適切なストレッチ方法に関する最新知見。","m":"患者への生活指導や健康相談で活用できる情報。特に整形外科的な症状を持つ患者への指導に有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-03-28"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクと関連があることが研究で判明。食事のタイミングが骨の健康に影響を与える可能性が示された。","m":"高齢患者の多いクリニックでは骨折予防が重要な課題。食事指導による予防医療として活用できる有用な情報。","i":"患者の生活習慣指導で食事タイミングの重要性を説明し、骨折予防につなげる。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-03-28"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法整備が提言され、精密検査受診率向上が急務とされている。検診体制強化の制度化が進む可能性。","m":"当院での健診・検診業務拡大機会。職域検診制度化により、企業からの検診受託増加の可能性。","i":"がん検診関連の制度変更を注視し、検診業務拡大や精密検査対応体制の整備を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-03-28"},{"t":"不調の多くは過剰から 頑張り過ぎず、体の声に耳傾けて","s":"不調の多くは過剰な行動から生じるという考え方について。頑張り過ぎず体の声に耳を傾けることの重要性を説く健康に関する記事。","m":"患者の心身の健康管理に関する考え方として参考になる。ストレス関連疾患の患者への指導や説明に活用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD258CZ0V20C26A2000000/","d":"2026-03-28"},{"t":"患者の血管ソックリ再現 東北大発新興、カテーテル治療の精度向上へ","s":"東北大学発の新興企業が患者の血管を精密に再現する技術を開発し、カテーテル治療の精度向上を目指している。","m":"循環器内科を有する当院にとって、カテーテル治療の精度向上技術は診療の質向上に直結。技術動向と実用化時期を継続監視が必要。","i":"循環器診療での治療精度向上技術として、将来的な導入検討や関連医療機関との連携可能性を注視。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC1684H0W6A310C2000000/","d":"2026-03-28"},{"t":"睡眠リズム、起きる時間で調整してみよう","s":"睡眠リズムの調整には起きる時間を一定にすることが重要という睡眠に関する知見。良質な睡眠のための具体的な方法について。","m":"睡眠障害や不眠を訴える患者への生活指導で活用できる情報。内科診療での患者指導に有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG116UR0R10C26A3000000/","d":"2026-03-28"},{"t":"Prevalence and incidence of infections among people with type 2 diabetes: a systematic review and meta-analysis.","s":"2型糖尿病患者における感染症の有病率と発生率を評価したメタアナリシス。70の研究を分析し、2型糖尿病患者では重篤な歯周病などの感染症リスクが高いことを示している。","m":"糖尿病内科を持つクリニックでは、感染症予防の重要性を患者に啓発する根拠となる。歯科との連携強化も検討価値がある。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41886636/","d":"2026-03-27"},{"t":"Safety of GLP-1 and Dual GLP-1/GIP Receptor Agonists in Preconception, Pregnancy, and Lactation: A Systematic Review of Maternal, Fetal, and Neonatal Outcomes.","s":"GLP-1受容体作動薬と二重受容体作動薬の妊娠期・授乳期における安全性を評価したシステマティックレビュー。妊娠可能年齢女性での使用が増加しているが、妊娠中の安全性データは限定的。","m":"糖尿病治療でGLP-1薬を使用する際、女性患者への妊娠・授乳期のリスク説明が重要。診療ガイドライン更新に注意が必要。","i":"GLP-1薬処方時は妊娠可能性の確認と適切な避妊指導を徹底する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41885132/","d":"2026-03-27"},{"t":"Incretin polyagonists as an alternative to bariatric surgery to manage obesity.","s":"インクレチン多重作動薬が肥満治療における外科手術の代替選択肢として注目されている。二重・三重作動薬は外科手術に匹敵する体重減少効果を示すクリニカル試験結果が報告されている。","m":"糖尿病・循環器内科で肥満患者が多い中、薬物治療による大幅な減量効果は診療方針に大きく影響する可能性がある。","i":"肥満症治療の選択肢拡大に備え、新薬情報の収集と適応患者の選定基準を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41884205/","d":"2026-03-27"},{"t":"[Research advances on the targeted programmed cell death regulatory network for treatment of refractory diabetic wounds].","s":"Refractory diabetic wounds are severe complications of diabetes mellitus, for which conventional treatments yield limited efficacy. Recent studies have demonstrated that the core pathogenesis lies in the dysregulation of the programmed cell death regulatory network induced by the hyperglycemic microenvironment. Specifically, excessive activation of lytic cell death such as necroptosis, ferroptosis, and pyroptosis drives persistent inflammation; while impairment of non-lytic cell death including apoptosis and cytoprotective autophagy as well as efferocytosis dysfunction results in impaired initiation of the inflammation resolution program. Distinct cell death pathways form a dynamic network through shared regulatory hubs and downstream signaling crosstalk, ultimately locking the wound in a vicious cycle of \"cell death-inflammation-repair impairment\". This review systematically elaborates on the dysregulation characteristics and interaction mechanisms of the programmed cell death regulatory network in diabetic wounds, and discusses the application prospects of combination therapies and precision stratified treatment. &#x7cd6;&#x5c3f;&#x75c5;&#x96be;&#x6108;&#x521b;&#x9762;&#x662f;&#x7cd6;&#x5c3f;&#x75c5;&#x4e25;&#x91cd;&#x5e76;&#x53d1;&#x75c7;&#xff0c;&#x4f20;&#x7edf;&#x6cbb;&#x7597;&#x6548;&#x679c;&#x6709;&#x9650;&#x3002;&#x8fd1;&#x5e74;&#x7814;&#x7a76;&#x8868;&#x660e;&#xff0c;&#x5176;&#x75c5;&#x7406;&#x6838;&#x5fc3;&#x5728;&#x4e8e;&#x9ad8;&#x7cd6;&#x5fae;&#x73af;&#x5883;&#x5bfc;&#x81f4;&#x7684;&#x7a0b;&#x5e8f;&#x6027;&#x7ec6;&#x80de;&#x6b7b;&#x4ea1;&#x8c03;&#x63a7;&#x7f51;&#x7edc;&#x5931;&#x8c03;&#xff0c;&#x5177;&#x4f53;&#x8868;&#x73b0;&#x4e3a;&#x574f;&#x6b7b;&#x6027;&#x51cb;&#x4ea1;&#x3001;&#x94c1;&#x6b7b;&#x4ea1;&#x3001;&#x7126;&#x4ea1;&#x7b49;&#x88c2;&#x89e3;&#x6027;&#x7ec6;&#x80de;&#x6b7b;&#x4ea1;&#x8fc7;&#x5ea6;&#x6fc0;&#x6d3b;&#x9a71;&#x52a8;&#x708e;&#x75c7;&#x6301;&#x7eed;&#xff1b;&#x51cb;&#x4ea1;&#x3001;&#x4fdd;&#x62a4;&#x6027;&#x7ec6;&#x80de;&#x81ea;&#x566c;&#x7b49;&#x975e;&#x88c2;&#x89e3;&#x6027;&#x7ec6;&#x80de;&#x6b7b;&#x4ea1;&#x53d7;&#x635f;&#x53ca;&#x80de;&#x846c;&#x4f5c;&#x7528;&#x969c;&#x788d;&#x5bfc;&#x81f4;&#x708e;&#x75c7;&#x6d88;&#x9000;&#x7a0b;&#x5e8f;&#x53d7;&#x963b;&#x3002;&#x5404;&#x6b7b;&#x4ea1;&#x9014;&#x5f84;&#x901a;&#x8fc7;&#x5171;&#x4eab;&#x8c03;&#x63a7;&#x67a2;&#x7ebd;&#x548c;&#x4e0b;&#x6e38;&#x4fe1;&#x53f7;&#x4e32;&#x6270;&#x5f62;&#x6210;&#x52a8;&#x6001;&#x7f51;&#x7edc;&#xff0c;&#x6700;&#x7ec8;&#x4f7f;&#x521b;&#x9762;&#x9677;&#x5165;&#x201c;&#x6b7b;&#x4ea1;&#x2014;&#x708e;&#x75c7;&#x2014;&#x4fee;&#x590d;&#x969c;&#x788d;&#x201d;&#x7684;&#x6076;&#x6027;&#x5faa;&#x73af;&#x3002;&#x8be5;&#x6587;&#x7cfb;&#x7edf;&#x9610;&#x8ff0;&#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x4e2d;&#x7a0b;&#x5e8f;&#x6027;&#x7ec6;&#x80de;&#x6b7b;&#x4ea1;&#x8c03;&#x63a7;&#x7f51;&#x7edc;&#x7684;&#x5931;&#x8c03;&#x7279;&#x5f81;&#x3001;&#x4ea4;&#x4e92;&#x673a;&#x5236;&#xff0c;&#x5e76;&#x63a2;&#x8ba8;&#x7ec4;&#x5408;&#x7597;&#x6cd5;&#x4e0e;&#x7cbe;&#x51c6;&#x5206;&#x5c42;&#x6cbb;&#x7597;&#x7684;&#x5e94;&#x7528;&#x524d;&#x666f;&#x3002;.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41881587/","d":"2026-03-27"},{"t":"[Mechanism of actions and reflections of Masquelet induced membrane technique in diabetic wound].","s":"Diabetic wounds are hindered in the healing process due to chronic inflammation , vasculari-zation disorder, and abnormal expression of growth factors caused by the high glucose microenvironment. Masquelet induced membrane technique (hereinafter referred to as the induced membrane technique) creates a bioactive membrane composed of various cellular components and rich in growth factors and microvessels by inserting bone cement into the wound. The membrane mainly promotes wound healing by remodeling the inflammatory microenvironment, promoting functional angiogenesis, and producing endogenous growth factors. This article briefly explains the mechanism by which the induced membrane technique improves wound healing and summarizes its clinical application in diabetic wounds. It is expected to provide new ideas and effective means for the clinical treatment of difficult-to-heal diabetic wounds. Future research needs to focus on the key molecular pathways for the application of the induced membrane technique in therapy and the development of new membrane induction materials, so as to provide new strategies for the treatment of diabetic wounds. &#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x56e0;&#x9ad8;&#x7cd6;&#x5fae;&#x73af;&#x5883;&#x6240;&#x81f4;&#x6162;&#x6027;&#x708e;&#x75c7;&#x3001;&#x8840;&#x7ba1;&#x65b0;&#x751f;&#x969c;&#x788d;&#x53ca;&#x751f;&#x957f;&#x56e0;&#x5b50;&#x8868;&#x8fbe;&#x5f02;&#x5e38;&#x7b49;&#x56e0;&#x7d20;&#xff0c;&#x5bfc;&#x81f4;&#x6108;&#x5408;&#x8fc7;&#x7a0b;&#x53d7;&#x963b;&#x3002;Masquelet&#x8bf1;&#x5bfc;&#x819c;&#x6280;&#x672f;&#xff08;&#x4ee5;&#x4e0b;&#x7b80;&#x79f0;&#x8bf1;&#x5bfc;&#x819c;&#x6280;&#x672f;&#xff09;&#x901a;&#x8fc7;&#x5728;&#x521b;&#x9762;&#x7f6e;&#x5165;&#x9aa8;&#x6c34;&#x6ce5;&#x4ece;&#x800c;&#x5728;&#x5c40;&#x90e8;&#x5f62;&#x6210;&#x4e00;&#x4e2a;&#x7531;&#x591a;&#x79cd;&#x7ec6;&#x80de;&#x6210;&#x5206;&#x7ec4;&#x6210;&#x7684;&#x5bcc;&#x542b;&#x751f;&#x957f;&#x56e0;&#x5b50;&#x53ca;&#x5fae;&#x8840;&#x7ba1;&#x7684;&#x751f;&#x7269;&#x6d3b;&#x6027;&#x819c;&#x3002;&#x8be5;&#x819c;&#x4e3b;&#x8981;&#x901a;&#x8fc7;&#x91cd;&#x5851;&#x708e;&#x75c7;&#x5fae;&#x73af;&#x5883;&#x3001;&#x4fc3;&#x8fdb;&#x529f;&#x80fd;&#x6027;&#x8840;&#x7ba1;&#x65b0;&#x751f;&#x3001;&#x4ea7;&#x751f;&#x5185;&#x6e90;&#x6027;&#x751f;&#x957f;&#x56e0;&#x5b50;3&#x79cd;&#x9014;&#x5f84;&#x4fc3;&#x8fdb;&#x521b;&#x9762;&#x6108;&#x5408;&#x3002;&#x8be5;&#x6587;&#x5bf9;&#x8bf1;&#x5bfc;&#x819c;&#x6280;&#x672f;&#x6539;&#x5584;&#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x6108;&#x5408;&#x7684;&#x673a;&#x5236;&#x8fdb;&#x884c;&#x4e86;&#x7b80;&#x8981;&#x9610;&#x8ff0;&#xff0c;&#x5e76;&#x5bf9;&#x5176;&#x5728;&#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x4e2d;&#x7684;&#x4e34;&#x5e8a;&#x5e94;&#x7528;&#x8fdb;&#x884c;&#x4e86;&#x68b3;&#x7406;&#xff0c;&#x4ee5;&#x671f;&#x4e3a;&#x4e34;&#x5e8a;&#x6cbb;&#x7597;&#x7cd6;&#x5c3f;&#x75c5;&#x96be;&#x6108;&#x521b;&#x9762;&#x63d0;&#x4f9b;&#x65b0;&#x7684;&#x601d;&#x8def;&#x548c;&#x6709;&#x6548;&#x624b;&#x6bb5;&#x3002;&#x672a;&#x6765;&#x7814;&#x7a76;&#x9700;&#x805a;&#x7126;&#x5e94;&#x7528;&#x8bf1;&#x5bfc;&#x819c;&#x6280;&#x672f;&#x6cbb;&#x7597;&#x7684;&#x5173;&#x952e;&#x5206;&#x5b50;&#x901a;&#x8def;&#x53ca;&#x65b0;&#x578b;&#x819c;&#x8bf1;&#x5bfc;&#x6750;&#x6599;&#x7684;&#x5f00;&#x53d1;&#xff0c;&#x4e3a;&#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x6cbb;&#x7597;&#x63d0;&#x4f9b;&#x65b0;&#x7684;&#x7b56;&#x7565;&#x3002;.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41881577/","d":"2026-03-27"},{"t":"Cellular Heterogeneity in Aortic Aneurysm and Dissection: Molecular Mechanisms and Therapeutic Opportunities.","s":"大動脈瘤・解離の病態における細胞不均一性の分子メカニズムと治療機会について解説したレビュー。平滑筋細胞、血管内皮細胞、免疫細胞、線維芽細胞の役割に焦点を当てている。","m":"循環器内科での大動脈疾患管理において、将来的な治療戦略の理解に役立つ基礎的知見。現在の診療に直接的影響は少ない。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41886549/","d":"2026-03-27"},{"t":"Early aspirin withdrawal versus dual antiplatelet therapy in high-risk patients after percutaneous coronary intervention: Meta-analysis of randomized trials.","s":"PCI後の高リスク患者において、早期アスピリン中止とP2Y12阻害薬単剤療法の安全性を評価したメタアナリシス。従来の12か月間二抗血小板療法と比較検討している。","m":"循環器内科でのPCI後管理において、出血リスクと血栓リスクのバランスを考慮した治療方針の参考となる重要な知見。","i":"PCI後患者の抗血小板療法方針について、最新エビデンスを踏まえた見直しを検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41886437/","d":"2026-03-27"},{"t":"Cardiotoxicity Challenges in Nanomaterial: Risk Assessment, Mechanisms, and Mitigation Strategies.","s":"ナノマテリアルによる心毒性のリスク評価、メカニズム、軽減戦略について包括的にレビューした論文。in vitro、in vivo、organ-on-chipプラットフォームでの評価手法を探討している。","m":"ナノマテリアルの医療応用が進む中、将来的な安全性評価の知見として参考になるが、現在のクリニック診療への直接的影響は限定的。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41884277/","d":"2026-03-27"},{"t":"Prognostic Value of Microvascular Resistance Reserve in Coronary Artery Disease: A Systematic Review and Meta-Analysis.","s":"Microvascular resistance reserve (MRR) is a novel index for evaluating coronary microvascular function independently of epicardial disease. Its prognostic significance in coronary artery disease (CAD) remains uncertain. The aim of this study was to assess the association between MRR and adverse cardiovascular outcomes across various CAD presentations. A systematic review and meta-analysis was conducted according to Preferred Reporting Items for Systematic Reviews and Meta-Analyses guidelines. MEDLINE and Embase were searched from January 2019 to January 2025 for prospective studies reporting HRs for major adverse cardiovascular events in relation to MRR. Risk for bias was assessed using the Quality in Prognosis Studies tool. Pooled HRs were calculated using a random-effects model; heterogeneity was evaluated using the I2 statistic. Five studies (n = 3,186) were included. Higher MRR was significantly associated with lower risk for adverse events (HR per unit increase: 0.75; 95% CI: 0.64-0.88; I2 = 80.9%). When dichotomized, low MRR conferred a more than 2-fold increased risk for major adverse cardiovascular events (HR: 2.39; 95% CI: 1.66-3.43). Subgroup analysis showed a stronger prognostic effect for ST-segment elevation myocardial infarction (HR: 0.46) vs stable CAD (HR: 0.86; P for interaction &lt; 0.0001). Threshold analysis identified MRR &#x2265; 3 as optimal for sensitivity (58.9%) and rule-out performance, while lower thresholds improved specificity. MRR is a robust, independent predictor of cardiovascular outcomes of both acute and chronic CAD. Its prognostic impact is particularly pronounced for acute coronary syndrome. A threshold of 3 provides the best prognostic balance, supporting its integration into invasive physiological assessment for risk stratification.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41881651/","d":"2026-03-27"},{"t":"[Mechanism of actions and reflections of Masquelet induced membrane technique in diabetic wound].","s":"Diabetic wounds are hindered in the healing process due to chronic inflammation , vasculari-zation disorder, and abnormal expression of growth factors caused by the high glucose microenvironment. Masquelet induced membrane technique (hereinafter referred to as the induced membrane technique) creates a bioactive membrane composed of various cellular components and rich in growth factors and microvessels by inserting bone cement into the wound. The membrane mainly promotes wound healing by remodeling the inflammatory microenvironment, promoting functional angiogenesis, and producing endogenous growth factors. This article briefly explains the mechanism by which the induced membrane technique improves wound healing and summarizes its clinical application in diabetic wounds. It is expected to provide new ideas and effective means for the clinical treatment of difficult-to-heal diabetic wounds. Future research needs to focus on the key molecular pathways for the application of the induced membrane technique in therapy and the development of new membrane induction materials, so as to provide new strategies for the treatment of diabetic wounds. &#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x56e0;&#x9ad8;&#x7cd6;&#x5fae;&#x73af;&#x5883;&#x6240;&#x81f4;&#x6162;&#x6027;&#x708e;&#x75c7;&#x3001;&#x8840;&#x7ba1;&#x65b0;&#x751f;&#x969c;&#x788d;&#x53ca;&#x751f;&#x957f;&#x56e0;&#x5b50;&#x8868;&#x8fbe;&#x5f02;&#x5e38;&#x7b49;&#x56e0;&#x7d20;&#xff0c;&#x5bfc;&#x81f4;&#x6108;&#x5408;&#x8fc7;&#x7a0b;&#x53d7;&#x963b;&#x3002;Masquelet&#x8bf1;&#x5bfc;&#x819c;&#x6280;&#x672f;&#xff08;&#x4ee5;&#x4e0b;&#x7b80;&#x79f0;&#x8bf1;&#x5bfc;&#x819c;&#x6280;&#x672f;&#xff09;&#x901a;&#x8fc7;&#x5728;&#x521b;&#x9762;&#x7f6e;&#x5165;&#x9aa8;&#x6c34;&#x6ce5;&#x4ece;&#x800c;&#x5728;&#x5c40;&#x90e8;&#x5f62;&#x6210;&#x4e00;&#x4e2a;&#x7531;&#x591a;&#x79cd;&#x7ec6;&#x80de;&#x6210;&#x5206;&#x7ec4;&#x6210;&#x7684;&#x5bcc;&#x542b;&#x751f;&#x957f;&#x56e0;&#x5b50;&#x53ca;&#x5fae;&#x8840;&#x7ba1;&#x7684;&#x751f;&#x7269;&#x6d3b;&#x6027;&#x819c;&#x3002;&#x8be5;&#x819c;&#x4e3b;&#x8981;&#x901a;&#x8fc7;&#x91cd;&#x5851;&#x708e;&#x75c7;&#x5fae;&#x73af;&#x5883;&#x3001;&#x4fc3;&#x8fdb;&#x529f;&#x80fd;&#x6027;&#x8840;&#x7ba1;&#x65b0;&#x751f;&#x3001;&#x4ea7;&#x751f;&#x5185;&#x6e90;&#x6027;&#x751f;&#x957f;&#x56e0;&#x5b50;3&#x79cd;&#x9014;&#x5f84;&#x4fc3;&#x8fdb;&#x521b;&#x9762;&#x6108;&#x5408;&#x3002;&#x8be5;&#x6587;&#x5bf9;&#x8bf1;&#x5bfc;&#x819c;&#x6280;&#x672f;&#x6539;&#x5584;&#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x6108;&#x5408;&#x7684;&#x673a;&#x5236;&#x8fdb;&#x884c;&#x4e86;&#x7b80;&#x8981;&#x9610;&#x8ff0;&#xff0c;&#x5e76;&#x5bf9;&#x5176;&#x5728;&#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x4e2d;&#x7684;&#x4e34;&#x5e8a;&#x5e94;&#x7528;&#x8fdb;&#x884c;&#x4e86;&#x68b3;&#x7406;&#xff0c;&#x4ee5;&#x671f;&#x4e3a;&#x4e34;&#x5e8a;&#x6cbb;&#x7597;&#x7cd6;&#x5c3f;&#x75c5;&#x96be;&#x6108;&#x521b;&#x9762;&#x63d0;&#x4f9b;&#x65b0;&#x7684;&#x601d;&#x8def;&#x548c;&#x6709;&#x6548;&#x624b;&#x6bb5;&#x3002;&#x672a;&#x6765;&#x7814;&#x7a76;&#x9700;&#x805a;&#x7126;&#x5e94;&#x7528;&#x8bf1;&#x5bfc;&#x819c;&#x6280;&#x672f;&#x6cbb;&#x7597;&#x7684;&#x5173;&#x952e;&#x5206;&#x5b50;&#x901a;&#x8def;&#x53ca;&#x65b0;&#x578b;&#x819c;&#x8bf1;&#x5bfc;&#x6750;&#x6599;&#x7684;&#x5f00;&#x53d1;&#xff0c;&#x4e3a;&#x7cd6;&#x5c3f;&#x75c5;&#x521b;&#x9762;&#x6cbb;&#x7597;&#x63d0;&#x4f9b;&#x65b0;&#x7684;&#x7b56;&#x7565;&#x3002;.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41881577/","d":"2026-03-27"},{"t":"Eptinezumab With Patient Education for Chronic Migraine and Medication-Overuse Headache: The Randomized, Placebo-Controlled RESOLUTION Trial.","s":"慢性片頭痛と薬物乱用頭痛に対するエプチネズマブと患者教育の併用効果を評価したRESOLUTION試験。76の専門クリニックで実施されたランダム化比較試験の結果。","m":"頭痛専門外来は持たないが、片頭痛患者は多く受診する。新しい治療選択肢として情報を把握しておく価値がある。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41886713/","d":"2026-03-27"},{"t":"Examining the characteristics of patients with long-term impaired work ability in primary health care - a cross-sectional study.","s":"プライマリケア患者の長期就労能力障害の特性を調査した横断研究。スウェーデンの40のプライマリケアセンターで実施され、243名の患者を対象としている。","m":"就労能力に関する研究だが、海外のプライマリケア研究であり、日本のクリニック経営への直接的示唆は限定的。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41866989/","d":"2026-03-27"},{"t":"Features of mobile apps for diabetic kidney disease self-management: A scoping review.","s":"Diabetic kidney disease (DKD) is a chronic complication of diabetes mellitus (DM). DKD and chronic kidney disease (CKD) are both long-term conditions requiring ongoing patient care. Individuals living with DKD or CKD can benefit from mobile apps that support effective self-management. However, limited evidence is available about what mobile apps features are commonly included for DKD. This scoping review aimed to identify the features of mobile applications on self-management for individuals with DKD, DM or CKD. The review followed the Joanna Briggs Institute (JBI) methodology for scoping reviews and adhered to PRISMA-ScR reporting guidelines. Five databases (PubMed, Scopus, SAGE Journals, ScienceDirect, and Web of Science) were searched from inception to February 26, 2025. Studies were included if they reported on mobile apps supporting self-management in adults with DKD, DM or CKD. DM and CKD apps were included due to similar self-management needs such as blood sugar or blood pressure tracking that are also relevant to people with DKD. Data were extracted on study characteristics, app features, use of technology, integration with care teams, and reported outcomes. Out of 3521 records identified, eleven studies met the inclusion criteria. Five studies focused on CKD, two on DKD, and four on diabetes. Across the eleven mobile apps reviewed, four core domains of self-management were identified: self-care monitoring (91%), educational components (64%), patient support and motivation (100%), and performance incentives (18%). Four apps employed wearable devices and incorporated supportive devices such as Bluetooth glucometers. However, only two apps included real-time communication features with providers integration with healthcare teams and gamification strategies. Mobile apps targeting DKD frequently incorporate monitoring, education, and motivational features. However, consistent integration with healthcare providers and incentive-based engagement strategies remains limited. Future app development should emphasise personalised feedback, clinical integration, and sustained engagement mechanisms to enhance usability and impact.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41860840/","d":"2026-03-27"},{"t":"IMPlementing IMProved Asthma self-management as RouTine (IMP2ART) in UK primary care: An internal pilot for a cluster randomised controlled trial.","s":"Supported self-management that includes a personalised asthma action plan and regular professional review, reduces unscheduled consultations, and improves asthma outcomes and quality of life. However, despite unequivocal inter/national guideline recommendations, supported self-management is poorly implemented in UK primary care. The IMPlementing IMProved Asthma self-management as RouTine (IMP2ART) implementation strategy (including facilitated provision of patient, professional, and organisational resources) has been developed to address this challenge and is being evaluated in a UK-wide cluster randomised controlled trial (cRCT). The internal pilot aimed to assess the trial recruitment processes, delivery of and general practice engagement with the implementation strategy to inform the progression criteria. Using mixed methods, we recruited 12 general practices and monitored trial processes and IMP2ART delivery through team logs and automated data (e.g., use of patient online resources; uptake of practice education modules). Qualitative interviews with general practice staff and IMP2ART facilitators explored feasibility and acceptability of the implementation strategy. We randomised 12 general practices to the IMP2ART implementation strategy arm (n&#x2009;=&#x2009;6) or usual asthma care (control, n&#x2009;=&#x2009;6). One control practice withdrew post-randomisation following concerns about data sharing. Most components were delivered successfully to the implementation group practices so that we met our progression criteria. In all six practices, the facilitated workshop was arranged within 12 weeks of randomisation and the team education module was completed (median 11 accesses/practice), the in-depth module was completed by 'the healthcare professional responsible for asthma reviews' (range 3-7 professionals/practice), and the asthma review template was successfully downloaded to the practice system. All six implementation practices received the baseline and first monthly audit and feedback report although there were delays in this process due to national-level governance changes. Practices' perceptions of IMP2ART were encouraging. In general, they participated in the patient, professional and organisational implementation strategies and reported positive experiences of the trial. The study provides evidence that the IMP2ART trial is feasible, and the implementation strategy is acceptable with only minor adjustments to trial processes. The IMP2ART strategy is now being tested in a UK-wide cRCT [ref: ISRCTN15448074], evaluating implementation (action plan ownership) and health outcomes (unscheduled care).","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41860818/","d":"2026-03-27"},{"t":"Atezolizumab plus FOLFOX for Stage III Mismatch Repair-Deficient Colon Cancer.","s":"ステージIII ミスマッチ修復欠損大腸癌に対するアテゾリズマブとFOLFOXの併用療法を評価した第3相試験。アテゾリズマブ追加による無病生存期間への影響を検討している。","m":"消化器内科・外科で大腸癌治療に関わる場合の最新治療情報として参考になるが、専門的な腫瘍治療の内容。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41880612/","d":"2026-03-27"},{"t":"EXPLORING THE IMPACT OF GUT MICROBIOTA MODULATION ON COLORECTAL CANCER THERAPY: A BIBLIOMETRIC ANALYSIS OF PROBIOTIC AND PREBIOTIC INTERVENTIONS.","s":"大腸癌治療における腸内細菌叢調節（プロバイオティクス・プレバイオティクス）の効果に関する文献計量学的分析。2020-2025年の116研究を分析し、中国が研究をリードしていることを示している。","m":"消化器疾患治療において腸内細菌叢の重要性が注目される中、プロバイオティクス治療の根拠として今後参考となる可能性がある。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41880417/","d":"2026-03-27"},{"t":"EFFECTIVENESS OF LIGAMENTUM TERES CARDIOPEXY FOR GERD RESOLUTION AFTER SLEEVE GASTRECTOMY: A META-ANALYSIS AND SYSTEMATIC REVIEW.","s":"袖状胃切除術後のGERD治療として靱帯縫合術の有効性と安全性を評価したメタアナリシス。GERD症状の寛解と制酸薬使用減少への影響を分析している。","m":"消化器外科の専門的内容で、当クリニックでは直接実施しない手術治療の話題。GERD管理の参考情報として留意程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41880416/","d":"2026-03-27"},{"t":"[Use of NSAIDs in inflammatory bowel disease].","s":"Health Technology Assessment (HTA) Region Stockholm conducted a systematic review evaluating the risk of flare-ups from use of non-steroidal anti-inflammatory drugs (NSAID) in patients with inflammatory bowel disease (IBD). Patients with IBD, such as ulcerative colitis and Crohn's disease, often experience pain including joint pain, pain from kidney stones, menstrual pain, and headache. Effective pain management is crucial for maintaining daily function and quality of life. There are concerns that NSAIDs may increase the risk of IBD flare-ups, and international guidelines vary in their recommendations. The overview indicates that short-term NSAID use is likely associated with a minimal or negligible increase in risk among patients with well-controlled IBD in remission. The findings are however uncertain due to limited data and methodological limitations in the included studies.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41873467/","d":"2026-03-27"},{"t":"[Colorectal cancer recurrence].","s":"This review investigates how recurrent colorectal cancer (CRC) affects ~16% of patients within 5 years after curative surgery and is linked to high mortality. Early dissemination and tumor dormancy challenge detection. Most recurrences occur in the liver, lungs, or peritoneum. Follow-up aims to detect early, but the survival benefits are uncertain. Around half of patients with recurrence may receive curative treatment, often involving surgery or chemotherapy. More research is needed to improve outcomes.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41873244/","d":"2026-03-27"},{"t":"Artificial intelligence and hearing health: a global evidence review of biases and equity implications for Africa.","s":"聴覚・聴力健康分野におけるAIの偏見と公平性への影響をアフリカを中心に検証したグローバル・エビデンス・レビュー。AIシステムが構造的偏見を埋め込む可能性について分析している。","m":"耳鼻咽喉科でのAI活用時の注意点として参考になるが、主にアフリカの低中所得国を対象とした研究で直接的関連は限定的。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41885802/","d":"2026-03-27"},{"t":"Comparing the prevalence, incidence and severity of mental disorders between deaf and hard-of-hearing and hearing adults aged 18-60: a systematic review.","s":"18-60歳の難聴・聴覚障害者と健聴者における精神疾患の有病率、発生率、重症度を比較したシステマティックレビュー。就労世代成人での精神健康格差を定量化することが目的。","m":"耳鼻咽喉科で聴覚障害患者を診る際、精神的ケアの必要性を考慮する参考となるが、専門的精神科治療は範囲外。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41883290/","d":"2026-03-27"},{"t":"Effects of photobiomodulation on oral mucositis, oral pain, xerostomia, salivary flow rate, and quality of life in patients with head and neck cancer: a systematic review and meta-analysis.","s":"頭頸部癌患者の口腔粘膜炎、口腔痛、口腔乾燥症、唾液分泌量、生活の質に対する光生物調節療法の効果を評価したメタアナリシス。30のRCT（1748名）を分析し有効性を示している。","m":"頭頸部癌治療の支持療法として有用な情報だが、当クリニックでは専門的がん治療は行わない。口腔ケアの参考程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41880047/","d":"2026-03-27"},{"t":"PD-1/PD-L1 inhibitors in recurrent or metastatic nasopharyngeal carcinoma: A systematic review and meta-analysis.","s":"Nasopharyngeal carcinoma (NPC) has a poor prognosis, largely due to immune escape. The programmed cell death protein 1 (PD-1) receptor and its ligand, PD-L1, play critical roles in this immune evasion. Consequently, blocking the PD-1/PD-L1 pathway with immune checkpoint inhibitors has become an established therapeutic strategy. We performed a systematic literature search of PubMed, Embase, and the Cochrane Library for studies published up to November 14, 2024, investigating PD-1/PD-L1 inhibitors in recurrent or metastatic NPC. The analyzed outcomes included progression-free survival (PFS), overall survival (OS), 1-year PFS rate, 1-year OS rate, objective response rate, disease control rate, and adverse events (AEs). Nine studies (comprising 10 datasets with 883 NPC patients) were included, consisting of 2 randomized controlled trials (RCTs) and 7 single-arm studies. The pooled analysis demonstrated a median PFS of 4.21 months (95% confidence interval [CI]: 2.47-5.95; P&#x2005;=&#x2005;.000; I2&#x2005;=&#x2005;78.5%) and a median OS of 16.27 months (95% CI: 14.60-17.94; P&#x2005;=&#x2005;.000; I2&#x2005;=&#x2005;0%). The pooled 1-year PFS rate was 43% (95% CI: 14%-73%; P&#x2005;=&#x2005;.004; I2&#x2005;=&#x2005;99.1%), and the 1-year OS rate was 80% (95% CI: 70%-91%; P&#x2005;=&#x2005;.000; I2&#x2005;=&#x2005;82.0%). The objective response rate was 45% (95% CI: 25%-64%; P&#x2005;=&#x2005;.000; I2&#x2005;=&#x2005;96.8%), and the disease control rate was 65% (95% CI: 48%-82%; P&#x2005;=&#x2005;.000; I2&#x2005;=&#x2005;96.4%). The incidence of any-grade AEs was 90% (95% CI: 74%-99%; P&#x2005;=&#x2005;.000; I2&#x2005;=&#x2005;94.1%), while grade &#x2265;3 AEs occurred in 34% of patients (95% CI: 12%-61%; P&#x2005;&lt;&#x2005;.001; I2&#x2005;=&#x2005;95.2%). No significant publication bias was identified. This meta-analysis summarizes the efficacy and safety profile of PD-1/PD-L1 inhibitors in recurrent or metastatic NPC. The findings highlight the need for additional randomized controlled trials to further validate the role of these therapies and provide an updated reference for clinical practice.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41861185/","d":"2026-03-27"},{"t":"Beneficial subgroups for PD-1 inhibitor plus chemotherapy in first-line treatment of advanced esophageal squamous cell carcinoma: A systematic review and meta-analysis.","s":"Esophageal cancer exhibits peak incidence in Asia and Africa, representing the sixth most common malignancy and seventh leading cause of global cancer mortality. Esophageal squamous cell carcinoma (ESCC) constitutes 90% of esophageal cancer cases. The European Medicines Agency approved programmed death 1 (PD-1) inhibitors plus chemotherapy as a first-line treatment for high PD-1-expressing ESCC. We systematically searched randomized controlled trials of PD-1 or PD-L1 inhibitors as first-line treatment from PubMed, Embase, and Cochrane Library. The following outcomes were combined: overall survival, progression-free survival, objective response rate, and treatment-related adverse events (TRAEs). Bias risk was rigorously evaluated using the Cochrane Risk of Bias Tool. RevMan 5.3 and R Studio (Boston) were utilized for data synthesis in this meta-analysis, with sensitivity analyses comparing fixed- and random-effects models to reinforce findings. A total of 4702 patients (PD-1 inhibitors plus chemotherapy: 2529; chemotherapy: 2173) were enrolled in 8 randomized controlled trials. Compared with conventional chemotherapy, first-line PD-1 inhibitors plus chemotherapy significantly improved the overall survival (hazard ratio&#x2005;=&#x2005;0.68, 95% confidence interval (CI): 0.63-0.74; P&#x2005;&lt;&#x2005;.00001) and objective response rate (relative risk [RR]&#x2005;=&#x2005;2.03, 95% CI: 1.80-2.29; P &lt; .00001) of advanced ESCC patients. Moreover, PD-1 inhibitor-based therapy provided benefits in progression-free survival (hazard ratio&#x2005;=&#x2005;0.62, 95% CI: 0.58-0.66; P&#x2005;&lt;&#x2005;.00001). But PD-1 inhibitors were not associated with statistically lower incidences of TRAEs and grade 3 to 5 TRAEs. In subgroup analyses, except the limited benefit observed in the programmed death-ligand 1 (PD-L1) combined positive score&#x2005;&lt;&#x2005;1 subgroup, none of the following factors significantly influenced the efficacy of PD-1 inhibitor therapy: advanced age, metastatic status, number of metastatic organs, or presence of liver metastases. The combination of PD-1 inhibitors with chemotherapy demonstrates superior efficacy as first-line therapy for advanced esophageal squamous cell carcinoma. Both elderly patients and those with metastatic involvement derive universal benefit without increased adverse risks. However, patients with PD-L1 combined positive score&#x2005;&lt;&#x2005;1 may experience restricted clinical benefits. Thus, more precise predictive markers are required to stratify potential responders, enabling broader patient populations to derive benefits from PD-1 inhibitor-chemotherapy regimens.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41861173/","d":"2026-03-27"},{"t":"Addressing the crises of declining vaccination rates and measles resurgence by promoting health literacy.","s":"米国で小児ワクチン接種率が低下し麻疹が再燃している危機に対し、健康リテラシーの向上による解決策を提案。MMR、DTaP、ポリオ、水痘ワクチンの接種率低下とその対策について論じている。","m":"小児科でのワクチン接種推進において、保護者の健康リテラシー向上が重要。接種率低下への対策として参考となる。","i":"小児科でワクチン接種率向上のため、保護者への健康教育と情報提供を強化する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41874088/","d":"2026-03-27"},{"t":"Pediatric COVID-19 in Korea: Lessons and Strategies for Future Disease-X Preparedness.","s":"韓国における小児COVID-19の経験と将来のDisease-X preparednessへの教訓をまとめた論文。国家レベルでの小児対応型パンデミック対策について分析している。","m":"小児科診療において、パンデミック対策の参考となる韓国の事例研究。将来の感染症対策立案時の参考情報。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41873445/","d":"2026-03-27"},{"t":"[Focus on evaluating the pneumococcal vaccine response].","s":"肺炎球菌ワクチンの免疫応答評価に焦点を当てたフランス語論文。非結合型多糖体ワクチン（PPV-23）と結合型ワクチン（PCV）の特性と効果について解説している。","m":"肺炎球菌ワクチンの理解を深める参考資料だが、基礎的な内容で現在の診療方針への直接的影響は限定的。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41700952/","d":"2026-03-27"},{"t":"Longitudinal and Multimodal Recording System to Capture Real-World Patient-Clinician Conversations for AI and Encounter Research: Protocol for an Observational Study.","s":"AIが患者と臨床医の実際の対話を多角的に記録・分析するシステムの研究プロトコル。従来の電子カルテデータだけでなく、音声・テキスト・映像を含む臨床現場の相互作用を捉える。","m":"クリニックでの患者対応の質向上や効率化に関連。AI技術の医療現場応用の進展として注目すべき研究。","i":"将来的にAI問診やコミュニケーション支援ツールの導入可能性を検討する。","src":"PubMed","p":"要注視","u":"https://pubmed.ncbi.nlm.nih.gov/41875276/","d":"2026-03-27"},{"t":"A Bilingual Arabic-English Ambient AI Scribe for Clinical Documentation: Prospective Evaluation Study.","s":"Medical ambient artificial intelligence (AI) scribes reduce documentation burden, but the current evidence is almost entirely from English systems. In the Arabic-speaking world, physicians converse mainly in Arabic and write clinical notes in English, adding cognitive burden. Due to scarce corpora in the Arabic language, the development of Arabic-enabled AI speech technologies has been challenging. Here, we address this gap by developing and evaluating a bilingual Arabic-English medical AI scribe. This study aims to evaluate the feasibility and performance of a bilingual medical Arabic-English ambient AI scribe, Sahl AI, using a full end-to-end methodology from raw audio to clinical note. A prospective, single-arm feasibility pilot study was conducted in 2 stages across outpatient clinics, inpatient services, and primary care clinics within Riyadh First Health Cluster: development and implementation. In stage 1 (development), consultation audios were collected and manually annotated to fine-tune the AI pipeline. Version 1 of Sahl AI underwent feasibility evaluation using a modified 9-item Physician Documentation Quality Instrument (PDQI-9) framework based on Likert-scale ratings. Subsequently, in stage 2 (implementation), the AI pipeline was fine-tuned, and version 2 was evaluated as a real-world deployment in family medicine clinics. Independent reviewers evaluated clinical notes. Physician experience was captured using targeted surveys. During stage 1, the AI pipeline was fine-tuned, producing version 1 of Sahl AI, which was tested in 64 clinical encounters for technical feasibility. This evaluation yielded a mean modified PQDI-9 score of 42.2 (SD 2.98) out of 45, with the model scoring 4.35 (SD 0.82) out of 5 in the accuracy domain. Following further optimization, version 2 of Sahl AI was evaluated during stage 2, using 55 real-world consultations assessed by 2 independent physician evaluators. Sahl AI achieved mean modified PDQI-9 scores of 42.4 (SD 1.84) out of 45 for Arabic and 37.8 (SD 1.10) out of 40 for English. On the Likert scale, for the accuracy domain, the mean score was 4.53 (SD 0.46) out of 5 for Arabic compared with 4.77 (SD 0.37) out of 5 for English (P=.06). Internal consistency (mean 4.94, SD 0.17) and comprehensibility (mean 4.89, SD 0.21) were the top-rated domains. The targeted survey of a larger cohort of 22 family medicine physicians using Sahl AI showed that most responding physicians agreed that notes were comprehensive and perceived potential time savings and reduced burnout. Sahl AI, a bilingual Arabic-English medical ambient AI scribe, generates accurate and high-quality notes, and in targeted postimplementation surveys, most physicians agreed that it produced comprehensive notes and perceived potential benefits for time savings and stress or burnout. This provides the first empirical basis for rigorous end-to-end ambient AI scribe evaluation in low-resource languages such as Arabic.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41875245/","d":"2026-03-27"},{"t":"An enhanced diabetic retinopathy detection approach using optimized deep learning technique.","s":"Diabetic Retinopathy (DR) remains a leading cause of vision loss among diabetic patients, underscoring the importance of early detection through reliable retinal imaging analysis. Retinal fundus images are inherently physics-driven, capturing the interactions of light with retinal tissue, including absorption, reflection, and scattering phenomena, which define the intensity and structural patterns critical for diagnosis. However, existing machine learning and optimization approaches for DR screening face challenges in handling the high-dimensional, heterogeneous, and complex physical characteristics of these images. Conventional methods often suffer from suboptimal feature selection, limited generalization, and reduced classification accuracy due to their inability to adaptively exploit image-specific patterns. To address these challenges, this study introduces a Dynamic Grasshopper Optimization Algorithm (DGOA) for feature selection, leveraging its dynamic adaptation capabilities to explore and exploit the physically meaningful feature space effectively. By incorporating adaptive parameter control, DGOA mitigates premature convergence and ensures the selection of the most discriminative features, enhancing model robustness. To further improve classification reliability, an ensemble learning classifier is integrated, combining multiple base models to leverage complementary strengths, reduce overfitting, and maximize predictive performance. The proposed physics-aware AI framework was validated on the EyePACS Retinal Fundus Images dataset, a large and diverse collection of high-resolution images reflecting variations in illumination, contrast, and tissue properties. Comparative experiments with EfficientNetV2S, MGA-CSG, and BWO-DL highlight the advantages of our approach in balancing computational efficiency, generalization, and physically informed feature extraction. The DGOA-Ensemble model achieved an accuracy of 94.6%, F1-score of 0.94, and AUC-ROC of 0.96, demonstrating its effectiveness as a robust, interpretable, and generalizable framework that bridges the gap between physics-based retinal imaging and AI-driven automated DR detection.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41872665/","d":"2026-03-27"},{"t":"Identifying postpartum depression subtypes using natural language processing and clinical notes.","s":"電子健康記録の臨床ノートから自然言語処理を用いて産後うつ病を特定する手法を開発。米国の大学医療センターで64,426名の患者データを用いて評価し、診断コードでは特定できない症例を発見。","m":"産後うつ病の早期発見にAI技術を活用する研究。小児科で産後の母親をフォローする際の参考となるが、実装は今後の課題。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41871883/","d":"2026-03-27"},{"t":"Engineering framework for curiosity-driven and humble AI in clinical decision support.","s":"臨床決定支援AIシステムのためのBODHI（バランス、開放性、診断、謙虚、探究心）フレームワークを提案。大規模言語モデルの不適切な確信度の問題に対処する二重反省アーキテクチャを開発。","m":"臨床AIシステムの信頼性向上に関する工学的研究。将来的にAI診療支援ツール導入時の判断基準として参考となる可能性がある。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41871866/","d":"2026-03-27"},{"t":"Comparison of post-discharge mortality and medical expenditures in COVID-19 patients according to mechanical ventilation and extracorporeal membrane oxygenation use: The LIFE study.","s":"COVID-19重症患者における人工呼吸器・ECMO使用と退院後の死亡率・医療費を分析した日本の研究。重症治療を受けた患者の180日後の予後と経済的負担を調査。","m":"当院では重症COVID-19治療は行わないが、退院後フォローアップの参考情報として把握しておく価値あり。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41886501/","d":"2026-03-27"},{"t":"Study protocol: A randomized controlled trial of chemoradiotherapy versus chemotherapy as neoadjuvant therapy for resectable pancreatic cancer (CSGO-HBP-027).","s":"切除可能膵がんの術前治療として化学療法単独と化学放射線療法を比較する多施設ランダム化試験のプロトコル。200名の患者を対象とした第II/III相試験。","m":"専門的ながん治療の研究で当院業務への直接的影響は限定的。消化器外科との連携時の知識として参考程度。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41886441/","d":"2026-03-27"},{"t":"Effectiveness of evidence-based nursing protocols in managing postpartum hemorrhage after vaginal delivery: a prospective observational quality-improvement evaluation.","s":"経腟分娩後の産後出血管理における evidence-based nursing protocol の有効性を評価した前向き観察研究。従来の看護ルーチンと構造化されたプロトコルを比較。","m":"産科診療は行わないが、エビデンスに基づく看護プロトコルの導入という観点で参考となる手法。","i":"","src":"PubMed","p":"参考","u":"https://pubmed.ncbi.nlm.nih.gov/41886103/","d":"2026-03-27"},{"t":"Clinical characteristics, prognostic factors, and feasibility of ICI continuation in immune checkpoint inhibitor-related pneumonitis.","s":"Immune checkpoint inhibitor (ICI)-related pneumonitis (ICI-pneumonitis) is a serious complication, whose clinical course and optimal management strategies remain inadequately elucidated. This study clarified whether post-pneumonitis ICI continuation is safe and feasible, identified risk factors for fatal outcomes or successful continuation, and assessed whether findings from patients with lung cancer can be generalized to those with other malignancies. This retrospective study analyzed data from 1,320 patients who received ICI therapy at Kyushu University Hospital between September 2014 and March 2023. Among these, 300 and 1,020 patients had lung and non-lung cancers, respectively. Clinical characteristics, treatment strategies, and outcomes were compared between the two groups. Predictors of fatal pneumonitis and successful ICI continuation were identified using univariable logistic regression. ICI-pneumonitis occurred in 96 (7.3%) patients, with a higher incidence in those with lung cancer (14.0%, [42/300]) than in those with non-lung cancers (5.3%, [54/1020]). Clinical characteristics remained similar across cancer types post-pneumonitis. Diffuse alveolar damage pattern, grade&#x2009;&#x2265;&#x2009;3 pneumonitis at diagnosis, and elevated C-reactive protein level were significant predictors of fatal pneumonitis. Among 34 patients who attempted ICI continuation, 20 (58.8%) maintained ICI treatment until disease progression. Successful ICI continuation showed a trend toward association with normal baseline lung parenchyma. The similar characteristics of ICI-pneumonitis across malignancies support the generalizability of management strategies. Approximately one-fifth of patients successfully continued ICI therapy after pneumonitis. Systematic radiological surveillance and appropriate severity-based treatment may help optimize outcomes in patients receiving ICI therapy.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41885927/","d":"2026-03-27"},{"t":"The role of health literacy in the association between nationality and health status among university students: a cross-sectional study.","s":"Immigrants often face numerous health-related challenges, which may result in a lower health status (HS) as compared with the domestic population. This study examined the association between nationality and HS among university students in Japan and the role of health literacy (HL) on this association. Web-based self-administered surveys were conducted with 1,366 university students across six of Japan's eight regions between February 20 and August 10, 2023. Nationality and HS were measured using a self-reported questionnaire, and HS was categorized into two groups: good or not good. HL was assessed by the 47-item European Health Literacy Survey. International students (61%) had a lower prevalence of good HS than Japanese students (73%) (p&#x2009;&lt;&#x2009;0.0001). Even after adjusting for sociodemographic and educational variables, international students showed a lower prevalence of good HS as compared with Japanese students (odds ratios [95% confidence interval]: 0.72 [0.53, 0.99], p&#x2009;=&#x2009;0.04). However, when considering HL level, the association attenuated (p&#x2009;=&#x2009;0.2), and the interaction of HL and nationality was observed (p&#x2009;&lt;&#x2009;0.0001). A subgroup analysis showed that international students had a higher prevalence of good HS as compared to Japanese students among the students with sufficient HL level (1.63, [1.03, 2.58], p&#x2009;=&#x2009;0.03), whereas among the students with inadequate HL level, international students had a lower prevalence of good HS (0.34, [0.20, 0.58], p&#x2009;&lt;&#x2009;0.0001). Although international students had a lower prevalence of good HS as compared to Japanese students, the direction of the association differs based on the level of HL.","m":"","i":"","src":"PubMed","p":"","u":"https://pubmed.ncbi.nlm.nih.gov/41883248/","d":"2026-03-27"},{"t":"診療報酬改定","s":"厚生労働省の診療報酬改定に関する公式情報。医療機関の経営に直接影響する制度変更の詳細が含まれている。","m":"診療報酬は当クリニックの収益基盤に直結。改定内容によって算定方式や施設基準への対応が必要。","i":"改定内容を精査し、当クリニックの各診療科への影響度を評価、必要な体制変更を検討する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-27"},{"t":"消費税と診療報酬について","s":"厚生労働省による消費税と診療報酬の関係についての公式見解。医療機関の消費税負担と補填措置に関する重要な情報。","m":"消費税は医療機関の経営を圧迫する要因。診療報酬での補填状況は収益性に直接関わる重要事項。","i":"消費税負担の実情と補填状況を確認し、必要に応じて関係機関へ意見提出を検討する。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-27"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する公式情報。感染症対策や届出基準などの情報が含まれる。","m":"感染症対策の一環として把握。当院での感染症診療時の参考情報として保管。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-27"},{"t":"Physicians Must Lead AI Integration in Medicine","s":"医師がAIの医療統合をリードすべきという提言。医療現場でのAI活用において医師の主導的役割の重要性を強調している。","m":"AI導入による診療効率化を検討する際、医師主導での適切な統合が重要。診療の質向上に直結する課題。","i":"AI技術導入時の医師の役割を明確化し、スタッフ教育体制を整備する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/physician-ai-adoption-surging-we-must-lead-its-integration-2026a100095u?src=rss","d":"2026-03-27"},{"t":"S1 Episode 2: Can Early Genetic Testing Change ATTR-CM Outcomes?","s":"ATTR心筋症における早期遺伝子検査が治療結果に与える影響について論じたポッドキャスト。専門的な心疾患の遺伝子検査と治療方針に関する最新知見を扱っている。","m":"循環器内科診療において、遺伝子検査の活用は今後重要性が増す分野。専門性の高い内容だが、循環器診療の将来的な方向性を示している。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep2-2026a10006ha?src=rss","d":"2026-03-27"},{"t":"S1 Episode 1: Rethinking Rhythm Control in ATTR-CM","s":"ATTR心筋症におけるリズムコントロールの新しい考え方について扱ったポッドキャスト。専門的な心疾患の治療戦略に関する最新の見解を提供している。","m":"循環器内科での不整脈治療に関する最新知見。専門性は高いが、循環器診療の質向上に関連する内容。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/ca8/p04/podcast-attr-cm-s1-ep1-2026a10006h9?src=rss","d":"2026-03-27"},{"t":"Preventing Deficiencies After Bariatric Surgery","s":"肥満外科手術後の栄養欠乏症の予防に関する記事。手術後の長期的な栄養管理と合併症予防について論じている。","m":"消化器外科や内科での術後管理に関連。肥満治療の一環として、栄養指導や継続的な管理の重要性を示している。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/preventing-deficiencies-after-bariatric-surgery-2026a100098g?src=rss","d":"2026-03-27"},{"t":"Higher Meat Intake, Lower Dementia Risk — But Only in APOE4","s":"APOE4遺伝子保有者において、肉類摂取量が多いと認知症リスクが低下するという研究結果。遺伝子型に基づいた個別化栄養指導の可能性を示唆している。","m":"内科での生活指導や栄養指導において、遺伝子情報を活用した個別化医療の可能性を示している。認知症予防への関心は患者ニーズも高い。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/higher-meat-intake-lower-dementia-risk-only-apoe4-carriers-2026a100098j?src=rss","d":"2026-03-27"},{"t":"FDA OKs Drug to Treat Neurologic Symptoms in Hunter Syndrome","s":"FDAがハンター症候群の神経症状を治療する新薬を承認。希少疾患に対する新しい治療選択肢が追加された。","m":"希少疾患の治療薬承認。小児科診療において、類似の希少疾患患者の治療選択肢拡大の参考となる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/fda-oks-drug-treat-neurologic-symptoms-hunter-syndrome-2026a100095l?src=rss","d":"2026-03-27"},{"t":"Don&apos;t Sleep on Heart Disease: Cardiac Risk of Sleep Disorders","s":"睡眠障害と心疾患リスクの関連について解説した記事。睡眠時無呼吸症候群などの睡眠障害が循環器疾患に与える影響と診療のポイントを論じている。","m":"内科・循環器診療において睡眠障害の評価は重要。患者の生活習慣病管理や心疾患予防に直接関連する実用的な内容。","i":"睡眠障害スクリーニングの循環器診療への組み込みと、必要に応じた専門医連携体制を検討する。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dont-sleep-heart-disease-identifying-sleep-related-cardiac-2026a100081a?src=rss","d":"2026-03-27"},{"t":"Nasal Brush Biopsy Flags Preclinical Alzheimer’s Disease","s":"鼻腔ブラシ生検によりアルツハイマー病の前臨床段階を検出する新しい診断方法に関する研究。侵襲性の低い早期診断技術として注目される。","m":"認知症の早期診断技術として将来的に重要になる可能性。内科診療での認知機能評価や専門医紹介の判断に関連。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/nasal-brush-biopsy-flags-preclinical-alzheimers-disease-2026a1000932?src=rss","d":"2026-03-27"},{"t":"Eptinezumab Sustains Long-Term Migraine Response","s":"エプチネズマブが片頭痛の長期的な治療効果を維持することが示された。持続的な片頭痛予防効果が確認されている。","m":"当院では専門的な片頭痛治療は限定的だが、患者紹介時や治療選択肢の説明時の参考情報として有用。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/eptinezumab-sustains-long-term-migraine-response-2026a10008r8?src=rss","d":"2026-03-27"},{"t":"Where Are the Adult ADHD Guidelines?","s":"成人ADHD診療ガイドラインの不足について問題提起した記事。成人期のADHD診断と治療における標準化された指針の必要性を論じている。","m":"内科や小児科での成人ADHD患者への対応指針。診断の標準化や専門医連携の重要性を示している。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/where-are-adult-adhd-guidelines-2026a100093q?src=rss","d":"2026-03-27"},{"t":"Infosys to acquire Optimum Healthcare IT in $465M deal","s":"InfosysがOptimum Healthcare ITを4億6500万ドルで買収。医療IT分野でのM&Aにより、医療機関向けITサービスの統合が進む。","m":"医療IT業界の統合動向。電子カルテや医療システムベンダーの統合は、将来的なシステム選択や保守に影響する可能性。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/infosys-acquire-optimum-healthcare-it-465m-deal","d":"2026-03-27"},{"t":"DOJ alleges NewYork-Presbyterian forces payers into anticompetitive 'all-or-nothing' contracts","s":"米司法省がNewYork-Presbyterian病院を保険者との反競争的契約で告発。「オール・オア・ナッシング」契約により市場競争を阻害したとして問題視されている。","m":"大病院の保険者との契約手法に関する法的問題。クリニック経営での保険者との契約交渉の参考となる事例。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/doj-alleges-newyork-presbyterian-forces-payers-anticompetitive-all-or-nothing-contracts","d":"2026-03-27"},{"t":"Trump admin delays nomination for new CDC director past deadline","s":"トランプ政権がCDC新長官の指名を期限内に行わず遅延。公衆衛生政策の方向性に不確実性が生じている。","m":"CDC政策の方向性は感染症対策や予防接種政策に影響。クリニックでの感染症対応や公衆衛生施策への影響を注視する必要。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/providers/trump-admin-delays-nomination-new-cdc-director-past-deadline","d":"2026-03-27"},{"t":"OpenEvidence rolls out AI medical coding feature","s":"OpenEvidenceがAI医療コーディング機能を導入。医療機関での診療情報コード化の自動化を支援する新機能を提供開始。","m":"診療報酬請求の効率化や精度向上に直結する技術。事務コスト削減や請求業務の改善に活用できる可能性。","i":"AI医療コーディングツールの導入可能性を検討し、事務効率化への活用を評価する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/health-tech/openevidence-rolls-out-ai-medical-coding-feature","d":"2026-03-27"},{"t":"The evolving state of exome and genome sequencing","s":"エクソーム・ゲノムシーケンシングの進化する現状について解説。遺伝子解析技術の発展と医療現場での活用状況を論じている。","m":"遺伝子検査技術の進歩は、将来的にクリニック診療でも活用機会が増える可能性。個別化医療の基盤技術として重要。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/evolving-state-exome-and-genome-sequencing","d":"2026-03-27"},{"t":"Study: Nearly 1 in 5 pediatric hospital deaths involve sepsis","s":"研究により小児病院での死亡事例の約5人に1人が敗血症に関連していることが判明。小児敗血症の早期認識と対応の重要性が示された。","m":"小児科診療において敗血症の早期発見は生命に関わる重要な課題。クリニックでの初期対応と適切な搬送判断が求められる。","i":"小児科診療での敗血症の早期発見・対応プロトコルの確認と、必要時の迅速な病院搬送体制を整備する。","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/study-nearly-1-5-pediatric-hospital-deaths- 響する可能性がある。当院で使用する薬剤の安定供給への間接的影響を注視すべき。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC197TY0Z10C26A3000000/","d":"2026-03-27"},{"t":"ヴィアトリス、全般性不安障害向けに飲み薬の承認取得 国内初","s":"ヴィアトリスが全般性不安障害に対する国内初の飲み薬の承認を取得。精神科領域での新たな治療選択肢が追加され、内科診療での心身症や不安症状への対応に影響する可能性。","m":"内科外来でも不安症状を訴える患者は多い。新薬承認により治療選択肢が広がり、精神科への紹介基準や連携方法の見直しが必要になる可能性。","i":"精神科連携体制の見直しと、不安障害患者への対応方針を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUC237QU0T20C26A3000000/","d":"2026-03-27"},{"t":"GEヘルスケア、乳房用の超音波診断装置 スキャン速度4割向上","s":"GEヘルスケアが乳房用超音波診断装置の新製品を発表、スキャン速度が40%向上。診断効率の向上により、検査時間の短縮と患者満足度向上が期待される。","m":"当院では乳房超音波検査は実施していないが、超音波診断技術の進歩は他の部位の検査効率向上にも応用される可能性がある。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUC236T90T20C26A3000000/","d":"2026-03-27"},{"t":"小児がん「神経芽腫」、未承認薬で臨床研究 国立がん研究センター","s":"国立がん研究センターが小児がん「神経芽腫」に対する未承認薬を用いた臨床研究を実施。新たな治療選択肢の開発に取り組む。","m":"当院小児科では直接的な治療は行わないが、患者・家族への説明や専門機関への紹介時の知識として重要。","i":"小児がん治療の進歩として小児科診療での説明・紹介時の参考とする。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOSG167TU0W6A310C2000000/","d":"2026-03-27"},{"t":"松風、虫歯治療向け樹脂の生産能力3倍に 新工場が一部完成","s":"歯科材料メーカー松風が虫歯治療向け樹脂の生産能力を3倍に拡張する新工場を一部完成。歯科治療材料の供給体制強化を図る。","m":"虫歯治療は小児科でも関連する処置。材料供給の安定化は治療コストや品質に影響する可能性。","i":"歯科材料の供給安定化と価格動向を注視し、当院での歯科処置コスト管理に反映。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUF235520T20C26A3000000/","d":"2026-03-27"},{"t":"塩野義製薬、3600億円借り入れ 田辺ファーマからのALS薬事業買収で","s":"塩野義製薬がALS治療薬事業買収のため3600億円を借り入れ。神経難病領域への大型投資により事業拡大を図る戦略。","m":"ALS治療薬の開発動向として参考。当院では直接扱わない疾患だが、神経内科領域の治療進歩の参考情報。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUF231A20T20C26A3000000/","d":"2026-03-27"},{"t":"塩野義製薬のコロナ薬「ゾコーバ」、予防向けの承認取得 経口薬で初","s":"塩野義製薬の新型コロナ治療薬「ゾコーバ」が予防目的での承認を取得。経口薬として初の予防適応となる。","m":"当院でのCOVID-19対策強化に直結。予防投与の需要増加や処方体制の見直しが必要になる可能性。","i":"予防投与の適応基準や処方方法を確認し、必要に応じて診療体制を整備する。","src":"日経","p":"要対応","u":"https://www.nikkei.com/article/DGXZQOUF231LA0T20C26A3000000/","d":"2026-03-27"},{"t":"ストレッチの効果アップ 「痛気持ちいい」より強めに伸ばす","s":"ストレッチは「痛気持ちいい」程度より強めに伸ばす方が効果的という研究結果。運動療法や理学療法の指導に活用できる知見として注目される。","m":"糖尿病や循環器疾患患者への運動指導で参考になる情報。患者への生活指導やリハビリテーション指導の質向上に活用できる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD080S80Y6A300C2000000/","d":"2026-03-27"},{"t":"「朝食抜きと遅い夕食」が骨折リスクと関連 食事の習慣に要注意","s":"朝食抜きと遅い夕食の習慣が骨折リスクと関連するという研究結果。食事習慣が骨の健康に与える影響について新たな知見が示された。","m":"高齢患者や糖尿病患者への栄養指導に活用できる情報。生活習慣指導の根拠として、食事タイミングの重要性を説明する際に有用。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD046M80U6A300C2000000/","d":"2026-03-27"},{"t":"職域がん検診の法整備を 精密検査の受診率向上が急務","s":"職域がん検診の法整備の必要性が議論されている。特に精密検査の受診率向上が急務とされている。","m":"当院の健診事業拡大の機会となる可能性。職域がん検診の法制化動向は事業戦略に直接影響する。","i":"職域がん検診の制度変更を注視し、企業健診への対応体制を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOUD11A370R10C26A3000000/","d":"2026-03-27"},{"t":"不調の多くは過剰から 頑張り過ぎず、体の声に耳傾けて","s":"体の不調の多くは過剰な活動が原因であり、頑張り過ぎずに体の声に耳を傾けることが重要という健康管理のアドバイス。ストレス管理と適度な休息の重要性を説明。","m":"患者への生活指導や健康管理アドバイスに活用できる内容。過労やストレスによる体調不良を訴える患者への指導に参考になる。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD258CZ0V20C26A2000000/","d":"2026-03-27"},{"t":"患者の血管ソックリ再現 東北大発新興、カテーテル治療の精度向上へ","s":"東北大発の新興企業が患者の血管を再現する技術を開発し、カテーテル治療の精度向上を目指している。この技術は循環器領域での診療精度向上に寄与する可能性がある。","m":"循環器を標榜するクリニックにとって、将来的な診療技術向上に繋がる可能性がある。治療精度向上は患者満足度と診療の質向上に直結する。","i":"循環器内科での治療精度向上技術として、今後の導入可能性を検討する。","src":"日経","p":"要注視","u":"https://www.nikkei.com/article/DGXZQOCC1684H0W6A310C2000000/","d":"2026-03-27"},{"t":"睡眠リズム、起きる時間で調整してみよう","s":"睡眠リズムの調整には起きる時間を一定にすることが重要という睡眠管理のアドバイス。睡眠障害や生活リズムの改善に関する実践的な指導法。","m":"不眠症や睡眠障害を訴える患者への生活指導に活用できる情報。糖尿病や循環器疾患患者の生活習慣改善指導にも応用可能。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOSG116UR0R10C26A3000000/","d":"2026-03-27"},{"t":"「5臓ないなら、ないなりに」 安藤忠雄さん、膵臓がんで再び手術","s":"建築家の安藤忠雄氏が膵臓がんで再手術を受けたことを公表。がん治療の実例として社会的関心を集める話題。","m":"膵臓がんは消化器内科で扱う疾患の一つ。著名人の闘病体験として患者啓発の参考になる可能性。","i":"","src":"日経","p":"参考","u":"https://www.nikkei.com/article/DGXZQOUD254HV0V20C26A2000000/","d":"2026-03-27"},{"t":"診療報酬改定","s":"診療報酬改定に関する厚生労働省の公式情報。医療機関の収益に直接影響する重要な制度変更。","m":"診療報酬は医療機関経営の根幹。改定内容の確認と院内システム・運用の見直しが急務。","i":"改定内容を詳細確認し、各診療科の算定要件変更への対応が必要。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000106602.html","d":"2026-03-26"},{"t":"消費税と診療報酬について","s":"消費税と診療報酬の関係について厚生労働省が説明。医療機関の税負担と収益構造に関わる重要な制度情報。","m":"医療機関は消費税の特殊な取り扱いがあるため、制度理解と適切な経営判断が重要。","i":"消費税負担の影響を分析し、経営計画の見直しが必要。","src":"厚生労働省","p":"要対応","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/iryouhoken14/index.html","d":"2026-03-26"},{"t":"ジカウイルス感染症","s":"厚生労働省によるジカウイルス感染症に関する情報。感染症対策として把握すべき疾患情報。","m":"感染症対策として認識必要だが、国内での流行リスクは低い。基礎知識として把握。","i":"","src":"厚生労働省","p":"参考","u":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000109881.html","d":"2026-03-26"},{"t":"Don&apos;t Sleep on Heart Disease: Cardiac Risk of Sleep Disorders","s":"睡眠障害が心疾患リスクを高めることについて報じている。睡眠関連の心疾患リスクの認識が重要視されている。","m":"循環器内科で心疾患患者を診療している。睡眠障害と心疾患の関連は診療に直結する重要な情報。","i":"循環器診療で睡眠障害の評価と連携体制を強化し、心疾患予防に活用。","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/dont-sleep-heart-disease-identifying-sleep-related-cardiac-2026a100081a?src=rss","d":"2026-03-26"},{"t":"Nasal Brush Biopsy Flags Preclinical Alzheimer’s Disease","s":"鼻腔ブラシ生検がアルツハイマー病の前臨床段階を発見できることが報告された。認知症の早期診断技術が進歩している。","m":"認知症の早期診断は高齢患者が多い当院でも関心が高い分野。ただし専門的検査のため直接的影響は限定的。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/nasal-brush-biopsy-flags-preclinical-alzheimers-disease-2026a1000932?src=rss","d":"2026-03-26"},{"t":"Eptinezumab Sustains Long-Term Migraine Response","s":"エプチネズマブが偏頭痛に対して長期間の効果を維持することが報告された。偏頭痛治療の新たな選択肢として注目。","m":"内科や耳鼻咽喉科での頭痛患者治療に関連。新薬情報として把握するが直接的な経営影響は小。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/eptinezumab-sustains-long-term-migraine-response-2026a10008r8?src=rss","d":"2026-03-26"},{"t":"Where Are the Adult ADHD Guidelines?","s":"成人ADHDの診療ガイドラインの必要性について議論されている記事。現在のガイドライン不足が診療の標準化を困難にしている可能性を指摘。","m":"内科での成人ADHD患者への対応方針検討の参考になる。今後ガイドライン策定により診療体制の見直しが必要になる可能性。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/where-are-adult-adhd-guidelines-2026a100093q?src=rss","d":"2026-03-26"},{"t":"Executive Dysfunction Tied to ASM Load in Resistant Epilepsy","s":"薬剤耐性てんかん患者において、抗てんかん薬の負荷量と実行機能障害の関連性を示した研究。薬剤選択と認知機能への影響について検討。","m":"専門外ではあるが、薬剤選択時の副作用考慮の重要性を示唆。他疾患での多剤併用時の参考にもなる。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/executive-dysfunction-tied-asm-load-drug-resistant-epilepsy-2026a100092z?src=rss","d":"2026-03-26"},{"t":"Spotting the Signs of Postpartum Psychosis","s":"産後精神病の早期発見・診断に関する記事。症状の見極めポイントと適切な対応方法について解説されている。","m":"小児科診療で母親の精神状態把握は重要。早期発見により適切な専門医紹介につながる。","i":"小児科での産後母親への対応時に精神症状への注意深い観察を行う","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/spotting-signs-postpartum-psychosis-2026a100091w?src=rss","d":"2026-03-26"},{"t":"Mandrola’s Top 4 Trials from ACC 2026","s":"ACC 2026で発表された循環器領域の主要臨床試験結果のトップ4について解説。循環器診療の最新エビデンスを紹介。","m":"循環器内科を標榜する当院にとって最新の臨床試験結果は診療方針に直接影響。定期的な知識アップデートが必要。","i":"循環器内科の診療プロトコール見直しと最新エビデンスに基づく治療方針の検討","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/mandrolas-top-4-trials-acc-2026-details-matter-2026a10008ti?src=rss","d":"2026-03-26"},{"t":"Arterial Stiffness Changes Linked to Developing Dementia","s":"動脈硬化の進行変化と認知症発症リスクの関連性を示した研究。血管の硬化度変化が将来の認知機能低下予測因子となる可能性。","m":"糖尿病・循環器内科での血管評価が認知症予防にもつながる。包括的な患者管理により付加価値提供が可能。","i":"糖尿病・循環器患者の動脈硬化評価を認知症予防の観点からも強化する","src":"Medscape","p":"要注視","u":"https://www.medscape.com/viewarticle/arterial-stiffness-changes-linked-development-dementia-2026a10008v7?src=rss","d":"2026-03-26"},{"t":"Scotland Introduces Newborn Screening for SMA","s":"スコットランドで脊髄性筋萎縮症（SMA）の新生児スクリーニングが導入された。早期発見による治療開始効果が期待される。","m":"小児科領域での新生児スクリーニング拡充の動向として参考。日本での導入時期と対応体制の準備が今後必要。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/s/viewarticle/scotland-introduces-newborn-screening-sma-2026a10008pc?src=rss","d":"2026-03-26"},{"t":"Exercise: A Disease-Modifying Therapy for PD","s":"パーキンソン病に対する運動療法の疾患修飾効果について解説。運動が病気の進行抑制に有効である可能性を示唆。","m":"生活習慣病患者への運動指導の重要性を再認識。パーキンソン病以外でも運動療法の積極的な推進が有効。","i":"","src":"Medscape","p":"参考","u":"https://www.medscape.com/viewarticle/exercise-disease-modifying-therapy-parkinsons-disease-2026a10003uw?src=rss","d":"2026-03-26"},{"t":"CMS reveals new Medicaid model that supports coordination for children with complex needs","s":"米国CMSが複雑なニーズを持つ小児患者の調整を支援する新しいメディケイドモデルを発表。米国の小児医療制度改革。","m":"米国の小児医療制度の動向。日本の小児科診療への直接的影響はないが、制度設計の参考情報。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/regulatory/cms-reveals-new-medicaid-model-supports-coordination-children-complex-needs","d":"2026-03-26"},{"t":"The evolving state of exome and genome sequencing","s":"エクソーム・ゲノム解析技術の進歩と臨床応用の現状について解説。個別化医療の発展における技術的進歩を紹介。","m":"将来的に個別化医療への対応検討が必要。現時点では情報収集段階だが技術動向の把握は重要。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/health-tech/evolving-state-exome-and-genome-sequencing","d":"2026-03-26"},{"t":"Study: Nearly 1 in 5 pediatric hospital deaths involve sepsis","s":"小児病院死亡例の約5分の1に敗血症が関与しているという研究結果。小児敗血症の早期診断・治療の重要性を強調。","m":"小児科での重篤感染症への対応力向上が必要。敗血症の早期診断により患者転帰改善につながる。","i":"小児科での感染症診療における敗血症の早期発見体制を強化する","src":"Fierce Healthcare","p":"要注視","u":"https://www.fiercehealthcare.com/providers/study-nearly-1-5-pediatric-hospital-deaths-involve-sepsis","d":"2026-03-26"},{"t":"Qualified Health locks in $125M in fresh funding to scale enterprise AI at health systems","s":"Qualified Healthがヘルスシステム向けエンタープライズAI拡大のため1億2500万ドルの資金調達を実施。医療AIの投資が活発化。","m":"海外の医療AI投資動向。将来的なAI技術導入の参考情報だが、現時点での直接的影響はない。","i":"","src":"Fierce Healthcare","p":"参考","u":"https://www.fiercehealthcare.com/ai-and-machine-learning/qualified-health-locks-125m-fresh-funding-scale-ai-health-systems","d":"2026-03-26"},{"t":"CVS Caremark, FTC reach settlement in insulin pricing case","s":"CVS Caremartがインスリン価格問題でFTCと和解に達した。PBMの価格設定慣行に対する規制当局の監視強化を示す事例。","m":"糖尿病診療での薬剤費負担は患者の治療継続に影響。価格動向と患者への情報提供体制の整備が必要。","i":"糖尿
